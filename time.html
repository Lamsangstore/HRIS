<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เวลาทำงาน - BizHRIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }</style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR (เหมือน index.html แต่ไฮไลท์ที่เมนูเวลาทำงาน) -->
    <aside class="w-64 bg-slate-800 text-white flex flex-col transition-all duration-300">
        <div class="p-5 flex items-center justify-center border-b border-slate-700">
            <i class="fa-solid fa-users-gear text-3xl text-blue-400 mr-3"></i>
            <h1 class="text-xl font-bold tracking-wider">Biz<span class="text-blue-400">HRIS</span></h1>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto" id="sidebar-nav">
            <a href="index.html" class="nav-item flex items-center px-4 py-3 rounded-lg hover:bg-slate-700 transition-colors">
                <i class="fa-solid fa-chart-pie w-6"></i> แดชบอร์ด
            </a>
            <!-- ไฮไลท์สีน้ำเงินที่หน้านี้ -->
            <a href="time.html" class="nav-item flex items-center px-4 py-3 rounded-lg hover:bg-slate-700 transition-colors bg-blue-600">
                <i class="fa-solid fa-clock w-6"></i> เวลาทำงาน & กะ
            </a>
            <!-- ไฟล์อื่นๆ ที่ต้องสร้างเพิ่มในอนาคต -->
            <a href="workflow.html" class="nav-item flex items-center px-4 py-3 rounded-lg hover:bg-slate-700 transition-colors">
                <i class="fa-solid fa-calendar-check w-6"></i> การอนุมัติ & วันลา
            </a>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- TOPBAR -->
        <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6 z-10">
            <h2 class="text-xl font-semibold text-slate-800">เวลาทำงานและกะ (Time & Shift)</h2>
            <div class="flex items-center space-x-4">
                <div class="flex items-center space-x-3">
                    <img src="" id="profile-img" class="w-9 h-9 rounded-full bg-slate-200">
                    <div class="text-sm">
                        <p class="font-medium text-slate-700" id="current-user-name">กำลังโหลด...</p>
                        <p class="text-xs text-slate-500" id="current-user-role">-</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- เนื้อหาหน้าระบบลงเวลา -->
        <div class="flex-1 overflow-y-auto p-6 bg-slate-50">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- กล่องลงเวลา -->
                <div class="space-y-6">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 text-center">
                        <h3 class="text-lg font-semibold text-slate-800 mb-2">ลงเวลาปฏิบัติงาน</h3>
                        <div class="text-4xl font-bold text-slate-800 my-4 tracking-wider" id="current-time-display">00:00:00</div>
                        
                        <div class="bg-slate-50 rounded-lg p-3 mb-6 text-sm flex items-center justify-center text-slate-600 border border-slate-200">
                            <i class="fa-solid fa-location-dot text-red-500 mr-2"></i> 
                            <span id="location-status">สาขาเนินปอ, พิจิตร (ระบบจำลองพิกัด)</span>
                        </div>

                        <div class="flex space-x-3">
                            <button onclick="clockIn()" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-medium py-3 rounded-xl transition-all shadow-sm">
                                <i class="fa-solid fa-sign-in-alt mr-2"></i>เข้างาน
                            </button>
                            <button onclick="clockOut()" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-medium py-3 rounded-xl transition-all shadow-sm">
                                <i class="fa-solid fa-sign-out-alt mr-2"></i>ออกงาน
                            </button>
                        </div>
                    </div>
                </div>

                <!-- กล่องประวัติการลงเวลา -->
                <div>
                    <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
                        <h3 class="text-lg font-semibold text-slate-800 mb-4"><i class="fa-solid fa-database text-blue-500 mr-2"></i>ประวัติลงเวลาวันนี้</h3>
                        <div id="realtime-logs" class="space-y-3">
                            <p class="text-slate-400 text-sm">กำลังเชื่อมต่อข้อมูล...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- JAVASCRIPT (Firebase) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADmZFoyvxq7vRD8SvV4PhnmNmnzwZQWVY",
            authDomain: "hris-21093.firebaseapp.com",
            projectId: "hris-21093",
            storageBucket: "hris-21093.firebasestorage.app",
            messagingSenderId: "549158917606",
            appId: "1:549158917606:web:cdade4e855554e57fab227",
            measurementId: "G-1FYRH1EL2W"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'bizhris-phichit';
        
        let currentUser = null;
        let userProfile = null;

        // เช็คว่าล็อกอินอยู่ไหม ถ้าไม่ ให้เด้งกลับไปหน้า index.html (ป้องกันการแอบเข้า)
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
                const docSnap = await getDoc(userRef);
                if (docSnap.exists()) {
                    userProfile = docSnap.data();
                    document.getElementById('current-user-name').textContent = userProfile.name;
                    document.getElementById('current-user-role').textContent = userProfile.role.toUpperCase();
                    document.getElementById('profile-img').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(userProfile.name)}&background=0D8ABC&color=fff`;
                    startRealtimeListeners();
                }
            } else {
                window.location.href = 'index.html'; // เตะกลับหน้าแรก
            }
        });

        // ฟังก์ชันบันทึกเวลา
        window.clockIn = async function() {
            if (!currentUser) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'time_logs'), {
                    uid: currentUser.uid, name: userProfile.name, type: 'clock_in', timestamp: new Date().toISOString()
                });
                alert("บันทึกเวลาเข้างานสำเร็จ!");
            } catch (error) { alert("Error: " + error.message); }
        }

        window.clockOut = async function() {
            if (!currentUser) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'time_logs'), {
                    uid: currentUser.uid, name: userProfile.name, type: 'clock_out', timestamp: new Date().toISOString()
                });
                alert("บันทึกเวลาออกงานสำเร็จ!");
            } catch (error) { alert("Error: " + error.message); }
        }

        // ดึงประวัติมาแสดง
        function startRealtimeListeners() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'time_logs'), (snapshot) => {
                const logs = [];
                snapshot.forEach(doc => logs.push(doc.data()));
                
                // กรองเฉพาะของตัวเอง
                const myLogs = logs.filter(l => l.uid === currentUser.uid)
                                   .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).slice(0, 5);
                
                let html = '';
                myLogs.forEach(log => {
                    const d = new Date(log.timestamp);
                    const isCheckIn = log.type === 'clock_in';
                    html += `
                        <div class="flex justify-between p-3 bg-slate-100 rounded-lg text-sm">
                            <span class="font-medium ${isCheckIn ? 'text-green-600' : 'text-red-500'}">
                                <i class="fa-solid ${isCheckIn ? 'fa-arrow-right-to-bracket' : 'fa-arrow-right-from-bracket'} mr-1"></i>
                                ${isCheckIn ? 'เข้างาน' : 'ออกงาน'}
                            </span>
                            <span class="text-slate-500">${d.toLocaleDateString('th-TH')} - ${d.toLocaleTimeString('th-TH')}</span>
                        </div>
                    `;
                });
                document.getElementById('realtime-logs').innerHTML = html || '<p class="text-slate-400">ยังไม่มีประวัติ</p>';
            });
        }

        // นาฬิกา
        setInterval(() => {
            const timeDisplay = document.getElementById('current-time-display');
            if(timeDisplay) timeDisplay.textContent = new Date().toLocaleTimeString('th-TH');
        }, 1000);
    </script>
</body>
</html>
