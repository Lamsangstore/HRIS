<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เวลาทำงาน - Lamsang Group</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1wFGzcl5Y3yEfd39sA2LTbrgeNkgVxm27">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #fafafa; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 10px; }
        
        /* Calendar Styles */
        .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 0.5rem; }
        .cal-day-header { text-align: center; font-size: 0.75rem; font-weight: 700; color: #a1a1aa; text-transform: uppercase; padding-bottom: 0.5rem; }
        .cal-cell { 
            aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 0.75rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
            position: relative; border: 2px solid transparent; background-color: #ffffff;
        }
        .cal-cell:hover:not(.empty) { border-color: #eab308; background-color: #fefce8; }
        .cal-cell.empty { background-color: transparent; cursor: default; }
        .cal-cell.today { background-color: #27272a; color: #ffffff; }
        .cal-cell.selected { border-color: #eab308; background-color: #eab308; color: #18181b; font-weight: 800; box-shadow: 0 4px 6px -1px rgba(234, 179, 8, 0.3); }
        .has-record-dot { width: 6px; height: 6px; background-color: #22c55e; border-radius: 50%; position: absolute; bottom: 6px; }
        .cal-cell.today .has-record-dot { background-color: #eab308; }
        .cal-cell.selected .has-record-dot { background-color: #18181b; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-zinc-800">

    <div id="sidebar-placeholder"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-zinc-50">
        <div id="topbar-placeholder"></div>

        <div class="flex-1 overflow-y-auto p-6 lg:p-8">
            <div class="max-w-6xl mx-auto mb-6">
                <h2 class="text-2xl font-black text-zinc-800 uppercase tracking-tight">Time & Attendance</h2>
                <p class="text-sm text-zinc-500 font-medium">ระบบลงเวลาปฏิบัติงานและประวัติย้อนหลัง</p>
            </div>

            <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- ============================================== -->
                <!-- คอลัมน์ซ้าย: กล่องลงเวลา และ ประวัติประจำวัน -->
                <!-- ============================================== -->
                <div class="lg:col-span-1 space-y-6">
                    
                    <!-- กล่องลงเวลา -->
                    <div class="bg-white rounded-[2rem] shadow-sm border border-zinc-200 p-8 text-center relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-2 bg-yellow-500"></div>
                        <h3 class="text-sm font-bold text-zinc-400 uppercase tracking-widest mb-2 mt-2">Current Time</h3>
                        <div class="text-5xl font-black text-zinc-900 my-4 tracking-tighter" id="current-time-display">00:00</div>
                        <div class="text-sm font-medium text-zinc-500 mb-6" id="current-date-display">วัน...</div>
                        
                        <div class="bg-zinc-50 rounded-xl p-3 mb-8 text-xs font-bold flex items-center justify-center text-zinc-600 border border-zinc-100">
                            <i class="fa-solid fa-location-dot text-yellow-500 mr-2 text-lg"></i> 
                            <span id="location-status">กำลังโหลดตำแหน่ง...</span>
                        </div>
                        
                        <div class="flex flex-col space-y-3">
                            <button onclick="clockIn()" id="btn-clock-in" class="w-full bg-zinc-900 hover:bg-zinc-800 text-yellow-500 font-black py-4 rounded-2xl transition-all shadow-lg flex justify-center items-center text-lg uppercase tracking-wider disabled:opacity-50">
                                <i class="fa-solid fa-right-to-bracket mr-3"></i> เข้างาน (Clock In)
                            </button>
                            <button onclick="clockOut()" id="btn-clock-out" class="w-full bg-white hover:bg-red-50 text-red-500 border-2 border-red-200 hover:border-red-500 font-black py-4 rounded-2xl transition-all flex justify-center items-center text-lg uppercase tracking-wider disabled:opacity-50">
                                <i class="fa-solid fa-right-from-bracket mr-3"></i> ออกงาน (Clock Out)
                            </button>
                        </div>
                    </div>

                    <!-- กล่องประวัติประจำวัน (เปลี่ยนตามวันที่เลือกในปฏิทิน) -->
                    <div class="bg-white rounded-[2rem] shadow-sm border border-zinc-200 overflow-hidden">
                        <div class="bg-zinc-100 px-6 py-4 flex justify-between items-center border-b border-zinc-200">
                            <h3 class="font-black text-zinc-700 text-sm uppercase tracking-widest"><i class="fa-solid fa-list-ul text-yellow-500 mr-2"></i> บันทึกเวลา</h3>
                            <span id="selected-date-text" class="text-xs font-bold text-zinc-500 bg-white px-2 py-1 rounded-md shadow-sm">วันนี้</span>
                        </div>
                        <div class="p-6">
                            <div id="daily-logs" class="space-y-4">
                                <div class="text-center py-8 text-zinc-400">
                                    <i class="fa-regular fa-clock text-3xl mb-3 opacity-50"></i>
                                    <p class="text-sm font-medium">ไม่มีประวัติลงเวลาในวันนี้</p>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- ============================================== -->
                <!-- คอลัมน์ขวา: ปฏิทินรายเดือน -->
                <!-- ============================================== -->
                <div class="lg:col-span-2">
                    <div class="bg-white rounded-[2rem] shadow-sm border border-zinc-200 p-8 h-full">
                        
                        <!-- Header ปฏิทิน -->
                        <div class="flex justify-between items-center mb-8">
                            <div>
                                <h3 class="text-2xl font-black text-zinc-800" id="month-display">มกราคม 2026</h3>
                                <p class="text-sm text-zinc-500 font-medium mt-1">สรุปการลงเวลาประจำเดือน</p>
                            </div>
                            <div class="flex space-x-2">
                                <button onclick="changeMonth(-1)" class="w-10 h-10 rounded-full bg-zinc-100 hover:bg-yellow-500 hover:text-zinc-900 text-zinc-600 flex items-center justify-center transition-colors">
                                    <i class="fa-solid fa-chevron-left"></i>
                                </button>
                                <button onclick="changeMonth(1)" class="w-10 h-10 rounded-full bg-zinc-100 hover:bg-yellow-500 hover:text-zinc-900 text-zinc-600 flex items-center justify-center transition-colors">
                                    <i class="fa-solid fa-chevron-right"></i>
                                </button>
                            </div>
                        </div>

                        <!-- ตารางปฏิทิน -->
                        <div class="cal-grid mb-2">
                            <div class="cal-day-header">อา</div>
                            <div class="cal-day-header">จ</div>
                            <div class="cal-day-header">อ</div>
                            <div class="cal-day-header">พ</div>
                            <div class="cal-day-header">พฤ</div>
                            <div class="cal-day-header">ศ</div>
                            <div class="cal-day-header">ส</div>
                        </div>
                        <div id="calendar-body" class="cal-grid">
                            <!-- JS จะเติมเซลล์วันที่ลงที่นี่ -->
                        </div>

                        <!-- คำอธิบายสัญลักษณ์ -->
                        <div class="mt-8 pt-6 border-t border-zinc-100 flex items-center justify-center space-x-6 text-xs font-bold text-zinc-500">
                            <div class="flex items-center"><div class="w-3 h-3 bg-zinc-900 rounded-full mr-2"></div> วันนี้</div>
                            <div class="flex items-center"><div class="w-3 h-3 bg-green-500 rounded-full mr-2"></div> มีประวัติลงเวลา</div>
                            <div class="flex items-center"><div class="w-3 h-3 bg-yellow-500 rounded-full mr-2"></div> วันที่เลือก</div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Firebase & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { renderUI } from "./shared_components.js";

        const firebaseConfig = { apiKey: "AIzaSyADmZFoyvxq7vRD8SvV4PhnmNmnzwZQWVY", authDomain: "hris-21093.firebaseapp.com", projectId: "hris-21093", storageBucket: "hris-21093.firebasestorage.app", messagingSenderId: "549158917606", appId: "1:549158917606:web:cdade4e855554e57fab227", measurementId: "G-1FYRH1EL2W" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'bizhris-phichit';

        let currentUser = null;
        let userProfile = null;
        let myLogs = []; // เก็บประวัติทั้งหมดของคนนี้
        
        // สถานะปฏิทิน
        let currentDate = new Date(); // วันนี้เสมอ
        let displayMonth = currentDate.getMonth();
        let displayYear = currentDate.getFullYear();
        let selectedDateStr = getLocalISODate(currentDate); // รูปแบบ YYYY-MM-DD

        // ฟังก์ชันแปลง Date เป็น YYYY-MM-DD ตามเวลา Local
        function getLocalISODate(dateObj) {
            const tzoffset = (dateObj.getTimezoneOffset() * 60000); 
            const localISOTime = (new Date(dateObj - tzoffset)).toISOString().slice(0, 10);
            return localISOTime;
        }

        // เช็คการเข้าสู่ระบบ
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
                const docSnap = await getDoc(userRef);
                if (docSnap.exists()) {
                    userProfile = docSnap.data();
                    renderUI(userProfile, 'time');
                    document.getElementById('location-status').textContent = userProfile.branch || 'Lamsang Group';
                    
                    fetchTimeLogs(); // โหลดประวัติจาก Firebase
                }
            } else {
                try { if (window.location.protocol !== 'about:') window.location.href = 'index.html'; } catch(e) {}
            }
        });

        window.handleLogout = () => { if(confirm('ออกจากระบบ?')) signOut(auth).then(() => window.location.href='index.html'); }

        // ==========================================
        // นาฬิกา Real-time
        // ==========================================
        setInterval(() => {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            const dateStr = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            
            document.getElementById('current-time-display').textContent = timeStr;
            document.getElementById('current-date-display').textContent = dateStr;
        }, 1000);

        // ==========================================
        // การบันทึกเวลา
        // ==========================================
        window.clockIn = async () => {
            if (!currentUser) return;
            document.getElementById('btn-clock-in').disabled = true;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'time_logs'), {
                    uid: currentUser.uid, name: userProfile.name, 
                    type: 'clock_in', timestamp: new Date().toISOString(), 
                    branch: userProfile.branch || 'Lamsang Group'
                });
                // ไม่ต้อง alert เพราะใช้ Real-time DB เดี๋ยวมันเด้งเข้าลิสต์เอง
            } catch (error) { alert("Error: " + error.message); }
            finally { document.getElementById('btn-clock-in').disabled = false; }
        }

        window.clockOut = async () => {
            if (!currentUser) return;
            document.getElementById('btn-clock-out').disabled = true;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'time_logs'), {
                    uid: currentUser.uid, name: userProfile.name, 
                    type: 'clock_out', timestamp: new Date().toISOString(), 
                    branch: userProfile.branch || 'Lamsang Group'
                });
            } catch (error) { alert("Error: " + error.message); }
            finally { document.getElementById('btn-clock-out').disabled = false; }
        }

        // ==========================================
        // โหลดข้อมูลและแสดงผลปฏิทิน
        // ==========================================
        function fetchTimeLogs() {
            // ดึงเฉพาะข้อมูลของ User คนนี้
            const logsQuery = query(collection(db, 'artifacts', appId, 'public', 'data', 'time_logs'));
            
            onSnapshot(logsQuery, (snapshot) => {
                myLogs = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if(data.uid === currentUser.uid) {
                        // เพิ่มฟิลด์ localDate ไว้ใช้เทียบกับปฏิทินง่ายๆ
                        data.localDate = getLocalISODate(new Date(data.timestamp));
                        myLogs.push(data);
                    }
                });
                // จัดเรียงใหม่ล่าสุดขึ้นก่อน
                myLogs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                
                renderCalendar();
                renderDailyLogs();
            });
        }

        window.changeMonth = (dir) => {
            displayMonth += dir;
            if(displayMonth > 11) { displayMonth = 0; displayYear++; }
            else if(displayMonth < 0) { displayMonth = 11; displayYear--; }
            renderCalendar();
        }

        window.selectDate = (dateString) => {
            selectedDateStr = dateString;
            renderCalendar(); // Rerender เพื่อไฮไลท์ปุ่ม
            renderDailyLogs(); // โชว์ประวัติของวันนั้น
            
            // เปลี่ยนข้อความบนหัวตาราง
            const d = new Date(dateString);
            const isToday = getLocalISODate(new Date()) === dateString;
            document.getElementById('selected-date-text').textContent = isToday ? 'วันนี้' : d.toLocaleDateString('th-TH', {day:'numeric', month:'short', year:'numeric'});
        }

        function renderCalendar() {
            const firstDay = new Date(displayYear, displayMonth, 1).getDay();
            const daysInMonth = new Date(displayYear, displayMonth + 1, 0).getDate();
            const todayStr = getLocalISODate(currentDate);
            
            // อัปเดตหัวปฏิทิน (ภาษาไทย)
            const monthNames = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
            document.getElementById('month-display').textContent = `${monthNames[displayMonth]} ${displayYear + 543}`; // แปลงเป็น พ.ศ.

            let html = '';
            // เติมช่องว่างก่อนเริ่มวันที่ 1
            for (let i = 0; i < firstDay; i++) { html += `<div class="cal-cell empty"></div>`; }

            // เช็คว่าวันไหนมีบันทึกเวลาบ้าง
            const logsMap = {};
            myLogs.forEach(log => { logsMap[log.localDate] = true; });

            // สร้างปุ่มวันที่
            for (let day = 1; day <= daysInMonth; day++) {
                const cellDate = new Date(displayYear, displayMonth, day);
                const cellDateStr = getLocalISODate(cellDate);
                
                let classes = 'cal-cell';
                if(cellDateStr === todayStr) classes += ' today';
                if(cellDateStr === selectedDateStr) classes += ' selected';
                
                const hasRecord = logsMap[cellDateStr] ? '<div class="has-record-dot"></div>' : '';

                html += `<div class="${classes}" onclick="selectDate('${cellDateStr}')">${day}${hasRecord}</div>`;
            }

            document.getElementById('calendar-body').innerHTML = html;
        }

        function renderDailyLogs() {
            // กรองเฉพาะประวัติของวันที่เลือก
            const logsToday = myLogs.filter(log => log.localDate === selectedDateStr);
            
            let html = '';
            if(logsToday.length === 0) {
                html = `
                <div class="text-center py-8 text-zinc-400">
                    <i class="fa-regular fa-calendar-xmark text-3xl mb-3 opacity-50"></i>
                    <p class="text-sm font-medium">ไม่มีประวัติลงเวลา</p>
                </div>`;
            } else {
                // เรียงจากเก่าไปใหม่ (เช้าไปเย็น)
                const sortedLogs = [...logsToday].sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
                
                sortedLogs.forEach(log => {
                    const time = new Date(log.timestamp).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});
                    const isClockIn = log.type === 'clock_in';
                    
                    html += `
                        <div class="flex items-center justify-between p-4 bg-zinc-50 rounded-xl border border-zinc-100 shadow-sm transition-all hover:border-yellow-300">
                            <div class="flex items-center">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center mr-3 ${isClockIn ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-500'}">
                                    <i class="fa-solid ${isClockIn ? 'fa-arrow-right-to-bracket' : 'fa-arrow-right-from-bracket'}"></i>
                                </div>
                                <div>
                                    <p class="font-black text-zinc-800 text-sm">${isClockIn ? 'เข้างาน' : 'ออกงาน'}</p>
                                    <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">${log.branch}</p>
                                </div>
                            </div>
                            <div class="text-lg font-black ${isClockIn ? 'text-green-600' : 'text-red-500'} font-mono">${time}</div>
                        </div>
                    `;
                });
            }
            document.getElementById('daily-logs').innerHTML = html;
        }
    </script>
</body>
</html>
