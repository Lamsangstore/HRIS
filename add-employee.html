<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เพิ่มพนักงานใหม่ - Lamsang Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Prompt', sans-serif; background-color: #fafafa; }</style>
</head>
<body class="flex h-screen overflow-hidden text-zinc-800">

    <aside class="w-64 bg-zinc-900 text-zinc-300 flex flex-col transition-all duration-300 shadow-xl z-20">
        <div class="p-5 flex items-center justify-center border-b border-zinc-800">
            <img src="https://lh3.googleusercontent.com/d/1wFGzcl5Y3yEfd39sA2LTbrgeNkgVxm27" alt="Lamsang Logo" class="h-10 w-10 object-contain rounded bg-white p-1 mr-3">
            <h1 class="text-lg font-bold tracking-wider truncate text-white">Lamsang Group</h1>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="home.html" class="nav-item flex items-center px-4 py-3 rounded-lg hover:bg-zinc-800 hover:text-yellow-400 transition-colors">
                <i class="fa-solid fa-house w-6"></i> หน้าหลัก
            </a>
            <a href="time.html" class="nav-item flex items-center px-4 py-3 rounded-lg hover:bg-zinc-800 hover:text-yellow-400 transition-colors">
                <i class="fa-solid fa-clock w-6"></i> เวลาทำงาน & กะ
            </a>
            <div id="menu-admin" class="space-y-2 mt-4 pt-4 border-t border-zinc-800">
                <p class="px-4 text-xs text-zinc-500 uppercase tracking-wider mb-2 font-semibold">ส่วนการจัดการ</p>
                <a href="add-employee.html" class="nav-item flex items-center px-4 py-3 rounded-lg transition-colors bg-yellow-500 text-zinc-900 font-bold shadow-sm">
                    <i class="fa-solid fa-user-plus w-6"></i> เพิ่มพนักงานใหม่
                </a>
                <a href="#" class="nav-item flex items-center px-4 py-3 rounded-lg hover:bg-zinc-800 hover:text-yellow-400 transition-colors">
                    <i class="fa-solid fa-file-invoice-dollar w-6"></i> จัดการเงินเดือน
                </a>
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-zinc-50">
        <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6 z-10 border-b border-zinc-200">
            <h2 class="text-xl font-bold text-zinc-800">ลงทะเบียนพนักงานใหม่</h2>
            <div class="flex items-center space-x-4">
                <div class="flex items-center space-x-3">
                    <img src="" id="profile-img-top" class="w-9 h-9 rounded-full object-cover border border-zinc-200">
                    <div class="text-sm">
                        <p class="font-semibold text-zinc-800" id="current-user-name">Admin</p>
                        <p class="text-xs text-zinc-500">ADMIN</p>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 lg:p-8">
            <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm border border-zinc-200 overflow-hidden">
                <div class="bg-zinc-900 px-6 py-4 text-white font-bold flex items-center justify-between">
                    <span>ข้อมูลพนักงานใหม่</span>
                    <span class="text-xs text-yellow-400 uppercase tracking-widest font-bold">Lamsang HR Engine</span>
                </div>
                <form id="add-employee-form" class="p-8">
                    <div class="mb-6 bg-yellow-50 border-l-4 border-yellow-500 p-4 text-sm text-yellow-800 font-medium rounded-r-xl">
                        ระบบจะสร้างบัญชีให้อัตโนมัติด้วยรหัสผ่าน <span class="font-black underline">123456</span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2"><label class="block text-sm font-bold text-zinc-700 mb-1">อีเมลพนักงาน <span class="text-red-500">*</span></label><input type="email" id="emp-email" required class="w-full border border-zinc-300 rounded-xl px-4 py-3 focus:ring-yellow-500 focus:border-yellow-500"></div>
                        <div><label class="block text-sm font-bold text-zinc-700 mb-1">ชื่อ-นามสกุล <span class="text-red-500">*</span></label><input type="text" id="emp-name" required class="w-full border border-zinc-300 rounded-xl px-4 py-3 focus:ring-yellow-500 focus:border-yellow-500"></div>
                        <div><label class="block text-sm font-bold text-zinc-700 mb-1">รหัสพนักงาน <span class="text-red-500">*</span></label><input type="text" id="emp-code" required class="w-full border border-zinc-300 rounded-xl px-4 py-3 focus:ring-yellow-500 focus:border-yellow-500"></div>
                        <div><label class="block text-sm font-bold text-zinc-700 mb-1">วันที่เริ่มงาน <span class="text-red-500">*</span></label><input type="date" id="emp-startdate" required class="w-full border border-zinc-300 rounded-xl px-4 py-3 focus:ring-yellow-500 focus:border-yellow-500"></div>
                        <div><label class="block text-sm font-bold text-zinc-700 mb-1">ฐานเงินเดือน <span class="text-red-500">*</span></label><input type="number" id="emp-salary" required class="w-full border border-zinc-300 rounded-xl px-4 py-3 focus:ring-yellow-500 focus:border-yellow-500"></div>
                    </div>
                    <div class="mt-10 flex justify-end space-x-3 border-t border-zinc-100 pt-8">
                        <button type="button" onclick="window.location.href='home.html'" class="px-6 py-3 border border-zinc-300 rounded-xl text-zinc-600 font-bold hover:bg-zinc-50 transition-all">ยกเลิก</button>
                        <button type="submit" class="px-10 py-3 bg-yellow-500 text-zinc-900 rounded-xl hover:bg-yellow-400 transition-all font-black shadow-lg">สร้างบัญชีและบันทึก</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADmZFoyvxq7vRD8SvV4PhnmNmnzwZQWVY",
            authDomain: "hris-21093.firebaseapp.com",
            projectId: "hris-21093",
            storageBucket: "hris-21093.firebasestorage.app",
            messagingSenderId: "549158917606",
            appId: "1:549158917606:web:cdade4e855554e57fab227",
            measurementId: "G-1FYRH1EL2W"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'bizhris-phichit';

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('current-user-name').textContent = data.name;
                    document.getElementById('profile-img-top').src = data.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.name)}&background=27272a&color=eab308&size=128`;
                    if(data.role !== 'admin') window.location.href = 'home.html';
                }
            } else { window.location.href = 'index.html'; }
        });

        document.getElementById('add-employee-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('emp-email').value;
            const name = document.getElementById('emp-name').value;
            try {
                const authUrl = `https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${firebaseConfig.apiKey}`;
                const authRes = await fetch(authUrl, { method: 'POST', body: JSON.stringify({ email, password: "123456", returnSecureToken: true }) });
                const authData = await authRes.json();
                if(!authRes.ok) throw new Error(authData.error.message);
                
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', authData.localId), {
                    uid: authData.localId, name, email,
                    employeeCode: document.getElementById('emp-code').value,
                    startDate: document.getElementById('emp-startdate').value,
                    baseSalary: parseFloat(document.getElementById('emp-salary').value),
                    role: 'employee', branch: 'สาขาพิจิตร (เนินปอ)', createdAt: new Date().toISOString()
                });
                alert('✅ สร้างพนักงานใหม่สำเร็จ!');
                e.target.reset();
            } catch(error) { alert("Error: " + error.message); }
        });
    </script>
</body>
</html>
