    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { renderUI } from "./shared_components.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADmZFoyvxq7vRD8SvV4PhnmNmnzwZQWVY",
            authDomain: "hris-21093.firebaseapp.com",
            projectId: "hris-21093",
            storageBucket: "hris-21093.firebasestorage.app",
            messagingSenderId: "549158917606",
            appId: "1:549158917606:web:cdade4e855554e57fab227",
            measurementId: "G-1FYRH1EL2W"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'bizhris-phichit';

        // ── ฟังก์ชัน Helper ──
        function set(id, value) {
            const el = document.getElementById(id);
            if (el) el.textContent = value || '-';
        }
        function val(id, value) {
            const el = document.getElementById(id);
            if (el) el.value = value || '';
        }
        function convertDriveLink(url) {
            if (!url) return '';
            if (url.includes('drive.google.com')) {
                const match = url.match(/\/d\/(.+?)\//) || url.match(/id=(.+?)(&|$)/);
                if (match && match[1]) return `https://lh3.googleusercontent.com/d/${match[1]}`;
            }
            return url;
        }
        function calcTenure(startDate) {
            if (!startDate) return '-';
            const start = new Date(startDate);
            const now = new Date();
            const months = (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth());
            if (months < 12) return `${months} เดือน`;
            const years = Math.floor(months / 12);
            const rem = months % 12;
            return `${years} ปี ${rem > 0 ? rem + ' เดือน' : ''}`.trim();
        }
        function statusBadge(status) {
            const map = {
                active:     { text: 'Active',     cls: 'bg-green-100 text-green-700' },
                probation:  { text: 'Probation',  cls: 'bg-yellow-100 text-yellow-700' },
                resigned:   { text: 'Resigned',   cls: 'bg-red-100 text-red-600' }
            };
            return map[status] || { text: status, cls: 'bg-zinc-100 text-zinc-500' };
        }
        function redirectToLogin() {
            try {
                if (window.location.protocol === 'about:' || window.location.hostname === '') throw new Error();
                window.location.href = 'index.html';
            } catch (e) {
                document.body.innerHTML = `<div class="flex h-screen items-center justify-center bg-zinc-900 text-white p-6 text-center"><div><i class="fa-solid fa-lock text-6xl text-yellow-500 mb-6"></i><h1 class="text-3xl font-bold mb-2 text-yellow-500">SESSION EXPIRED</h1><p class="text-zinc-400">กรุณากลับไปเปิดไฟล์ index.html ใหม่</p></div></div>`;
            }
        }

        // ── Auth State ──
        onAuthStateChanged(auth, async (user) => {
            if (!user) return redirectToLogin();

            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
            const docSnap = await getDoc(userRef);
            if (!docSnap.exists()) return redirectToLogin();

            const d = docSnap.data();

            // Render shared UI
            renderUI(d, 'profile');

            // Hide loader
            const loader = document.getElementById('app-loader');
            if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 500); }

            // ── รูปโปรไฟล์ ──
            const avatarUrl = d.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(d.name)}&background=27272a&color=eab308&size=128`;
            document.getElementById('main-profile-img').src = avatarUrl;

            // ── Card header ──
            set('display-name', d.name);
            set('display-position', d.position || d.role);
            set('display-branch', d.branch);
            set('display-emp-code', d.employeeCode);
            set('display-start-date', d.startDate ? new Date(d.startDate).toLocaleDateString('th-TH') : '-');
            set('display-role', d.role?.toUpperCase());
            set('display-emp-type', d.empType || '-');
            set('display-tenure', calcTenure(d.startDate));

            const sb = statusBadge(d.status);
            const sbEl = document.getElementById('display-status-badge');
            sbEl.textContent = sb.text;
            sbEl.className = `status-badge ${sb.cls}`;

            // ── หมวด 1: ข้อมูลส่วนบุคคล (ล็อก) ──
            set('v-title', d.titleTH);
            set('v-fname-th', d.fnameTH);
            set('v-lname-th', d.lnameTH);
            set('v-fname-en', d.fnameEN);
            set('v-lname-en', d.lnameEN);
            set('v-gender', d.gender);
            set('v-dob', d.dob ? new Date(d.dob).toLocaleDateString('th-TH') : '-');
            // ซ่อนเลขบัตรบางส่วน (แสดงเฉพาะ 4 ตัวท้าย)
            set('v-idcard', d.idCard ? d.idCard.replace(/^(\d+)(\d{4})$/, (_, h, t) => '*'.repeat(h.length) + t) : '-');
            set('v-emp-code', d.employeeCode);
            set('v-start-date', d.startDate ? new Date(d.startDate).toLocaleDateString('th-TH') : '-');

            // ── หมวด 1: ข้อมูลส่วนบุคคล (แก้ไขได้) ──
            val('edit-nickname', d.nickname);

            // ── หมวด 2: การติดต่อ ──
            set('v-email', d.email);
            val('edit-phone', d.phone);
            val('edit-line-id', d.lineId);
            val('edit-address', d.address);
            val('edit-province', d.province);
            val('edit-district', d.district);
            val('edit-subdistrict', d.subdistrict);
            val('edit-zipcode', d.zipcode);

            // ── หมวด 3: การทำงาน (ล็อก) ──
            set('v-branch', d.branch);
            set('v-position', d.position);
            set('v-emp-type', d.empType);
            set('v-status', d.status);
            set('v-role', d.role?.toUpperCase());

            // ── หมวด 4: เงินเดือน (ล็อก) ──
            set('v-salary-month', d.baseSalary ? `฿ ${Number(d.baseSalary).toLocaleString()}` : '-');
            set('v-salary-day',   d.dailyWage  ? `฿ ${Number(d.dailyWage).toLocaleString()}`  : '-');
            set('v-salary-hour',  d.hourlyWage ? `฿ ${Number(d.hourlyWage).toLocaleString()}`  : '-');
            set('v-commission',   d.commission ? `${d.commission}%` : '-');
            set('v-payment-method', d.paymentMethod);
            set('v-bank-name', d.bankName);
            set('v-bank-acc',  d.bankAccount ? '****' + d.bankAccount.slice(-4) : '-');
            set('v-sso', d.sso === 'Yes' ? 'เข้าร่วม (5%)' : 'ไม่เข้าร่วม');
            set('v-tax', d.taxDeduction === 'No' ? 'ไม่หัก' : d.taxDeduction === 'Yes' ? 'หักตามขั้นบันได' : d.taxDeduction === '3' ? 'หัก 3%' : d.taxDeduction || '-');

            // ── หมวด 5: ฉุกเฉิน (แก้ไขได้) ──
            val('edit-emergency-name', d.emergencyName);
            val('edit-emergency-phone', d.emergencyPhone);

            // ── หมวด 6: รูปโปรไฟล์ ──
            val('edit-photo-url', d.originalPhotoURL || d.photoURL || '');
        });

        // ── Logout ──
        window.handleLogout = () => {
            if (confirm('คุณต้องการออกจากระบบใช่หรือไม่?')) {
                signOut(auth).then(() => redirectToLogin());
            }
        };

        // ── เปลี่ยนรูปโปรไฟล์ด้วยคลิกที่รูป ──
        window.changeProfilePicture = () => {
            const cur = document.getElementById('edit-photo-url').value;
            const url = prompt('วางลิงก์รูปภาพ (Google Drive หรือ URL ทั่วไป):', cur);
            if (url) {
                document.getElementById('edit-photo-url').value = url;
                document.getElementById('main-profile-img').src = convertDriveLink(url);
            }
        };

        // ── บันทึกฟอร์ม ──
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> กำลังบันทึก...';

            const inputPhotoUrl = document.getElementById('edit-photo-url').value.trim();
            const displayPhotoUrl = convertDriveLink(inputPhotoUrl);

            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', auth.currentUser.uid), {
                    nickname:       document.getElementById('edit-nickname').value.trim(),
                    phone:          document.getElementById('edit-phone').value.trim(),
                    lineId:         document.getElementById('edit-line-id').value.trim(),
                    address:        document.getElementById('edit-address').value.trim(),
                    province:       document.getElementById('edit-province').value.trim(),
                    district:       document.getElementById('edit-district').value.trim(),
                    subdistrict:    document.getElementById('edit-subdistrict').value.trim(),
                    zipcode:        document.getElementById('edit-zipcode').value.trim(),
                    emergencyName:  document.getElementById('edit-emergency-name').value.trim(),
                    emergencyPhone: document.getElementById('edit-emergency-phone').value.trim(),
                    originalPhotoURL: inputPhotoUrl,
                    photoURL:       displayPhotoUrl,
                    updatedAt:      new Date().toISOString()
                });
                alert('✅ บันทึกข้อมูลสำเร็จ!');
                window.location.reload();
            } catch (err) {
                alert('❌ เกิดข้อผิดพลาด: ' + err.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-save"></i> บันทึกข้อมูล';
            }
        });
    </script>
</body>
</html>
