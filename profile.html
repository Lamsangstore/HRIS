<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์ส่วนตัว - Lamsang Group</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1wFGzcl5Y3yEfd39sA2LTbrgeNkgVxm27">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #fafafa; }
        .avatar-container:hover .avatar-overlay { opacity: 1; }
        .loading-overlay { position: fixed; inset: 0; background: #18181b; z-index: 100; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-zinc-800">

    <!-- ✅ จุดวาง Sidebar ส่วนกลาง -->
    <div id="sidebar-placeholder"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-zinc-50">
        <!-- ✅ จุดวาง Topbar ส่วนกลาง -->
        <div id="topbar-placeholder"></div>

        <div class="flex-1 overflow-y-auto p-6 lg:p-8 bg-zinc-50">
            <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
                <!-- เนื้อหาโปรไฟล์ (เหมือนเดิม) -->
                <div class="md:col-span-1">
                    <div class="bg-white rounded-2xl shadow-sm border border-zinc-200 p-8 text-center relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-24 bg-zinc-900"></div>
                        <div class="relative w-32 h-32 mx-auto mt-8 mb-4 avatar-container cursor-pointer rounded-full border-4 border-white shadow-md group">
                            <img src="" id="main-profile-img" class="w-full h-full rounded-full object-cover">
                            <div class="avatar-overlay absolute inset-0 bg-black bg-opacity-50 rounded-full flex items-center justify-center opacity-0 transition-opacity duration-300" onclick="changeProfilePicture()">
                                <i class="fa-solid fa-link text-white text-xl"></i>
                            </div>
                        </div>
                        <h3 class="text-xl font-black text-zinc-800" id="display-name">-</h3>
                        <p class="text-sm text-yellow-600 font-bold mb-1" id="display-role">-</p>
                        <p class="text-xs text-zinc-400 mb-6" id="display-branch">-</p>
                        <div class="border-t border-zinc-100 pt-6 text-left text-sm space-y-4">
                            <div class="flex justify-between font-medium">
                                <span class="text-zinc-400">รหัสพนักงาน:</span>
                                <span id="display-emp-code">-</span>
                            </div>
                            <div class="flex justify-between font-medium">
                                <span class="text-zinc-400">เริ่มงานเมื่อ:</span>
                                <span id="display-start-date">-</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="md:col-span-2">
                    <div class="bg-white rounded-2xl shadow-sm border border-zinc-200 overflow-hidden">
                        <div class="bg-zinc-900 px-6 py-4 text-white font-bold">จัดการข้อมูลส่วนตัว</div>
                        <form id="profile-form" class="p-6">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                <div class="sm:col-span-2">
                                    <label class="block text-sm font-bold text-zinc-700 mb-1 text-xs">ลิงก์รูปโปรไฟล์ (Direct Link/Google Drive)</label>
                                    <input type="url" id="edit-photo-url" class="w-full border border-zinc-300 rounded-xl px-4 py-3 focus:ring-yellow-500 focus:border-yellow-500" placeholder="https://...">
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-zinc-700 mb-1 text-xs text-zinc-400 italic">ชื่อ-นามสกุล (พนักงานแก้ได้)</label>
                                    <input type="text" id="edit-name" required class="w-full border border-zinc-300 rounded-xl px-4 py-3 focus:ring-yellow-500 focus:border-yellow-500 font-bold">
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-zinc-700 mb-1 text-xs text-zinc-400 italic">เบอร์โทรศัพท์</label>
                                    <input type="tel" id="edit-phone" class="w-full border border-zinc-300 rounded-xl px-4 py-3 focus:ring-yellow-500 focus:border-yellow-500">
                                </div>
                                <div class="sm:col-span-2">
                                    <label class="block text-sm font-bold text-zinc-700 mb-1 text-xs text-zinc-400 italic">ที่อยู่ปัจจุบัน</label>
                                    <textarea id="edit-address" rows="2" class="w-full border border-zinc-300 rounded-xl px-4 py-3 focus:ring-yellow-500 focus:border-yellow-500"></textarea>
                                </div>
                                <div class="sm:col-span-2 pt-4 border-t border-zinc-100">
                                    <p class="text-[10px] font-black text-zinc-300 mb-4 uppercase tracking-widest">ข้อมูลภายในล็อกไว้โดย HR</p>
                                </div>
                                <div><label class="block text-[10px] font-bold text-zinc-400 mb-1 uppercase">อีเมลพนักงาน</label><input type="text" id="edit-email" readonly class="w-full border border-zinc-200 bg-zinc-50 text-zinc-400 rounded-xl px-4 py-2 cursor-not-allowed text-sm"></div>
                                <div><label class="block text-[10px] font-bold text-zinc-400 mb-1 uppercase">ฐานเงินเดือน</label><input type="text" id="edit-salary" readonly class="w-full border border-zinc-200 bg-zinc-50 text-green-600 font-black rounded-xl px-4 py-2 cursor-not-allowed text-sm"></div>
                            </div>
                            <div class="mt-8 flex justify-end">
                                <button type="submit" id="save-btn" class="px-10 py-3 bg-yellow-500 text-zinc-900 rounded-xl hover:bg-yellow-400 transition-all font-black shadow-lg flex items-center">
                                    <i class="fa-solid fa-save mr-2"></i> บันทึกข้อมูล
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="app-loader" class="loading-overlay">
        <div class="text-center"><i class="fa-solid fa-circle-notch fa-spin text-4xl text-yellow-500 mb-4"></i><p class="text-white text-xs font-bold tracking-widest uppercase">Lamsang Group</p></div>
    </div>

    <!-- ✅ นำเข้าไฟล์ Shared Component (ต้องเรียกเป็น type="module") -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // เรียกใช้ฟังก์ชันจากไฟล์ภายนอก
        import { renderUI } from "./shared_components.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADmZFoyvxq7vRD8SvV4PhnmNmnzwZQWVY",
            authDomain: "hris-21093.firebaseapp.com",
            projectId: "hris-21093",
            storageBucket: "hris-21093.firebasestorage.app",
            messagingSenderId: "549158917606",
            appId: "1:549158917606:web:cdade4e855554e57fab227",
            measurementId: "G-1FYRH1EL2W"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'bizhris-phichit';

        function redirectToLogin() {
            try { if (window.location.protocol === 'about:' || window.location.hostname === '') throw new Error(); window.location.href = 'index.html'; } 
            catch (e) { document.body.innerHTML = `<div class="flex h-screen items-center justify-center bg-zinc-900 text-white p-6 text-center"><div><i class="fa-solid fa-lock text-6xl text-yellow-500 mb-6"></i><h1 class="text-3xl font-bold mb-2 text-yellow-500">SESSION EXPIRED</h1><p class="text-zinc-400">กรุณากลับไปเปิดไฟล์ index.html ใหม่ครับ</p></div></div>`; }
        }

        function convertDriveLink(url) {
            if (!url) return "";
            if (url.includes('drive.google.com')) {
                const match = url.match(/\/d\/(.+?)\//) || url.match(/id=(.+?)(&|$)/);
                if (match && match[1]) return `https://lh3.googleusercontent.com/d/${match[1]}`;
            }
            return url; 
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
                const docSnap = await getDoc(userRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // ✅ สั่ง Render Sidebar และ Topbar จากส่วนกลาง (หน้าโปรไฟล์ ID คือ 'profile')
                    renderUI(data, 'profile');
                    
                    const loader = document.getElementById('app-loader');
                    if(loader) { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 500); }

                    const avatarUrl = data.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.name)}&background=27272a&color=eab308&size=128`;
                    document.getElementById('main-profile-img').src = avatarUrl;
                    document.getElementById('display-name').textContent = data.name;
                    document.getElementById('display-role').textContent = data.role.toUpperCase();
                    document.getElementById('display-branch').textContent = data.branch;
                    document.getElementById('display-emp-code').textContent = data.employeeCode;
                    document.getElementById('display-start-date').textContent = new Date(data.startDate).toLocaleDateString('th-TH');
                    document.getElementById('edit-name').value = data.name;
                    document.getElementById('edit-phone').value = data.phone || '';
                    document.getElementById('edit-address').value = data.address || '';
                    document.getElementById('edit-email').value = data.email;
                    document.getElementById('edit-photo-url').value = data.originalPhotoURL || data.photoURL || '';
                    document.getElementById('edit-salary').value = `฿ ${Number(data.baseSalary).toLocaleString()}`;
                }
            } else { redirectToLogin(); }
        });

        // ฟังก์ชัน Logout ต้องผูกกับ window เพื่อให้ปุ่มใน Shared Component เรียกใช้ได้
        window.handleLogout = () => {
            if(confirm('คุณต้องการออกจากระบบใช่หรือไม่?')) { signOut(auth).then(() => redirectToLogin()); }
        }

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            btn.disabled = true; btn.innerHTML = 'กำลังบันทึก...';
            const inputPhotoUrl = document.getElementById('edit-photo-url').value.trim();
            const displayPhotoUrl = convertDriveLink(inputPhotoUrl);
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', auth.currentUser.uid), {
                    name: document.getElementById('edit-name').value,
                    phone: document.getElementById('edit-phone').value,
                    address: document.getElementById('edit-address').value,
                    originalPhotoURL: inputPhotoUrl,
                    photoURL: displayPhotoUrl
                });
                alert('✅ บันทึกข้อมูลสำเร็จ!');
                window.location.reload();
            } catch(e) { alert(e.message); btn.disabled = false; btn.innerHTML = 'บันทึกข้อมูล'; }
        });

        window.changeProfilePicture = () => {
            const url = prompt("วางลิงก์รูปภาพ (Google Drive หรือ URL ทั่วไป):", document.getElementById('edit-photo-url').value);
            if(url) {
                document.getElementById('edit-photo-url').value = url;
                document.getElementById('main-profile-img').src = convertDriveLink(url);
            }
        }
    </script>
</body>
</html>
