<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamsang Group HRIS</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1wFGzcl5Y3yEfd39sA2LTbrgeNkgVxm27">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Prompt', sans-serif; }

        /* ========= SIDEBAR ========= */
        #app-sidebar {
            width: 16rem;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: width;
        }
        #app-sidebar.collapsed { width: 4rem; }
        #app-sidebar.collapsed .sidebar-text,
        #app-sidebar.collapsed .admin-panel-text,
        #app-sidebar.collapsed .footer-text { display: none; }
        #app-sidebar.collapsed .collapsed-footer-text { display: block; }
        #app-sidebar.collapsed .nav-item { justify-content: center; padding-left: 0; padding-right: 0; }
        #app-sidebar.collapsed .nav-item i { margin: 0 !important; font-size: 1.25rem; }
        #app-sidebar.collapsed .logo-container { padding: 1rem 0; }
        #app-sidebar.collapsed .logo-container img { margin-right: 0; width: 2rem; height: 2rem; min-width: 2rem; }

        /* ========= PAGE TRANSITIONS ========= */
        #page-content {
            animation: pageFadeIn 0.18s ease forwards;
        }
        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ========= LOADING OVERLAY ========= */
        #page-loader {
            position: absolute; inset: 0;
            background: #fafafa;
            z-index: 50;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.2s ease;
        }
        #page-loader.hidden-fade { opacity: 0; pointer-events: none; }

        /* ========= SCROLLBAR ========= */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-50 flex h-screen overflow-hidden text-zinc-800">

    <!-- ===================== SIDEBAR (อยู่ตลอด ไม่โหลดใหม่) ===================== -->
    <aside id="app-sidebar" class="bg-zinc-900 text-zinc-300 flex flex-col shadow-xl z-20 h-full overflow-hidden shrink-0">
        <!-- Logo -->
        <div class="logo-container p-5 flex items-center justify-center border-b border-zinc-800">
            <img src="https://lh3.googleusercontent.com/d/1wFGzcl5Y3yEfd39sA2LTbrgeNkgVxm27"
                 alt="Lamsang Logo"
                 class="h-10 w-10 min-w-[2.5rem] object-contain rounded bg-white p-1 mr-3 shrink-0">
            <h1 class="text-lg font-bold tracking-wider truncate text-white sidebar-text">Lamsang Group</h1>
        </div>

        <!-- Nav -->
        <nav id="sidebar-nav" class="flex-1 px-4 py-6 space-y-2 overflow-y-auto overflow-x-hidden">
            <!-- รายการเมนูจะถูก inject โดย JS หลังล็อกอิน -->
            <div class="animate-pulse space-y-3 px-2">
                <div class="h-10 bg-zinc-800 rounded-lg"></div>
                <div class="h-10 bg-zinc-800 rounded-lg opacity-70"></div>
                <div class="h-10 bg-zinc-800 rounded-lg opacity-40"></div>
            </div>
        </nav>

        <!-- Footer -->
        <div class="p-4 border-t border-zinc-800 text-[10px] text-zinc-600 text-center uppercase tracking-widest font-medium footer-text whitespace-nowrap">
            &copy; 2026 Lamsang Group
        </div>
        <div class="p-4 border-t border-zinc-800 text-[10px] text-zinc-600 text-center font-black hidden collapsed-footer-text">LSG</div>
    </aside>

    <!-- ===================== MAIN AREA ===================== -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden">

        <!-- TOPBAR (อยู่ตลอด ไม่โหลดใหม่) -->
        <header id="app-topbar" class="bg-white shadow-sm h-16 flex items-center justify-between px-6 z-10 border-b border-zinc-200 shrink-0">
            <div class="flex items-center">
                <button onclick="toggleSidebar()" class="text-zinc-500 hover:text-yellow-500 hover:bg-zinc-100 p-2 rounded-lg mr-4 transition-colors focus:outline-none">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <h2 id="topbar-title" class="text-lg font-bold text-zinc-800 uppercase tracking-tight hidden sm:block">Lamsang Group</h2>
            </div>
            <div class="flex items-center space-x-4">
                <button class="text-zinc-400 hover:text-yellow-500 relative transition-colors p-2">
                    <i class="fa-regular fa-bell text-xl"></i>
                    <span class="absolute top-1 right-1 bg-red-500 text-white text-[9px] font-bold rounded-full h-4 w-4 flex items-center justify-center border-2 border-white">3</span>
                </button>
                <div class="h-8 w-px bg-zinc-200"></div>
                <button id="topbar-profile-btn" onclick="navigateTo('profile')" class="flex items-center space-x-3 hover:bg-zinc-50 px-3 py-1.5 rounded-xl transition-all border border-transparent hover:border-zinc-100 group">
                    <img id="topbar-avatar" src="https://ui-avatars.com/api/?name=LSG&background=f4f4f5&color=a1a1aa"
                         class="w-8 h-8 rounded-full object-cover border-2 border-zinc-200 group-hover:border-yellow-500 transition-all">
                    <div class="text-sm leading-tight hidden md:block">
                        <p id="topbar-username" class="font-bold text-zinc-800 group-hover:text-yellow-600 transition-colors">กำลังโหลด...</p>
                        <p id="topbar-role" class="text-[9px] text-zinc-400 font-black uppercase tracking-widest">SYSTEM</p>
                    </div>
                </button>
                <div class="h-8 w-px bg-zinc-200 hidden md:block"></div>
                <button onclick="handleLogout()" class="text-xs text-red-500 hover:text-red-700 font-black uppercase tracking-widest flex items-center transition-colors bg-red-50 hover:bg-red-100 px-3 py-2 rounded-lg">
                    <i class="fa-solid fa-power-off sm:mr-2"></i><span class="hidden sm:inline">ออกจากระบบ</span>
                </button>
            </div>
        </header>

        <!-- CONTENT AREA — เปลี่ยนเฉพาะตรงนี้ -->
        <div class="flex-1 overflow-y-auto relative bg-zinc-50" id="content-wrapper">
            <!-- Loading overlay -->
            <div id="page-loader">
                <i class="fa-solid fa-circle-notch fa-spin text-5xl text-yellow-500 mb-4 drop-shadow-md"></i>
                <p class="text-[10px] font-black text-zinc-400 uppercase tracking-[0.2em]">Loading Workspace...</p>
            </div>

            <!-- เนื้อหาแต่ละหน้าถูก inject ที่นี่ -->
            <div id="page-content" class="min-h-full"></div>
        </div>
    </div>

    <!-- ===================== FIREBASE & SPA ROUTER ===================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADmZFoyvxq7vRD8SvV4PhnmNmnzwZQWVY",
            authDomain: "hris-21093.firebaseapp.com",
            projectId: "hris-21093",
            storageBucket: "hris-21093.firebasestorage.app",
            messagingSenderId: "549158917606",
            appId: "1:549158917606:web:cdade4e855554e57fab227"
        };
        const fbApp = initializeApp(firebaseConfig);
        const auth = getAuth(fbApp);
        const db = getFirestore(fbApp);
        const APP_ID = 'bizhris-phichit';

        // ── Page registry ──────────────────────────────────────────────
        // แต่ละ page คือ object ที่มี: title, html() และ init(user, db, APP_ID)
        const PAGES = {};

        // ── Router state ───────────────────────────────────────────────
        let currentPageId = null;
        let currentUser = null;
        let userProfile = null;
        let pageCleanup = null; // ฟังก์ชัน cleanup ของหน้าก่อน (เช่น unsubscribe listeners)

        // ── Sidebar nav registry (ขึ้นอยู่กับ role) ───────────────────
        function buildNav(profile) {
            const isAdmin = profile.role === 'admin';
            const isManager = profile.role === 'manager' || isAdmin;
            return [
                { id: 'home',         icon: 'fa-house',                label: 'หน้าหลัก',              show: true },
                { id: 'executive',    icon: 'fa-chart-line',           label: 'แดชบอร์ดผู้บริหาร',     show: isManager },
                { id: 'time',         icon: 'fa-clock',                label: 'เวลาทำงาน & กะ',        show: true },
                { id: 'leave',        icon: 'fa-calendar-check',       label: 'การลา & วันหยุด',        show: true },
                { id: 'leave-mgmt',   icon: 'fa-clipboard-list',       label: 'อนุมัติการลา',          show: isManager },
                { id: 'profile',      icon: 'fa-id-badge',             label: 'โปรไฟล์ของฉัน',         show: true },
                { id: '---',          icon: '',                        label: 'Admin Panel',            show: isAdmin, divider: true },
                { id: 'add-employee', icon: 'fa-user-plus',            label: 'เพิ่ม/แก้ไขพนักงาน',   show: isAdmin, adminStyle: true },
                { id: 'leave-admin',  icon: 'fa-sliders',              label: 'ตั้งค่าการลา',          show: isAdmin, adminStyle: true },
                { id: 'payroll',      icon: 'fa-file-invoice-dollar',  label: 'จัดการเงินเดือน',       show: isAdmin },
            ];
        }

        function renderNav(profile, activeId) {
            const nav = document.getElementById('sidebar-nav');
            const items = buildNav(profile);
            let html = '';
            items.forEach(item => {
                if (!item.show) return;
                if (item.divider) {
                    html += `<div class="mt-6 pt-6 border-t border-zinc-800">
                        <p class="px-4 text-[10px] text-zinc-500 uppercase tracking-widest mb-2 font-bold admin-panel-text whitespace-nowrap">${item.label}</p>`;
                    return;
                }
                const isActive = item.id === activeId;
                const baseClass = 'nav-item flex items-center px-4 py-3 rounded-lg transition-colors cursor-pointer';
                const activeClass = isActive ? 'bg-yellow-500 text-zinc-900 font-semibold shadow-sm' : 
                                    (item.adminStyle ? 'text-yellow-500 hover:bg-zinc-800 hover:text-yellow-400' : 'hover:bg-zinc-800 hover:text-yellow-400');
                html += `<button data-page="${item.id}" class="${baseClass} ${activeClass} w-full text-left" title="${item.label}">
                    <i class="fa-solid ${item.icon} w-6 text-center shrink-0"></i>
                    <span class="ml-3 font-medium sidebar-text whitespace-nowrap">${item.label}</span>
                </button>`;
                if (item.divider) html += '</div>';
            });
            // ปิด admin div ถ้ามี
            if (items.some(i => i.show && i.divider)) html += '</div>';
            nav.innerHTML = html;

            // Bind click
            nav.querySelectorAll('button[data-page]').forEach(btn => {
                btn.addEventListener('click', () => navigateTo(btn.dataset.page));
            });
        }

        // ── Topbar update ───────────────────────────────────────────────
        function updateTopbar(profile, pageTitle) {
            const avatar = profile.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=27272a&color=eab308&size=128`;
            document.getElementById('topbar-avatar').src = avatar;
            document.getElementById('topbar-username').textContent = profile.name;
            document.getElementById('topbar-role').textContent = profile.role;
            if (pageTitle) document.getElementById('topbar-title').textContent = pageTitle;
        }

        // ── Page Loader ─────────────────────────────────────────────────
        function showLoader() {
            const loader = document.getElementById('page-loader');
            loader.classList.remove('hidden-fade');
            loader.style.opacity = '1';
        }
        function hideLoader() {
            const loader = document.getElementById('page-loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.classList.add('hidden-fade'), 200);
        }

        // ── Navigate ────────────────────────────────────────────────────
        window.navigateTo = async function(pageId) {
            if (pageId === currentPageId) return;
            if (pageId === '#' || pageId === 'executive' || pageId === 'payroll' || pageId === '---') {
                showToast('หน้านี้ยังอยู่ระหว่างพัฒนา', 'info');
                return;
            }

            // Cleanup หน้าเก่า (unsubscribe Firebase listeners ฯลฯ)
            if (typeof pageCleanup === 'function') {
                pageCleanup();
                pageCleanup = null;
            }

            currentPageId = pageId;
            showLoader();

            // อัปเดต active state บน sidebar
            if (userProfile) renderNav(userProfile, pageId);

            // โหลด page module
            try {
                const page = await loadPage(pageId);
                if (!page) { hideLoader(); return; }

                // Set content
                const contentEl = document.getElementById('page-content');
                contentEl.innerHTML = page.html;
                contentEl.style.animation = 'none';
                contentEl.offsetHeight; // force reflow
                contentEl.style.animation = '';

                // อัปเดต title
                document.getElementById('topbar-title').textContent = page.title || 'Lamsang Group';
                document.title = `${page.title || 'หน้าหลัก'} - Lamsang Group`;

                // scroll กลับบนสุดเสมอ
                document.getElementById('content-wrapper').scrollTop = 0;

                // init page logic
                if (typeof page.init === 'function') {
                    pageCleanup = await page.init(currentUser, userProfile, db, APP_ID) || null;
                }

                hideLoader();

                // อัปเดต URL hash (ไม่ reload)
                history.pushState({ page: pageId }, '', `#${pageId}`);

            } catch (err) {
                console.error('Page load error:', err);
                hideLoader();
                document.getElementById('page-content').innerHTML = `
                    <div class="flex flex-col items-center justify-center h-64 text-zinc-400">
                        <i class="fa-solid fa-triangle-exclamation text-5xl mb-4 text-yellow-500"></i>
                        <p class="font-bold">ไม่สามารถโหลดหน้านี้ได้</p>
                        <p class="text-xs mt-1">${err.message}</p>
                    </div>`;
            }
        }

        // ── Page Loader: โหลด HTML + script จากไฟล์ .html ─────────────
        // แต่ละหน้าถูก inline ไว้ใน PAGES registry ด้านล่าง
        async function loadPage(pageId) {
            if (PAGES[pageId]) return PAGES[pageId];
            console.warn(`Page "${pageId}" not registered`);
            return null;
        }

        // ── Toast notification ──────────────────────────────────────────
        window.showToast = function(msg, type = 'info') {
            const colors = { info: 'bg-zinc-800 text-white', success: 'bg-green-600 text-white', error: 'bg-red-600 text-white' };
            const toast = document.createElement('div');
            toast.className = `fixed bottom-6 right-6 z-[999] px-5 py-3 rounded-xl shadow-2xl text-sm font-bold ${colors[type]} transition-all`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2500);
        }

        // ── Auth gate ───────────────────────────────────────────────────
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', user.uid));
            if (!snap.exists()) {
                alert('ไม่พบข้อมูลโปรไฟล์ กรุณาติดต่อ HR');
                signOut(auth); window.location.href = 'index.html'; return;
            }
            userProfile = snap.data();

            // Build sidebar & topbar ครั้งเดียว
            const startPage = (location.hash.slice(1) || 'home');
            renderNav(userProfile, startPage);
            updateTopbar(userProfile, null);

            // Navigate ไปหน้าแรก
            await navigateTo(startPage);
        });

        window.handleLogout = () => {
            if (confirm('คุณต้องการออกจากระบบใช่หรือไม่?')) {
                if (typeof pageCleanup === 'function') pageCleanup();
                signOut(auth).then(() => window.location.href = 'index.html');
            }
        };

        window.toggleSidebar = () => {
            document.getElementById('app-sidebar').classList.toggle('collapsed');
        };

        // Handle browser back/forward
        window.addEventListener('popstate', (e) => {
            if (e.state?.page) navigateTo(e.state.page);
        });

        // Auto-collapse on mobile
        if (window.innerWidth < 1024) {
            document.getElementById('app-sidebar').classList.add('collapsed');
        }

        // ================================================================
        // SHARED LEAVE HELPERS
        // ================================================================
        const LEAVE_TYPES = [
            { id: 'sick',      label: 'ลาป่วย',                   icon: 'fa-kit-medical',      color: 'red',    maxDays: 30 },
            { id: 'personal',  label: 'ลากิจ',                    icon: 'fa-briefcase',         color: 'blue',   maxDays: 6  },
            { id: 'vacation',  label: 'ลาพักร้อน',                icon: 'fa-umbrella-beach',    color: 'green',  maxDays: 10 },
            { id: 'maternity', label: 'ลาคลอด',                   icon: 'fa-baby',              color: 'pink',   maxDays: 98 },
            { id: 'ordain',    label: 'ลาบวช',                    icon: 'fa-om',                color: 'orange', maxDays: 15 },
            { id: 'military',  label: 'ลาเพื่อรับราชการทหาร',     icon: 'fa-shield-halved',     color: 'slate',  maxDays: 60 },
            { id: 'other',     label: 'อื่นๆ',                    icon: 'fa-ellipsis',          color: 'zinc',   maxDays: 0  },
        ];
        function getLeaveTypeInfo(id) { return LEAVE_TYPES.find(t => t.id === id) || LEAVE_TYPES[LEAVE_TYPES.length - 1]; }
        function colorVariants(color) {
            const map = {
                red:    { bg:'bg-red-100',    text:'text-red-700',    badge:'bg-red-100 text-red-700'     },
                blue:   { bg:'bg-blue-100',   text:'text-blue-700',   badge:'bg-blue-100 text-blue-700'   },
                green:  { bg:'bg-green-100',  text:'text-green-700',  badge:'bg-green-100 text-green-700' },
                pink:   { bg:'bg-pink-100',   text:'text-pink-700',   badge:'bg-pink-100 text-pink-700'   },
                orange: { bg:'bg-orange-100', text:'text-orange-700', badge:'bg-orange-100 text-orange-700'},
                slate:  { bg:'bg-slate-100',  text:'text-slate-700',  badge:'bg-slate-100 text-slate-700' },
                zinc:   { bg:'bg-zinc-100',   text:'text-zinc-700',   badge:'bg-zinc-100 text-zinc-700'   },
                yellow: { bg:'bg-yellow-100', text:'text-yellow-700', badge:'bg-yellow-100 text-yellow-700'},
            };
            return map[color] || map.zinc;
        }
        function calcLeaveHours(startDate, startTime, endDate, endTime, schedule) {
            const workDaySet = new Set(schedule.workDays || [1,2,3,4,5]);
            const holidays   = new Set(schedule.holidays || []);
            let total = 0;
            const [ssh, ssm] = (startTime || schedule.workStart || '08:00').split(':').map(Number);
            const [esh, esm] = (endTime   || schedule.workEnd   || '17:00').split(':').map(Number);
            const startMs = new Date(`${startDate}T${String(ssh).padStart(2,'0')}:${String(ssm).padStart(2,'0')}`);
            const endMs   = new Date(`${endDate}T${String(esh).padStart(2,'0')}:${String(esm).padStart(2,'0')}`);
            let cur = new Date(startDate + 'T00:00:00');
            const endDay = new Date(endDate + 'T00:00:00');
            while (cur <= endDay) {
                const ds = cur.toISOString().slice(0,10);
                if (workDaySet.has(cur.getDay()) && !holidays.has(ds)) {
                    const ws = schedule.workStart || '08:00';
                    const we = schedule.workEnd   || '17:00';
                    const dayStart = new Date(`${ds}T${ws}`);
                    const dayEnd   = new Date(`${ds}T${we}`);
                    const s = cur.getTime() === new Date(startDate+'T00:00:00').getTime() && startMs > dayStart ? startMs : dayStart;
                    const e = cur.getTime() === endDay.getTime() && endMs < dayEnd ? endMs : dayEnd;
                    if (e > s) {
                        let mins = (e - s) / 60000;
                        const fullDayMins = (dayEnd - dayStart) / 60000;
                        const breakMins  = schedule.breakMinutes || 60;
                        mins = mins * (1 - breakMins / fullDayMins);
                        total += Math.max(0, mins);
                    }
                }
                cur.setDate(cur.getDate() + 1);
            }
            return Math.round(total / 60 * 100) / 100;
        }
        function hoursToDisplay(h) {
            if (h == null || h === '') return '-';
            const days = Math.floor(h / 8);
            const hrs  = Math.round((h % 8) * 10) / 10;
            if (days > 0 && hrs > 0) return `${days} วัน ${hrs} ชม.`;
            if (days > 0) return `${days} วัน`;
            return `${hrs} ชม.`;
        }
        const STATUS_MAP = {
            pending:   { label: 'รอการอนุมัติ', badge: 'bg-yellow-100 text-yellow-800 border border-yellow-200', icon: 'fa-clock'        },
            approved:  { label: 'อนุมัติแล้ว',  badge: 'bg-green-100 text-green-800 border border-green-200',   icon: 'fa-circle-check' },
            rejected:  { label: 'ไม่อนุมัติ',   badge: 'bg-red-100 text-red-700 border border-red-200',         icon: 'fa-circle-xmark' },
            cancelled: { label: 'ยกเลิก',        badge: 'bg-zinc-100 text-zinc-600 border border-zinc-200',       icon: 'fa-ban'          },
        };

        // ================================================================
        // PAGE DEFINITIONS
        // แต่ละหน้าเป็น object { title, html, init }
        // init() return cleanup function (optional) สำหรับ unsubscribe listeners
        // ================================================================

        // ── HOME ──────────────────────────────────────────────────────
        PAGES['home'] = {
            title: 'หน้าหลัก',
            html: `
            <div class="p-6 lg:p-10">
                <div class="mb-8">
                    <h2 class="text-3xl font-black text-zinc-800">สวัสดี, คุณ<span id="welcome-name" class="text-yellow-600">...</span> 👋</h2>
                    <p class="text-zinc-400 text-sm mt-1 font-medium italic">Welcome to Lamsang Group Management System</p>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
                    <div class="lg:col-span-2 bg-white rounded-3xl shadow-sm border border-zinc-200 p-8 flex flex-col">
                        <h3 class="text-lg font-black text-zinc-800 mb-6 flex items-center uppercase tracking-tight">

            init: async (user, profile, db, appId) => {

                const currentDate = new Date();
                let displayMonth = currentDate.getMonth();
                let displayYear = currentDate.getFullYear();
                let selectedDateStr = getLocalISO(currentDate);
                let myLogs = [];
                let clockInterval;

                function getLocalISO(d) {
                    return new Date(d - d.getTimezoneOffset() * 60000).toISOString().slice(0, 10);
                }

                document.getElementById('location-status').textContent = profile.branch || 'Lamsang Group';

                // Clock
                function updateClock() {
                    const now = new Date();
                    const el = document.getElementById('current-time-display');
                    const del = document.getElementById('current-date-display');
                    if (el) el.textContent = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                    if (del) del.textContent = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                }
                updateClock();
                clockInterval = setInterval(updateClock, 1000);

                // Calendar
                function renderCalendar() {
                    const firstDay = new Date(displayYear, displayMonth, 1).getDay();
                    const daysInMonth = new Date(displayYear, displayMonth + 1, 0).getDate();
                    const todayStr = getLocalISO(new Date());
                    const months = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
                    const el = document.getElementById('month-display');
                    if (el) el.textContent = `${months[displayMonth]} ${displayYear + 543}`;
                    const logsMap = {};
                    myLogs.forEach(l => { logsMap[l.localDate] = true; });
                    let html = '';
                    for (let i = 0; i < firstDay; i++) html += `<div class="cal-cell empty"></div>`;
                    for (let d = 1; d <= daysInMonth; d++) {
                        const ds = getLocalISO(new Date(displayYear, displayMonth, d));
                        let cls = 'cal-cell';
                        if (ds === todayStr) cls += ' today';
                        if (ds === selectedDateStr) cls += ' selected';
                        const dot = logsMap[ds] ? '<div class="has-record-dot"></div>' : '';
                        html += `<div class="${cls}" onclick="selectCalDate('${ds}')">${d}${dot}</div>`;
                    }
                    const body = document.getElementById('calendar-body');
                    if (body) body.innerHTML = html;
                }

                function renderLogs() {
                    const logs = myLogs.filter(l => l.localDate === selectedDateStr).sort((a,b) => new Date(a.timestamp)-new Date(b.timestamp));
                    let html = '';
                    if (!logs.length) {
                        html = `<div class="text-center py-8 text-zinc-400"><i class="fa-regular fa-calendar-xmark text-3xl mb-3 opacity-50"></i><p class="text-sm font-medium">ไม่มีประวัติลงเวลา</p></div>`;
                    } else {
                        logs.forEach(log => {
                            const time = new Date(log.timestamp).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                            const isIn = log.type === 'clock_in';
                            html += `<div class="flex items-center justify-between p-4 bg-zinc-50 rounded-xl border border-zinc-100 shadow-sm hover:border-yellow-300 transition-all">
                                <div class="flex items-center">

                                </div>
                                <div class="text-lg font-black ${isIn ? 'text-green-600' : 'text-red-500'} font-mono">${time}</div>

                        });
                    }
                    const el = document.getElementById('daily-logs');
                    if (el) el.innerHTML = html;
                }

                window.selectCalDate = (ds) => {
                    selectedDateStr = ds;
                    renderCalendar();
                    renderLogs();

                    const el = document.getElementById('selected-date-text');

                    } catch (e) { alert(e.message); }
                    finally { if (btn) btn.disabled = false; }
                };

                renderCalendar();

                // cleanup: unsubscribe listener + stop clock

                    unsubscribe();
                    clearInterval(clockInterval);
                    delete window.clockIn;
                    delete window.clockOut;

                // Fill profile card

                document.getElementById('display-name').textContent = profile.name;
                document.getElementById('display-role').textContent = profile.position || profile.role.toUpperCase();
                document.getElementById('display-branch').textContent = profile.branch || 'สำนักงานใหญ่';
                document.getElementById('display-emp-code').textContent = profile.employeeCode || '-';
                document.getElementById('display-start-date').textContent = profile.startDate ? new Date(profile.startDate).toLocaleDateString('th-TH') : '-';
                const st = document.getElementById('display-status');
                if (profile.status === 'resigned') { st.textContent = 'ลาออก'; st.className = 'font-bold text-red-600'; }
                else if (profile.status === 'probation') { st.textContent = 'ทดลองงาน'; st.className = 'font-bold text-blue-600'; }
                else { st.textContent = 'ทำงานอยู่'; st.className = 'font-bold text-green-600'; }

                function convertDriveLink(url) {
                    if (!url) return '';
                    if (url.includes('drive.google.com')) {
                        const m = url.match(/\/d\/(.+?)\//) || url.match(/id=(.+?)(&|$)/);
                        if (m && m[1]) return `https://lh3.googleusercontent.com/d/${m[1]}`;
                    }
                    return url;
                }

                    const url = prompt('วางลิงก์รูปภาพ (Google Drive หรือ URL รูปภาพ):', cur);
                    if (url !== null) {
                        document.getElementById('edit-photo-url').value = url;

                        document.getElementById('save-btn').classList.add('animate-pulse', 'ring-4', 'ring-yellow-300');
                    }
                };

                    e.preventDefault();

                        if (newPw !== confPw) { alert('❌ รหัสผ่านไม่ตรงกัน'); btn.disabled = false; btn.innerHTML = orig; return; }

                    } catch (err) { alert('❌ ' + err.message); }
                    finally { btn.disabled = false; btn.innerHTML = orig; }
                });

                return () => { delete window.changeProfilePicture; };
            }
        };

          <p class="text-xs text-zinc-400">ใช้เมื่อลาแค่ช่วงเช้า/บ่าย หรือลาบางชั่วโมง</p>
        </div>
      </div>
      <!-- ช่วงเวลา (hidden ถ้าไม่เปิด hourly) -->
      <div id="hourly-fields" class="hidden grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-bold text-zinc-700 mb-1">เวลาเริ่ม</label>
          <input type="time" id="req-start-time" class="w-full border-2 border-zinc-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:border-yellow-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-sm font-bold text-zinc-700 mb-1">เวลาสิ้นสุด</label>
          <input type="time" id="req-end-time" class="w-full border-2 border-zinc-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:border-yellow-500 focus:outline-none">
        </div>
      </div>
      <!-- Preview ชั่วโมง -->
      <div id="hours-preview" class="hidden items-center gap-3 p-4 bg-yellow-50 border border-yellow-200 rounded-xl">
        <i class="fa-solid fa-calculator text-yellow-600 text-lg"></i>
        <div>
          <p class="text-xs text-yellow-700 font-bold uppercase tracking-widest">ชั่วโมงลาที่คำนวณได้</p>
          <p class="text-2xl font-black text-yellow-900" id="hours-preview-val">-</p>
        </div>
      </div>
      <!-- เหตุผล -->
      <div>
        <label class="block text-sm font-bold text-zinc-700 mb-1">เหตุผล / รายละเอียด *</label>
        <textarea id="req-reason" rows="3" placeholder="ระบุเหตุผลการลา..." class="w-full border-2 border-zinc-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:border-yellow-500 focus:outline-none resize-none"></textarea>
      </div>
      <!-- เอกสารแนบ -->
      <div>
        <label class="block text-sm font-bold text-zinc-700 mb-1">ลิงก์เอกสารแนบ (ใบรับรองแพทย์ ฯลฯ)</label>
        <input type="url" id="req-attachment" placeholder="https://drive.google.com/..." class="w-full border-2 border-zinc-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:border-yellow-500 focus:outline-none">
      </div>
      <!-- Submit -->
      <button onclick="submitLeaveRequest()" id="submit-leave-btn"
        class="w-full bg-yellow-500 hover:bg-yellow-400 text-zinc-900 font-black py-4 rounded-xl transition-all shadow-md uppercase tracking-widest text-sm flex items-center justify-center gap-2">
        <i class="fa-solid fa-paper-plane"></i> ส่งคำขอลา
      </button>
    </div>
  </div>
</div>`,

    init: async (user, profile, db, APP_ID) => {
        const { collection, doc, getDoc, addDoc, onSnapshot, query, where, orderBy, updateDoc }
            = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

        let mySchedule = { workDays: [1,2,3,4,5], workStart: '08:00', workEnd: '17:00', breakMinutes: 60 };
        let myBalance  = {};
        let myRequests = [];
        let selectedLeaveType = null;
        let isHourly = false;
        let calYear  = new Date().getFullYear();
        let calMonth = new Date().getMonth();

        // โหลดตารางงานส่วนตัว
        const schedSnap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'work_schedules', user.uid));
        if (schedSnap.exists()) mySchedule = { ...mySchedule, ...schedSnap.data() };

        // โหลดโควต้าวันลา
        const balSnap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_balances', user.uid));
        if (balSnap.exists()) myBalance = balSnap.data();

        renderQuota();
        buildLeaveTypeGrid();
        setDefaultDates();

        // Real-time คำขอของฉัน
        const unsub = onSnapshot(
            query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'leave_requests'),
                  where('uid', '==', user.uid), orderBy('createdAt', 'desc')),
            snap => {
                myRequests = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderMyRequests();
                renderCalendar();
            }
        );

        // ── Render โควต้า ──
        function renderQuota() {
            const types = ['sick','personal','vacation'];
            let html = '';
            types.forEach(tid => {
                const t   = getLeaveTypeInfo(tid);
                const bal = myBalance[tid] || {};
                const max = bal.totalHours || (t.maxDays * 8);
                const used= bal.usedHours  || 0;
                const rem = Math.max(0, max - used);
                const pct = max > 0 ? Math.min(100, Math.round(used / max * 100)) : 0;
                const cv  = colorVariants(t.color);
                html += `
                <div class="leave-card bg-white rounded-2xl border border-zinc-200 p-5">
                  <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 rounded-xl ${cv.bg} flex items-center justify-center">
                      <i class="fa-solid ${t.icon} ${cv.text}"></i>
                    </div>
                    <div>
                      <p class="font-black text-zinc-800 text-sm">${t.label}</p>
                      <p class="text-[10px] text-zinc-400 font-bold">คงเหลือ ${hoursToDisplay(rem)}</p>
                    </div>
                  </div>
                  <div class="w-full bg-zinc-100 rounded-full h-1.5 mb-1">
                    <div class="h-1.5 rounded-full ${cv.bg.replace('100','400')} transition-all" style="width:${pct}%"></div>
                  </div>
                  <div class="flex justify-between text-[10px] text-zinc-400 font-bold">
                    <span>ใช้ ${hoursToDisplay(used)}</span><span>สิทธิ์ ${hoursToDisplay(max)}</span>
                  </div>
                </div>`;
            });
            // วันหยุดนักขัตฤกษ์
            html += `
            <div class="leave-card bg-zinc-900 rounded-2xl p-5 text-white">
              <div class="flex items-center gap-3 mb-3">
                <div class="w-10 h-10 rounded-xl bg-yellow-500 flex items-center justify-center">
                  <i class="fa-solid fa-star text-zinc-900"></i>
                </div>
                <div>
                  <p class="font-black text-sm">วันทำงานของฉัน</p>
                  <p class="text-[10px] text-zinc-400 font-bold">ตารางประจำสัปดาห์</p>
                </div>
              </div>
              <p class="text-yellow-400 font-black text-sm">${formatWorkDays(mySchedule.workDays)}</p>
              <p class="text-zinc-400 text-xs mt-1">${mySchedule.workStart} – ${mySchedule.workEnd} (พัก ${mySchedule.breakMinutes} นาที)</p>
            </div>`;
            const el = document.getElementById('quota-row');
            if (el) el.innerHTML = html;
        }

        function formatWorkDays(days) {
            const names = ['อา','จ','อ','พ','พฤ','ศ','ส'];
            return (days || []).map(d => names[d]).join(', ');
        }

        // ── Build leave type selector ──
        function buildLeaveTypeGrid() {
            const el = document.getElementById('leave-type-grid');
            if (!el) return;
            el.innerHTML = LEAVE_TYPES.map(t => {
                const cv = colorVariants(t.color);
                return `
                <button onclick="selectLeaveType('${t.id}')" id="lt-${t.id}"
                  class="p-3 rounded-xl border-2 border-zinc-200 hover:border-yellow-400 text-left transition-all group">
                  <i class="fa-solid ${t.icon} text-zinc-400 group-hover:text-yellow-500 mb-1 block transition-colors"></i>
                  <p class="text-xs font-black text-zinc-700 leading-tight">${t.label}</p>
                  ${t.maxDays ? `<p class="text-[10px] text-zinc-400 font-medium">${t.maxDays} วัน/ปี</p>` : ''}
                </button>`;
            }).join('');
        }

        window.selectLeaveType = (tid) => {
            selectedLeaveType = tid;
            document.querySelectorAll('[id^="lt-"]').forEach(el => {
                el.classList.remove('border-yellow-500', 'bg-yellow-50');
                el.classList.add('border-zinc-200');
            });
            const el = document.getElementById(`lt-${tid}`);
            if (el) { el.classList.add('border-yellow-500', 'bg-yellow-50'); el.classList.remove('border-zinc-200'); }
            recalcHours();
        };

        function setDefaultDates() {
            const today = new Date().toISOString().slice(0, 10);
            const sd = document.getElementById('req-start-date');
            const ed = document.getElementById('req-end-date');
            if (sd) sd.value = today;
            if (ed) ed.value = today;
            // Set default times from schedule
            const st = document.getElementById('req-start-time');
            const et = document.getElementById('req-end-time');
            if (st) st.value = mySchedule.workStart;
            if (et) et.value = mySchedule.workEnd;
        }

        window.toggleHourly = () => {
            isHourly = !isHourly;
            const btn = document.getElementById('hourly-toggle');
            const fields = document.getElementById('hourly-fields');
            if (isHourly) {
                btn?.classList.replace('bg-zinc-300', 'bg-yellow-400');
                btn?.querySelector('span')?.classList.add('translate-x-5');
                fields?.classList.remove('hidden');
                fields?.classList.add('grid');
            } else {
                btn?.classList.replace('bg-yellow-400', 'bg-zinc-300');
                btn?.querySelector('span')?.classList.remove('translate-x-5');
                fields?.classList.add('hidden');
                fields?.classList.remove('grid');
            }
            recalcHours();
        };

        function recalcHours() {
            const sd = document.getElementById('req-start-date')?.value;
            const ed = document.getElementById('req-end-date')?.value;
            if (!sd || !ed) return;
            const st = isHourly ? (document.getElementById('req-start-time')?.value || mySchedule.workStart) : mySchedule.workStart;
            const et = isHourly ? (document.getElementById('req-end-time')?.value  || mySchedule.workEnd)   : mySchedule.workEnd;
            const hrs = calcLeaveHours(sd, st, ed, et, mySchedule);
            const prev = document.getElementById('hours-preview');
            const val  = document.getElementById('hours-preview-val');
            if (hrs > 0) {
                prev?.classList.remove('hidden');
                prev?.classList.add('flex');
                if (val) val.textContent = hoursToDisplay(hrs);
            } else {
                prev?.classList.add('hidden');
                prev?.classList.remove('flex');
            }
        }

        // Bind date/time change
        ['req-start-date','req-end-date','req-start-time','req-end-time'].forEach(id => {
            document.getElementById(id)?.addEventListener('change', recalcHours);
        });

        window.openLeaveModal  = () => document.getElementById('leave-modal')?.classList.remove('hidden');
        window.closeLeaveModal = () => document.getElementById('leave-modal')?.classList.add('hidden');

        window.submitLeaveRequest = async () => {
            if (!selectedLeaveType) { showToast('กรุณาเลือกประเภทการลา', 'error'); return; }
            const sd = document.getElementById('req-start-date')?.value;
            const ed = document.getElementById('req-end-date')?.value;
            const reason = document.getElementById('req-reason')?.value.trim();
            if (!sd || !ed || !reason) { showToast('กรุณากรอกข้อมูลให้ครบ', 'error'); return; }
            if (sd > ed) { showToast('วันสิ้นสุดต้องไม่ก่อนวันเริ่มต้น', 'error'); return; }
            const st = isHourly ? document.getElementById('req-start-time')?.value : mySchedule.workStart;
            const et = isHourly ? document.getElementById('req-end-time')?.value   : mySchedule.workEnd;
            const hrs = calcLeaveHours(sd, st, ed, et, mySchedule);

            const btn = document.getElementById('submit-leave-btn');
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังส่ง...';
            try {
                await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'leave_requests'), {
                    uid: user.uid, employeeName: profile.name, employeeCode: profile.employeeCode || '',
                    branch: profile.branch || '', position: profile.position || '',
                    photoURL: profile.photoURL || '',
                    type: selectedLeaveType, typeName: getLeaveTypeInfo(selectedLeaveType).label,
                    startDate: sd, endDate: ed, startTime: st, endTime: et,
                    isHourly, totalHours: hrs,
                    reason, attachment: document.getElementById('req-attachment')?.value.trim() || '',
                    status: 'pending',
                    createdAt: new Date().toISOString(),
                });
                showToast('✅ ส่งคำขอลาเรียบร้อยแล้ว', 'success');
                closeLeaveModal();
                selectedLeaveType = null;
                document.getElementById('employee-form')?.reset?.();
                document.getElementById('req-reason').value = '';
                document.getElementById('req-attachment').value = '';
                document.querySelectorAll('[id^="lt-"]').forEach(el => {
                    el.classList.remove('border-yellow-500', 'bg-yellow-50');
                    el.classList.add('border-zinc-200');
                });
                setDefaultDates();
            } catch (e) { showToast('❌ ' + e.message, 'error'); }
            finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane mr-2"></i> ส่งคำขอลา';
            }
        };

        // ── Render my requests ──
        function renderMyRequests() {
            const el = document.getElementById('my-requests');
            if (!el) return;
            if (!myRequests.length) {
                el.innerHTML = `<div class="text-center py-16 text-zinc-300">
                    <i class="fa-regular fa-calendar-xmark text-5xl mb-3"></i>
                    <p class="font-bold text-sm">ยังไม่มีคำขอลา</p>
                    <p class="text-xs mt-1">กดปุ่ม "ยื่นคำขอลา" เพื่อเริ่มต้น</p>
                </div>`; return;
            }
            el.innerHTML = myRequests.map(r => {
                const t  = getLeaveTypeInfo(r.type);
                const st = STATUS_MAP[r.status] || STATUS_MAP.pending;
                const cv = colorVariants(t.color);
                const dateRange = r.startDate === r.endDate
                    ? fmtDate(r.startDate)
                    : `${fmtDate(r.startDate)} – ${fmtDate(r.endDate)}`;
                const timeRange = r.isHourly ? ` (${r.startTime}–${r.endTime})` : '';
                const canCancel = r.status === 'pending';
                return `
                <div class="leave-card bg-white rounded-2xl border border-zinc-200 p-5 flex flex-col sm:flex-row sm:items-center gap-4">
                  <div class="w-12 h-12 rounded-2xl ${cv.bg} flex items-center justify-center shrink-0">
                    <i class="fa-solid ${t.icon} ${cv.text} text-lg"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex flex-wrap items-center gap-2 mb-1">
                      <span class="font-black text-zinc-800">${t.label}</span>
                      <span class="text-[10px] font-black px-2.5 py-1 rounded-full ${st.badge}">
                        <i class="fa-solid ${st.icon} mr-1"></i>${st.label}
                      </span>
                    </div>
                    <p class="text-sm text-zinc-500 font-medium">${dateRange}${timeRange}</p>
                    <p class="text-xs text-zinc-400 mt-0.5 truncate">${r.reason}</p>
                    ${r.approverNote ? `<p class="text-xs text-red-500 mt-1 font-bold"><i class="fa-solid fa-comment mr-1"></i>${r.approverNote}</p>` : ''}
                  </div>
                  <div class="text-right shrink-0">
                    <p class="font-black text-zinc-800 text-lg">${hoursToDisplay(r.totalHours)}</p>
                    <p class="text-[10px] text-zinc-400 font-bold uppercase">ชั่วโมงลา</p>
                    ${canCancel ? `<button onclick="cancelLeaveRequest('${r.id}')" class="mt-2 text-[10px] text-red-500 hover:text-red-700 font-black uppercase bg-red-50 hover:bg-red-100 px-3 py-1 rounded-lg transition-all">ยกเลิก</button>` : ''}
                  </div>
                </div>`;
            }).join('');
        }

        window.cancelLeaveRequest = async (id) => {
            if (!confirm('ต้องการยกเลิกคำขอลานี้?')) return;
            try {
                await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_requests', id), {
                    status: 'cancelled', cancelledAt: new Date().toISOString()
                });
                showToast('ยกเลิกคำขอลาแล้ว', 'info');
            } catch (e) { showToast('❌ ' + e.message, 'error'); }
        };

        // ── Calendar ──
        function renderCalendar() {
            const el = document.getElementById('leave-cal-grid');
            const title = document.getElementById('cal-month-title');
            if (!el) return;
            const months = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
            if (title) title.textContent = `${months[calMonth]} ${calYear + 543}`;
            const firstDay = new Date(calYear, calMonth, 1).getDay();
            const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
            const today = new Date().toISOString().slice(0, 10);
            // Map leave days
            const leaveMap = {};
            myRequests.filter(r => r.status !== 'cancelled' && r.status !== 'rejected').forEach(r => {
                let d = new Date(r.startDate);
                const end = new Date(r.endDate);
                while (d <= end) {
                    const ds = d.toISOString().slice(0, 10);
                    if (!leaveMap[ds]) leaveMap[ds] = [];
                    leaveMap[ds].push(r);
                    d.setDate(d.getDate() + 1);
                }
            });
            let html = '';
            for (let i = 0; i < firstDay; i++) html += `<div></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = ds === today;
                const leaves  = leaveMap[ds] || [];
                const colors  = leaves.map(r => colorVariants(getLeaveTypeInfo(r.type).color).bg).filter((v,i,a) => a.indexOf(v) === i);
                html += `
                <div class="aspect-square flex flex-col items-center justify-center rounded-xl text-xs font-bold relative
                  ${isToday ? 'bg-zinc-900 text-white' : leaves.length ? 'bg-yellow-50 text-yellow-900' : 'text-zinc-600 hover:bg-zinc-50'} cursor-default transition-all">
                  <span>${d}</span>
                  ${leaves.length ? `<div class="flex gap-0.5 mt-0.5">${colors.slice(0,3).map(c => `<div class="w-1.5 h-1.5 rounded-full ${c}"></div>`).join('')}</div>` : ''}
                </div>`;
            }
            el.innerHTML = html;
        }

        window.leaveCalPrev = () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); };
        window.leaveCalNext = () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); };

        window.switchLeaveTab = (tab) => {
            document.getElementById('tab-mine')?.classList.toggle('hidden', tab !== 'mine');
            document.getElementById('tab-calendar')?.classList.toggle('hidden', tab !== 'calendar');
            document.querySelectorAll('.tab-btn').forEach((b, i) => {
                const isActive = (i === 0 && tab === 'mine') || (i === 1 && tab === 'calendar');
                b.classList.toggle('active', isActive);
                b.classList.toggle('text-zinc-500', !isActive);
            });
            if (tab === 'calendar') renderCalendar();
        };

        function fmtDate(ds) {
            if (!ds) return '-';
            return new Date(ds).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        return () => {
            unsub();
            ['selectLeaveType','toggleHourly','openLeaveModal','closeLeaveModal',
             'submitLeaveRequest','cancelLeaveRequest','leaveCalPrev','leaveCalNext',
             'switchLeaveTab'].forEach(k => delete window[k]);
        };
    }
};

    html: `

</div>

<!-- Approve/Reject modal -->
<div id="action-modal" class="fixed inset-0 z-[200] flex items-center justify-center p-4 hidden">
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeActionModal()"></div>
  <div class="relative bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">

      <h3 id="action-modal-title" class="font-black text-white text-lg">-</h3>
      <p id="action-modal-sub" class="text-[10px] font-bold uppercase tracking-widest mt-0.5">-</p>
    </div>
    <div class="p-8 space-y-4">

        <textarea id="action-note" rows="2" placeholder="เหตุผลการอนุมัติ/ไม่อนุมัติ..." class="w-full border-2 border-zinc-200 rounded-xl px-4 py-2.5 text-sm focus:border-yellow-500 focus:outline-none resize-none"></textarea>
      </div>
      <div class="flex gap-3">
        <button onclick="closeActionModal()" class="flex-1 py-3 bg-zinc-100 hover:bg-zinc-200 text-zinc-700 font-black rounded-xl transition-all text-sm">ยกเลิก</button>
        <button id="action-confirm-btn" class="flex-1 py-3 font-black rounded-xl transition-all text-sm text-white" onclick="confirmAction()">ยืนยัน</button>
      </div>
    </div>
  </div>

    init: async (user, profile, db, APP_ID) => {
        if (profile.role !== 'admin' && profile.role !== 'manager') {
            navigateTo('home'); return;
        }
        const { collection, doc, onSnapshot, updateDoc, query, orderBy, where, getDoc }
            = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

        let allRequests = [];
        let pendingAction = null; // { id, action }

        const unsub = onSnapshot(
            query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'leave_requests'), orderBy('createdAt', 'desc')),
            snap => {
                allRequests = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                updateStats();
                filterRequests();
            }
        );

        function updateStats() {
            const now = new Date();
            const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
            document.getElementById('stat-pending').textContent  = allRequests.filter(r => r.status === 'pending').length;
            document.getElementById('stat-approved').textContent = allRequests.filter(r => r.status === 'approved' && r.createdAt?.startsWith(thisMonth)).length;
            document.getElementById('stat-rejected').textContent = allRequests.filter(r => r.status === 'rejected' && r.createdAt?.startsWith(thisMonth)).length;
        }

        window.filterRequests = () => {
            const st  = document.getElementById('filter-status')?.value;
            const br  = document.getElementById('filter-branch')?.value;
            let filtered = allRequests;
            if (st !== 'all') filtered = filtered.filter(r => r.status === st);
            if (br) filtered = filtered.filter(r => r.branch === br);
            renderRequests(filtered);
        };

        function renderRequests(list) {
            const el = document.getElementById('mgmt-request-list');
            if (!el) return;
            if (!list.length) {
                el.innerHTML = `<div class="text-center py-16 text-zinc-300">
                    <i class="fa-regular fa-folder-open text-5xl mb-3"></i>
                    <p class="font-bold text-sm">ไม่มีคำขอในหมวดนี้</p>
                </div>`; return;
            }
            const avatarUrl = (r) => r.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(r.employeeName)}&background=f4f4f5&color=27272a&bold=true`;
            el.innerHTML = list.map(r => {
                const t  = getLeaveTypeInfo(r.type);
                const st = STATUS_MAP[r.status] || STATUS_MAP.pending;
                const cv = colorVariants(t.color);
                const isPending = r.status === 'pending';
                const dateRange = r.startDate === r.endDate ? fmtDate(r.startDate) : `${fmtDate(r.startDate)} – ${fmtDate(r.endDate)}`;
                const timeRange = r.isHourly ? ` เวลา ${r.startTime}–${r.endTime}` : ' (เต็มวัน)';
                return `
                <div class="req-card bg-white rounded-2xl border border-zinc-200 p-5 lg:p-6">
                  <div class="flex flex-col lg:flex-row gap-4">
                    <!-- Left: Employee info -->
                    <div class="flex items-center gap-4 lg:w-56 shrink-0">
                      <img src="${avatarUrl(r)}" class="w-12 h-12 rounded-2xl object-cover border border-zinc-200">
                      <div class="min-w-0">
                        <p class="font-black text-zinc-800 text-sm truncate">${r.employeeName}</p>
                        <p class="text-[10px] text-zinc-400 font-bold uppercase">${r.employeeCode || ''}</p>
                        <p class="text-[10px] text-zinc-400">${r.branch || ''}</p>
                      </div>
                    </div>
                    <!-- Center: Leave detail -->
                    <div class="flex-1">
                      <div class="flex flex-wrap items-center gap-2 mb-2">
                        <span class="inline-flex items-center gap-1.5 text-xs font-black px-3 py-1 rounded-full ${cv.badge}">
                          <i class="fa-solid ${t.icon}"></i> ${t.label}
                        </span>
                        <span class="text-[10px] font-black px-2.5 py-1 rounded-full ${st.badge}">
                          <i class="fa-solid ${st.icon} mr-1"></i>${st.label}
                        </span>
                        <span class="ml-auto font-black text-zinc-800">${hoursToDisplay(r.totalHours)}</span>
                      </div>
                      <p class="text-sm font-bold text-zinc-600">${dateRange}${timeRange}</p>
                      <p class="text-xs text-zinc-400 mt-1 line-clamp-2">${r.reason}</p>
                      ${r.attachment ? `<a href="${r.attachment}" target="_blank" class="text-xs text-yellow-600 hover:text-yellow-700 font-bold mt-1 inline-flex items-center gap-1"><i class="fa-solid fa-paperclip"></i> ดูเอกสารแนบ</a>` : ''}
                      ${r.approverNote ? `<p class="text-xs text-zinc-500 mt-1 bg-zinc-50 px-3 py-1.5 rounded-lg border"><i class="fa-solid fa-comment mr-1 text-zinc-400"></i>${r.approverNote}</p>` : ''}
                    </div>
                    <!-- Right: Actions -->
                    ${isPending ? `
                    <div class="flex lg:flex-col gap-2 shrink-0 justify-end">
                      <button onclick="openActionModal('${r.id}','approve')"
                        class="inline-flex items-center gap-2 bg-green-500 hover:bg-green-400 text-white font-black px-5 py-2.5 rounded-xl text-xs transition-all uppercase tracking-widest shadow-sm">
                        <i class="fa-solid fa-check"></i> อนุมัติ
                      </button>
                      <button onclick="openActionModal('${r.id}','reject')"
                        class="inline-flex items-center gap-2 bg-red-50 hover:bg-red-500 text-red-600 hover:text-white border-2 border-red-200 hover:border-red-500 font-black px-5 py-2.5 rounded-xl text-xs transition-all uppercase tracking-widest">
                        <i class="fa-solid fa-xmark"></i> ไม่อนุมัติ
                      </button>
                    </div>` : `
                    <div class="shrink-0 text-right">
                      <p class="text-[10px] text-zinc-400 font-bold uppercase">ดำเนินการโดย</p>
                      <p class="text-xs font-bold text-zinc-600">${r.approvedBy || '-'}</p>
                      <p class="text-[10px] text-zinc-400">${r.approvedAt ? fmtDate(r.approvedAt.slice(0,10)) : ''}</p>
                    </div>`}
                  </div>
                </div>`;
            }).join('');
        }

        window.openActionModal = (id, action) => {
            const r = allRequests.find(x => x.id === id);
            if (!r) return;
            pendingAction = { id, action };
            const isApprove = action === 'approve';
            const header = document.getElementById('action-modal-header');
            if (header) {
                header.className = `px-8 py-5 ${isApprove ? 'bg-green-600' : 'bg-red-600'}`;
            }
            const title = document.getElementById('action-modal-title');
            if (title) title.textContent = isApprove ? '✅ อนุมัติคำขอลา' : '❌ ไม่อนุมัติคำขอลา';
            const sub = document.getElementById('action-modal-sub');
            if (sub) sub.textContent = isApprove ? 'Approve Leave Request' : 'Reject Leave Request';
            const box = document.getElementById('action-detail-box');
            if (box) box.innerHTML = `
                <div class="flex justify-between"><span class="text-zinc-400">พนักงาน</span><span class="font-bold">${r.employeeName}</span></div>
                <div class="flex justify-between"><span class="text-zinc-400">ประเภท</span><span class="font-bold">${r.typeName}</span></div>
                <div class="flex justify-between"><span class="text-zinc-400">วันที่</span><span class="font-bold">${fmtDate(r.startDate)}${r.startDate !== r.endDate ? ' – '+fmtDate(r.endDate) : ''}</span></div>
                <div class="flex justify-between"><span class="text-zinc-400">จำนวน</span><span class="font-bold text-yellow-600">${hoursToDisplay(r.totalHours)}</span></div>`;
            const btn = document.getElementById('action-confirm-btn');
            if (btn) {
                btn.className = `flex-1 py-3 font-black rounded-xl transition-all text-sm text-white ${isApprove ? 'bg-green-500 hover:bg-green-400' : 'bg-red-500 hover:bg-red-400'}`;
                btn.textContent = isApprove ? 'ยืนยันการอนุมัติ' : 'ยืนยันการไม่อนุมัติ';
            }
            document.getElementById('action-note').value = '';
            document.getElementById('action-modal')?.classList.remove('hidden');
        };

        window.closeActionModal = () => {
            document.getElementById('action-modal')?.classList.add('hidden');
            pendingAction = null;
        };

        window.confirmAction = async () => {
            if (!pendingAction) return;
            const { id, action } = pendingAction;
            const note = document.getElementById('action-note')?.value.trim();
            const btn = document.getElementById('action-confirm-btn');
            btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
            try {
                const r = allRequests.find(x => x.id === id);
                const updatePayload = {
                    status: action === 'approve' ? 'approved' : 'rejected',
                    approvedBy: profile.name,
                    approvedAt: new Date().toISOString(),
                    approverNote: note || '',
                };
                await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_requests', id), updatePayload);

                // ถ้าอนุมัติ → หักโควต้าจาก leave_balances
                if (action === 'approve' && r) {
                    const balRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_balances', r.uid);
                    const balSnap = await getDoc(balRef);
                    const bal = balSnap.exists() ? balSnap.data() : {};
                    const tid = r.type;
                    const prev = (bal[tid]?.usedHours) || 0;
                    await updateDoc(balRef, { [`${tid}.usedHours`]: prev + (r.totalHours || 0) });
                }

                showToast(action === 'approve' ? '✅ อนุมัติคำขอลาแล้ว' : '❌ ไม่อนุมัติคำขอลา', action === 'approve' ? 'success' : 'info');
                closeActionModal();
            } catch (e) { showToast('❌ ' + e.message, 'error'); }
            finally { btn.disabled = false; }
        };

        function fmtDate(ds) {
            if (!ds) return '-';
            return new Date(ds).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        return () => {
            unsub();
            ['filterRequests','openActionModal','closeActionModal','confirmAction'].forEach(k => delete window[k]);
        };
    }
};

                }).join('')}
              </div>
              <button onclick="saveQuota()" class="w-full mt-5 bg-yellow-500 hover:bg-yellow-400 text-zinc-900 font-black py-3 rounded-xl transition-all text-sm uppercase tracking-widest shadow-md">
                <i class="fa-solid fa-save mr-2"></i> บันทึกโควต้าวันลา
              </button>
            </div>`;

            // Bind daily hours preview
            function updateDailyPreview() {
                const s = document.getElementById('sched-start')?.value || '08:00';
                const e = document.getElementById('sched-end')?.value   || '17:00';
                const b = Number(document.getElementById('sched-break')?.value) || 60;
                const [sh,sm] = s.split(':').map(Number);
                const [eh,em] = e.split(':').map(Number);
                const mins = (eh*60+em) - (sh*60+sm) - b;
                const el = document.getElementById('daily-hrs-preview');
                if (el) el.textContent = mins > 0 ? `${(mins/60).toFixed(1)} ชั่วโมง` : '-';
            }
            ['sched-start','sched-end','sched-break'].forEach(id =>
                document.getElementById(id)?.addEventListener('input', updateDailyPreview));
            updateDailyPreview();
        }

        window.toggleWorkDay = (d) => {
            if (workDaysSel.includes(d)) workDaysSel = workDaysSel.filter(x => x !== d);
            else workDaysSel.push(d);
            workDaysSel.sort();
            const btn = document.getElementById(`wday-${d}`);
            if (btn) {
                btn.classList.toggle('selected', workDaysSel.includes(d));
            }
        };

        window.saveSchedule = async () => {
            if (!selectedEmpUid) return;
            const payload = {
                workDays: workDaysSel,
                workStart: document.getElementById('sched-start')?.value || '08:00',
                workEnd:   document.getElementById('sched-end')?.value   || '17:00',
                breakMinutes: Number(document.getElementById('sched-break')?.value) || 60,
                holidays: (document.getElementById('sched-holidays')?.value || '')
                    .split(',').map(s => s.trim()).filter(Boolean),
                updatedAt: new Date().toISOString(),
            };
            try {
                await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'work_schedules', selectedEmpUid), payload, { merge: true });
                showToast('✅ บันทึกตารางงานแล้ว', 'success');
            } catch (e) { showToast('❌ ' + e.message, 'error'); }
        };

        window.saveQuota = async () => {
            if (!selectedEmpUid) return;
            const payload = {};
            LEAVE_TYPES.filter(t => t.maxDays > 0).forEach(t => {
                const el = document.getElementById(`quota-${t.id}`);
                if (el) {
                    const balSnap_cur = {};
                    payload[`${t.id}`] = {
                        totalHours: Number(el.value) || 0,
                        usedHours: 0, // admin reset ถ้าต้องการ; ค่าเดิมถูก preserve โดย merge
                    };
                }
            });
            try {
                await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_balances', selectedEmpUid), payload, { merge: true });
                showToast('✅ บันทึกโควต้าวันลาแล้ว', 'success');
            } catch (e) { showToast('❌ ' + e.message, 'error'); }
        };

        return () => {
            unsub();
            ['filterAdminEmpList','selectAdminEmp','toggleWorkDay','saveSchedule','saveQuota'].forEach(k => delete window[k]);
        };
    }
};

    </script>
</body>
</html>
