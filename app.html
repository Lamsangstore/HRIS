                <div class="req-card bg-white rounded-2xl border border-zinc-200 p-5 lg:p-6">
                  <div class="flex flex-col lg:flex-row gap-4">
                    <div class="flex items-center gap-4 lg:w-56 shrink-0">
                      <img src="${avatarUrl(r)}" onerror="handleImgError(this)" data-name="${r.employeeName||''}" class="w-12 h-12 rounded-2xl object-cover border border-zinc-200">
                      <div class="min-w-0">
                        <p class="font-black text-zinc-800 text-sm truncate">${r.employeeName}</p>
                        <p class="text-[10px] text-zinc-400 font-bold uppercase">${r.employeeCode || ''}</p>
                        <p class="text-[10px] text-zinc-400">${r.branch || ''}</p>
                      </div>
                    </div>
                    <div class="flex-1">
                      <div class="flex flex-wrap items-center gap-2 mb-2">
                        <span class="inline-flex items-center gap-1.5 text-xs font-black px-3 py-1 rounded-full ${cv.badge}">
                          <i class="fa-solid ${t.icon}"></i> ${t.label}
                        </span>
                        <span class="text-[10px] font-black px-2.5 py-1 rounded-full ${st.badge}">
                          <i class="fa-solid ${st.icon} mr-1"></i>${st.label}
                        </span>
                        <span class="ml-auto font-black text-zinc-800">${dispHoursForReq(r)}</span>
                      </div>
                      <p class="text-sm font-bold text-zinc-600">${dateRange}${timeRange}</p>
                      <p class="text-xs text-zinc-400 mt-1 line-clamp-2">${r.reason}</p>
                      ${r.attachment ? `<a href="${r.attachment}" target="_blank" class="text-xs text-yellow-600 hover:text-yellow-700 font-bold mt-1 inline-flex items-center gap-1"><i class="fa-solid fa-paperclip"></i> ดูเอกสารแนบ</a>` : ''}
                      ${r.approverNote ? `<p class="text-xs text-zinc-500 mt-1 bg-zinc-50 px-3 py-1.5 rounded-lg border"><i class="fa-solid fa-comment mr-1 text-zinc-400"></i>${r.approverNote}</p>` : ''}
                    </div>
                    ${isPending ? `
                    <div class="flex lg:flex-col gap-2 shrink-0 justify-end">
                      <button onclick="openActionModal('${r.id}','approve')"
                        class="inline-flex items-center gap-2 bg-green-500 hover:bg-green-400 text-white font-black px-5 py-2.5 rounded-xl text-xs transition-all uppercase tracking-widest shadow-sm">
                        <i class="fa-solid fa-check"></i> อนุมัติ
                      </button>
                      <button onclick="openActionModal('${r.id}','reject')"
                        class="inline-flex items-center gap-2 bg-red-50 hover:bg-red-500 text-red-600 hover:text-white border-2 border-red-200 hover:border-red-500 font-black px-5 py-2.5 rounded-xl text-xs transition-all uppercase tracking-widest">
                        <i class="fa-solid fa-xmark"></i> ไม่อนุมัติ
                      </button>
                    </div>` : r.status === 'approved' ? `
                    <div class="flex lg:flex-col gap-2 shrink-0 justify-end items-end">
                      <div class="text-right">
                        <p class="text-[10px] text-zinc-400 font-bold uppercase">อนุมัติโดย</p>
                        <p class="text-xs font-bold text-zinc-600">${r.approvedBy || '-'}</p>
                        <p class="text-[10px] text-zinc-400">${r.approvedAt ? fmtDate(r.approvedAt) : ''}</p>
                      </div>
                      <button onclick="mgrCancelLeave('${r.id}')"
                        class="inline-flex items-center gap-1.5 bg-orange-50 hover:bg-orange-500 text-orange-600 hover:text-white border-2 border-orange-200 hover:border-orange-500 font-black px-4 py-2 rounded-xl text-[10px] transition-all uppercase tracking-widest">
                        <i class="fa-solid fa-rotate-left"></i> ยกเลิก (คืนสิทธิ์)
                      </button>
                    </div>` : `
                    <div class="shrink-0 text-right">
                      <p class="text-[10px] text-zinc-400 font-bold uppercase">ดำเนินการโดย</p>
                      <p class="text-xs font-bold text-zinc-600">${r.approvedBy || '-'}</p>
                      <p class="text-[10px] text-zinc-400">${r.approvedAt ? fmtDate(r.approvedAt) : ''}</p>
                    </div>`}
                  </div>
                </div>`;
            }).join('');
        }

        window.openActionModal = async (id, action) => {
            const r = allRequests.find(x => x.id === id);
            if (!r) return;
            pendingAction = { id, action };
            const isApprove = action === 'approve';
            const header = document.getElementById('action-modal-header');
            if (header) header.className = `px-8 py-5 ${isApprove ? 'bg-green-600' : 'bg-red-600'}`;
            const title = document.getElementById('action-modal-title');
            if (title) title.textContent = isApprove ? '✅ อนุมัติคำขอลา' : '❌ ไม่อนุมัติคำขอลา';
            const sub = document.getElementById('action-modal-sub');
            if (sub) sub.textContent = isApprove ? 'Approve Leave Request' : 'Reject Leave Request';

            const box = document.getElementById('action-detail-box');
            if (box) {
                // แสดง detail เบื้องต้นก่อน
                const sched = scheduleCache[r.uid] || null;
                const reqHrsDisplay = dispHoursForReq(r);
                box.innerHTML = `
                    <div class="flex justify-between"><span class="text-zinc-400">พนักงาน</span><span class="font-bold">${r.employeeName}</span></div>
                    <div class="flex justify-between"><span class="text-zinc-400">ประเภท</span><span class="font-bold">${r.typeName}</span></div>
                    <div class="flex justify-between"><span class="text-zinc-400">วันที่</span><span class="font-bold">${fmtDate(r.startDate)}${r.startDate !== r.endDate ? ' – '+fmtDate(r.endDate) : ''}</span></div>
                    <div class="flex justify-between"><span class="text-zinc-400">จำนวนที่ขอ</span><span class="font-bold text-yellow-600">${reqHrsDisplay}</span></div>
                    <div id="quota-loading" class="text-center py-2 text-zinc-400 text-xs"><i class="fa-solid fa-spinner fa-spin mr-1"></i> กำลังโหลดโควต้า...</div>`;

                // โหลด balance แบบ async แล้วอัปเดต
                try {
                    const bal  = await getEmpBalance(r.uid);
                    const hpd  = sched ? getDayWorkHours(sched) : 8;
                    const tid  = r.type;
                    const isTrackable = ['sick','personal','vacation'].includes(tid);
                    const loadingEl = document.getElementById('quota-loading');
                    if (!loadingEl) return; // modal ปิดไปแล้ว

                    if (isTrackable) {
                        const b       = bal[tid] || {};
                        const totalH  = b.totalHours != null ? b.totalHours : (getLeaveTypeInfo(tid).maxDays * hpd);
                        const usedH   = b.usedHours  || 0;
                        const remH    = Math.max(0, totalH - usedH);
                        const reqH    = r.totalHours || 0;
                        const afterH  = Math.max(0, remH - reqH);
                        const pct     = totalH > 0 ? Math.min(100, Math.round(usedH/totalH*100)) : 0;
                        const willExceed = reqH > remH;
                        const barColor   = willExceed ? 'bg-red-400' : pct > 80 ? 'bg-orange-400' : 'bg-green-400';

                        loadingEl.outerHTML = `
                            <div class="mt-2 pt-2 border-t border-zinc-200 space-y-1.5">
                              <p class="text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-2">โควต้า${r.typeName}</p>
                              <div class="flex justify-between text-xs">
                                <span class="text-zinc-500">ใช้ไปแล้ว</span>
                                <span class="font-bold">${balanceToDisplay(usedH, sched)}</span>
                              </div>
                              <div class="flex justify-between text-xs">
                                <span class="text-zinc-500">คงเหลือก่อนอนุมัติ</span>
                                <span class="font-bold ${willExceed ? 'text-red-600' : 'text-green-600'}">${balanceToDisplay(remH, sched)}</span>
                              </div>
                              <div class="w-full bg-zinc-200 rounded-full h-1.5 my-1">
                                <div class="h-1.5 rounded-full ${barColor} transition-all" style="width:${pct}%"></div>
                              </div>
                              <div class="flex justify-between text-xs">
                                <span class="text-zinc-500">หลังอนุมัติจะเหลือ</span>
                                <span class="font-black ${willExceed ? 'text-red-600' : 'text-zinc-800'}">${balanceToDisplay(afterH, sched)}</span>
                              </div>
                              ${willExceed ? `<div class="bg-red-50 border border-red-200 rounded-lg px-3 py-2 mt-1">
                                <p class="text-xs text-red-700 font-bold"><i class="fa-solid fa-triangle-exclamation mr-1"></i>โควต้าไม่พอ! ขาดอีก ${balanceToDisplay(reqH - remH, sched)}</p>
                              </div>` : ''}
                            </div>`;
                    } else {
                        loadingEl.outerHTML = `<p class="text-xs text-zinc-400 text-center pt-1">ประเภทนี้ไม่นับโควต้า</p>`;
                    }
                } catch(e) {
                    const loadingEl = document.getElementById('quota-loading');
                    if (loadingEl) loadingEl.outerHTML = `<p class="text-xs text-red-400 text-center pt-1">โหลดโควต้าไม่ได้</p>`;
                }
            }

            const btn = document.getElementById('action-confirm-btn');
            if (btn) {
                btn.className = `flex-1 py-3 font-black rounded-xl transition-all text-sm text-white ${isApprove ? 'bg-green-500 hover:bg-green-400' : 'bg-red-500 hover:bg-red-400'}`;
                btn.textContent = isApprove ? 'ยืนยันการอนุมัติ' : 'ยืนยันการไม่อนุมัติ';
            }
            document.getElementById('action-note').value = '';
            document.getElementById('action-modal')?.classList.remove('hidden');
        };

        window.closeActionModal = () => {
            document.getElementById('action-modal')?.classList.add('hidden');
            pendingAction = null;
        };

        window.confirmAction = async () => {
            if (!pendingAction) return;
            const { id, action } = pendingAction;
            const note = document.getElementById('action-note')?.value.trim();
            const btn = document.getElementById('action-confirm-btn');
            btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
            try {
                const r = allRequests.find(x => x.id === id);
                await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_requests', id), {
                    status: action === 'approve' ? 'approved' : 'rejected',
                    approvedBy: profile.name,
                    approvedAt: new Date().toISOString(),
                    approverNote: note || '',
                });
                if (action === 'approve' && r) {
                    const tid = r.type;
                    if (['sick','personal','vacation','maternity','ordain','military'].includes(tid)) {
                        const balRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_balances', r.uid);
                        const balSnap = await getDoc(balRef);
                        const bal = balSnap.exists() ? balSnap.data() : {};
                        const prev = (bal[tid]?.usedHours) || 0;
                        const newUsed = Math.round((prev + (r.totalHours || 0)) * 100) / 100;
                        // ใช้ dotted path เพื่อ update แค่ usedHours ไม่แตะ totalHours
                        if (balSnap.exists()) {
                            await updateDoc(balRef, { [`${tid}.usedHours`]: newUsed });
                        } else {
                            // doc ยังไม่มี — สร้างใหม่ โดยใช้ hpd จาก schedule จริง
                            const empSched2 = scheduleCache[r.uid] || { workStart:'08:00', workEnd:'17:00', breakMinutes:60 };
                            const hpd2 = getDayWorkHours(empSched2);
                            const defaultTotal = Math.round(getLeaveTypeInfo(tid).maxDays * hpd2 * 100) / 100;
                            await setDoc(balRef, { [tid]: { totalHours: defaultTotal, usedHours: newUsed } }, { merge: true });
                        }
                        invalidateBalance(r.uid);
                    }
                }
                showToast(action === 'approve' ? '✅ อนุมัติคำขอลาแล้ว' : '❌ ไม่อนุมัติคำขอลา', action === 'approve' ? 'success' : 'info');
                // แจ้งพนักงานผ่าน LINE
                if (r) notifyEmployeeLeaveResult(r, action, profile.name, note).catch(()=>{});
                closeActionModal();
            } catch (e) { showToast('❌ ' + e.message, 'error'); }
            finally { btn.disabled = false; }
        };

        // แก้: ย้าย mgrCancelLeave ออกจาก return cleanup มาไว้ที่นี่
        // ให้ถูก register เป็น window function ได้ทันทีตอน init
        window.mgrCancelLeave = async (id) => {
            const r = allRequests.find(x => x.id === id);
            if (!r) return;
            if (!confirm(`ยกเลิกการลาของ "${r.employeeName}" และคืนสิทธิ์ ${r.totalHours} ชม. ใช่หรือไม่?`)) return;
            try {
                await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_requests', id), {
                    status: 'cancelled',
                    cancelledAt: new Date().toISOString(),
                    cancelledBy: profile.name,
                    cancelNote: 'ยกเลิกโดยหัวหน้า'
                });
                const leaveKey = ['sick','personal','vacation'].includes(r.type) ? r.type : null;
                if (leaveKey && r.totalHours > 0) {
                    const balRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_balances', r.uid);
                    const bs = await getDoc(balRef);
                    if (bs.exists()) {
                        const bal = bs.data();
                        const newUsed = Math.max(0, (bal[leaveKey]?.usedHours || 0) - r.totalHours);
                        await updateDoc(balRef, { [leaveKey + '.usedHours']: newUsed });
                    }
                }
                invalidateBalance(r.uid);
                showToast('✅ ยกเลิกการลาและคืนสิทธิ์แล้ว', 'success');
            } catch(e) { showToast('❌ ' + e.message, 'error'); }
        };

        function fmtDate(ds) {
            if (!ds) return '-';
            // รองรับทั้ง 'YYYY-MM-DD' และ full ISO timestamp จาก Firestore
            const d = ds.length === 10 ? new Date(ds+'T12:00:00+07:00') : new Date(ds);
            return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric', timeZone: 'Asia/Bangkok' });
        }

        return () => {
            unsub();
            // แก้: เพิ่ม mgrCancelLeave เข้า cleanup ด้วย
            ['filterRequests','openActionModal','closeActionModal','confirmAction','mgrCancelLeave'].forEach(k => delete window[k]);
        };
    }
};

    init: async (user, profile, db, APP_ID) => {
        if (profile.role !== 'admin') { navigateTo('home'); return; }
        const { collection, doc, getDoc, setDoc, updateDoc, onSnapshot, getDocs, query, where }
            = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

        let allEmps   = [];
        let selectedEmpUid = null;
        let workDaysSel = [1, 2, 3, 4, 5];

        const unsub = onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'users'), snap => {
            allEmps = snap.docs.map(d => d.data()).filter(e => e.uid);
            renderEmpList(allEmps);
        });

        function renderEmpList(list) {
            const el = document.getElementById('admin-emp-list');
            if (!el) return;
            if (!list.length) { el.innerHTML = `<div class="p-6 text-center text-zinc-400 text-sm">ไม่พบพนักงาน</div>`; return; }
            el.innerHTML = list.map(e => {
                const av = e.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(e.name)}&background=f4f4f5&color=27272a&bold=true`;
                const isActive = e.uid === selectedEmpUid;
                return `
                <button onclick="selectAdminEmp('${e.uid}')" class="w-full flex items-center gap-3 px-5 py-3.5 text-left transition-all hover:bg-zinc-50 ${isActive ? 'bg-yellow-50 border-l-4 border-yellow-500' : ''}">
                  <img src="${av}" onerror="handleImgError(this)" class="w-10 h-10 rounded-xl object-cover border border-zinc-200 shrink-0">
                  <div class="min-w-0">
                    <p class="font-bold text-zinc-800 text-sm truncate">${e.name}</p>
                    <p class="text-[10px] text-zinc-400 font-bold uppercase">${e.employeeCode || e.role}</p>
                    <p class="text-[10px] text-zinc-400 truncate">${e.branch || ''}</p>
                  </div>
                  <i class="fa-solid fa-chevron-right text-zinc-300 ml-auto shrink-0 text-xs"></i>
                </button>`;
            }).join('');
        }

        window.filterAdminEmpList = () => {
            const q = document.getElementById('admin-emp-search')?.value.toLowerCase();
            renderEmpList(allEmps.filter(e => e.name?.toLowerCase().includes(q) || e.employeeCode?.toLowerCase().includes(q)));
        };

        window.selectAdminEmp = async (uid) => {
            selectedEmpUid = uid;
            renderEmpList(allEmps.filter(e => {
                const q = document.getElementById('admin-emp-search')?.value.toLowerCase() || '';
                return !q || e.name?.toLowerCase().includes(q) || e.employeeCode?.toLowerCase().includes(q);
            }));
            const emp = allEmps.find(e => e.uid === uid);
            if (!emp) return;

            // โหลด schedule, balance และ approved requests พร้อมกัน
            const [schedSnap, balSnap, reqSnap] = await Promise.all([
                getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'work_schedules', uid)),
                getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_balances',  uid)),
                getDocs(query(
                    collection(db, 'artifacts', APP_ID, 'public', 'data', 'leave_requests'),
                    where('uid', '==', uid),
                    where('status', '==', 'approved')
                )),
            ]);

            const sched = schedSnap.exists() ? schedSnap.data() : { workDays:[1,2,3,4,5], workStart:'08:00', workEnd:'17:00', breakMinutes:60, holidays:[] };
            const balRaw = balSnap.exists() ? balSnap.data() : {};

            // คำนวณ usedHours จาก approved requests (source of truth)
            const usedFromReqs = {};
            reqSnap.docs.forEach(d => {
                const r = d.data();
                if (r.type && r.totalHours > 0)
                    usedFromReqs[r.type] = Math.round(((usedFromReqs[r.type]||0) + r.totalHours) * 100) / 100;
            });

            // merge: ใช้ค่าที่มากกว่าระหว่าง Firestore กับที่คำนวณได้
            const bal = { ...balRaw };
            Object.keys(usedFromReqs).forEach(tid => {
                if (!bal[tid]) bal[tid] = {};
                bal[tid] = {
                    ...bal[tid],
                    usedHours: Math.max(bal[tid]?.usedHours || 0, usedFromReqs[tid]),
                };
            });

            workDaysSel = sched.workDays || [1,2,3,4,5];
            renderAdminPanel(emp, sched, bal);
        };

        
        function renderAdminPanel(emp, sched, bal) {
            const panel = document.getElementById('admin-right-panel');
            if (!panel) return;
            const av = emp.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(emp.name)}&background=27272a&color=eab308&bold=true`;
            const DAY_NAMES = ['อา','จ','อ','พ','พฤ','ศ','ส'];
            const daysHtml = [0,1,2,3,4,5,6].map(d => {

                return `<button onclick="toggleWorkDay(${d})" id="wday-${d}"
                    class="day-toggle w-10 h-10 rounded-xl border-2 border-zinc-200 font-black text-xs text-zinc-500 ${isSel ? 'selected' : ''}">
                    ${DAY_NAMES[d]}</button>`;
            }).join('');

            // คำนวณ hpd จาก schedule จริง
            const hpd = getDayWorkHours(sched);

            panel.innerHTML = `
            <!-- Employee card -->
            <div class="bg-zinc-900 text-white rounded-2xl p-5 flex items-center gap-4 mb-5">
              <img src="${av}" onerror="handleImgError(this)" class="w-14 h-14 rounded-2xl object-cover border-2 border-zinc-700">
              <div>
                <p class="font-black text-lg">${emp.name}</p>
                <p class="text-yellow-400 text-xs font-bold uppercase">${emp.employeeCode || ''} · ${emp.position || emp.role}</p>
                <p class="text-zinc-400 text-xs">${emp.branch || ''}</p>
              </div>
            </div>

            <!-- Work Schedule -->
            <div class="bg-white rounded-2xl border border-zinc-200 p-6 mb-5">
              <h4 class="font-black text-zinc-800 mb-5 flex items-center gap-2 uppercase text-sm tracking-widest">
                <i class="fa-solid fa-calendar-days text-yellow-500"></i> ตารางการทำงาน
              </h4>
              <div class="space-y-5">
                <div>
                  <p class="text-xs font-bold text-zinc-500 mb-2 uppercase tracking-widest">วันทำงาน</p>
                  <div class="flex gap-2 flex-wrap">${daysHtml}</div>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                  <div>
                    <label class="block text-xs font-bold text-zinc-500 mb-1 uppercase">เวลาเข้างาน</label>
                    <input type="time" id="sched-start" value="${sched.workStart || '08:00'}"
                      class="w-full border-2 border-zinc-200 rounded-xl px-3 py-2 text-sm font-bold focus:border-yellow-500 focus:outline-none">
                  </div>
                  <div>
                    <label class="block text-xs font-bold text-zinc-500 mb-1 uppercase">เวลาออกงาน</label>
                    <input type="time" id="sched-end" value="${sched.workEnd || '17:00'}"
                      class="w-full border-2 border-zinc-200 rounded-xl px-3 py-2 text-sm font-bold focus:border-yellow-500 focus:outline-none">
                  </div>
                  <div>
                    <label class="block text-xs font-bold text-zinc-500 mb-1 uppercase">เริ่มพัก</label>
                    <input type="time" id="sched-break-start" value="${sched.breakStart || '12:00'}"
                      class="w-full border-2 border-zinc-200 rounded-xl px-3 py-2 text-sm font-bold focus:border-yellow-500 focus:outline-none">
                  </div>
                  <div>
                    <label class="block text-xs font-bold text-zinc-500 mb-1 uppercase">พัก (นาที)</label>
                    <input type="number" id="sched-break" value="${sched.breakMinutes ?? 60}" min="0" max="240"
                      class="w-full border-2 border-zinc-200 rounded-xl px-3 py-2 text-sm font-bold focus:border-yellow-500 focus:outline-none">
                  </div>
                </div>
                <!-- Daily work hours preview -->
                <div class="bg-zinc-50 rounded-xl p-3 flex items-center gap-3 border border-zinc-200">
                  <i class="fa-solid fa-clock text-yellow-500"></i>
                  <p class="text-sm font-bold text-zinc-600">
                    ชั่วโมงงาน/วัน: <span id="daily-hrs-preview" class="text-yellow-600">${hpd.toFixed(1)} ชม.</span>
                  </p>
                </div>
                <div>
                  <label class="block text-xs font-bold text-zinc-500 mb-1 uppercase">วันหยุดพิเศษ (กรอก YYYY-MM-DD คั่นด้วย ,)</label>
                  <textarea id="sched-holidays" rows="2" placeholder="2026-04-06, 2026-04-07, ..."
                    class="w-full border-2 border-zinc-200 rounded-xl px-3 py-2 text-sm font-medium focus:border-yellow-500 focus:outline-none resize-none">${(sched.holidays||[]).join(', ')}</textarea>
                </div>
                <button onclick="saveSchedule()" class="w-full bg-zinc-900 hover:bg-zinc-800 text-yellow-400 font-black py-3 rounded-xl transition-all text-sm uppercase tracking-widest">
                  <i class="fa-solid fa-save mr-2"></i> บันทึกตารางงาน
                </button>
              </div>
            </div>

            <!-- Leave Quota -->
            <div class="bg-white rounded-2xl border border-zinc-200 p-6">
              <h4 class="font-black text-zinc-800 mb-1 flex items-center gap-2 uppercase text-sm tracking-widest">
                <i class="fa-solid fa-sliders text-yellow-500"></i> โควต้าวันลาประจำปี
              </h4>
              <p class="text-[11px] text-zinc-400 mb-5 font-medium">
                คำนวณจาก <span class="font-black text-yellow-600">${hpd.toFixed(1)} ชม./วัน</span>
                (${sched.workStart||'08:00'} – ${sched.workEnd||'17:00'} พัก ${sched.breakStart||'12:00'} ${sched.breakMinutes??60} นาที)
              </p>
              <div class="space-y-4" id="quota-form">
                ${LEAVE_TYPES.filter(t => t.maxDays > 0).map(t => {
                    const b        = bal[t.id] || {};
                    const cv       = colorVariants(t.color);
                    const usedHrs  = b.usedHours  || 0;
                    const totalHrs = b.totalHours != null ? b.totalHours : (t.maxDays * hpd);
                    // แปลง ชม. → วัน เพื่อแสดงใน input (ช่องนี้ต้องเป็นตัวเลขวันล้วน เพราะอ่านค่ากลับไปคำนวณ)
                    const totalDays = Math.round(totalHrs / hpd * 10) / 10;
                    const remHrs    = Math.max(0, totalHrs - usedHrs);
                    return `
                    <div class="p-3 bg-zinc-50 rounded-xl border border-zinc-200">
                      <div class="flex items-center gap-3 mb-2">
                        <div class="w-9 h-9 rounded-xl ${cv.bg} flex items-center justify-center shrink-0">
                          <i class="fa-solid ${t.icon} ${cv.text} text-sm"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                          <p class="font-bold text-zinc-800 text-sm">${t.label}</p>
                          <div class="flex gap-3 text-[10px] text-zinc-400 mt-0.5 flex-wrap">
                            <span>ใช้ <span class="font-black text-zinc-600">${balanceToDisplay(usedHrs, sched)}</span></span>
                            <span>คงเหลือ <span class="font-black ${remHrs <= 0 ? 'text-red-500' : 'text-green-600'}">${balanceToDisplay(remHrs, sched)}</span></span>
                            <span>จาก <span class="font-black">${balanceToDisplay(totalHrs, sched)}</span></span>
                          </div>
                        </div>
                        <div class="flex items-center gap-2 shrink-0">
                          <label class="text-xs text-zinc-500 font-bold whitespace-nowrap">สิทธิ์ (วัน)</label>
                          <input type="number" id="quota-${t.id}"
                            value="${totalDays}"
                            min="0" step="0.5"
                            class="w-20 border-2 border-zinc-200 rounded-lg px-2 py-1.5 text-sm font-black text-center focus:border-yellow-500 focus:outline-none">
                        </div>
                      </div>
                      ${totalHrs > 0 ? (() => {
                        const pct2 = Math.min(100, Math.round(usedHrs/totalHrs*100));
                        const barC = pct2 >= 100 ? 'bg-red-400' : pct2 >= 80 ? 'bg-orange-400' : 'bg-green-400';
                        return `<div class="w-full bg-zinc-200 rounded-full h-1.5"><div class="h-1.5 rounded-full ${barC}" style="width:${pct2}%"></div></div>
                                <p class="text-right text-[9px] text-zinc-400 font-bold mt-0.5">${pct2}% ใช้แล้ว</p>`;
                      })() : ''}
                    </div>`;
                }).join('')}
              </div>
              <p class="text-[10px] text-zinc-400 mt-3 text-center font-medium">
                กรอกเป็น "วัน" — ระบบแปลงเป็นชั่วโมงอัตโนมัติตาม schedule
              </p>
              <div class="mt-4 flex gap-3">
                <button onclick="recalcUsedHours()" class="flex-1 bg-zinc-100 hover:bg-zinc-200 text-zinc-700 font-black py-3 rounded-xl transition-all text-sm border-2 border-zinc-200">
                  <i class="fa-solid fa-rotate mr-2 text-zinc-500"></i> คำนวณจากประวัติการลา
                </button>
                <button onclick="saveQuota()" class="flex-1 bg-yellow-500 hover:bg-yellow-400 text-zinc-900 font-black py-3 rounded-xl transition-all text-sm shadow-md">
                  <i class="fa-solid fa-save mr-2"></i> บันทึกโควต้าวันลา
                </button>
              </div>
            </div>`;

            // Bind daily hours preview (อัปเดตทันทีเมื่อเปลี่ยนเวลา/พัก)
            function updateDailyPreview() {
                const s = document.getElementById('sched-start')?.value || '08:00';
                const e = document.getElementById('sched-end')?.value   || '17:00';
                const b = Number(document.getElementById('sched-break')?.value) || 0;
                const [sh, sm] = s.split(':').map(Number);
                const [eh, em] = e.split(':').map(Number);
                const mins = (eh * 60 + em) - (sh * 60 + sm) - b;
                const el = document.getElementById('daily-hrs-preview');
                if (el) el.textContent = mins > 0 ? `${(mins/60).toFixed(1)} ชม.` : '-';
            }
            ['sched-start','sched-end','sched-break'].forEach(id =>
                document.getElementById(id)?.addEventListener('input', updateDailyPreview)
            );
        }

        window.toggleWorkDay = (d) => {
            if (workDaysSel.includes(d)) workDaysSel = workDaysSel.filter(x => x !== d);
            else workDaysSel.push(d);
            workDaysSel.sort();
            const btn = document.getElementById(`wday-${d}`);
            if (btn) {
                btn.classList.toggle('selected', workDaysSel.includes(d));
            }
        };

        window.saveSchedule = async () => {
            if (!selectedEmpUid) return;
            const payload = {
                workDays: workDaysSel,
                workStart: document.getElementById('sched-start')?.value || '08:00',
                workEnd:   document.getElementById('sched-end')?.value   || '17:00',
                breakStart:   document.getElementById('sched-break-start')?.value || '12:00',
                breakMinutes: Number(document.getElementById('sched-break')?.value) || 60,
                holidays: (document.getElementById('sched-holidays')?.value || '')
                    .split(',').map(s => s.trim()).filter(Boolean),
                updatedAt: new Date().toISOString(),
            };
            // เวลาพักต้องอยู่ในช่วงเวลาทำงาน ไม่งั้นชั่วโมงลาเต็มวันจะไม่ตรงกับ ชม./วัน
            if (payload.breakMinutes > 0) {
                const bs = hhmmToMins(payload.breakStart);
                if (bs < hhmmToMins(payload.workStart) || bs + payload.breakMinutes > hhmmToMins(payload.workEnd)) {
                    showToast('❌ ช่วงเวลาพักต้องอยู่ภายในเวลาเข้า–ออกงาน', 'error');
                    return;
                }
            }
            try {
                await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'work_schedules', selectedEmpUid), payload, { merge: true });
                showToast('✅ บันทึกตารางงานแล้ว', 'success');
            } catch (e) { showToast('❌ ' + e.message, 'error'); }
        };

       
        window.recalcUsedHours = async () => {
            if (!selectedEmpUid) return;
            const btn = document.querySelector('button[onclick="recalcUsedHours()"]');
            if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังคำนวณ...'; }
            try {
                // ดึง approved requests ทั้งหมดของพนักงานคนนี้
                const reqSnap = await getDocs(query(
                    collection(db, 'artifacts', APP_ID, 'public', 'data', 'leave_requests'),
                    where('uid', '==', selectedEmpUid),
                    where('status', '==', 'approved')
                ));
                // รวม totalHours แยกตาม type
                const usedMap = {};
                reqSnap.docs.forEach(d => {
                    const r = d.data();
                    const tid = r.type;
                    if (!tid) return;
                    usedMap[tid] = Math.round(((usedMap[tid] || 0) + (r.totalHours || 0)) * 100) / 100;
                });
                // อ่าน balance ปัจจุบัน
                const balRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_balances', selectedEmpUid);
                const balSnap = await getDoc(balRef);
                // สร้าง update payload ด้วย dotted path
                const updatePayload = {};
                Object.entries(usedMap).forEach(([tid, hrs]) => {
                    updatePayload[`${tid}.usedHours`] = hrs;
                });
                // ถ้า type ไม่มีใน usedMap แปลว่า usedHours = 0
                ['sick','personal','vacation','maternity','ordain','military'].forEach(tid => {
                    if (!(tid in usedMap)) updatePayload[`${tid}.usedHours`] = 0;
                });
                if (balSnap.exists()) {
                    await updateDoc(balRef, updatePayload);
                } else {
                    // doc ไม่มีเลย — สร้างใหม่
                    const schedSnap2 = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'work_schedules', selectedEmpUid));
                    const empSched2 = schedSnap2.exists() ? schedSnap2.data() : { workStart:'08:00', workEnd:'17:00', breakMinutes:60 };
                    const hpd2 = getDayWorkHours(empSched2);
                    const initDoc = {};
                    LEAVE_TYPES.filter(t => t.maxDays > 0).forEach(t => {
                        initDoc[t.id] = { totalHours: Math.round(t.maxDays * hpd2 * 100)/100, usedHours: usedMap[t.id] || 0 };
                    });
                    await setDoc(balRef, initDoc);
                }
                // reload panel
                const emp = allEmps.find(e => e.uid === selectedEmpUid);
                if (emp) await selectAdminEmp(selectedEmpUid);
                const total = Object.values(usedMap).reduce((a,b)=>a+b,0);
                showToast(`✅ คำนวณจาก ${reqSnap.size} คำขอ รวม ${total.toFixed(1)} ชม.`, 'success');
            } catch(e) {
                showToast('❌ ' + e.message, 'error');
            } finally {
                if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-rotate mr-2 text-zinc-500"></i> คำนวณจากประวัติการลา'; }
            }
        };

        // คำนวณ totalHours ของใบลาทุกใบใหม่ด้วยสูตรปัจจุบัน (หักพักเฉพาะส่วนที่คาบเกี่ยวจริง)
        // apply=false → แค่แสดงผลว่าจะเปลี่ยนอะไรบ้าง, apply=true → เขียนลง Firestore แล้วปรับ usedHours
        window.backfillLeaveHours = async (apply) => {
            const btnId = apply ? 'backfill-apply-btn' : 'backfill-dry-btn';
            const btn = document.getElementById(btnId);
            const orig = btn ? btn.innerHTML : '';
            const out = document.getElementById('backfill-result');
            if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังคำนวณ...'; }
            try {
                const reqCol = collection(db, 'artifacts', APP_ID, 'public', 'data', 'leave_requests');
                const reqSnap = await getDocs(reqCol);

                // โหลด schedule ของแต่ละ uid ครั้งเดียว
                const uids = [...new Set(reqSnap.docs.map(d => d.data().uid).filter(Boolean))];
                const schedOf = {};
                await Promise.all(uids.map(async uid => {
                    const s = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'work_schedules', uid));
                    schedOf[uid] = s.exists() ? s.data()
                        : { workDays:[1,2,3,4,5], workStart:'08:00', workEnd:'17:00', breakStart:'12:00', breakMinutes:60, holidays:[] };
                }));

                // หาใบที่ค่าเปลี่ยน
                const diffs = [];
                reqSnap.docs.forEach(d => {
                    const r = d.data();
                    if (!r.uid || !r.startDate || !r.endDate) return;
                    const fresh = calcLeaveHours(r.startDate, r.startTime, r.endDate, r.endTime, schedOf[r.uid]);
                    const old = r.totalHours ?? 0;
                    if (Math.abs(fresh - old) > 0.005) {
                        diffs.push({ id: d.id, uid: r.uid, name: r.employeeName || r.uid,
                                     date: r.startDate, time: `${r.startTime || '-'}–${r.endTime || '-'}`,
                                     status: r.status, old, fresh });
                    }
                });

                if (!diffs.length) {
                    if (out) {
                        out.classList.remove('hidden');
                        out.innerHTML = `<p class="text-sm font-bold text-emerald-600"><i class="fa-solid fa-circle-check mr-2"></i>
                            ตรวจ ${reqSnap.size} ใบ — ถูกต้องทั้งหมดแล้ว ไม่มีอะไรต้องแก้</p>`;
                    }
                    showToast(`✅ ตรวจ ${reqSnap.size} ใบ ไม่พบที่ต้องแก้`, 'success');
                    return;
                }

                // ตารางสรุป
                const rows = diffs.map(x => `
                    <tr class="border-b border-zinc-100">
                      <td class="py-2 pr-3 font-bold text-zinc-700">${x.name}</td>
                      <td class="py-2 pr-3 text-zinc-500">${x.date} ${x.time}</td>
                      <td class="py-2 pr-3 text-zinc-400">${x.status}</td>
                      <td class="py-2 pr-3 text-right text-red-500 font-bold">${x.old.toFixed(2)}</td>
                      <td class="py-2 pr-3 text-right text-emerald-600 font-black">${x.fresh.toFixed(2)}</td>
                    </tr>`).join('');
                if (out) {
                    out.classList.remove('hidden');
                    out.innerHTML = `
                      <p class="text-sm font-black text-zinc-700 mb-2">
                        ${apply ? 'เขียนแล้ว' : 'จะแก้'} ${diffs.length} ใบ (จากทั้งหมด ${reqSnap.size} ใบ)
                        ${apply ? '' : '<span class="text-zinc-400 font-medium">— ยังไม่ได้เขียนลงฐานข้อมูล</span>'}
                      </p>
                      <div class="overflow-x-auto max-h-64 overflow-y-auto">
                        <table class="w-full text-xs">
                          <thead class="text-[10px] uppercase text-zinc-400 font-black">
                            <tr class="border-b-2 border-zinc-200">
                              <th class="text-left py-2 pr-3">พนักงาน</th>
                              <th class="text-left py-2 pr-3">วันที่/เวลา</th>
                              <th class="text-left py-2 pr-3">สถานะ</th>
                              <th class="text-right py-2 pr-3">เดิม</th>
                              <th class="text-right py-2 pr-3">ใหม่</th>
                            </tr>
                          </thead>
                          <tbody>${rows}</tbody>
                        </table>
                      </div>`;
                }

                if (!apply) {
                    showToast(`🔍 พบ ${diffs.length} ใบที่ต้องแก้ — ตรวจแล้วกด "เขียนจริง"`, 'success');
                    return;
                }

                // เขียน totalHours ใหม่
                for (const x of diffs) {
                    await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_requests', x.id), {
                        totalHours: x.fresh,
                        backfilledAt: new Date().toISOString(),
                    });
                }

                // ปรับ usedHours ของคนที่ได้รับผลกระทบ — รวมใหม่จากใบที่อนุมัติแล้วทั้งหมด
                const affected = [...new Set(diffs.map(x => x.uid))];
                for (const uid of affected) {
                    const usedMap = {};
                    reqSnap.docs.forEach(d => {
                        const r = d.data();
                        if (r.uid !== uid || r.status !== 'approved' || !r.type) return;
                        const hrs = diffs.find(x => x.id === d.id)?.fresh ?? (r.totalHours || 0);
                        usedMap[r.type] = Math.round(((usedMap[r.type] || 0) + hrs) * 100) / 100;
                    });
                    const balRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_balances', uid);
                    const balSnap = await getDoc(balRef);
                    if (!balSnap.exists()) continue; // ไม่มี balance ก็ข้าม ให้ไปกด "คำนวณจากประวัติการลา" ทีหลัง
                    const payload = {};
                    ['sick','personal','vacation','maternity','ordain','military'].forEach(tid => {
                        payload[`${tid}.usedHours`] = usedMap[tid] || 0;
                    });
                    await updateDoc(balRef, payload);
                }

                showToast(`✅ แก้ ${diffs.length} ใบ · ปรับโควต้า ${affected.length} คน`, 'success');
                if (selectedEmpUid) await selectAdminEmp(selectedEmpUid);
            } catch (e) {
                showToast('❌ ' + e.message, 'error');
            } finally {
                if (btn) { btn.disabled = false; btn.innerHTML = orig; }
            }
        };

        window.saveQuota = async () => {
            if (!selectedEmpUid) return;
        
            // แก้: ใช้ doc และ getDoc จาก scope ของ init โดยตรง
            // ไม่ import Firestore ใหม่ซ้ำอีกครั้ง
            const schedSnap = await getDoc(
                doc(db, 'artifacts', APP_ID, 'public', 'data', 'work_schedules', selectedEmpUid)
            );
            const empSched = schedSnap.exists()
                ? schedSnap.data()
                : { workStart: '08:00', workEnd: '17:00', breakMinutes: 60 };
            const hpd = getDayWorkHours(empSched);
        
            // อ่าน usedHours เดิมก่อน เพื่อไม่ให้ถูกรีเซ็ต
            const curBalSnap = await getDoc(
                doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_balances', selectedEmpUid)
            );
            const curBal = curBalSnap.exists() ? curBalSnap.data() : {};

            // ใช้ dotted path เพื่อ update แค่ totalHours ไม่แตะ usedHours
            const payload = {};
            LEAVE_TYPES.filter(t => t.maxDays > 0).forEach(t => {
                const el = document.getElementById(`quota-${t.id}`);
                if (!el) return;
                const inputDays = parseFloat(el.value) || 0;
                const totalHrs = Math.round(inputDays * hpd * 100) / 100;
                payload[`${t.id}.totalHours`] = totalHrs;
                // เขียน usedHours เฉพาะถ้ายังไม่มี field นี้ (พนักงานใหม่)
                if (curBal[t.id]?.usedHours == null) {
                    payload[`${t.id}.usedHours`] = 0;
                }
            });

            try {
                const balDocRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_balances', selectedEmpUid);
                if (curBalSnap.exists()) {
                    await updateDoc(balDocRef, payload);
                } else {
                    await setDoc(balDocRef, payload);
                }
                showToast('✅ บันทึกโควต้าวันลาแล้ว (คำนวณจาก ' + hpd.toFixed(1) + ' ชม./วัน)', 'success');
            } catch(e) {
                showToast('❌ ' + e.message, 'error');
            }
        };

        return () => {
            unsub();
            ['filterAdminEmpList','selectAdminEmp','toggleWorkDay','saveSchedule','saveQuota','recalcUsedHours','backfillLeaveHours'].forEach(k => delete window[k]);
        };
    }
};

        window.prOpenCreate = () => {

            try {

                    {periodNo:no,year:yr,startDate:s,endDate:e,note:n,status:'draft',createdAt:new Date().toISOString(),createdBy:profile.name});

        };

        function cntDays(sd,ed,sc){
            const ws=new Set(sc.workDays||[1,2,3,4,5]), hd=new Set(sc.holidays||[]);
            let n=0, d=parseDateTH(sd), end=parseDateTH(ed);
            while(d<=end){const ds=dateToTHStr(d);if(ws.has(d.getDay())&&!hd.has(ds))n++;d.setDate(d.getDate()+1);}
            return n;
        }
        function calcTax(sal,mode){
            if(!mode||mode==='No')return 0;
            if(mode==='3')return Math.round(sal*0.03);
            const an=sal*12; let t=0,rem=an;
            for(const [c,r] of [[150000,0],[150000,.05],[200000,.1],[250000,.15],[250000,.2],[500000,.25],[500000,.3],[Infinity,.35]]){
                const tx=Math.min(rem,c); t+=tx*r; rem-=tx; if(rem<=0)break;
            }
            return Math.round(t/12);
        }

        window.prGenAll = async pid => {
            const active=employees.filter(e=>e.status!=='resigned');
            if(!confirm(
                `คำนวณเงินเดือนใหม่ให้ ${active.length} คน?\n\n`
              + `คำนวณใหม่จากข้อมูลล่าสุด: เงินเดือน ชั่วโมงลา OT คอมมิชชั่น ประกันสังคม ภาษี และหักอื่นๆ ประจำ\n`
              + `เก็บค่าที่พิมพ์เองไว้ให้: หักลา รายได้อื่นๆ และชั่วโมงสาย\n\n`
              + `หมายเหตุ: รายการหักอื่นๆ ที่เพิ่มไว้เฉพาะงวดนี้ จะถูกแทนที่ด้วยรายการประจำจากข้อมูลพนักงาน`
            ))return;
            const period=periods.find(p=>p.id===pid); if(!period)return;
            const btn=document.querySelector(`[onclick="prGenAll('${pid}')"]`);
            if(btn){btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังคำนวณ...';}
            try {
                const [ls,ss,otSnap]=await Promise.all([
                    getDocs(query(collection(db,'artifacts',APP_ID,'public','data','leave_requests'),where('status','==','approved'))),
                    getDocs(collection(db,'artifacts',APP_ID,'public','data','work_schedules')),
                    getDocs(query(collection(db,'artifacts',APP_ID,'public','data','ot_requests'),where('status','==','approved'),where('periodId','==',pid))),
                ]);
                const lbu={},sbu={},otbu={};
                ls.docs.forEach(d=>{const l=d.data();if(l.startDate<=period.endDate&&l.endDate>=period.startDate){if(!lbu[l.uid])lbu[l.uid]=[];lbu[l.uid].push(l);}});
                ss.docs.forEach(d=>{sbu[d.id]=d.data();});
                // รวม OT และ Commission ต่อพนักงาน (อาจมีหลาย request ต่องวด)
                otSnap.docs.forEach(d=>{
                    const o=d.data();
                    if(!otbu[o.uid]) otbu[o.uid]={otHours:0,commTotal:0,salesTotal:0};
                    otbu[o.uid].otHours   += o.otConverted||0;
                    otbu[o.uid].commTotal += o.commTotal||0;
                    // รวมยอดขายจาก commItems
                    (o.commItems||[]).forEach(c=>{ otbu[o.uid].salesTotal += c.sales||0; });
                });
                const ex=await getDocs(query(collection(db,'artifacts',APP_ID,'public','data','payroll_records'),where('periodId','==',pid)));
                // ค่าพวกนี้ไม่มีที่มาจากไหน admin พิมพ์เองล้วนๆ — เก็บไว้ก่อนลบแล้วใส่คืน
                // ไม่งั้นกดคำนวณใหม่ทีเดียวหายหมด ต้องมานั่งกรอกใหม่ทุกคน
                const manual={};
                ex.docs.forEach(d=>{
                    const r=d.data(); if(!r.uid) return;
                    manual[r.uid]={
                        deductLeave:  r.deductLeave  || 0,
                        otherEarning: r.otherEarning || 0,
                        lateHours:    r.lateHours    || 0,
                    };
                });
                if(ex.docs.length){const b1=writeBatch(db);ex.docs.forEach(d=>b1.delete(d.ref));await b1.commit();}
                const b2=writeBatch(db);
                active.forEach(emp=>{
                    const lv=lbu[emp.uid]||[], sc=sbu[emp.uid]||{workDays:[1,2,3,4,5],workStart:'08:00',workEnd:'17:00',breakMinutes:60};
                    const lh={sick:0,personal:0,vacation:0,other:0};
                    lv.forEach(l=>{const t=['sick','personal','vacation'].includes(l.type)?l.type:'other';lh[t]+=(l.totalHours||0);});
                    const wd=cntDays(period.startDate,period.endDate,sc);
                    const base=emp.baseSalary||0, daily=emp.dailyWage||0, hourly=emp.hourlyWage||0, commR=emp.commission||0;
                    const taxMode=emp.taxDeduction||'No';
                    const dSSO=emp.sso==='Yes'?Math.min(Math.round(base*0.05),750):0;
                    const dTax=taxMode==='custom' ? (emp.taxCustomAmount||0) : calcTax(base,taxMode), eD=daily*wd;
                    // OT & Commission จาก ot_requests ที่อนุมัติแล้ว
                    const otData=otbu[emp.uid]||{otHours:0,commTotal:0,salesTotal:0};
                    const wh=Math.round(otData.otHours*100)/100;
                    const eH=Math.round(hourly*wh*100)/100;
                    const eC=Math.round(otData.commTotal*100)/100;
                    const salesTotal=Math.round(otData.salesTotal*100)/100;
                    // หักอื่นๆ ประจำจากโปรไฟล์ — คัดลอกเป็น snapshot ไว้ในใบเงินเดือน
                    // งวดที่ปิดไปแล้วจะได้ไม่เปลี่ยนตามถ้ามีคนไปแก้โปรไฟล์ทีหลัง
                    const odItems=(emp.otherDeducts||[]).filter(it=>it && (it.label || it.amount>0))
                        .map(it=>({label:it.label||'',amount:Number(it.amount)||0}));
                    const dOther=Math.round(odItems.reduce((s,it)=>s+it.amount,0)*100)/100;
                    const mn=manual[emp.uid]||{deductLeave:0,otherEarning:0,lateHours:0};
                    const tEar=base+eD+eH+eC+mn.otherEarning, tDed=dSSO+dTax+dOther+mn.deductLeave, net=tEar-tDed;
                    const ref=doc(collection(db,'artifacts',APP_ID,'public','data','payroll_records'));

                        createdAt:new Date().toISOString(),
                    });
                });
                await b2.commit();

            } catch(err){showToast('❌ '+err.message,'error');console.error(err);}

        };

                <div><label class="pr-lbl">\u0e0a\u0e37\u0e48\u0e2d\u0e40\u0e25\u0e48\u0e19</label><input ${RO} id="rn" class="pr-input" value="${r.nickname||''}"></div>
                <div><label class="pr-lbl">Line ID</label><input ${RO} id="rl" class="pr-input" value="${r.lineId||''}"></div>
                <div><label class="pr-lbl">\u0e07\u0e27\u0e14\u0e17\u0e35\u0e48</label><input readonly id="rp" class="pr-input" value="${r.periodNo}/${r.year}"></div>
                <div><label class="pr-lbl">\u0e2a\u0e32\u0e02\u0e32</label><input readonly class="pr-input" value="${r.branch||'-'}"></div>
              </div>
            </div>
            <div class="pr-section"><p class="pr-section-title">\u0e2d\u0e31\u0e15\u0e23\u0e32\u0e04\u0e48\u0e32\u0e08\u0e49\u0e32\u0e07</p>
              <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                <div><label class="pr-lbl">\u0e40\u0e07\u0e34\u0e19\u0e40\u0e14\u0e37\u0e2d\u0e19 (\u0e3f/\u0e40\u0e14\u0e37\u0e2d\u0e19)</label><input ${RO} id="rb" type="number" class="pr-input num" value="${r.baseSalary||0}"></div>
                <div><label class="pr-lbl">\u0e04\u0e48\u0e32\u0e08\u0e49\u0e32\u0e07\u0e23\u0e32\u0e22\u0e27\u0e31\u0e19 (\u0e3f/\u0e27\u0e31\u0e19)</label><input ${RO} id="rd" type="number" class="pr-input num" value="${r.dailyWage||0}"></div>
                <div><label class="pr-lbl">\u0e04\u0e48\u0e32\u0e08\u0e49\u0e32\u0e07\u0e23\u0e32\u0e22\u0e0a\u0e21. (\u0e3f/\u0e0a\u0e21.)</label><input ${RO} id="rh" type="number" class="pr-input num" value="${r.hourlyWage||0}"></div>
                <div><label class="pr-lbl">\u0e04\u0e2d\u0e21\u0e21\u0e34\u0e0a\u0e0a\u0e31\u0e48\u0e19 (%)</label><input ${RO} id="rc" type="number" class="pr-input num" value="${r.commissionRate||0}"></div>
                <div><label class="pr-lbl">ยอดขั้นต่ำคอมมิชชั่น (฿)</label><input ${RO} id="rcm" type="number" class="pr-input num" value="${commMin}"></div>
              </div>
            </div>
            <div class="pr-section"><p class="pr-section-title">\u0e23\u0e27\u0e21\u0e27\u0e31\u0e19 / \u0e0a\u0e31\u0e48\u0e27\u0e42\u0e21\u0e07 / \u0e04\u0e2d\u0e21\u0e21\u0e34\u0e0a\u0e0a\u0e31\u0e48\u0e19</p>
              <div class="grid grid-cols-3 gap-3">
                <div><label class="pr-lbl">\u0e23\u0e27\u0e21\u0e27\u0e31\u0e19\u0e17\u0e33\u0e07\u0e32\u0e19</label><input ${RO} id="rwd" type="number" class="pr-input num" value="${r.workDays||0}"></div>
                <div><label class="pr-lbl">\u0e23\u0e27\u0e21\u0e0a\u0e21. OT/Extra</label><input ${RO} id="rwh" type="number" step="0.5" class="pr-input num" value="${r.workHours||0}"></div>
                <div><label class="pr-lbl">\u0e23\u0e27\u0e21\u0e2b\u0e19\u0e48\u0e27\u0e22\u0e04\u0e2d\u0e21\u0e21\u0e34\u0e0a\u0e0a\u0e31\u0e48\u0e19</label><input ${RO} id="rcu" type="number" class="pr-input num" value="${r.commissionUnits||0}"></div>
              </div>
            </div>
            <div class="pr-section"><p class="pr-section-title">\u0e23\u0e32\u0e22\u0e44\u0e14\u0e49 (Earnings)</p>
              <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                <div class="bg-green-50 rounded-xl p-3 border border-green-100"><label class="pr-lbl" style="color:#15803d">\u0e23\u0e32\u0e22\u0e44\u0e14\u0e49\u0e08\u0e32\u0e01\u0e27\u0e31\u0e19 (\u0e3f)</label><p class="font-black text-green-700 num text-base mt-0.5" id="red">${fmt(r.earningDaily||0)}</p></div>
                <div class="bg-green-50 rounded-xl p-3 border border-green-100"><label class="pr-lbl" style="color:#15803d">\u0e23\u0e32\u0e22\u0e44\u0e14\u0e49\u0e08\u0e32\u0e01\u0e0a\u0e21. (\u0e3f)</label><p class="font-black text-green-700 num text-base mt-0.5" id="reh">${fmt(r.earningHourly||0)}</p></div>
                <div class="bg-green-50 rounded-xl p-3 border border-green-100"><label class="pr-lbl" style="color:#15803d">รายได้คอมมิชชั่น (฿)</label><p class="font-black text-green-700 num text-base mt-0.5" id="rec">${fmt(r.earningCommission||0)}</p><p id="rec-note" class="text-[10px] mt-0.5">${(commMin>0&&(r.commissionUnits||0)<commMin&&(r.commissionUnits||0)>0)?'<span class="text-red-500 font-bold">⚠️ ยอดไม่ถึงขั้นต่ำ</span>':''}</p></div>
                <div><label class="pr-lbl">\u0e23\u0e32\u0e22\u0e44\u0e14\u0e49\u0e2d\u0e37\u0e48\u0e19\u0e46 (\u0e3f)</label><input ${RO} id="reo" type="number" class="pr-input num" value="${r.otherEarning||0}"></div>
              </div>
            </div>
            <div class="pr-section"><p class="pr-section-title">\u0e01\u0e32\u0e23\u0e25\u0e32 (Leave)</p>
              <div class="grid grid-cols-2 sm:grid-cols-5 gap-3">
                <div><label class="pr-lbl">\u0e25\u0e32\u0e1b\u0e48\u0e27\u0e22 (\u0e0a\u0e21.)</label><input ${RO} id="rls" type="number" step="0.5" class="pr-input num" value="${r.sickLeaveHours||0}"></div>
                <div><label class="pr-lbl">\u0e25\u0e32\u0e01\u0e34\u0e08 (\u0e0a\u0e21.)</label><input ${RO} id="rlp" type="number" step="0.5" class="pr-input num" value="${r.personalLeaveHours||0}"></div>
                <div><label class="pr-lbl">\u0e25\u0e32\u0e1e\u0e31\u0e01\u0e23\u0e49\u0e2d\u0e19 (\u0e0a\u0e21.)</label><input ${RO} id="rlv" type="number" step="0.5" class="pr-input num" value="${r.vacationLeaveHours||0}"></div>
                <div><label class="pr-lbl">\u0e25\u0e32\u0e2d\u0e37\u0e48\u0e19\u0e46 (\u0e0a\u0e21.)</label><input ${RO} id="rlo" type="number" step="0.5" class="pr-input num" value="${r.otherLeaveHours||0}"></div>
                <div><label class="pr-lbl">\u0e2a\u0e32\u0e22 (\u0e0a\u0e21.)</label><input ${RO} id="rlt" type="number" step="0.5" class="pr-input num" value="${r.lateHours||0}"></div>
              </div>
            </div>
            <div class="pr-section"><p class="pr-section-title">\u0e01\u0e32\u0e23\u0e2b\u0e31\u0e01 (Deductions)</p>
              <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                <div><label class="pr-lbl">\u0e2b\u0e31\u0e01\u0e25\u0e32 (\u0e3f)</label><input ${RO} id="rdl" type="number" class="pr-input num" value="${r.deductLeave||0}"></div>
                <div><label class="pr-lbl">\u0e2b\u0e31\u0e01\u0e1b\u0e23\u0e30\u0e01\u0e31\u0e19\u0e2a\u0e31\u0e07\u0e04\u0e21 (\u0e3f)</label><input ${RO} id="rds" type="number" class="pr-input num" value="${r.deductSSO||0}"></div>
                <div><label class="pr-lbl">ภาษี ณ ที่จ่าย</label>
                  <select ${RO} id="rtm" class="pr-input" onchange="prRecalc()">
                    <option value="No" ${r.taxMode==='No'||!r.taxMode?'selected':''}>ไม่หัก</option>
                    <option value="Yes" ${r.taxMode==='Yes'?'selected':''}>ตามขั้นบันได</option>
                    <option value="3" ${r.taxMode==='3'?'selected':''}>3% Fixed</option>
                    <option value="custom" ${r.taxMode==='custom'?'selected':''}>กำหนดเอง</option>
                  </select>
                </div>
                <div><label class="pr-lbl">หักภาษี (฿)</label><input id="rdt" type="number" class="pr-input num" value="${r.deductTax||0}" ${r.taxMode==='custom' ? (isDraft?'':'readonly') : 'readonly'} oninput="prRecalc()"></div>
                <div><label class="pr-lbl">\u0e2b\u0e31\u0e01\u0e2d\u0e37\u0e48\u0e19\u0e46 (\u0e3f)</label><input readonly id="rdo" type="number" class="pr-input num bg-zinc-100" value="${r.otherDeduct||0}"></div>
              </div>
              <div class="mt-4 pt-3 border-t border-zinc-100">
                <div class="flex items-center justify-between mb-2">
                  <p class="pr-lbl">\u0e23\u0e32\u0e22\u0e01\u0e32\u0e23\u0e2b\u0e31\u0e01\u0e2d\u0e37\u0e48\u0e19\u0e46</p>
                  ${isDraft ? `<button type="button" onclick="prOdAdd()"
                    class="px-3 py-1.5 bg-zinc-100 hover:bg-zinc-200 text-zinc-700 font-bold rounded-lg transition-all text-[11px]">
                    <i class="fa-solid fa-plus mr-1 text-zinc-500"></i> \u0e40\u0e1e\u0e34\u0e48\u0e21\u0e23\u0e32\u0e22\u0e01\u0e32\u0e23</button>` : ''}
                </div>
                <div id="pr-od-list" class="space-y-2"></div>
              </div>
            </div>
            <div class="rounded-2xl overflow-hidden border border-zinc-200">
              <table class="w-full text-sm">
                <tbody>
                  <tr class="pr-row-earn border-b border-green-100"><td class="px-5 py-3 font-bold text-green-700">\u0e23\u0e27\u0e21\u0e23\u0e32\u0e22\u0e44\u0e14\u0e49</td><td class="px-5 py-3 text-right font-black text-green-700 num" id="rte">\u0e3f${fmt(r.totalEarning)}</td></tr>
                  <tr class="pr-row-deduct border-b border-red-100"><td class="px-5 py-3 font-bold text-red-600">\u0e23\u0e27\u0e21\u0e2b\u0e31\u0e01</td><td class="px-5 py-3 text-right font-black text-red-600 num" id="rtd">\u0e3f${fmt(r.totalDeduct)}</td></tr>
                  <tr class="pr-row-net"><td class="px-5 py-4 font-black text-zinc-800 text-base">\u0e23\u0e27\u0e21\u0e23\u0e31\u0e1a (\u0e2a\u0e38\u0e17\u0e18\u0e34)</td><td class="px-5 py-4 text-right font-black text-green-600 text-xl num" id="rtn">\u0e3f${fmt(r.netPay)}</td></tr>
                </tbody>
              </table>
            </div>`;

            // ใบเก่าที่บันทึกก่อนมีรายการย่อย จะมีแต่ยอดรวม otherDeduct
            // ต้องแปลงเป็น 1 รายการ ไม่งั้น prRecalc จะรวมจาก list ว่างแล้วทับยอดเดิมเป็น 0
            const odInit = (r.otherDeductItems && r.otherDeductItems.length)
                ? r.otherDeductItems
                : (Number(r.otherDeduct)>0 ? [{label:'หักอื่นๆ', amount:Number(r.otherDeduct)}] : []);
            prOdRender(odInit, isDraft);

            sEl('pr-net-prev').textContent=`\u0e3f ${fmt(r.netPay)}`;
            if(isDraft){
                ['rb','rd','rh','rc','rwd','rwh','rcu','reo','rdl','rds','rdt','rtm']
                    .forEach(id=>sEl(id)?.addEventListener('input',prRecalc));
            }
            const sb=sEl('pr-save-btn'); if(sb) sb.style.display=isDraft?'':'none';
            sEl('pr-modal-rec')?.classList.remove('hidden');
            prRecalc();
        };

        window.prCloseRec = () => { sEl('pr-modal-rec')?.classList.add('hidden'); editId=null; };

        // ── รายการหักอื่นๆ ในใบเงินเดือน (snapshot ที่คัดลอกมาจากโปรไฟล์ตอนสร้างงวด)
        // แก้เฉพาะงวดนี้ได้ ไม่ย้อนกลับไปแก้โปรไฟล์
        let prOdDraft = true;
        window.prOdRows = () =>
            [...document.querySelectorAll('#pr-od-list .pr-od-row')].map(r=>({
                label:  r.querySelector('.pr-od-label')?.value.trim() || '',
                amount: Number(r.querySelector('.pr-od-amount')?.value) || 0,
            }));

        window.prOdRender = (items, isDraft) => {
            prOdDraft = isDraft;
            const box=sEl('pr-od-list'); if(!box) return;
            const RO2 = isDraft ? '' : 'readonly';
            box.innerHTML = (items||[]).map((it,i)=>`
                <div class="pr-od-row flex gap-2 items-center">
                  <input ${RO2} type="text" class="pr-input pr-od-label flex-1" value="${(it.label||'').replace(/"/g,'&quot;')}" placeholder="หักค่าอะไร">
                  <input ${RO2} type="number" step="0.01" class="pr-input num pr-od-amount w-32" value="${Number(it.amount)||0}">
                  ${isDraft?`<button type="button" onclick="prOdRemove(${i})" title="ลบรายการนี้"
                    class="shrink-0 w-9 h-9 rounded-lg bg-red-50 hover:bg-red-100 text-red-500 transition-all">
                    <i class="fa-solid fa-trash-can text-xs"></i></button>`:''}
                </div>`).join('')
                || `<p class="text-[11px] text-zinc-400 font-medium py-2 text-center bg-zinc-50 rounded-lg border border-dashed border-zinc-200">
                      ไม่มีรายการหักอื่นๆ${isDraft?' — ตั้งรายการประจำได้ที่ข้อมูลพนักงาน หรือกด "เพิ่มรายการ" สำหรับงวดนี้เท่านั้น':''}
                    </p>`;
            if(isDraft) box.querySelectorAll('.pr-od-amount').forEach(el=>el.addEventListener('input',prRecalc));
            prRecalc();
        };

        window.prOdAdd = () => {
            prOdRender([...prOdRows(), {label:'',amount:0}], prOdDraft);
            document.querySelector('#pr-od-list .pr-od-row:last-child .pr-od-label')?.focus();
        };

        window.prOdRemove = (i) => {
            const items=prOdRows(); items.splice(i,1);
            prOdRender(items, prOdDraft);
        };

        window.prRecalc = () => {
            const b=gN('rb'),d=gN('rd'),h=gN('rh'),c=gN('rc');
            const wd=gN('rwd'),wh=gN('rwh'),cu=gN('rcu'),eo=gN('reo');
            const tm=sEl('rtm')?.value||'No';
            const cm=gN('rcm');
            // toggle หักภาษี field: custom = แก้ได้, อื่นๆ = readonly
            const rdtEl=sEl('rdt');
            const isLocked=sEl('rtm')?.hasAttribute('readonly');
            if(rdtEl){
                if(tm==='custom' && !isLocked) rdtEl.removeAttribute('readonly');
                else rdtEl.setAttribute('readonly','');
            }
            const eD=d*wd, eH=h*wh, eC=(cm>0&&cu<cm) ? 0 : cu*(c/100);
            const setT=(id,v)=>{const e=sEl(id);if(e)e.textContent=fmt(v);};
            setT('red',eD); setT('reh',eH); setT('rec',eC);
            // Commission min threshold note
            const recNote=sEl('rec-note');
            if(recNote){
                if(cm>0&&cu>0&&cu<cm) recNote.innerHTML='<span class="text-red-500 text-[10px] font-bold">⚠️ ยอดไม่ถึงขั้นต่ำ (' + cm.toLocaleString('th-TH') + ' ฿)</span>';
                else if(cm>0&&cu>=cm) recNote.innerHTML='<span class="text-green-600 text-[10px] font-bold">✅ ถึงขั้นต่ำ</span>';
                else recNote.innerHTML='';
            }
            const tEar=b+eD+eH+eC+eo;
            if(tm!=='custom'){const te=sEl('rdt');if(te)te.value=calcTax(b,tm);}
            // \u0e2b\u0e31\u0e01\u0e2d\u0e37\u0e48\u0e19\u0e46 \u0e21\u0e32\u0e08\u0e32\u0e01\u0e1c\u0e25\u0e23\u0e27\u0e21\u0e02\u0e2d\u0e07\u0e23\u0e32\u0e22\u0e01\u0e32\u0e23\u0e22\u0e48\u0e2d\u0e22 \u0e0a\u0e48\u0e2d\u0e07 rdo \u0e40\u0e1b\u0e47\u0e19\u0e41\u0e04\u0e48\u0e17\u0e35\u0e48\u0e41\u0e2a\u0e14\u0e07\u0e1c\u0e25
            const dOther=Math.round(prOdRows().reduce((s,it)=>s+it.amount,0)*100)/100;
            const rdoEl=sEl('rdo'); if(rdoEl) rdoEl.value=dOther;
            const tDed=gN('rdl')+gN('rds')+gN('rdt')+dOther;
            const net=tEar-tDed;
            const setTL=(id,v)=>{const e=sEl(id);if(e)e.textContent=`\u0e3f${fmt(v)}`;};
            setTL('rte',tEar); setTL('rtd',tDed); setTL('rtn',net);
            const p=sEl('pr-net-prev');if(p)p.textContent=`\u0e3f ${fmt(net)}`;
        };

        window.prSaveRec = async () => {
            if(!editId) return;
            const b=gN('rb'),d=gN('rd'),h=gN('rh'),c=gN('rc');
            const wd=gN('rwd'),wh=gN('rwh'),cu=gN('rcu'),eo=gN('reo');
            const tm=sEl('rtm')?.value||'No';
            const cm=gN('rcm');
            const eD=d*wd,eH=h*wh,eC=(cm>0&&cu<cm) ? 0 : cu*(c/100);
            const tEar=b+eD+eH+eC+eo;
            const odItems=prOdRows().filter(it=>it.label||it.amount>0);
            const dOther=Math.round(odItems.reduce((s,it)=>s+it.amount,0)*100)/100;
            const tDed=gN('rdl')+gN('rds')+gN('rdt')+dOther;
            const net=tEar-tDed;
            const btn=sEl('pr-save-btn'); btn.disabled=true; btn.innerHTML='<i class="fa-solid fa-spinner fa-spin mr-2"></i> \u0e1a\u0e31\u0e19\u0e17\u0e36\u0e01...';
            try {
                await updateDoc(doc(db,'artifacts',APP_ID,'public','data','payroll_records',editId),{
                    nickname:gV('rn'),lineId:gV('rl'),
                    baseSalary:b,dailyWage:d,hourlyWage:h,commissionRate:c,commissionMin:cm,
                    workDays:wd,workHours:wh,commissionUnits:cu,
                    earningDaily:eD,earningHourly:eH,earningCommission:eC,otherEarning:eo,
                    sickLeaveHours:gN('rls'),personalLeaveHours:gN('rlp'),
                    vacationLeaveHours:gN('rlv'),otherLeaveHours:gN('rlo'),lateHours:gN('rlt'),
                    deductLeave:gN('rdl'),deductSSO:gN('rds'),deductTax:gN('rdt'),
                    otherDeduct:dOther,otherDeductItems:odItems,
                    taxMode:tm,totalEarning:tEar,totalDeduct:tDed,netPay:net,
                    updatedAt:new Date().toISOString(),
                });
                showToast('\u2705 \u0e1a\u0e31\u0e19\u0e17\u0e36\u0e01\u0e40\u0e23\u0e35\u0e22\u0e1a\u0e23\u0e49\u0e2d\u0e22','success');
                prCloseRec();
            } catch(err){showToast('\u274c '+err.message,'error');}
            finally{btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-save mr-2"></i> \u0e1a\u0e31\u0e19\u0e17\u0e36\u0e01';}
        };

        window.prFinal = async pid => {
            if(!confirm('\u0e2a\u0e23\u0e38\u0e1b\u0e07\u0e27\u0e14\u0e19\u0e35\u0e49? \u0e08\u0e30\u0e44\u0e21\u0e48\u0e2a\u0e32\u0e21\u0e32\u0e23\u0e16\u0e41\u0e01\u0e49\u0e44\u0e02\u0e44\u0e14\u0e49\u0e2d\u0e35\u0e01'))return;
            try{await updateDoc(doc(db,'artifacts',APP_ID,'public','data','payroll_periods',pid),
                {status:'final',finalizedAt:new Date().toISOString(),finalizedBy:profile.name});
                showToast('\u2705 \u0e2a\u0e23\u0e38\u0e1b\u0e07\u0e27\u0e14\u0e40\u0e23\u0e35\u0e22\u0e1a\u0e23\u0e49\u0e2d\u0e22','success');
            }catch(err){showToast('\u274c '+err.message,'error');}
        };
        window.prPaid = async pid => {
            if(!confirm('\u0e22\u0e37\u0e19\u0e22\u0e31\u0e19\u0e01\u0e32\u0e23\u0e08\u0e48\u0e32\u0e22\u0e40\u0e07\u0e34\u0e19\u0e40\u0e14\u0e37\u0e2d\u0e19\u0e07\u0e27\u0e14\u0e19\u0e35\u0e49?'))return;
            try{await updateDoc(doc(db,'artifacts',APP_ID,'public','data','payroll_periods',pid),
                {status:'paid',paidAt:new Date().toISOString(),paidBy:profile.name});

            if (typeof XLSX === 'undefined') {

                    s.onload = res; s.onerror = rej;
                    document.head.appendChild(s);

            }

            // Headers ตาม template ของระบบ
            const headers = [
                'เลขที่พนักงาน',
                'ชื่อ - นามสกุล',
                'เงินเดือน(SAL)',
                'ส่วนแบ่งการขาย(COM)',
                'ค่าล่วงเวลา(OT)',
                'ค่ากะ(R004)',
                'โบนัส(R003)',
                'ค่าปรับ(FN)',
                'กองทุนเงินให้กู้ยืมเพื่อการศึกษา(STL)',

                'ประกันสังคม(SSF)'
            ];

            // Map payroll records → template columns
            const dataRows = records.map(r => [
                r.employeeCode || '',                          // เลขที่พนักงาน
                r.name || '',                                  // ชื่อ - นามสกุล
                r.baseSalary || 0,                             // เงินเดือน(SAL)
                r.earningCommission || 0,                      // ส่วนแบ่งการขาย(COM)
                r.earningHourly || 0,                          // ค่าล่วงเวลา(OT)
                r.earningDaily || 0,                           // ค่ากะ(R004)
                r.otherEarning || 0,                           // โบนัส(R003)
                r.deductLeave || 0,                            // ค่าปรับ(FN)
                r.otherDeduct || 0,                            // กองทุนเงินให้กู้ยืมเพื่อการศึกษา(STL)
                r.deductTax || 0,                              // ภาษีหัก ณ ที่จ่าย(WHT)
                r.deductSSO || 0,                              // ประกันสังคม(SSF)
            ]);

            // Build worksheet
            const wsData = [headers, ...dataRows];
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(wsData);

            // Column widths (match template approximately)
            ws['!cols'] = [
                { wch: 14 },  // เลขที่พนักงาน
                { wch: 28 },  // ชื่อ - นามสกุล
                { wch: 16 },  // เงินเดือน
                { wch: 20 },  // ส่วนแบ่งการขาย
                { wch: 14 },  // OT
                { wch: 12 },  // ค่ากะ
                { wch: 12 },  // โบนัส
                { wch: 10 },  // ค่าปรับ
                { wch: 36 },  // กองทุน
                { wch: 20 },  // ภาษี
                { wch: 16 },  // ประกันสังคม
            ];

            // Style header row — gray fill, bold (using !ref-based approach)
            const range = XLSX.utils.decode_range(ws['!ref']);
            for (let C = range.s.c; C <= range.e.c; C++) {
                const addr = XLSX.utils.encode_cell({ r: 0, c: C });
                if (!ws[addr]) continue;
                ws[addr].s = {
                    font: { bold: true, name: 'Calibri', sz: 11 },
                    fill: { fgColor: { rgb: 'D3D3D3' }, patternType: 'solid' },
                    alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
                    border: {

                        bottom: { style: 'thin', color: { rgb: '999999' } },
                        left:   { style: 'thin', color: { rgb: '999999' } },
                        right:  { style: 'thin', color: { rgb: '999999' } },
                    }
                };
            }
            // Style data rows — number format with 2 decimal places
            for (let R = 1; R <= dataRows.length; R++) {
                for (let C = 0; C <= range.e.c; C++) {
                    const addr = XLSX.utils.encode_cell({ r: R, c: C });
                    if (!ws[addr]) continue;
                    const isNum = C >= 2;
                    ws[addr].s = {
                        font: { name: 'Calibri', sz: 11 },
                        numFmt: isNum ? '#,##0.00' : '@',
                        alignment: { horizontal: isNum ? 'right' : 'left', vertical: 'center' },

                            bottom: { style: 'thin', color: { rgb: 'DDDDDD' } },

            // Download
            const filename = `Import_SalaryPayRun_${period.year}_${String(period.periodNo).padStart(2,'0')}.xlsx`;

        // ── KBIZ Bank Export Logic ────────────────────────────────────

            _bankRecords = records.filter(r => r.periodId === pid || !r.periodId);

            // Fallback: เติม bankAccount/bankName จาก employees ถ้า record เก่าไม่มี
            _bankRecords = _bankRecords.map(r => {

                const emp = employees.find(e => e.uid === r.uid);

        window.prBankExport = async () => {

            if (!dateEl || !dateEl.value) { showToast('กรุณาระบุวันที่เงินเข้าบัญชี', 'error'); return; }

            const selectedIds = new Set([...document.querySelectorAll('.pr-bank-chk:checked')].map(c => c.value));
            if (!selectedIds.size) { showToast('กรุณาเลือกพนักงานอย่างน้อย 1 คน', 'error'); return; }

            // Format effective date DD/MM/YYYY
            const [yyyy, mm, dd] = dateEl.value.split('-');
            const effectiveDate = `${dd}/${mm}/${yyyy}`;

            const selected = _bankRecords.filter(r => selectedIds.has(r.id) && r.bankAccount && r.bankAccount.trim());
            if (!selected.length) { showToast('ไม่มีพนักงานที่มีบัญชีธนาคารในรายการที่เลือก', 'error'); return; }

            if (typeof XLSX === 'undefined') {
                await new Promise((res, rej) => {
                    const s = document.createElement('script');
                    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
                    s.onload = res; s.onerror = rej;
                    document.head.appendChild(s);

            const totalAmt = selected.reduce((s, r) => s + (r.netPay || 0), 0);
            ws['A1'] = { v: 'Total No. of Transaction / จำนวนรายการทั้งหมด ', t: 's' };
            ws['B1'] = { v: selected.length, t: 'n' };
            ws['C1'] = { v: 'Total Amount / จำนวนเงินทั้งหมด ', t: 's' };
            ws['D1'] = { v: totalAmt, t: 'n', z: '#,##0.00' };

            // Row 2: blank
            ws['A2'] = { v: '', t: 's' };

            // Row 3: Headers
            const headers = [
                'Bank Code / \nรหัสธนาคาร',

            // Styles — Row 1 summary
            ['A1','B1','C1','D1'].forEach(addr => {
                if (!ws[addr]) return;

                    font: { bold: true, name: 'Calibri', sz: 10 },

                    alignment: { vertical: 'center', wrapText: false },
                    border: { top:{style:'thin',color:{rgb:'CCCCCC'}}, bottom:{style:'thin',color:{rgb:'CCCCCC'}}, left:{style:'thin',color:{rgb:'CCCCCC'}}, right:{style:'thin',color:{rgb:'CCCCCC'}} }
                };
            });

            // Styles — Header row 3
            cols.forEach(c => {
                const addr = `${c}3`;
                if (!ws[addr]) return;
                ws[addr].s = {
                    font: { bold: true, name: 'Calibri', sz: 10 },
                    fill: { fgColor: { rgb: 'D6DCE4' }, patternType: 'solid' },
                    alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
                    border: { top:{style:'thin',color:{rgb:'999999'}}, bottom:{style:'thin',color:{rgb:'999999'}}, left:{style:'thin',color:{rgb:'999999'}}, right:{style:'thin',color:{rgb:'999999'}} }
                };

            // Styles — Data rows
            for (let i = 0; i < selected.length; i++) {
                const row = i + 4;
                cols.forEach((c, ci) => {

                        border: { top:{style:'thin',color:{rgb:'E4E4E7'}}, bottom:{style:'thin',color:{rgb:'E4E4E7'}}, left:{style:'thin',color:{rgb:'E4E4E7'}}, right:{style:'thin',color:{rgb:'E4E4E7'}} }
                    };

        // ── LINE Payroll Send Logic ──────────────────────────────────

            const sub = document.getElementById('pr-line-period-sub');
            if (sub) sub.textContent = `งวดที่ ${p.periodNo}/${p.year}  ·  ${fmtD(p.startDate)} – ${fmtD(p.endDate)}`;

            // โหลด records + users พร้อมกัน เพื่อดึง lineId ล่าสุดจาก users
            try {
                const [recSnap, userSnap] = await Promise.all([
                    getDocs(query(
                        collection(db,'artifacts',APP_ID,'public','data','payroll_records'),
                        where('periodId','==',pid)
                    )),
                    getDocs(collection(db,'artifacts',APP_ID,'public','data','users')),
                ]);
                // map uid → lineId ล่าสุด
                const userLineMap = {};
                userSnap.docs.forEach(d => {
                    const u = d.data();
                    if (u.uid) userLineMap[u.uid] = u.lineId || '';
                });
                // merge lineId ล่าสุดเข้า records
                _lineRecords = recSnap.docs.map(d => {
                    const r = { id:d.id, ...d.data() };
                    r.lineId = userLineMap[r.uid] || r.lineId || '';
                    return r;
                });
            } catch(e) {
                _lineRecords = records.filter(r => r.periodId === pid); // fallback
