                return `<label class="flex items-center gap-3 p-3 rounded-2xl border-2 border-zinc-100 hover:border-[#06C755] cursor-pointer transition-all group ${hasLine ? '' : 'opacity-50 cursor-not-allowed'}" ${!hasLine ? 'title="ไม่มี LINE User ID"' : ''}>
                    <input type="checkbox" class="pr-line-cb w-4 h-4 accent-[#06C755] cursor-pointer shrink-0" data-rid="${r.id}" ${!hasLine ? 'disabled' : ''}>
                    <img src="${av}" onerror="handleImgError(this)" class="w-9 h-9 rounded-full object-cover border-2 border-zinc-200 group-hover:border-[#06C755] transition-all shrink-0">
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold text-zinc-800 truncate">${r.name}${r.nickname ? ` <span class="text-zinc-400 font-normal">(${r.nickname})</span>` : ''}</p>
                        <p class="text-[10px] text-zinc-400 font-medium truncate">${r.branch||''} · ${r.position||''}</p>
                    </div>
                    <div class="text-right shrink-0">
                        <p class="text-sm font-black text-zinc-800 num">฿${fmt(r.netPay||0)}</p>
                        ${hasLine
                            ? '<span class="text-[9px] font-black text-[#06C755] bg-green-50 px-2 py-0.5 rounded-full uppercase tracking-wider">มี LINE</span>'
                            : '<span class="text-[9px] font-black text-zinc-400 bg-zinc-100 px-2 py-0.5 rounded-full uppercase tracking-wider">ไม่มี LINE ID</span>'}
                    </div>
                </label>`;
            }).join('') : '<p class="text-center text-zinc-400 text-sm py-8">ไม่พบรายการ</p>';
            prLineUpdateCount();
        };

        window.prLineToggleAll = (checked) => {
            document.querySelectorAll('.pr-line-cb:not(:disabled)').forEach(cb => { cb.checked = checked; });
            prLineUpdateCount();
        };

        function prLineUpdateCount() {
            const sel = document.querySelectorAll('.pr-line-cb:checked').length;
            const el = document.getElementById('pr-line-sel-cnt');
            if (el) el.textContent = `${sel} คน`;
            const allEl = document.getElementById('pr-line-all');
            const total = document.querySelectorAll('.pr-line-cb:not(:disabled)').length;
            if (allEl) allEl.checked = total > 0 && sel === total;
            document.getElementById('pr-line-list')?.querySelectorAll('label').forEach(lbl => {
                lbl.addEventListener('change', prLineUpdateCount);
            });
        }
        document.getElementById('pr-line-list')?.addEventListener('change', prLineUpdateCount);

        window.prLineSend = async () => {
            const pid = _lineActivePid;
            const p   = periods.find(x => x.id === pid);
            if (!p) return;
            const selectedIds = [...document.querySelectorAll('.pr-line-cb:checked')].map(cb => cb.dataset.rid);
            if (!selectedIds.length) { showToast('กรุณาเลือกพนักงานอย่างน้อย 1 คน', 'error'); return; }

            const btn = document.getElementById('pr-line-send-btn');
            const lbl = document.getElementById('pr-line-send-label');
            btn.disabled = true; lbl.textContent = 'กำลังส่ง...';

            const period_label = `งวดที่ ${p.periodNo}/${p.year}`;
            const period_range = `${fmtD(p.startDate)} – ${fmtD(p.endDate)}`;
            let ok = 0, fail = 0;

            for (const rid of selectedIds) {
                const r = _lineRecords.find(x => x.id === rid);
                if (!r || !r.lineId) { fail++; continue; }
                lbl.textContent = `กำลังส่ง ${r.name}...`;
                try {
                    await sendLineMessage(r.lineId, [buildPayslipFlex(r, period_label, period_range)]);
                    ok++;
                } catch(e) {
                    console.warn('LINE send failed:', r.name, e.message);
                    fail++;
                    if (fail === 1) showToast(`❌ ${r.name}: ${e.message}`, 'error');
                }
                await new Promise(res => setTimeout(res, 300)); // rate limit
            }

            btn.disabled = false; lbl.textContent = 'ส่งสลิป';
            prLineClose();
            showToast(
                fail === 0
                    ? `✅ ส่งสลิปทาง LINE สำเร็จ ${ok} คน`
                    : `⚠️ สำเร็จ ${ok} คน, ล้มเหลว ${fail} คน`,
                fail === 0 ? 'success' : 'info'
            );
        };

        function buildPayslipFlex(r, periodLabel, periodRange) {
            const fmtN = n => Number(n||0).toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2});
            const fmtB = n => `฿${fmtN(n)}`;
            const fmtI = n => Number(n||0) === 0 ? '0' : fmtN(n);

            const row = (label, val, bold, color) => ({
                type:'box', layout:'horizontal', margin:'xs',
                contents:[
                    { type:'text', text:label, size:'sm', color:'#52525b', flex:4, wrap:false },
                    { type:'text', text:String(val), size:'sm', align:'end', flex:3,
                      weight: bold ? 'bold' : 'regular',
                      color:  color || (bold ? '#18181b' : '#3f3f46') }
                ]
            });
            const section = (icon, label, color) => ({
                type:'box', layout:'horizontal', margin:'md', alignItems:'center',
                contents:[
                    { type:'text', text:icon+' '+label, size:'xs', weight:'bold', color:color, flex:1 }
                ]
            });
            const sep = { type:'separator', margin:'sm', color:'#e4e4e7' };

            // ลา — ใช้ field names จาก payroll_records จริง
            const leaveRows = [
                row('ลาป่วย (ชม.)',               fmtI(r.sickLeaveHours)),
                row('ลาพักร้อน (ชม.)',             fmtI(r.vacationLeaveHours)),
                row('ลากิจ (ชม.)',                fmtI(r.personalLeaveHours)),
                row('ลาอื่นๆ (ชม.)',              fmtI(r.otherLeaveHours)),
                row('ไม่ได้บันทึกเวลา (เข้า-ออก)', `${r.missingCheckIn||0}-${r.missingCheckOut||0}`),
            ];

            // รายได้
            const earningRows = [
                row('เงินเดือน ('+(r.workDays||0)+')', fmtI(r.baseSalary)),
                row('รายวัน ('+(r.workDays||0)+')',     fmtI(r.earningDaily)),
                row('รายชั่วโมง ('+(r.workHours||0)+')',fmtI(r.earningHourly)),
                row('คอมมิชชั่น ('+(r.commissionUnits||0)+')', fmtI(r.earningCommission)),
                row('รายได้อื่นๆ',                     fmtI(r.otherEarning)),
                { type:'box', layout:'horizontal', margin:'xs',
                  contents:[
                    { type:'text', text:'รวมเงินได้', size:'sm', weight:'bold', color:'#18181b', flex:4 },
                    { type:'text', text:fmtN(r.totalEarning), size:'sm', weight:'bold', color:'#18181b', align:'end', flex:3 }
                  ]
                },
            ];

            // หัก — taxMode เก็บเป็น text เช่น "3%" หรือ "No"
            const taxLabel = r.taxMode && r.taxMode !== 'No' ? `หักภาษี ณ ที่จ่าย ${r.taxMode}` : 'หักภาษี ณ ที่จ่าย';
            // แจกแจงหักอื่นๆ ทีละรายการ เพื่อให้พนักงานรู้ว่าถูกหักค่าอะไรบ้าง
            // ถ้าไม่มีรายการย่อย (ใบเก่าก่อนมีฟีเจอร์นี้) ให้แสดงยอดรวมเหมือนเดิม
            const odItems = (r.otherDeductItems||[]).filter(it => it && (it.label || it.amount > 0));
            const otherDeductRows = odItems.length
                ? odItems.map(it => row(`• ${it.label || 'หักอื่นๆ'}`, fmtI(it.amount), false, '#dc2626'))
                : [row('หักอื่นๆ', fmtI(r.otherDeduct), false, '#dc2626')];
            const deductRows = [
                row(taxLabel,          fmtI(r.deductTax),   false, '#dc2626'),
                row('หักประกันสังคม', fmtI(r.deductSSO),   false, '#dc2626'),
                row('หักขาดงาน',      fmtI(r.deductLeave), false, '#dc2626'),
                ...otherDeductRows,
                { type:'box', layout:'horizontal', margin:'xs',
                  contents:[
                    { type:'text', text:'รวมเงินหัก', size:'sm', weight:'bold', color:'#dc2626', flex:4 },
                    { type:'text', text:fmtN(r.totalDeduct), size:'sm', weight:'bold', color:'#dc2626', align:'end', flex:3 }
                  ]
                },
            ];

            const heroContents = r.photoURL ? [{
                type:'image', url: r.photoURL,
                size:'full', aspectRatio:'20:13', aspectMode:'cover'
            }] : [];

            return {
                type: 'flex',
                altText: `สลิปเงินเดือน ${periodLabel} - ${r.name} ฿${fmtN(r.netPay)}`,
                contents: {
                    type:'bubble', size:'mega',
                    ...(r.photoURL ? {
                        hero: {
                            type:'image', url:r.photoURL,
                            size:'full', aspectRatio:'20:10', aspectMode:'cover'
                        }
                    } : {}),
                    body: {
                        type:'box', layout:'vertical',
                        paddingAll:'16px', spacing:'none',
                        contents:[
                            // หัวข้อ period
                            { type:'text', text:`เงินเดือนงวดที่ ${periodLabel.replace('งวดที่ ','')}`, size:'sm', color:'#52525b' },
                            { type:'text', text:`ตั้งแต่ วันที่ ${periodRange.split('–')[0]?.trim()}`, size:'xs', color:'#71717a' },
                            { type:'text', text:`ถึง วันที่ ${(periodRange.split('–')[1]||'').trim()}`, size:'xs', color:'#71717a' },
                            sep,
                            // ชื่อ + รหัส
                            { type:'box', layout:'horizontal', margin:'md', alignItems:'center',
                              contents:[
                                { type:'text', text: r.employeeCode||'', size:'sm', color:'#52525b', flex:2 },
                                { type:'text', text: r.nickname||r.name, size:'lg', weight:'bold', color:'#18181b', align:'end', flex:3 }
                              ]
                            },
                            { type:'text', text: r.name + (r.position?' · '+r.position:''), size:'xs', color:'#71717a', align:'end' },
                            sep,
                            // ลารวม
                            section('🗓️','ลารวม','#52525b'),
                            ...leaveRows,
                            sep,
                            // เงินได้
                            section('💰','เงินได้','#16a34a'),
                            ...earningRows,
                            sep,
                            // เงินหัก
                            section('💸','เงินหัก','#dc2626'),
                            ...deductRows,
                            sep,
                            // สุทธิ
                            { type:'box', layout:'horizontal', margin:'md', alignItems:'center',
                              contents:[
                                { type:'text', text:'เงินได้สุทธิ', size:'md', weight:'bold', color:'#18181b', flex:2 },
                                { type:'text', text:fmtN(r.netPay), size:'xl', weight:'bold', color:'#ca8a04', align:'end', flex:3 }
                              ]
                            },
                        ]
                    },
                    footer: {
                        type:'box', layout:'vertical', paddingAll:'12px',
                        backgroundColor:'#f4f4f5',
                        contents:[
                            { type:'text', text:'พบปัญหาติดต่อที่ HR', size:'xs', color:'#a1a1aa', align:'center' }
                        ]
                    }
                }
            };
        }

        return () => {
            unsubP();
            if(unsubRec) unsubRec();
            ['prSel','prOpenCreate','prCloseCreate','prDoCreate','prGenAll',
             'prOpenRec','prCloseRec','prRecalc','prSaveRec',
             'prFinal','prPaid','prDel','prCSV','prXLSX',
             'prBankOpen','prBankClose','prBankExport','prBankToggleAll','prBankUpdateCount',
             'prLineOpen','prLineClose','prLineFilter','prLineToggleAll','prLineSend'
            ].forEach(k=>delete window[k]);
        };
    }
};

    init: async (user, profile, db, APP_ID) => {
        if (profile.role !== 'admin' && profile.role !== 'manager') { navigateTo('home'); return; }
        const { collection, getDocs, query, where, orderBy }
            = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
        const col = name => collection(db,'artifacts',APP_ID,'public','data',name);

        // โหลดพนักงาน + schedule + leave (approved) + กะงาน + พิกัดสาขา
        const [empSnap, schedSnap, leaveSnap, shiftSnap] = await Promise.all([
            getDocs(col('users')),
            getDocs(col('work_schedules')),
            getDocs(query(col('leave_requests'), where('status','==','approved'))),
            getDocs(col('shifts')),
            loadBranchLocations(),
        ]);
        const shiftMap = {};
        shiftSnap.forEach(d => shiftMap[d.id] = d.data());

        // เวลาเข้า-ออก-พัก ที่มีผลจริงของวันนั้น (กะรายวัน > ตารางปกติ)
        function effTimes(sched, dow) {
            const sid = sched && sched.shiftByDay ? sched.shiftByDay[dow] : null;
            const sh = sid ? shiftMap[sid] : null;
            return {
                start: (sh && sh.start) || (sched && sched.workStart) || null,
                end:   (sh && sh.end)   || (sched && sched.workEnd)   || null,
                breakMinutes: sh && sh.breakMinutes != null ? sh.breakMinutes
                    : (sched && sched.breakMinutes != null ? sched.breakMinutes : 60),
                shiftName: sh ? sh.name : null,
            };
        }
        const employees = empSnap.docs.map(d => ({ uid: d.id, ...d.data() })).filter(e => e.name);
        employees.sort((a,b)=>a.name.localeCompare(b.name,'th'));
        const empMap = Object.fromEntries(employees.map(e => [e.uid, e]));

        const schedMap = {};
        schedSnap.forEach(d => schedMap[d.id] = d.data());
        const allApprovedLeaves = leaveSnap.docs.map(d => d.data());

        // populate selects
        const empSel = document.getElementById('sa-emp');
        if (empSel) {
            employees.forEach(e => {
                const opt = document.createElement('option');
                opt.value = e.uid;
                opt.textContent = `${e.name}${e.employeeCode?` (${e.employeeCode})`:''}`;
                empSel.appendChild(opt);
            });
        }
        const branches = [...new Set(employees.map(e=>e.branch).filter(Boolean))].sort();
        const brSel = document.getElementById('sa-branch');
        if (brSel) {
            branches.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b; opt.textContent = b;
                brSel.appendChild(opt);
            });
        }

        // default range = this month
        window.saSetRange = (mode) => {
            const now = newDateTH();
            let from, to;
            if (mode === 'today') { from = to = dateToTHStr(now); }
            else if (mode === 'week') {
                const d = new Date(now); d.setDate(d.getDate() - 6);
                from = dateToTHStr(d); to = dateToTHStr(now);
            } else if (mode === 'lastMonth') {
                const y = now.getFullYear(), m = now.getMonth() - 1;
                const first = new Date(y, m, 1);
                const last  = new Date(y, m + 1, 0);
                from = dateToTHStr(first); to = dateToTHStr(last);
            } else { // month
                const first = new Date(now.getFullYear(), now.getMonth(), 1);
                const last  = new Date(now.getFullYear(), now.getMonth() + 1, 0);
                from = dateToTHStr(first); to = dateToTHStr(last);
            }
            const fEl = document.getElementById('sa-from'); if (fEl) fEl.value = from;
            const tEl = document.getElementById('sa-to');   if (tEl) tEl.value = to;
        };
        saSetRange('month');

        let lastRows = [];

        window.saLoad = async () => {
            const from = document.getElementById('sa-from')?.value;
            const to   = document.getElementById('sa-to')?.value;
            const uid  = document.getElementById('sa-emp')?.value;
            const br   = document.getElementById('sa-branch')?.value;
            if (!from || !to) { showToast('กรุณาเลือกช่วงวันที่', 'error'); return; }
            if (from > to)    { showToast('วันที่เริ่มต้องไม่หลังวันที่สิ้นสุด', 'error'); return; }

            const tbody = document.getElementById('sa-tbody');
            if (tbody) tbody.innerHTML = `<tr><td colspan="8" class="text-center py-12 text-zinc-300"><i class="fa-solid fa-spinner fa-spin text-3xl"></i></td></tr>`;

            try {
                // query ตาม date range อย่างเดียว (เลี่ยง composite index)
                // แล้ว filter uid/branch ฝั่ง client
                const qRef = query(col('time_logs'),
                    where('localDate','>=',from),
                    where('localDate','<=',to));
                const logSnap = await getDocs(qRef);
                let logs = logSnap.docs.map(d => d.data());

                if (uid) logs = logs.filter(l => l.uid === uid);
                if (br) {
                    logs = logs.filter(l => {
                        const emp = empMap[l.uid];
                        return emp && emp.branch === br;
                    });
                }

                // group logs by uid+localDate
                const groups = {};
                logs.forEach(l => {
                    if (!l.uid || !l.localDate) return;
                    const k = l.uid + '|' + l.localDate;
                    if (!groups[k]) groups[k] = { ins: [], outs: [], branch: l.branch || '' };
                    if (l.type === 'clock_in')  groups[k].ins.push(l);
                    if (l.type === 'clock_out') groups[k].outs.push(l);
                });

                // ขอบเขตพนักงาน (ตาม filter)
                let empsInScope = employees;
                if (uid) empsInScope = empsInScope.filter(e => e.uid === uid);
                if (br)  empsInScope = empsInScope.filter(e => e.branch === br);
                empsInScope = empsInScope.filter(e => e.status !== 'resigned');

                // สร้าง list วันในช่วง
                const days = [];
                {
                    let d = parseDateTH(from);
                    const endD = parseDateTH(to);
                    const todayStr = todayTH();
                    while (d <= endD) {
                        const ds = dateToTHStr(d);
                        if (ds <= todayStr) days.push(ds); // ไม่ generate วันอนาคต
                        const nx = new Date(d); nx.setDate(nx.getDate()+1); d = nx;
                    }
                }

                // index วันลา: uid → date → leave
                const leaveByUid = {};
                allApprovedLeaves.forEach(l => {
                    if (!l.uid || !l.startDate || !l.endDate) return;
                    if (l.endDate < from || l.startDate > to) return;
                    if (!leaveByUid[l.uid]) leaveByUid[l.uid] = {};
                    let d = parseDateTH(l.startDate);
                    const e = parseDateTH(l.endDate);
                    while (d <= e) {
                        leaveByUid[l.uid][dateToTHStr(d)] = l;
                        const nx = new Date(d); nx.setDate(nx.getDate()+1); d = nx;
                    }
                });

                const DOW_TH = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
                const rows = [];
                empsInScope.forEach(emp => {
                    const sched = schedMap[emp.uid] || null;
                    const empOffice = officeFor(emp.branch);
                    const workDaySet = new Set((sched && sched.workDays) ? sched.workDays : [1,2,3,4,5]);
                    const personalHolSet = new Set((sched && Array.isArray(sched.holidays)) ? sched.holidays : []);
                    const empLeaves = leaveByUid[emp.uid] || {};

                    days.forEach(ds => {
                        const dow  = parseDateTH(ds).getDay();
                        const isPubHol  = isPublicHoliday(ds);
                        const isPersHol = personalHolSet.has(ds);
                        const isWorkDay = workDaySet.has(dow) && !isPubHol && !isPersHol;
                        const leave = empLeaves[ds];

                        const g = groups[emp.uid + '|' + ds];
                        let inFirst, outLast;
                        if (g) {
                            g.ins.sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
                            g.outs.sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
                            inFirst = g.ins[0];
                            outLast = g.outs[g.outs.length-1];
                        }

                        // เวลาอ้างอิงของวันนี้ — ใช้กะรายวันถ้ามี ไม่งั้นใช้ตารางปกติ
                        const eff = effTimes(sched, dow);
                        const LATE_GRACE_MIN = 15;     // มาช้าได้ไม่เกิน 15 นาทีถึงไม่ติดสถานะ "สาย"
                        const toMin = (hhmm) => {
                            const [h, m] = String(hhmm||'').split(':').map(Number);
                            return (h || 0) * 60 + (m || 0);
                        };
                        let hours = 0, isLate = false, isEarlyOut = false;
                        let lateMinutes = 0, earlyOutMinutes = 0;
                        if (inFirst && outLast) {
                            const ms = new Date(outLast.timestamp) - new Date(inFirst.timestamp);
                            hours = Math.max(0, ms/3600000 - eff.breakMinutes/60);
                        }
                        if (inFirst && eff.start && isWorkDay) {
                            const inT = new Date(inFirst.timestamp).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bangkok'});
                            const diff = toMin(inT) - toMin(eff.start);
                            if (diff > 0) {
                                lateMinutes = diff;                    // เก็บนาทีสายจริง
                                isLate = diff > LATE_GRACE_MIN;        // status "สาย" เฉพาะเกิน 15 นาที
                            }
                        }
                        if (outLast && eff.end && isWorkDay) {
                            const outT = new Date(outLast.timestamp).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bangkok'});
                            const diff = toMin(eff.end) - toMin(outT);
                            if (diff > 0) {
                                earlyOutMinutes = diff;
                                isEarlyOut = true;
                            }
                        }
                        const totalLateMin = lateMinutes + earlyOutMinutes;   // นาทีสาย + ออกก่อน รวม

                        // กำหนดสถานะ
                        let status, statusCls;
                        const hasLog = !!(inFirst || outLast);
                        if (!hasLog) {
                            if (leave) {
                                const t = getLeaveTypeInfo(leave.type);
                                status = 'ลา' + (t.label.replace(/^ลา/,'') || '');
                                statusCls = 'bg-blue-100 text-blue-700';
                            } else if (isPubHol) {
                                status = 'วันหยุดนักขัตฤกษ์';
                                statusCls = 'bg-red-100 text-red-700';
                            } else if (!isWorkDay) {
                                status = 'วันหยุด';
                                statusCls = 'bg-purple-100 text-purple-700';
                            } else {
                                status = 'ขาดงาน';
                                statusCls = 'bg-red-200 text-red-800';
                            }
                        } else if (!inFirst || !outLast) {
                            status = 'ไม่ครบ';
                            statusCls = 'bg-orange-100 text-orange-700';
                        } else if (!isWorkDay) {
                            status = 'วันโอที';
                            statusCls = 'bg-amber-100 text-amber-700';
                        } else if (isLate && isEarlyOut) {
                            status = 'สาย+ออกก่อน';
                            statusCls = 'bg-red-100 text-red-700';
                        } else if (isLate) {
                            status = 'สาย';
                            statusCls = 'bg-orange-100 text-orange-700';
                        } else if (isEarlyOut) {
                            status = 'ออกก่อน';
                            statusCls = 'bg-pink-100 text-pink-700';
                        } else {
                            status = 'ปกติ';
                            statusCls = 'bg-green-100 text-green-700';
                        }

                        // ข้าม "วันหยุด" / "วันหยุดนักขัตฤกษ์" ที่ไม่มีบันทึก (ลดความรก)
                        if (!hasLog && !leave && !isWorkDay) return;

                        const branchVal = emp.branch || (g && g.branch) || '';
                        rows.push({
                            date: ds,
                            dow: DOW_TH[dow],
                            uid: emp.uid,
                            name: emp.name,
                            code: emp.employeeCode || '',
                            branch: branchVal,
                            photoURL: emp.photoURL || '',
                            inTime: inFirst ? new Date(inFirst.timestamp).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bangkok'}) : '',
                            outTime: outLast ? new Date(outLast.timestamp).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bangkok'}) : '',
                            inLat:  inFirst && inFirst.lat != null ? inFirst.lat : null,
                            inLng:  inFirst && inFirst.lng != null ? inFirst.lng : null,
                            inAcc:  inFirst && inFirst.accuracy != null ? inFirst.accuracy : null,
                            inDist: inFirst && inFirst.lat != null && inFirst.lng != null
                                ? (inFirst.distanceM != null ? inFirst.distanceM : Math.round(distanceMeters(inFirst.lat, inFirst.lng, empOffice.lat, empOffice.lng)))
                                : null,
                            inOutside: !!(inFirst && inFirst.lat != null && inFirst.lng != null && (
                                inFirst.outsideOffice != null
                                    ? inFirst.outsideOffice
                                    : distanceMeters(inFirst.lat, inFirst.lng, empOffice.lat, empOffice.lng) > empOffice.radius
                            )),
                            inDenied:   !!(inFirst && inFirst.locationDenied),
                            outLat: outLast && outLast.lat != null ? outLast.lat : null,
                            outLng: outLast && outLast.lng != null ? outLast.lng : null,
                            outAcc: outLast && outLast.accuracy != null ? outLast.accuracy : null,
                            outDist: outLast && outLast.lat != null && outLast.lng != null
                                ? (outLast.distanceM != null ? outLast.distanceM : Math.round(distanceMeters(outLast.lat, outLast.lng, empOffice.lat, empOffice.lng)))
                                : null,
                            outOutside: !!(outLast && outLast.lat != null && outLast.lng != null && (
                                outLast.outsideOffice != null
                                    ? outLast.outsideOffice
                                    : distanceMeters(outLast.lat, outLast.lng, empOffice.lat, empOffice.lng) > empOffice.radius
                            )),
                            outDenied:  !!(outLast && outLast.locationDenied),
                            hours,
                            shift: eff.shiftName,
                            complete: !!(inFirst && outLast),
                            isLate,
                            isEarlyOut,
                            lateMinutes,
                            earlyOutMinutes,
                            totalLateMin,
                            isOT: hasLog && !isWorkDay,
                            isAbsent: !hasLog && !leave && isWorkDay,
                            isLeave: !hasLog && !!leave,
                            status,
                            statusCls,
                        });
                    });
                });

                rows.sort((a,b) => b.date.localeCompare(a.date) || a.name.localeCompare(b.name,'th'));

                lastRows = rows;
                renderRows(rows);
            } catch (e) {
                console.error('saLoad:', e);
                if (tbody) tbody.innerHTML = `<tr><td colspan="8" class="text-center py-12 text-red-400 text-sm font-bold">โหลดข้อมูลไม่ได้: ${e.message}</td></tr>`;
            }
        };

        function renderRows(rows) {
            const tbody = document.getElementById('sa-tbody');
            const cnt = document.getElementById('sa-count');
            if (cnt) cnt.textContent = (typeof saView !== 'undefined' && saView === 'summary')
                ? buildSummary(rows).length + ' คน'
                : rows.length + ' รายการ';
            if (typeof saView !== 'undefined' && saView === 'summary') renderSummary(rows);

            // stats
            const empSet = new Set(rows.filter(r=>r.complete||!r.isAbsent).map(r=>r.uid));
            const workDays = rows.filter(r=>r.complete).length;
            const totalHours = rows.reduce((s,r)=>s+r.hours,0);
            const absentCount = rows.filter(r=>r.isAbsent).length;
            const setT = (id,v) => { const e=document.getElementById(id); if(e) e.textContent=v; };
            const outsideCount = rows.filter(r => r.inOutside || r.outOutside).length;
            setT('sa-stat-emp', new Set(rows.map(r=>r.uid)).size);
            setT('sa-stat-days', workDays);
            setT('sa-stat-hours', totalHours.toFixed(1));
            setT('sa-stat-incomplete', absentCount);
            setT('sa-stat-outside', outsideCount);

            if (!tbody) return;
            if (!rows.length) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center py-16 text-zinc-300"><i class="fa-regular fa-folder-open text-4xl mb-3 block"></i><span class="font-bold text-sm">ไม่พบประวัติในช่วงนี้</span></td></tr>`;
                return;
            }
            const timeCell = (time, lat, lng, acc, dist, outside, colorCls, deltaMin, deltaKind) => {
                if (!time) return '<span class="font-mono font-black text-zinc-300">—</span>';
                const hasGps = lat != null && lng != null;
                const distTxt = dist != null
                    ? (dist < 1000 ? `${Math.round(dist)}ม.` : `${(dist/1000).toFixed(1)}กม.`)
                    : '';
                const linkColor = outside ? 'text-red-600 hover:text-red-700' : 'text-yellow-600 hover:text-yellow-700';
                const linkIcon  = outside ? 'fa-triangle-exclamation' : 'fa-map-location-dot';
                const linkLabel = outside ? `นอกออฟฟิศ ${distTxt}` : (distTxt ? `ในออฟฟิศ ${distTxt}` : 'ดูแผนที่');
                const mapLink = hasGps
                    ? `<a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank" class="text-[10px] font-bold inline-flex items-center gap-1 mt-0.5 ${linkColor}" title="ความแม่นยำ ±${acc?Math.round(acc):'?'}ม.">
                          <i class="fa-solid ${linkIcon}"></i> ${linkLabel}
                       </a>`
                    : `<span class="text-[10px] font-bold text-red-400 mt-0.5 inline-flex items-center gap-1">
                          <i class="fa-solid fa-location-crosshairs"></i> ไม่มี GPS
                       </span>`;
                // ป้ายนาทีสาย/ออกก่อน (แสดงเสมอเมื่อมี — แม้ไม่เกิน grace period)
                let deltaBadge = '';
                if (deltaMin > 0) {
                    if (deltaKind === 'late') {
                        const isHard = deltaMin > 15;     // เกิน grace
                        deltaBadge = `<span class="text-[10px] font-black mt-0.5 px-1.5 py-0.5 rounded ${isHard?'bg-orange-100 text-orange-700':'bg-zinc-100 text-zinc-500'}" title="${isHard?'สาย':'สายในช่วง grace'}">
                            +${deltaMin} นาที${isHard?'':' (ในช่วงผ่อนผัน)'}
                        </span>`;
                    } else {
                        deltaBadge = `<span class="text-[10px] font-black mt-0.5 px-1.5 py-0.5 rounded bg-pink-100 text-pink-700">
                            ออกก่อน ${deltaMin} นาที
                        </span>`;
                    }
                }
                return `<div class="flex flex-col items-center gap-0.5">
                    <span class="font-mono font-black ${colorCls}">${time}</span>
                    ${deltaBadge}
                    ${mapLink}
                </div>`;
            };
            tbody.innerHTML = rows.map(r => {
                const dateLabel = new Date(r.date+'T12:00:00+07:00').toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'numeric',timeZone:'Asia/Bangkok'});
                const avatar = r.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(r.name)}&background=f4f4f5&color=27272a&bold=true`;
                const rowBg = r.isAbsent ? 'bg-red-50/60' : r.isOT ? 'bg-amber-50/60' : r.isLeave ? 'bg-blue-50/40' : '';
                return `<tr class="sa-row border-b border-zinc-100 ${rowBg}">
                    <td class="px-4 py-3 whitespace-nowrap">
                        <div class="font-bold text-zinc-700 text-xs">${dateLabel}</div>
                        <div class="text-[10px] font-black text-zinc-400 uppercase">${r.dow}${r.shift ? ` · <span class="text-indigo-500">${r.shift}</span>` : ''}</div>
                    </td>
                    <td class="px-4 py-3">
                        <div class="flex items-center gap-2">
                            <img src="${avatar}" onerror="handleImgError(this)" data-name="${r.name}" class="w-7 h-7 rounded-full object-cover border border-zinc-200">
                            <span class="font-bold text-zinc-800 text-xs">${r.name}</span>
                        </div>
                    </td>
                    <td class="px-4 py-3 text-zinc-500 text-xs font-bold">${r.code||'-'}</td>
                    <td class="px-4 py-3 text-zinc-500 text-xs">${r.branch||'-'}</td>
                    <td class="px-4 py-3 text-center whitespace-nowrap">${timeCell(r.inTime, r.inLat, r.inLng, r.inAcc, r.inDist, r.inOutside, 'text-green-700', r.lateMinutes, 'late')}</td>
                    <td class="px-4 py-3 text-center whitespace-nowrap">${timeCell(r.outTime, r.outLat, r.outLng, r.outAcc, r.outDist, r.outOutside, 'text-red-600', r.earlyOutMinutes, 'early')}</td>
                    <td class="px-4 py-3 text-right font-bold text-zinc-700">${r.hours?r.hours.toFixed(2):'-'}</td>
                    <td class="px-4 py-3 text-center"><span class="sa-chip ${r.statusCls}">${r.status}</span></td>
                </tr>`;
            }).join('');
        }

        // ── สรุปรายคน ─────────────────────────────────────────
        let saView = 'daily';

        function buildSummary(rows) {
            const byUid = {};
            rows.forEach(r => {
                if (!byUid[r.uid]) byUid[r.uid] = {
                    uid: r.uid, name: r.name, code: r.code, branch: r.branch, photoURL: r.photoURL,
                    present: 0, late: 0, earlyOut: 0, incomplete: 0, absent: 0, leave: 0, ot: 0, outside: 0,
                    lateMin: 0, hours: 0,
                };
                const s = byUid[r.uid];
                if (r.isAbsent) s.absent++;
                else if (r.isLeave) s.leave++;
                else if (r.isOT) { s.ot++; s.hours += r.hours; }
                else if (!r.complete) s.incomplete++;
                else {
                    s.present++;
                    s.hours += r.hours;
                    if (r.isLate) s.late++;       // นับเฉพาะที่เกิน grace
                    if (r.isEarlyOut) s.earlyOut++;
                }
                // สะสมนาทีสาย + นาทีออกก่อน (ทุกแถวที่มี ไม่สนใจ grace)
                s.lateMin += (r.lateMinutes || 0) + (r.earlyOutMinutes || 0);
                if (r.inOutside || r.outOutside) s.outside++;
            });
            return Object.values(byUid).sort((a,b)=>a.name.localeCompare(b.name,'th'));
        }

        function renderSummary(rows) {
            const tbody = document.getElementById('sa-summary-tbody');
            if (!tbody) return;
            const sums = buildSummary(rows);
            if (!sums.length) {
                tbody.innerHTML = `<tr><td colspan="12" class="text-center py-16 text-zinc-300 font-bold text-sm">ไม่พบข้อมูลในช่วงนี้</td></tr>`;
                return;
            }
            const numCell = (v, cls) => v > 0
                ? `<td class="px-4 py-3 text-center font-black ${cls}">${v}</td>`
                : `<td class="px-4 py-3 text-center text-zinc-300">-</td>`;
            const fmtLateMin = (m) => {
                if (!m) return '<td class="px-4 py-3 text-right text-zinc-300">-</td>';
                const h = Math.floor(m / 60), mm = m % 60;
                const txt = h ? `${h} ชม. ${mm} น.` : `${mm} น.`;
                return `<td class="px-4 py-3 text-right font-black text-rose-600">${txt}</td>`;
            };
            tbody.innerHTML = sums.map(s => {
                const avatar = s.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&background=f4f4f5&color=27272a&bold=true`;
                return `<tr class="sa-row border-b border-zinc-100">
                    <td class="px-4 py-3">
                        <div class="flex items-center gap-2">
                            <img src="${avatar}" onerror="handleImgError(this)" data-name="${s.name}" class="w-7 h-7 rounded-full object-cover border border-zinc-200">
                            <div>
                                <p class="font-bold text-zinc-800 text-xs">${s.name}</p>
                                <p class="text-[10px] text-zinc-400 font-bold">${s.code||''}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-4 py-3 text-zinc-500 text-xs">${s.branch||'-'}</td>
                    ${numCell(s.present, 'text-green-700')}
                    ${numCell(s.late, 'text-orange-600')}
                    ${numCell(s.earlyOut, 'text-pink-600')}
                    ${numCell(s.incomplete, 'text-orange-500')}
                    ${numCell(s.absent, 'text-red-600')}
                    ${numCell(s.leave, 'text-blue-600')}
                    ${numCell(s.ot, 'text-amber-600')}
                    ${numCell(s.outside, 'text-red-500')}
                    ${fmtLateMin(s.lateMin)}
                    <td class="px-4 py-3 text-right font-black text-zinc-800">${s.hours.toFixed(1)}</td>
                </tr>`;
            }).join('');
        }

        window.saSetView = (mode) => {
            saView = mode;
            const daily = mode === 'daily';
            document.getElementById('sa-daily-wrap')?.classList.toggle('hidden', !daily);
            document.getElementById('sa-summary-wrap')?.classList.toggle('hidden', daily);
            const db_ = document.getElementById('sa-view-daily');
            const sb_ = document.getElementById('sa-view-summary');
            if (db_) db_.className = `text-[11px] font-black px-3 py-1 rounded-md ${daily?'bg-white text-zinc-800 shadow-sm':'text-zinc-500'}`;
            if (sb_) sb_.className = `text-[11px] font-black px-3 py-1 rounded-md ${!daily?'bg-white text-zinc-800 shadow-sm':'text-zinc-500'}`;
            if (!daily) renderSummary(lastRows);
            const cnt = document.getElementById('sa-count');
            if (cnt) cnt.textContent = daily
                ? lastRows.length + ' รายการ'
                : buildSummary(lastRows).length + ' คน';
        };

        window.saExport = () => {
            if (!lastRows.length) { showToast('ไม่มีข้อมูลให้ Export', 'error'); return; }
            if (saView === 'summary') { saExportSummary(); return; }
            const header = ['Date','DayOfWeek','EmployeeCode','Name','Branch','ClockIn','InLat','InLng','InAcc','InDistM','InOutside','LateMin','ClockOut','OutLat','OutLng','OutAcc','OutDistM','OutOutside','EarlyOutMin','TotalLateMin','InMapUrl','OutMapUrl','Hours','Status'];
            const lines = [header.join(',')];
            const esc = s => `"${String(s||'').replace(/"/g,'""')}"`;
            const mapUrl = (lat,lng) => (lat!=null && lng!=null) ? `https://www.google.com/maps?q=${lat},${lng}` : '';
            lastRows.forEach(r => {
                lines.push([
                    r.date, r.dow, r.code||'', esc(r.name), esc(r.branch),
                    r.inTime,  r.inLat??'',  r.inLng??'',  r.inAcc!=null?Math.round(r.inAcc):'',  r.inDist??'',  r.inOutside?'YES':'',  r.lateMinutes||0,
                    r.outTime, r.outLat??'', r.outLng??'', r.outAcc!=null?Math.round(r.outAcc):'', r.outDist??'', r.outOutside?'YES':'', r.earlyOutMinutes||0, r.totalLateMin||0,
                    esc(mapUrl(r.inLat,r.inLng)), esc(mapUrl(r.outLat,r.outLng)),
                    r.hours.toFixed(2), esc(r.status)
                ].join(','));
            });
            const blob = new Blob(['﻿'+lines.join('\n')], { type:'text/csv;charset=utf-8;' });
            const url  = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `attendance_${document.getElementById('sa-from').value}_${document.getElementById('sa-to').value}.csv`;
            a.click(); URL.revokeObjectURL(url);
        };

        function saExportSummary() {
            const sums = buildSummary(lastRows);
            const header = ['EmployeeCode','Name','Branch','PresentDays','LateDays','EarlyOutDays','Incomplete','Absent','LeaveDays','OTDays','OutsideOffice','TotalLateMin','TotalHours'];
            const esc = s => `"${String(s||'').replace(/"/g,'""')}"`;
            const lines = [header.join(',')];
            sums.forEach(s => {
                lines.push([s.code||'', esc(s.name), esc(s.branch), s.present, s.late, s.earlyOut, s.incomplete, s.absent, s.leave, s.ot, s.outside, s.lateMin, s.hours.toFixed(2)].join(','));
            });
            const blob = new Blob(['﻿'+lines.join('\n')], { type:'text/csv;charset=utf-8;' });
            const url  = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `attendance_summary_${document.getElementById('sa-from').value}_${document.getElementById('sa-to').value}.csv`;
            a.click(); URL.revokeObjectURL(url);
        }

        // โหลดอัตโนมัติครั้งแรก
        saLoad();

        return () => {
            ['saSetRange','saLoad','saExport','saSetView'].forEach(k => delete window[k]);
        };
    }
};

    init: async (user, profile, db, APP_ID) => {
        if (profile.role !== 'admin' && profile.role !== 'manager') { navigateTo('home'); return; }
        const { collection, doc, getDoc, getDocs, query, orderBy }
            = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
        const col = name => collection(db,'artifacts',APP_ID,'public','data',name);

        // load employees + schedules
        const [empSnap, schedSnap] = await Promise.all([ getDocs(col('users')), getDocs(col('work_schedules')) ]);
        const employees = empSnap.docs.map(d => ({ uid: d.id, ...d.data() })).filter(e => e.name);
        employees.sort((a,b)=>a.name.localeCompare(b.name,'th'));
        const empMap = Object.fromEntries(employees.map(e => [e.uid, e]));
        const schedMap = {};
        schedSnap.forEach(d => schedMap[d.id] = d.data());

        // populate selects
        const empSel = document.getElementById('sl-emp');
        if (empSel) employees.forEach(e => {
            const opt = document.createElement('option');
            opt.value = e.uid;
            opt.textContent = `${e.name}${e.employeeCode?` (${e.employeeCode})`:''}`;
            empSel.appendChild(opt);
        });
        const branches = [...new Set(employees.map(e=>e.branch).filter(Boolean))].sort();
        const brSel = document.getElementById('sl-branch');
        if (brSel) branches.forEach(b => {
            const opt = document.createElement('option');
            opt.value = b; opt.textContent = b;
            brSel.appendChild(opt);
        });
        const tSel = document.getElementById('sl-type');
        if (tSel) LEAVE_TYPES.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t.id; opt.textContent = t.label;
            tSel.appendChild(opt);
        });

        // โหลด leave requests ทั้งหมด
        let allReqs = [];
        try {
            const snap = await getDocs(query(col('leave_requests'), orderBy('createdAt','desc')));
            allReqs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        } catch (e) {
            console.error('load leaves:', e);
            showToast('โหลดข้อมูลไม่ได้: '+e.message, 'error');
        }

        window.slSetRange = (mode) => {
            const now = newDateTH();
            let from, to;
            if (mode === 'year') {
                from = `${now.getFullYear()}-01-01`;
                to   = `${now.getFullYear()}-12-31`;
            } else if (mode === 'quarter') {
                const d = new Date(now); d.setMonth(d.getMonth() - 2);
                from = dateToTHStr(new Date(d.getFullYear(), d.getMonth(), 1));
                to   = dateToTHStr(new Date(now.getFullYear(), now.getMonth() + 1, 0));
            } else {
                from = dateToTHStr(new Date(now.getFullYear(), now.getMonth(), 1));
                to   = dateToTHStr(new Date(now.getFullYear(), now.getMonth() + 1, 0));
            }
            const fEl = document.getElementById('sl-from'); if (fEl) fEl.value = from;
            const tEl = document.getElementById('sl-to');   if (tEl) tEl.value = to;
        };
        window.slClearRange = () => {
            const fEl = document.getElementById('sl-from'); if (fEl) fEl.value = '';
            const tEl = document.getElementById('sl-to');   if (tEl) tEl.value = '';
        };
        // default = year
        slSetRange('year');

        let filtered = [];
        const balanceCache = {};

        async function getEmpBalance(uid) {
            if (balanceCache[uid]) return balanceCache[uid];
            try {
                const snap = await getDoc(doc(db,'artifacts',APP_ID,'public','data','leave_balances',uid));
                balanceCache[uid] = snap.exists() ? snap.data() : {};
            } catch { balanceCache[uid] = {}; }
            return balanceCache[uid];
        }

        async function renderBalance(uid) {
            const box = document.getElementById('sl-balance');
            if (!box) return;
            if (!uid) { box.classList.add('hidden'); box.innerHTML = ''; return; }
            const emp = empMap[uid];
            if (!emp) { box.classList.add('hidden'); return; }
            box.classList.remove('hidden');
            box.innerHTML = `<div class="bg-white rounded-2xl border border-zinc-200 p-5">
                <div class="flex items-center gap-2 mb-3 text-zinc-400 text-xs">
                    <i class="fa-solid fa-spinner fa-spin"></i> กำลังโหลดโควต้าของ ${emp.name}...
                </div>
            </div>`;

            const bal = await getEmpBalance(uid);
            const sched = schedMap[uid] || null;
            const hpd = sched ? getDayWorkHours(sched) : 8;
            const trackable = ['sick','personal','vacation','maternity','ordain','military'];

            const cards = trackable.map(tid => {
                const t   = getLeaveTypeInfo(tid);
                const cv  = colorVariants(t.color);
                const b   = bal[tid] || {};
                const totalH = b.totalHours != null ? b.totalHours : Math.round(t.maxDays * hpd * 100) / 100;
                const usedH  = b.usedHours  || 0;
                const remH   = Math.max(0, totalH - usedH);
                const pct    = totalH > 0 ? Math.min(100, Math.round(usedH/totalH*100)) : 0;
                const barColor = pct >= 100 ? 'bg-red-400' : pct > 80 ? 'bg-orange-400' : 'bg-green-400';
                return `<div class="border border-zinc-200 rounded-xl p-3.5">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="inline-flex items-center justify-center w-7 h-7 rounded-lg ${cv.badge}">
                            <i class="fa-solid ${t.icon} text-xs"></i>
                        </span>
                        <span class="font-black text-xs text-zinc-700">${t.label}</span>
                    </div>
                    <div class="flex justify-between text-[11px] text-zinc-400 font-bold mb-1">
                        <span>คงเหลือ</span>
                        <span class="text-zinc-700">${balanceToDisplay(remH, sched)}</span>
                    </div>
                    <div class="w-full bg-zinc-100 rounded-full h-1.5 mb-1.5">
                        <div class="h-1.5 rounded-full ${barColor} transition-all" style="width:${pct}%"></div>
                    </div>
                    <div class="flex justify-between text-[10px] text-zinc-400 font-medium">
                        <span>ใช้ ${balanceToDisplay(usedH, sched)}</span>
                        <span>จาก ${balanceToDisplay(totalH, sched)}</span>
                    </div>
                </div>`;
            }).join('');

            const avatar = emp.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(emp.name)}&background=f4f4f5&color=27272a&bold=true`;
            box.innerHTML = `<div class="bg-white rounded-2xl border border-zinc-200 p-5">
                <div class="flex items-center gap-3 mb-4 pb-4 border-b border-zinc-100">
                    <img src="${avatar}" onerror="handleImgError(this)" data-name="${emp.name}" class="w-10 h-10 rounded-2xl object-cover border border-zinc-200">
                    <div class="min-w-0 flex-1">
                        <p class="font-black text-zinc-800 text-sm truncate">${emp.name}</p>
                        <p class="text-[10px] text-zinc-400 font-bold uppercase">${emp.employeeCode || ''} · ${emp.branch || ''}</p>
                    </div>
                    <span class="text-[10px] font-black text-zinc-400 uppercase tracking-widest"><i class="fa-solid fa-calendar-check mr-1 text-yellow-500"></i> โควต้าวันลาคงเหลือ</span>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">${cards}</div>
            </div>`;
        }

        window.slApply = () => {
            const uid    = document.getElementById('sl-emp')?.value;
            const br     = document.getElementById('sl-branch')?.value;
            const type   = document.getElementById('sl-type')?.value;
            const status = document.getElementById('sl-status')?.value;
            const from   = document.getElementById('sl-from')?.value;
            const to     = document.getElementById('sl-to')?.value;

            filtered = allReqs.filter(r => {
                if (uid && r.uid !== uid) return false;
                if (br && r.branch !== br) return false;
                if (type && r.type !== type) return false;
                if (status && r.status !== status) return false;
                // ช่วงวันที่ — ทับซ้อนกับ [from..to]
                if (from && r.endDate   && r.endDate   < from) return false;
                if (to   && r.startDate && r.startDate > to)   return false;
                return true;
            });

            renderBalance(uid);
            renderStats(filtered);
            renderList(filtered);
        };

        function fmtDate(ds) {
            if (!ds) return '-';
            const d = ds.length === 10 ? new Date(ds+'T12:00:00+07:00') : new Date(ds);
            return d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric',timeZone:'Asia/Bangkok'});
        }

        function renderStats(list) {
            const setT = (id,v) => { const e=document.getElementById(id); if(e) e.textContent=v; };
            setT('sl-stat-total', list.length);
            setT('sl-stat-pending', list.filter(r=>r.status==='pending').length);
            setT('sl-stat-approved', list.filter(r=>r.status==='approved').length);
            const totalHrs = list.filter(r=>r.status==='approved').reduce((s,r)=>s+(r.totalHours||0),0);
            setT('sl-stat-hours', totalHrs.toFixed(1));
        }

        function renderList(list) {
            const el = document.getElementById('sl-list');
            if (!el) return;
            if (!list.length) {
                el.innerHTML = `<div class="text-center py-16 text-zinc-300 bg-white rounded-2xl border border-zinc-200">
                    <i class="fa-regular fa-folder-open text-5xl mb-3"></i>
                    <p class="font-bold text-sm">ไม่พบประวัติการลา</p>
                </div>`; return;
            }
            el.innerHTML = list.map(r => {
                const t  = getLeaveTypeInfo(r.type);
                const st = STATUS_MAP[r.status] || STATUS_MAP.pending;
                const cv = colorVariants(t.color);
                const dateRange = r.startDate === r.endDate ? fmtDate(r.startDate) : `${fmtDate(r.startDate)} – ${fmtDate(r.endDate)}`;
                const timeRange = r.isHourly ? ` เวลา ${r.startTime}–${r.endTime}` : ' (เต็มวัน)';
                const sched = schedMap[r.uid] || null;
                const hrsDisplay = hoursToDisplay(r.totalHours, sched);
                const avatar = r.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(r.employeeName||'?')}&background=f4f4f5&color=27272a&bold=true`;
                return `
                <div class="bg-white rounded-2xl border border-zinc-200 p-4 lg:p-5">
                  <div class="flex flex-col lg:flex-row gap-3">
                    <div class="flex items-center gap-3 lg:w-56 shrink-0">
                      <img src="${avatar}" onerror="handleImgError(this)" data-name="${r.employeeName||''}" class="w-10 h-10 rounded-2xl object-cover border border-zinc-200">
                      <div class="min-w-0">
                        <p class="font-black text-zinc-800 text-sm truncate">${r.employeeName||'-'}</p>
                        <p class="text-[10px] text-zinc-400 font-bold uppercase">${r.employeeCode||''}</p>
                        <p class="text-[10px] text-zinc-400">${r.branch||''}</p>
                      </div>
                    </div>
                    <div class="flex-1 min-w-0">
                      <div class="flex flex-wrap items-center gap-2 mb-1.5">
                        <span class="inline-flex items-center gap-1.5 text-xs font-black px-3 py-1 rounded-full ${cv.badge}">
                          <i class="fa-solid ${t.icon}"></i> ${t.label}
                        </span>
                        <span class="text-[10px] font-black px-2.5 py-1 rounded-full ${st.badge}">
                          <i class="fa-solid ${st.icon} mr-1"></i>${st.label}
                        </span>
                        <span class="ml-auto font-black text-zinc-800 text-sm">${hrsDisplay}</span>
                      </div>
                      <p class="text-sm font-bold text-zinc-600">${dateRange}${timeRange}</p>
                      <p class="text-xs text-zinc-400 mt-1 line-clamp-2">${r.reason||''}</p>
                      ${r.attachment ? `<a href="${r.attachment}" target="_blank" class="text-xs text-yellow-600 hover:text-yellow-700 font-bold mt-1 inline-flex items-center gap-1"><i class="fa-solid fa-paperclip"></i> ดูเอกสารแนบ</a>` : ''}
                      ${r.approverNote ? `<p class="text-xs text-zinc-500 mt-1 bg-zinc-50 px-3 py-1.5 rounded-lg border"><i class="fa-solid fa-comment mr-1 text-zinc-400"></i>${r.approverNote}</p>` : ''}
                    </div>
                    <div class="shrink-0 text-right text-xs lg:w-40">
                      ${(r.status==='approved'||r.status==='rejected') ? `
                        <p class="text-[10px] text-zinc-400 font-bold uppercase">${r.status==='approved'?'อนุมัติโดย':'ดำเนินการโดย'}</p>
                        <p class="font-bold text-zinc-600 text-xs">${r.approvedBy||'-'}</p>
                        <p class="text-[10px] text-zinc-400">${r.approvedAt?fmtDate(r.approvedAt):''}</p>
                      ` : r.status==='cancelled' ? `
                        <p class="text-[10px] text-zinc-400 font-bold uppercase">ยกเลิกโดย</p>
                        <p class="font-bold text-zinc-600 text-xs">${r.cancelledBy||r.employeeName||'-'}</p>
                        <p class="text-[10px] text-zinc-400">${r.cancelledAt?fmtDate(r.cancelledAt):''}</p>
                      ` : `
                        <p class="text-[10px] text-zinc-400 font-bold uppercase">ขอเมื่อ</p>
                        <p class="font-bold text-zinc-600 text-xs">${r.createdAt?fmtDate(r.createdAt):'-'}</p>
                      `}
                    </div>
                  </div>
                </div>`;
            }).join('');
        }

        window.slExport = () => {
            if (!filtered.length) { showToast('ไม่มีข้อมูลให้ Export', 'error'); return; }
            const header = ['EmployeeCode','Name','Branch','Type','StartDate','EndDate','Hours','Status','Reason','ApprovedBy','ApprovedAt'];
            const lines = [header.join(',')];
            const esc = s => `"${String(s||'').replace(/"/g,'""')}"`;
            filtered.forEach(r => {
                lines.push([
                    r.employeeCode||'',
                    esc(r.employeeName),
                    esc(r.branch),
                    esc(r.typeName||r.type),
                    r.startDate||'',
                    r.endDate||'',
                    r.totalHours||0,
                    r.status||'',
                    esc(r.reason),
                    esc(r.approvedBy),
                    r.approvedAt||''
                ].join(','));
            });
            const blob = new Blob(['﻿'+lines.join('\n')], { type:'text/csv;charset=utf-8;' });
            const url  = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `leaves_${(document.getElementById('sl-from').value||'all')}_${(document.getElementById('sl-to').value||'all')}.csv`;
            a.click(); URL.revokeObjectURL(url);
        };

        // โหลดครั้งแรก
        slApply();

        return () => {
            ['slSetRange','slClearRange','slApply','slExport'].forEach(k => delete window[k]);
        };
    }
};

// REVIEW_DIMENSIONS ย้ายไป js/lib/review-dimensions.js แล้ว (ดู import ด้านบน)

// auto-detect ว่าพนักงานคนนี้มีหน้าที่บริหาร/หัวหน้างานหรือไม่
function isManagerialEmp(emp) {
    if (!emp) return false;
    if (emp.role === 'manager' || emp.role === 'admin') return true;
    const p = (emp.position || '').toLowerCase();
    return /หัวหน้า|ผู้จัดการ|ผู้บริหาร|ผู้อำนวยการ|manager|supervisor|director|lead|chief|head/.test(p);
}
// หน้า review-admin ที่แยกไฟล์ไปแล้วเรียกตัวนี้ — ต้องอยู่บน window ถึงจะมองเห็น
window.isManagerialEmp = isManagerialEmp;

// เก็บไว้เพื่อ backward compat กับ review เก่าที่ใช้ flat criteria
// REVIEW_DEFAULT_CRITERIA ย้ายไป js/lib/review-dimensions.js แล้ว (ดู import ด้านบน)

// หน้า review-admin ย้ายไป js/pages/review-admin.js แล้ว — โหลดผ่าน PAGE_MODULES ใน loadPage

// ================================================================
// PAGE: my-review — พนักงานดูผลประเมินของตัวเอง
// ================================================================
PAGES['my-review'] = {
    title: 'ผลประเมินของฉัน',
    html: `
<style>
.mr-tab { transition: all .2s; }
.mr-tab.active { background:#18181b; color:#eab308; }
</style>
<div class="p-6 lg:p-8 max-w-3xl mx-auto">
  <div class="mb-6">
    <h2 class="text-xl sm:text-2xl font-black text-zinc-800 uppercase tracking-tight">ผลประเมินของฉัน</h2>
    <p class="text-sm text-zinc-400 font-medium mt-0.5">ผลประเมินจากหัวหน้า และการประเมินตัวเอง</p>
  </div>

  <div class="flex gap-2 mb-6 bg-zinc-100 p-1 rounded-xl w-fit">
    <button class="mr-tab active text-xs font-black uppercase tracking-widest px-5 py-2 rounded-lg" onclick="mrSetTab('received')">ผลจากหัวหน้า</button>
    <button class="mr-tab text-xs font-black uppercase tracking-widest px-5 py-2 rounded-lg text-zinc-500" onclick="mrSetTab('self')">ประเมินตัวเอง</button>
  </div>

  <div id="mr-tab-received">
    <div id="mr-list" class="space-y-4">
      <div class="text-center py-16 text-zinc-300"><i class="fa-solid fa-spinner fa-spin text-4xl"></i></div>
    </div>
  </div>

  <div id="mr-tab-self" class="hidden">
    <div class="bg-white rounded-2xl border border-zinc-200 p-5 mb-4 flex items-center gap-3">
      <label class="text-xs font-black text-zinc-500 uppercase whitespace-nowrap">รอบประเมิน</label>
      <select id="mr-self-cycle" onchange="mrLoadSelfCycle()" class="flex-1 border-2 border-zinc-200 rounded-xl px-3 py-2 text-sm font-bold focus:border-yellow-500 focus:outline-none">
        <option value="">— เลือกรอบประเมิน —</option>
      </select>
    </div>
    <div id="mr-self-body">
      <div class="text-center py-16 text-zinc-300"><i class="fa-solid fa-square-poll-vertical text-5xl mb-3"></i><p class="font-bold text-sm">เลือกรอบประเมินเพื่อประเมินตัวเอง</p></div>
    </div>
  </div>
</div>`,

    init: async (user, profile, db, APP_ID) => {
        const { collection, doc, getDocs, getDoc, setDoc, query, orderBy, where }
            = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
        const col = name => collection(db,'artifacts',APP_ID,'public','data',name);

        // โหลด review ทั้งหมด (manager + self) ของฉัน
        // query แคบที่ uid ตัวเอง — ถ้าดึงทั้ง collection security rules จะปฏิเสธทั้งคำขอ
        // (rules ไม่ใช่ตัวกรอง) และคะแนนประเมินของคนอื่นก็ไม่ควรหลุดมาถึงเบราว์เซอร์อยู่แล้ว
        const snap = await getDocs(query(col('reviews'), where('uid','==',user.uid)));
        const myReviews = snap.docs.map(d => d.data())
            .filter(r => r.kind !== 'self')
            .sort((a,b) => (b.reviewedAt||'').localeCompare(a.reviewedAt||''));
        const mySelfReviews = {};
        snap.docs.forEach(d => {
            const r = d.data();
            if (r.kind === 'self') mySelfReviews[r.cycleId] = r;
        });

        // โหลด cycles สำหรับประเมินตัวเอง
        const cyclesSnap = await getDocs(query(col('review_cycles'), orderBy('createdAt','desc')));
        const cycles = cyclesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        const cycleSel = document.getElementById('mr-self-cycle');
        if (cycleSel) cycles.forEach(c => {
            const o = document.createElement('option');
            o.value = c.id; o.textContent = c.name;
            cycleSel.appendChild(o);
        });

        window.mrSetTab = (tab) => {
            document.getElementById('mr-tab-received')?.classList.toggle('hidden', tab !== 'received');
            document.getElementById('mr-tab-self')?.classList.toggle('hidden', tab !== 'self');
            document.querySelectorAll('.mr-tab').forEach((b, i) => {
                const isActive = (i === 0 && tab === 'received') || (i === 1 && tab === 'self');
                b.classList.toggle('active', isActive);
                b.classList.toggle('text-zinc-500', !isActive);
            });
        };

        // ── ประเมินตัวเอง ────────────────────────────────────────
        let selfTemp = {}, selfMgrOverride = null, selfCurCycle = null;

        function selfDims(cycle) {
            const dims = (cycle && cycle.dimensions) || REVIEW_DIMENSIONS;
            const showMgr = selfMgrOverride != null ? selfMgrOverride : isManagerialEmp(profile);
            return dims.filter(d => !d.managerOnly || showMgr);
        }

        window.mrLoadSelfCycle = () => {
            const cid = document.getElementById('mr-self-cycle')?.value;
            selfCurCycle = cycles.find(c => c.id === cid) || null;
            const body = document.getElementById('mr-self-body');
            if (!body) return;
            if (!selfCurCycle) {
                body.innerHTML = '<div class="text-center py-16 text-zinc-300"><i class="fa-solid fa-square-poll-vertical text-5xl mb-3"></i><p class="font-bold text-sm">เลือกรอบประเมินเพื่อประเมินตัวเอง</p></div>';
                return;
            }
            const existing = mySelfReviews[selfCurCycle.id];
            selfTemp = existing && existing.scores ? { ...existing.scores } : {};
            selfMgrOverride = existing && typeof existing.isManagerial === 'boolean' ? existing.isManagerial : null;
            renderSelf();
        };

        function renderSelf() {
            const body = document.getElementById('mr-self-body');
            if (!body || !selfCurCycle) return;
            const allDims = (selfCurCycle.dimensions) || REVIEW_DIMENSIONS;
            const showMgr = selfMgrOverride != null ? selfMgrOverride : isManagerialEmp(profile);
            const existing = mySelfReviews[selfCurCycle.id];

            const dimsHtml = allDims.map((dim, dIdx) => {
                const visible = !dim.managerOnly || showMgr;
                const itemsHtml = dim.items.map(it => {
                    const key = dim.id + '.' + it.id;
                    const cur = selfTemp[key] || 0;
                    const stars = [1,2,3,4,5].map(n => `
                        <button type="button" onclick="mrSelfSetScore('${key}',${n})"
                            class="w-11 h-11 rounded-lg text-2xl transition-all active:scale-95 ${n <= cur ? 'text-yellow-500' : 'text-zinc-200 hover:text-yellow-300'}"
                            aria-label="ให้ ${n} ดาว">
                            <i class="fa-solid fa-star pointer-events-none"></i>
                        </button>`).join('');
                    const scoreLabel = cur > 0 ? `<span class="text-xs font-black text-yellow-600">(${cur}/5)</span>` : '<span class="text-[10px] text-zinc-300 font-bold">ยังไม่ให้คะแนน</span>';
                    return `<div class="py-3 border-b border-zinc-100 last:border-0">
                        <p class="text-sm font-bold text-zinc-800">${it.name}</p>
                        <p class="text-[11px] text-zinc-400 mt-0.5 mb-2 leading-snug">${it.desc}</p>
                        <div class="flex items-center gap-1 flex-wrap">${stars}<span class="ml-2">${scoreLabel}</span></div>
                    </div>`;
                }).join('');
                const mgrToggle = dim.managerOnly
                    ? `<label class="flex items-center gap-1.5 text-[10px] font-bold text-zinc-500 cursor-pointer">
                         <input type="checkbox" ${showMgr?'checked':''} onchange="mrSelfToggleMgr(this.checked)" class="accent-yellow-500">
                         ประเมินมิตินี้
                       </label>`
                    : '';
                return `<div class="mb-4 ${!visible ? 'opacity-60' : ''}">
                    <div class="flex items-center justify-between gap-2 mb-2 px-3 py-2 rounded-xl border ${dim.color||'bg-zinc-50 border-zinc-200 text-zinc-700'}">
                        <div>
                            <p class="font-black text-xs">${dIdx+1}. ${dim.name}</p>
                            <p class="text-[10px] font-bold opacity-70">${dim.nameEn}${dim.managerOnly ? ' · เฉพาะหัวหน้างาน' : ''}</p>
                        </div>
                        ${mgrToggle}
                    </div>
                    ${visible ? itemsHtml : '<p class="text-center py-3 text-[11px] text-zinc-400">ไม่ประเมินมิตินี้</p>'}
                </div>`;
            }).join('');

            body.innerHTML = `<div class="bg-white rounded-2xl border border-zinc-200 p-5">
                ${existing ? `<div class="bg-green-50 border border-green-200 rounded-xl px-4 py-2 mb-4 text-xs font-bold text-green-700">
                    <i class="fa-solid fa-circle-check mr-1"></i> คุณเคยส่งการประเมินตัวเองในรอบนี้แล้ว — แก้ไขแล้วบันทึกใหม่ได้
                </div>` : `<p class="text-xs text-zinc-400 font-medium mb-4">ให้คะแนนตัวเองตามตรง 1-5 ดาว เพื่อเปรียบเทียบกับมุมมองของหัวหน้า</p>`}
                ${dimsHtml}
                <div class="mt-4">
                    <label class="block text-xs font-bold text-zinc-500 mb-1 uppercase">ความเห็นเพิ่มเติม (จุดแข็ง / สิ่งที่อยากพัฒนา)</label>
                    <textarea id="mr-self-comment" rows="3" class="w-full border-2 border-zinc-200 rounded-xl px-4 py-2.5 text-sm focus:border-yellow-500 focus:outline-none resize-none">${existing?.comment || ''}</textarea>
                </div>
                <button onclick="mrSelfSave()" id="mr-self-save"
                    class="w-full mt-4 bg-yellow-500 hover:bg-yellow-400 text-zinc-900 font-black py-3 rounded-xl text-sm uppercase">
                    <i class="fa-solid fa-floppy-disk mr-1"></i> บันทึกการประเมินตัวเอง
                </button>
            </div>`;
        }

        window.mrSelfSetScore = (key, n) => { selfTemp[key] = n; renderSelf(); };
        window.mrSelfToggleMgr = (checked) => { selfMgrOverride = checked; renderSelf(); };

        window.mrSelfSave = async () => {
            if (!selfCurCycle) return;
            const dims = selfDims(selfCurCycle);
            const missing = [];
            dims.forEach(dim => dim.items.forEach(it => {
                const key = dim.id + '.' + it.id;
                if (!selfTemp[key]) missing.push(it.name);
            }));
            if (missing.length) { showToast(`ยังขาดคะแนน: ${missing[0]}${missing.length>1?` (+${missing.length-1} ข้อ)`:''}`, 'error'); return; }
            const dimAvg = {};
            const allVals = [];
            dims.forEach(dim => {
                const vals = dim.items.map(it => selfTemp[dim.id + '.' + it.id] || 0);
                dimAvg[dim.id] = Math.round(vals.reduce((s,v)=>s+v,0) / vals.length * 100) / 100;
                allVals.push(...vals);
            });
            const avg = Math.round(allVals.reduce((s,v)=>s+v,0) / allVals.length * 100) / 100;
            const isManagerial = selfMgrOverride != null ? selfMgrOverride : isManagerialEmp(profile);
            const btn = document.getElementById('mr-self-save');
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i> กำลังบันทึก...';
            try {
                const payload = {
                    cycleId: selfCurCycle.id, cycleName: selfCurCycle.name,
                    uid: user.uid, employeeName: profile.name, employeeCode: profile.employeeCode || '',
                    branch: profile.branch || '', position: profile.position || '',
                    dimensions: dims, scores: { ...selfTemp }, dimAvg, avg, isManagerial,
                    comment: document.getElementById('mr-self-comment')?.value.trim() || '',
                    kind: 'self',
                    reviewedBy: profile.name, reviewedAt: new Date().toISOString(),
                };
                await setDoc(doc(db,'artifacts',APP_ID,'public','data','reviews', `${selfCurCycle.id}_${user.uid}_self`), payload);
                mySelfReviews[selfCurCycle.id] = payload;
                showToast('✅ บันทึกการประเมินตัวเองแล้ว', 'success');
                renderSelf();
            } catch(e) { showToast('❌ '+e.message, 'error'); }
            finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-floppy-disk mr-1"></i> บันทึกการประเมินตัวเอง'; }
        };

        const el = document.getElementById('mr-list');
        if (el) {
            if (!myReviews.length) {
                el.innerHTML = `<div class="text-center py-16 text-zinc-300">
                    <i class="fa-regular fa-folder-open text-5xl mb-3"></i>
                    <p class="font-bold text-sm">ยังไม่มีผลประเมิน</p>
                </div>`;
            } else {
                // กลุ่ม manager reviews ตาม cycleId — ถ้ามีหลายหัวหน้าประเมิน จะเห็นพร้อมกัน
                const byCycle = {};
                myReviews.forEach(r => {
                    if (!byCycle[r.cycleId]) byCycle[r.cycleId] = { cycleName: r.cycleName, list: [] };
                    byCycle[r.cycleId].list.push(r);
                });

                el.innerHTML = Object.entries(byCycle).map(([cid, group]) => {
                    // กั๊ก: ต้องประเมินตัวเองในรอบเดียวกันก่อนถึงจะดูผลของหัวหน้าได้
                    if (!mySelfReviews[cid]) {
                        return `<div class="bg-white rounded-2xl border border-amber-200 p-8 text-center">
                            <div class="w-16 h-16 mx-auto rounded-full bg-amber-50 flex items-center justify-center mb-3">
                                <i class="fa-solid fa-lock text-2xl text-amber-500"></i>
                            </div>
                            <p class="font-black text-zinc-800 text-sm">${group.cycleName || 'รอบประเมิน'}</p>
                            <p class="text-xs text-zinc-500 mt-1">หัวหน้าประเมินคุณแล้ว <span class="font-black text-amber-700">${group.list.length} คน</span></p>
                            <div class="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 mt-4 max-w-sm mx-auto">
                                <p class="text-xs font-bold text-amber-800 mb-1"><i class="fa-solid fa-circle-info mr-1"></i> ต้องประเมินตัวเองก่อน</p>
                                <p class="text-[11px] text-amber-700 leading-snug">เพื่อให้การประเมินเป็นกลางและตรงจุด คุณต้องประเมินตัวเองในรอบนี้ก่อน ระบบจึงจะเปิดให้ดูผลจากหัวหน้าได้</p>
                            </div>
                            <button onclick="mrSetTab('self');document.getElementById('mr-self-cycle').value='${cid}';mrLoadSelfCycle();"
                                class="mt-4 bg-yellow-500 hover:bg-yellow-400 text-zinc-900 font-black px-5 py-2.5 rounded-xl text-xs uppercase">
                                <i class="fa-solid fa-pen mr-1"></i> ไปประเมินตัวเอง
                            </button>
                        </div>`;
                    }
                    return group.list.map(r => {
                    const starRow = (sc) => [1,2,3,4,5].map(n =>
                        `<i class="fa-solid fa-star text-lg ${n <= sc ? 'text-yellow-500' : 'text-zinc-200'}"></i>`).join('');

                    // ใช้ dimensions ใหม่ถ้ามี; ถ้าเป็น review เก่า fallback ไป criteria แบบเดิม
                    let body = '';
                    if (Array.isArray(r.dimensions) && r.dimensions.length) {
                        body = r.dimensions.map((dim, dIdx) => {
                            const dAvg = r.dimAvg && r.dimAvg[dim.id] != null ? r.dimAvg[dim.id] : null;
                            const items = dim.items.map(it => {
                                const key = dim.id + '.' + it.id;
                                const sc = (r.scores && r.scores[key]) || 0;
                                return `<div class="py-2.5 border-b border-zinc-50 last:border-0">
                                    <p class="text-sm font-bold text-zinc-700">${it.name}</p>
                                    <p class="text-[10px] text-zinc-400 leading-snug mb-1.5">${it.desc||''}</p>
                                    <div class="flex items-center gap-1.5">
                                        <span class="flex gap-0.5">${starRow(sc)}</span>
                                        <span class="text-xs font-black text-yellow-600 ml-1">${sc}/5</span>
                                    </div>
                                </div>`;
                            }).join('');
                            return `<div class="mt-4">
                                <div class="flex items-center justify-between gap-2 mb-2 px-3 py-2 rounded-xl border ${dim.color||'bg-zinc-50 border-zinc-200 text-zinc-700'}">
                                    <div class="min-w-0">
                                        <p class="font-black text-xs">${dIdx+1}. ${dim.name}</p>
                                        <p class="text-[10px] font-bold opacity-70">${dim.nameEn||''}</p>
                                    </div>
                                    ${dAvg != null ? `<p class="text-lg font-black shrink-0">${dAvg.toFixed(1)}</p>` : ''}
                                </div>
                                ${items}
                            </div>`;
                        }).join('');
                    } else {
                        const criteria = r.criteria || REVIEW_DEFAULT_CRITERIA;
                        body = criteria.map((c, i) => {
                            const sc = r.scores?.[i] || 0;
                            return `<div class="py-2 border-b border-zinc-50 last:border-0">
                                <p class="text-sm font-bold text-zinc-700 mb-1">${c}</p>
                                <div class="flex items-center gap-1.5">
                                    <span class="flex gap-0.5">${starRow(sc)}</span>
                                    <span class="text-xs font-black text-yellow-600 ml-1">${sc}/5</span>
                                </div>
                            </div>`;
                        }).join('');
                    }

                    const avgColor = r.avg >= 4 ? 'text-green-600' : r.avg >= 3 ? 'text-yellow-600' : 'text-red-500';
                    return `<div class="bg-white rounded-2xl border border-zinc-200 p-6">
                        <div class="flex items-center justify-between mb-4 pb-4 border-b border-zinc-100">
                            <div>
                                <p class="font-black text-zinc-800">${r.cycleName || 'รอบประเมิน'}</p>
                                <p class="text-[10px] text-zinc-400 font-bold">ประเมินโดย ${r.reviewedBy || '-'} · ${r.reviewedAt ? new Date(r.reviewedAt).toLocaleDateString('th-TH',{timeZone:'Asia/Bangkok'}) : ''}</p>
                            </div>
                            <div class="text-center">
                                <p class="text-3xl font-black ${avgColor}">${(r.avg||0).toFixed(1)}</p>
                                <p class="text-[9px] text-zinc-400 font-bold uppercase">เต็ม 5.0</p>
                            </div>

                        ${body}
