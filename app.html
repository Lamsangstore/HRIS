                    const personalHolSet = new Set((mySchedule && Array.isArray(mySchedule.holidays)) ? mySchedule.holidays : []);
                    const workDaySet = new Set((mySchedule && mySchedule.workDays) ? mySchedule.workDays : [1,2,3,4,5]);
                    const leaveTypeLabel = { sick:'ป่วย', personal:'กิจ', vacation:'พักร้อน', maternity:'คลอด', ordain:'บวช', military:'ทหาร', other:'ลา' };
                    const leaveTypeClass = { sick:'leave-sick', personal:'leave-personal', vacation:'leave-vacation', maternity:'leave-maternity', ordain:'leave-ordain', military:'leave-military', other:'leave-other' };
                    let html = '';
                    for (let i = 0; i < firstDay; i++) html += '<div class="cal-cell empty"></div>';
                    for (let d = 1; d <= daysInMonth; d++) {
                        const ds = getLocalISO(new Date(displayYear, displayMonth, d));
                        const dow = new Date(displayYear, displayMonth, d).getDay();
                        let cls = 'cal-cell';
                        let label = '';
                        const isHol = isPublicHoliday(ds);
                        const isOffDay = !workDaySet.has(dow) || personalHolSet.has(ds);
                        const lv = leaveMap[ds];
                        if (isHol) {
                            cls += ' holiday-cell';
                            const holName = getHolidayName(ds) || '\u0e2b\u0e22\u0e38\u0e14\u0e19\u0e31\u0e01\u0e02\u0e31\u0e15\u0e24\u0e01\u0e29\u0e4c';
                            const holShort = holName.length > 6 ? holName.slice(0,6)+'\u2026' : holName;
                            label = '<span class="cal-label" style="color:inherit;opacity:0.8">' + holShort + '</span>';
                        } else if (isOffDay) {
                            cls += ' personal-holiday';
                            label = '<span class="cal-label" style="color:inherit;opacity:0.8">\u0e2b\u0e22\u0e38\u0e14</span>';
                        } else if (lv) {
                            if (lv.status === 'pending') {
                                cls += ' leave-pending';
                                label = '<span class="cal-label" style="color:inherit;opacity:0.8">' + (leaveTypeLabel[lv.type]||'\u0e25\u0e32') + '?</span>';
                            } else {
                                cls += ' ' + (leaveTypeClass[lv.type] || 'leave-other');
                                label = '<span class="cal-label" style="color:inherit;opacity:0.8">' + (leaveTypeLabel[lv.type]||'\u0e25\u0e32') + '</span>';
                            }
                        }
                        if (ds === todayStr) cls += ' today';
                        if (ds === selectedDateStr) cls += ' selected';
                        const dot = logsMap[ds] ? '<div class="has-record-dot"></div>' : '';
                        html += '<div class="' + cls + '" onclick="selectCalDate(\''+ ds +'\')">' + d + label + dot + '</div>';
                    }
                    const body = document.getElementById('calendar-body');
                    if (body) body.innerHTML = html;
                }

                function renderLogs() {
                    const allLogs = myLogs.filter(l => l.localDate === selectedDateStr).sort((a,b) => new Date(a.timestamp)-new Date(b.timestamp));
                    let html = '';
                    if (!allLogs.length) {
                        html = `<div class="text-center py-8 text-zinc-400"><i class="fa-regular fa-calendar-xmark text-3xl mb-3 opacity-50"></i><p class="text-sm font-medium">ไม่มีประวัติลงเวลา</p></div>`;
                    } else {
                        // เอา clock_in แรกสุด และ clock_out หลังสุด
                        const ins  = allLogs.filter(l => l.type === 'clock_in');
                        const outs = allLogs.filter(l => l.type === 'clock_out');
                        const firstIn  = ins[0];
                        const lastOut  = outs[outs.length - 1];
                        const toShow   = [firstIn, lastOut].filter(Boolean);
                        toShow.forEach(log => {
                            const time  = new Date(log.timestamp).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Bangkok' });
                            const isIn  = log.type === 'clock_in';
                            const hasGps = log.lat != null && log.lng != null;

                            // คำนวณระยะ + สถานะ — รองรับ record เก่าที่ยังไม่มี distanceM
                            let gpsBlock = '';
                            if (hasGps) {
                                const dist = (log.distanceM != null)
                                    ? log.distanceM
                                    : Math.round(distanceMeters(log.lat, log.lng, OFFICE_LAT, OFFICE_LNG));
                                const outside = (log.outsideOffice != null) ? log.outsideOffice : (dist > OFFICE_RADIUS_M);
                                const distTxt = dist < 1000 ? `${dist} ม.` : `${(dist/1000).toFixed(2)} กม.`;
                                const accTxt  = log.accuracy ? ` <span class="text-zinc-400 font-medium">±${Math.round(log.accuracy)}ม.</span>` : '';
                                const cls   = outside ? 'text-red-600' : 'text-green-600';
                                const icon  = outside ? 'fa-triangle-exclamation' : 'fa-circle-check';
                                const label = outside ? `นอกออฟฟิศ ${distTxt}` : `ในออฟฟิศ ${distTxt}`;
                                gpsBlock = `
                                    <div class="mt-1 flex flex-col gap-0.5">
                                        <span class="text-[10px] font-black inline-flex items-center gap-1 ${cls}">
                                            <i class="fa-solid ${icon}"></i> ${label}${accTxt}
                                        </span>
                                        <a href="https://www.google.com/maps?q=${log.lat},${log.lng}" target="_blank" class="text-[10px] font-bold text-yellow-600 hover:text-yellow-700 inline-flex items-center gap-1">
                                            <i class="fa-solid fa-map-location-dot"></i> ดูตำแหน่งบน Google Maps
                                        </a>
                                    </div>`;
                            } else if (log.locationDenied) {
                                gpsBlock = `<p class="text-[10px] font-bold text-red-400 mt-1 inline-flex items-center gap-1"><i class="fa-solid fa-location-crosshairs"></i> ไม่ได้แชร์ตำแหน่ง</p>`;
                            } else {
                                gpsBlock = `<p class="text-[10px] font-bold text-zinc-400 mt-1 inline-flex items-center gap-1"><i class="fa-regular fa-circle-question"></i> ไม่มีข้อมูล GPS</p>`;
                            }

                            html += `<div class="flex items-start justify-between p-4 bg-zinc-50 rounded-xl border border-zinc-100 shadow-sm hover:border-yellow-300 transition-all">
                                <div class="flex items-start">
                                    <div class="w-10 h-10 rounded-full flex items-center justify-center mr-3 shrink-0 ${isIn ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-500'}">
                                        <i class="fa-solid ${isIn ? 'fa-arrow-right-to-bracket' : 'fa-arrow-right-from-bracket'}"></i>
                                    </div>
                                    <div class="min-w-0">
                                        <p class="font-black text-zinc-800 text-sm">${isIn ? 'เข้างาน' : 'ออกงาน'}</p>
                                        <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">${log.branch||''}</p>
                                        ${gpsBlock}
                                    </div>
                                </div>
                                <div class="text-lg font-black ${isIn ? 'text-green-600' : 'text-red-500'} font-mono shrink-0">${time}</div>
                            </div>`;
                        });
                        // แสดงจำนวน record ทั้งหมดถ้ามากกว่า 2
                        if (allLogs.length > 2) {
                            html += `<p class="text-center text-[10px] text-zinc-400 font-bold pt-1">มีบันทึกทั้งหมด ${allLogs.length} รายการ (แสดงเข้าแรก-ออกหลัง)</p>`;
                        }
                    }

                    // รายละเอียดวันที่เลือก (วันหยุด / วันลา)
                    const leaveMap = buildLeaveMap();
                    const isHol   = isPublicHoliday(selectedDateStr);
                    const holName = getHolidayName(selectedDateStr);
                    const lv      = leaveMap[selectedDateStr];
                    const leaveTypeLabel = { sick:'ลาป่วย', personal:'ลากิจ', vacation:'ลาพักร้อน', other:'ลาอื่นๆ' };
                    let detailHtml = '';
                    if (isHol) {
                        detailHtml = `<div class="mt-3 flex items-start gap-2.5 bg-red-50 border border-red-100 rounded-xl p-3.5">
                            <i class="fa-solid fa-umbrella-beach text-red-400 mt-0.5 shrink-0"></i>
                            <div>
                                <p class="text-xs font-black text-red-600">วันหยุดนักขัตฤกษ์</p>
                                <p class="text-sm font-bold text-red-700 mt-0.5">${holName || 'วันหยุดราชการ'}</p>
                            </div>
                        </div>`;
                    }
                    if (lv) {
                        const isPending = lv.status === 'pending';
                        detailHtml += `<div class="mt-3 flex items-start gap-2.5 ${isPending ? 'bg-orange-50 border-orange-100' : 'bg-blue-50 border-blue-100'} border rounded-xl p-3.5">
                            <i class="fa-solid fa-calendar-minus ${isPending ? 'text-orange-400' : 'text-blue-400'} mt-0.5 shrink-0"></i>
                            <div>
                                <p class="text-xs font-black ${isPending ? 'text-orange-600' : 'text-blue-600'}">${isPending ? 'รออนุมัติการลา' : 'วันลา'}</p>
                                <p class="text-sm font-bold ${isPending ? 'text-orange-700' : 'text-blue-700'} mt-0.5">${leaveTypeLabel[lv.type] || 'ลา'}</p>
                            </div>
                        </div>`;
                    }

                    const el = document.getElementById('daily-logs');
                    if (el) el.innerHTML = html + detailHtml;
                }

                window.selectCalDate = (ds) => {
                    selectedDateStr = ds;
                    renderCalendar();
                    renderLogs();
                    const d = parseDateTH(ds);
                    const el = document.getElementById('selected-date-text');
                    if (el) el.textContent = todayTH() === ds ? 'วันนี้' : d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric', timeZone: 'Asia/Bangkok' });
                };

                document.getElementById('btn-prev-month')?.addEventListener('click', () => {
                    displayMonth--; if (displayMonth < 0) { displayMonth = 11; displayYear--; } renderCalendar(); renderMyAttn();
                });
                document.getElementById('btn-next-month')?.addEventListener('click', () => {
                    displayMonth++; if (displayMonth > 11) { displayMonth = 0; displayYear++; } renderCalendar(); renderMyAttn();
                });

                // โหลด shifts (สำหรับคำนวณ workStart/workEnd ของวัน)
                let shiftMap = {};
                try {
                    const shSnap = await getDocs(collection(db,'artifacts',appId,'public','data','shifts'));
                    shSnap.forEach(d => shiftMap[d.id] = d.data());
                } catch {}

                function effTimes(dow) {
                    const sid = mySchedule && mySchedule.shiftByDay ? mySchedule.shiftByDay[dow] : null;
                    const sh = sid ? shiftMap[sid] : null;
                    return {
                        start: (sh && sh.start) || (mySchedule && mySchedule.workStart) || null,
                        end:   (sh && sh.end)   || (mySchedule && mySchedule.workEnd)   || null,
                        breakMinutes: sh && sh.breakMinutes != null ? sh.breakMinutes
                            : (mySchedule && mySchedule.breakMinutes != null ? mySchedule.breakMinutes : 60),
                        shiftName: sh ? sh.name : null,
                    };
                }

                const LATE_GRACE_MIN = 15;
                const DOW_TH = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
                const toMin = (hhmm) => {
                    const [h, m] = String(hhmm||'').split(':').map(Number);
                    return (h || 0) * 60 + (m || 0);
                };

                function buildMyAttnRows() {
                    const workDaySet = new Set((mySchedule && mySchedule.workDays) ? mySchedule.workDays : [1,2,3,4,5]);
                    const personalHolSet = new Set((mySchedule && Array.isArray(mySchedule.holidays)) ? mySchedule.holidays : []);
                    const leaveMap = buildLeaveMap();

                    // group logs by date
                    const groups = {};
                    myLogs.forEach(l => {
                        const ds = l.localDate;
                        if (!ds) return;
                        if (!groups[ds]) groups[ds] = { ins: [], outs: [] };
                        if (l.type === 'clock_in') groups[ds].ins.push(l);
                        if (l.type === 'clock_out') groups[ds].outs.push(l);
                    });

                    // เดือนปัจจุบันใน calendar
                    const todayStr = todayTH();
                    const daysInMonth = new Date(displayYear, displayMonth + 1, 0).getDate();
                    const rows = [];
                    for (let d = daysInMonth; d >= 1; d--) {
                        const ds = `${displayYear}-${String(displayMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                        if (ds > todayStr) continue;          // ข้ามวันอนาคต
                        const dow = parseDateTH(ds).getDay();
                        const isPubHol  = isPublicHoliday(ds);
                        const isPersHol = personalHolSet.has(ds);
                        const isWorkDay = workDaySet.has(dow) && !isPubHol && !isPersHol;
                        const leave = leaveMap[ds];

                        const g = groups[ds];
                        let inFirst, outLast;
                        if (g) {
                            g.ins.sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
                            g.outs.sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
                            inFirst = g.ins[0];
                            outLast = g.outs[g.outs.length-1];
                        }

                        const eff = effTimes(dow);
                        let hours = 0, isLate = false, isEarlyOut = false, lateMinutes = 0, earlyOutMinutes = 0;
                        if (inFirst && outLast) {
                            const ms = new Date(outLast.timestamp) - new Date(inFirst.timestamp);
                            hours = Math.max(0, ms/3600000 - eff.breakMinutes/60);
                        }
                        if (inFirst && eff.start && isWorkDay) {
                            const inT = new Date(inFirst.timestamp).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bangkok'});
                            const diff = toMin(inT) - toMin(eff.start);
                            if (diff > 0) { lateMinutes = diff; isLate = diff > LATE_GRACE_MIN; }
                        }
                        if (outLast && eff.end && isWorkDay) {
                            const outT = new Date(outLast.timestamp).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bangkok'});
                            const diff = toMin(eff.end) - toMin(outT);
                            if (diff > 0) { earlyOutMinutes = diff; isEarlyOut = true; }
                        }

                        let status, statusCls;
                        const hasLog = !!(inFirst || outLast);
                        if (!hasLog) {
                            if (leave) {
                                const lt = leave.type;
                                const lname = { sick:'ป่วย', personal:'กิจ', vacation:'พักร้อน', maternity:'คลอด', ordain:'บวช', military:'ทหาร' };
                                status = 'ลา' + (lname[lt] || ''); statusCls = 'bg-blue-100 text-blue-700';
                            } else if (isPubHol) { status = 'หยุดนักขัตฤกษ์'; statusCls = 'bg-red-100 text-red-700'; }
                            else if (!isWorkDay) { status = 'วันหยุด'; statusCls = 'bg-purple-100 text-purple-700'; }
                            else { status = 'ขาดงาน'; statusCls = 'bg-red-200 text-red-800'; }
                        } else if (!inFirst || !outLast) {
                            status = 'ไม่ครบ'; statusCls = 'bg-orange-100 text-orange-700';
                        } else if (!isWorkDay) {
                            status = 'วันโอที'; statusCls = 'bg-amber-100 text-amber-700';
                        } else if (isLate && isEarlyOut) {
                            status = 'สาย+ออกก่อน'; statusCls = 'bg-red-100 text-red-700';
                        } else if (isLate) {
                            status = 'สาย'; statusCls = 'bg-orange-100 text-orange-700';
                        } else if (isEarlyOut) {
                            status = 'ออกก่อน'; statusCls = 'bg-pink-100 text-pink-700';
                        } else {
                            status = 'ปกติ'; statusCls = 'bg-green-100 text-green-700';
                        }

                        // ข้ามวันหยุด/หยุดนักขัตฤกษ์ที่ไม่มีบันทึก (ลดความรก)
                        if (!hasLog && !leave && !isWorkDay) continue;

                        rows.push({
                            date: ds, dow: DOW_TH[dow], shift: eff.shiftName,
                            inTime: inFirst ? new Date(inFirst.timestamp).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bangkok'}) : '',
                            outTime: outLast ? new Date(outLast.timestamp).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bangkok'}) : '',
                            inLat: inFirst?.lat, inLng: inFirst?.lng,
                            outLat: outLast?.lat, outLng: outLast?.lng,
                            hours, lateMinutes, earlyOutMinutes, status, statusCls,
                            isAbsent: !hasLog && !leave && isWorkDay,
                            isOT: hasLog && !isWorkDay,
                            isLeave: !hasLog && !!leave,
                        });
                    }
                    return rows;
                }

                function renderMyAttn() {
                    const tbody = document.getElementById('my-attn-tbody');
                    const cnt = document.getElementById('my-attn-count');
                    if (!tbody) return;
                    const rows = buildMyAttnRows();
                    if (cnt) cnt.textContent = rows.length + ' รายการ';
                    if (!rows.length) {
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-12 text-zinc-300 font-bold text-sm">ไม่มีประวัติในเดือนนี้</td></tr>';
                        return;
                    }
                    const timeBlock = (time, lat, lng, deltaMin, kind, colorCls) => {
                        if (!time) return '<span class="font-mono font-black text-zinc-300">—</span>';
                        let badge = '';
                        if (deltaMin > 0) {
                            if (kind === 'late') {
                                const hard = deltaMin > 15;
                                badge = `<span class="text-[10px] font-black mt-0.5 px-1.5 py-0.5 rounded ${hard?'bg-orange-100 text-orange-700':'bg-zinc-100 text-zinc-500'}">+${deltaMin} น.${hard?'':' (ผ่อนผัน)'}</span>`;
                            } else {
                                badge = `<span class="text-[10px] font-black mt-0.5 px-1.5 py-0.5 rounded bg-pink-100 text-pink-700">ออกก่อน ${deltaMin} น.</span>`;
                            }
                        }
                        const map = (lat != null && lng != null)
                            ? `<a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank" class="text-[10px] font-bold text-yellow-600 hover:text-yellow-700 mt-0.5"><i class="fa-solid fa-map-location-dot mr-1"></i>แผนที่</a>`
                            : '';
                        return `<div class="flex flex-col items-center gap-0.5">
                            <span class="font-mono font-black ${colorCls}">${time}</span>
                            ${badge}${map}
                        </div>`;
                    };
                    tbody.innerHTML = rows.map(r => {
                        const dateLabel = new Date(r.date+'T12:00:00+07:00').toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'numeric',timeZone:'Asia/Bangkok'});
                        const rowBg = r.isAbsent ? 'bg-red-50/60' : r.isOT ? 'bg-amber-50/60' : r.isLeave ? 'bg-blue-50/40' : '';
                        return `<tr class="border-b border-zinc-100 ${rowBg}">
                            <td class="px-4 py-3 whitespace-nowrap">
                                <div class="font-bold text-zinc-700 text-xs">${dateLabel}</div>
                                <div class="text-[10px] font-black text-zinc-400 uppercase">${r.dow}${r.shift?` · <span class="text-indigo-500">${r.shift}</span>`:''}</div>
                            </td>
                            <td class="px-4 py-3 text-center whitespace-nowrap">${timeBlock(r.inTime, r.inLat, r.inLng, r.lateMinutes, 'late', 'text-green-700')}</td>
                            <td class="px-4 py-3 text-center whitespace-nowrap">${timeBlock(r.outTime, r.outLat, r.outLng, r.earlyOutMinutes, 'early', 'text-red-600')}</td>
                            <td class="px-4 py-3 text-right font-bold text-zinc-700">${r.hours?r.hours.toFixed(2):'-'}</td>
                            <td class="px-4 py-3 text-center"><span class="text-[10px] font-bold px-2 py-0.5 rounded-full ${r.statusCls}">${r.status}</span></td>
                        </tr>`;
                    }).join('');
                }

                // ต้อง query แคบที่ uid ตัวเอง ไม่ใช่ดึงทั้ง collection แล้วกรองใน JS
                // เพราะ security rules ไม่ใช่ตัวกรอง — ถ้าอ่านทั้ง collection แล้วมีสักแถวที่ไม่มีสิทธิ์
                // Firestore จะปฏิเสธทั้งคำขอ ไม่ใช่คืนเฉพาะแถวที่อ่านได้
                const unsubscribe = onSnapshot(
                    query(collection(db, 'artifacts', appId, 'public', 'data', 'time_logs'),
                          where('uid', '==', user.uid)), snap => {
                    myLogs = [];
                    snap.forEach(d => {
                        const data = d.data();
                        data.localDate = getLocalISO(new Date(data.timestamp));
                        myLogs.push(data);
                    });
                    myLogs.sort((a,b) => new Date(b.timestamp)-new Date(a.timestamp));
                    renderCalendar();
                    renderLogs();
                    renderMyAttn();
                });

                async function doClock(type) {
                    const btnId = type === 'clock_in' ? 'btn-clock-in' : 'btn-clock-out';
                    const btn = document.getElementById(btnId);
                    if (btn) btn.disabled = true;
                    const origHtml = btn ? btn.innerHTML : '';
                    if (btn) btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-3"></i> กำลังระบุตำแหน่ง...';
                    try {
                        const pos = await getFreshLocation(8000);
                        const payload = {
                            uid: user.uid, name: profile.name, type,
                            timestamp: new Date().toISOString(),
                            localDate: todayTH(),
                            branch: profile.branch || 'Lamsang Group',
                        };
                        let outsideOffice = false, distM = null;
                        if (pos) {
                            distM = distanceMeters(pos.lat, pos.lng, myOffice.lat, myOffice.lng);
                            outsideOffice = distM > myOffice.radius;
                            payload.lat = pos.lat;
                            payload.lng = pos.lng;
                            payload.accuracy = pos.accuracy;
                            payload.distanceM = Math.round(distM);
                            payload.outsideOffice = outsideOffice;
                        } else {
                            payload.locationDenied = true;
                        }

                        // ถ้าอยู่นอกรัศมี ต้อง confirm ก่อนบันทึก
                        if (outsideOffice) {
                            const distTxt = distM < 1000 ? `${Math.round(distM)} ม.` : `${(distM/1000).toFixed(2)} กม.`;
                            const actionTxt = type === 'clock_in' ? 'เข้างาน' : 'ออกงาน';
                            const ok = confirm(
                                `⚠ คุณอยู่นอกพื้นที่ ${myOffice.name} (ห่าง ${distTxt})\n` +
                                `รัศมีที่อนุญาต: ${myOffice.radius} เมตร\n\n` +
                                `ต้องการลงเวลา${actionTxt}ต่อหรือไม่?\n` +
                                `(ระบบจะแจ้งหัวหน้าและบันทึกตำแหน่งของคุณ)`
                            );
                            if (!ok) {
                                if (btn) { btn.disabled = false; btn.innerHTML = origHtml; }
                                return;
                            }
                        }

                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'time_logs'), payload);

                        // แจ้งหัวหน้าผ่าน LINE ถ้าลงเวลานอกพื้นที่
                        if (outsideOffice) {
                            notifyManagersOutsideClock(profile, type, pos, Math.round(distM), myOffice).catch(()=>{});
                        }
                        const okMsg = type === 'clock_in' ? '✅ บันทึกเวลาเข้างานแล้ว' : '✅ บันทึกเวลาออกงานแล้ว';
                        let noteMsg = '';
                        let toastType = 'success';

                    <div id="tab-list" class="tab-content">

                                        title="สร้าง/อัปเดตข้อมูลสาธารณะ (ชื่อ/LINE ID) ที่ใช้ส่งแจ้งเตือน"
                                        class="shrink-0 px-4 py-2.5 bg-zinc-100 hover:bg-zinc-200 text-zinc-700 font-bold rounded-xl transition-all text-xs whitespace-nowrap">
                                        <i class="fa-solid fa-address-book mr-2 text-zinc-500"></i> ซิงค์ไดเรกทอรี
                                    </button>
                                    <div class="relative w-full sm:w-64">
                                        <i class="fa-solid fa-search absolute left-3 top-3 text-zinc-400"></i>
                                        <input id="search-emp" oninput="filterEmployees()" type="text" placeholder="ค้นหาพนักงาน..." class="w-full border border-zinc-200 rounded-xl pl-9 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-yellow-500 focus:outline-none">
                                    </div>
                                </div>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-sm">
                                    <thead><tr class="bg-zinc-50 text-zinc-500 text-[11px] uppercase tracking-widest font-bold">
                                        <th class="px-6 py-4 text-left">พนักงาน</th>
                                        <th class="px-4 py-4 text-left">รหัส / ตำแหน่ง</th>
                                        <th class="px-4 py-4 text-left">สาขา</th>
                                        <th class="px-4 py-4 text-left">สถานะ</th>
                                        <th class="px-6 py-4 text-center">จัดการ</th>
                                    </tr></thead>
                                    <tbody id="employee-list"><tr><td colspan="5" class="text-center py-10 text-zinc-400">กำลังโหลดข้อมูล...</td></tr></tbody>

                </div>
            </div>`,
            init: async (user, profile, db, appId) => {
                if (profile.role !== 'admin') { navigateTo('home'); return; }
                const { collection, doc, getDoc, setDoc, updateDoc, onSnapshot } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

                let isEditing = false;
                let allEmployees = [];

                window.empSwitchTab = (tab) => {
                    const btnAdd = document.getElementById('btn-tab-add');
                    const btnManage = document.getElementById('btn-tab-manage');
                    if (tab === 'add') {
                        btnAdd.className = 'flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm font-bold transition-all bg-white text-zinc-800 shadow-sm';
                        btnManage.className = 'flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm font-bold transition-all text-zinc-500 hover:text-zinc-800';
                        document.getElementById('tab-form').classList.add('active');
                        document.getElementById('tab-list').classList.remove('active');
                    } else {
                        btnManage.className = 'flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm font-bold transition-all bg-white text-zinc-800 shadow-sm';
                        btnAdd.className = 'flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm font-bold transition-all text-zinc-500 hover:text-zinc-800';
                        document.getElementById('tab-list').classList.add('active');
                        document.getElementById('tab-form').classList.remove('active');
                        if (allEmployees.length === 0) loadList();
                    }
                };

                const v = (id) => document.getElementById(id)?.value.trim() || '';

                // directory = สำเนาข้อมูลที่ "ไม่อ่อนไหว" ของพนักงาน ให้เพื่อนร่วมงานอ่านได้
                // มีไว้เพื่อให้เบราว์เซอร์พนักงานหา LINE ID ของหัวหน้าได้ตอนส่งแจ้งเตือน
                // โดยไม่ต้องเปิด users (ที่มีเงินเดือน/เลขบัตร ปชช.) ให้อ่าน
                // ห้ามใส่ salary/idCard/bankAccount/dob/address ลงไปเด็ดขาด
                const directoryDocFrom = (p, uid) => ({
                    uid,
                    name: p.name || '',
                    nickname: p.nickname || '',
                    role: p.role || 'employee',
                    branch: p.branch || '',
                    position: p.position || '',
                    photoURL: p.photoURL || '',
                    lineId: p.lineId || '',
                    status: p.status || 'active',
                    managerUid: p.managerUid || '',
                    // ทำเป็น field ไว้เลย จะได้ query ตรงๆ ได้ — rules บล็อกการอ่านทั้ง collection
                    notifyTarget: (p.role === 'manager' || p.role === 'admin') && p.status !== 'resigned',
                    updatedAt: new Date().toISOString(),
                });

                const syncDirectory = async (p, uid) =>
                    setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'directory', uid),
                           directoryDocFrom(p, uid));

                const unsubscribe = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), snap => {
                    allEmployees = [];
                    let html = '';
                    snap.forEach(d => {
                        const emp = d.data();
                        allEmployees.push(emp);
                    });
                    // populate manager dropdown (managers/admins only, not resigned)
                    const mSel = document.getElementById('f-manager-uid');
                    if (mSel) {
                        const cur = mSel.value;
                        const mgrs = allEmployees
                            .filter(e => (e.role === 'manager' || e.role === 'admin') && e.status !== 'resigned' && e.uid)
                            .sort((a,b) => (a.name||'').localeCompare(b.name||'','th'));
                        mSel.innerHTML = '<option value="">— ไม่ระบุ / ขึ้นตรงกับผู้บริหาร —</option>'
                            + mgrs.map(m => `<option value="${m.uid}">${m.name||''}${m.position?` (${m.position})`:''}</option>`).join('');
                        if (cur) mSel.value = cur;
                    }
                    snap.forEach(d => {
                        const emp = d.data();
                        const avatar = emp.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(emp.name)}&background=f4f4f5&color=27272a&bold=true`;
                        let badge = '<span class="px-2 py-1 bg-green-100 text-green-700 rounded text-[10px] font-bold">Active</span>';
                        if (emp.status === 'resigned') badge = '<span class="px-2 py-1 bg-red-100 text-red-700 rounded text-[10px] font-bold">Resigned</span>';
                        else if (emp.status === 'probation') badge = '<span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-[10px] font-bold">Probation</span>';
                        html += `<tr class="hover:bg-zinc-50 transition-all border-b border-zinc-100">
                            <td class="px-6 py-4"><div class="flex items-center"><img src="${avatar}" onerror="handleImgError(this)" data-name="${emp.name}" class="w-10 h-10 rounded-full border border-zinc-200 mr-3 object-cover"><div><p class="font-bold text-zinc-800 text-sm">${emp.name}</p><p class="text-[10px] text-zinc-400 font-bold">${emp.email}</p></div></div></td>
                            <td class="px-4 py-4"><p class="text-xs font-black text-zinc-600">${emp.employeeCode||'-'}</p><p class="text-[10px] text-zinc-400">${emp.position||emp.role}</p></td>
                            <td class="px-4 py-4 text-xs font-medium text-zinc-600">${emp.branch||'-'}</td>
                            <td class="px-4 py-4">${badge}</td>
                            <td class="px-6 py-4 text-center"><button onclick="empPrepareEdit('${emp.uid}')" class="text-zinc-500 bg-zinc-100 hover:bg-yellow-500 hover:text-zinc-900 px-3 py-1.5 rounded-lg transition-all text-xs font-bold shadow-sm"><i class="fa-solid fa-pen mr-1"></i> แก้ไข</button></td>
                        </tr>`;
                    });
                    const el = document.getElementById('employee-list');
                    if (el) el.innerHTML = html || '<tr><td colspan="5" class="text-center py-10 text-zinc-400">ยังไม่มีข้อมูลพนักงาน</td></tr>';
                });

                window.filterEmployees = () => {

          <select id="req-start-time" onchange="recalcHours()" class="w-full border-2 border-zinc-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:border-yellow-500 focus:outline-none bg-white cursor-pointer"></select>
        </div>
        <div>
          <label class="block text-sm font-bold text-zinc-700 mb-1">เวลาสิ้นสุด</label>
          <select id="req-end-time" onchange="recalcHours()" class="w-full border-2 border-zinc-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:border-yellow-500 focus:outline-none bg-white cursor-pointer"></select>
        </div>
      </div>
      <div id="leave-date-warn" class="hidden p-3 bg-amber-50 border border-amber-300 rounded-xl space-y-1"></div>
      <!-- Preview ชั่วโมง -->
      <div id="hours-preview" class="hidden items-center gap-3 p-4 bg-yellow-50 border border-yellow-200 rounded-xl">
        <i class="fa-solid fa-calculator text-yellow-600 text-lg"></i>
        <div>
          <p class="text-xs text-yellow-700 font-bold uppercase tracking-widest">ชั่วโมงลาที่คำนวณได้</p>
          <p class="text-2xl font-black text-yellow-900" id="hours-preview-val">-</p>
        </div>
      </div>
      <!-- เหตุผล -->
      <div>
        <label class="block text-sm font-bold text-zinc-700 mb-1">เหตุผล / รายละเอียด *</label>
        <textarea id="req-reason" rows="3" placeholder="ระบุเหตุผลการลา..." class="w-full border-2 border-zinc-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:border-yellow-500 focus:outline-none resize-none"></textarea>
      </div>
      <!-- เอกสารแนบ -->
      <div>
        <label class="block text-sm font-bold text-zinc-700 mb-1">ลิงก์เอกสารแนบ (ใบรับรองแพทย์ ฯลฯ)</label>
        <input type="url" id="req-attachment" placeholder="https://drive.google.com/..." class="w-full border-2 border-zinc-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:border-yellow-500 focus:outline-none">
      </div>
      <!-- Submit -->
      <button onclick="submitLeaveRequest()" id="submit-leave-btn"
        class="w-full bg-yellow-500 hover:bg-yellow-400 text-zinc-900 font-black py-4 rounded-xl transition-all shadow-md uppercase tracking-widest text-sm flex items-center justify-center gap-2">
        <i class="fa-solid fa-paper-plane"></i> ส่งคำขอลา
      </button>
    </div>
  </div>
</div>`,

    init: async (user, profile, db, APP_ID) => {
        const { collection, doc, getDoc, getDocs, addDoc, onSnapshot, query, where, orderBy, updateDoc }
            = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

        let mySchedule = { workDays: [1,2,3,4,5], workStart: '08:00', workEnd: '17:00', breakMinutes: 60 };
        let myBalance  = {};
        let myRequests = [];
        let selectedLeaveType = null;
        let isHourly = false;
        let editingId = null;   // id ของคำขอ pending ที่กำลังแก้ไข (null = สร้างใหม่)
        let calYear  = newDateTH().getFullYear();
        let calMonth = newDateTH().getMonth();

        // โหลดตารางงานส่วนตัว
        const schedSnap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'work_schedules', user.uid));
        if (schedSnap.exists()) mySchedule = { ...mySchedule, ...schedSnap.data() };

        // โหลดโควต้าวันลา (one-shot ก่อน เพื่อ render เร็ว)
        const balSnap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_balances', user.uid));
        if (balSnap.exists()) myBalance = balSnap.data();

        renderQuota();
        buildLeaveTypeGrid();
        setDefaultDates();

        // Real-time balance — อัปเดตโควต้าทันทีที่ admin approve/reject
        let unsubBal = null;
        unsubBal = onSnapshot(
            doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_balances', user.uid),
            snap => {
                myBalance = snap.exists() ? snap.data() : {};
                renderQuota();
            },
            err => console.warn('leave_balances listener err:', err.message)
        );

        // Real-time คำขอของฉัน — มี error handler ป้องกัน index missing
        let unsubReq = null;
        async function loadMyRequests() {
            try {
                // ลอง realtime ก่อน (ต้องมี composite index uid+createdAt)
                unsubReq = onSnapshot(
                    query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'leave_requests'),
                          where('uid', '==', user.uid), orderBy('createdAt', 'desc')),
                    snap => {
                        myRequests = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        renderMyRequests();
                        renderCalendar();
                        renderQuota();
                    },
                    async err => {
                        // index ยังไม่มี → fallback getDocs + sort ฝั่ง client
                        console.warn('leave_requests onSnapshot err (fallback to getDocs):', err.message);
                        try {
                            const snap2 = await getDocs(
                                query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'leave_requests'),
                                      where('uid', '==', user.uid))
                            );
                            myRequests = snap2.docs
                                .map(d => ({ id: d.id, ...d.data() }))
                                .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
                            renderMyRequests();
                            renderCalendar();
                            renderQuota();
                        } catch(e2) {
                            console.error('leave_requests getDocs fallback failed:', e2);
                        }
                    }
                );
            } catch(e) {
                console.error('loadMyRequests outer error:', e);
            }
        }
        await loadMyRequests();

        // รวมชั่วโมงที่ใช้ไปจากใบลาที่อนุมัติแล้ว
        // ใช้เป็น source of truth คู่กับ Firestore balance เผื่อ balance ยังอัปเดตไม่ทัน
        function usedHoursFromRequests() {
            const out = {};
            (myRequests || []).forEach(r => {
                if (r.status === 'approved' && r.type && r.totalHours > 0) {
                    out[r.type] = Math.round(((out[r.type] || 0) + r.totalHours) * 100) / 100;
                }
            });
            return out;
        }

        // โควตาของฉันสำหรับการลาประเภทหนึ่ง — ทุกที่ที่แสดงโควตาต้องเรียกตัวนี้
        //
        // เคยพัง: การ์ดโควตาอ่านจาก myBalance (ค่าจริงของพนักงานคนนี้) แต่ปุ่มเลือก
        // ประเภทลาใน modal อ่าน LEAVE_TYPES.maxDays (ค่า default ในโค้ด) พอ admin
        // แก้สิทธิ์ให้ใครเป็นพิเศษ สองที่เลยขึ้นไม่ตรงกัน (การ์ดบอก 15 วัน modal บอก 10)
        // balOverride: ใส่ balance ที่เพิ่งอ่านสดจาก Firestore ได้ (ใช้ตอนเช็คก่อน submit)
        function myQuotaFor(tid, usedFromReqs, balOverride) {
            const t   = getLeaveTypeInfo(tid);
            const bal = (balOverride || myBalance)[tid] || {};
            const hpd = getDayWorkHours(mySchedule);           // ชม./วัน ของพนักงานคนนี้
            const max = bal.totalHours ?? (t.maxDays * hpd);   // admin ยังไม่ตั้ง → ใช้ default × hpd
            const used = Math.max(bal.usedHours || 0, (usedFromReqs || {})[tid] || 0);
            return { max, used, rem: Math.max(0, max - used) };
        }

        function renderQuota() {
            const types = ['sick','personal','vacation'];
            const usedFromReqs = usedHoursFromRequests();
            let html = '';
            types.forEach(tid => {
                const t = getLeaveTypeInfo(tid);
                const { max, used, rem } = myQuotaFor(tid, usedFromReqs);
                const pct = max > 0 ? Math.min(100, Math.round(used / max * 100)) : 0;
                const cv  = colorVariants(t.color);
                html += `
                <div class="leave-card bg-white rounded-2xl border border-zinc-200 p-5">
                  <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 rounded-xl ${cv.bg} flex items-center justify-center">
                      <i class="fa-solid ${t.icon} ${cv.text}"></i>
                    </div>
                    <div>
                      <p class="font-black text-zinc-800 text-sm">${t.label}</p>
                      <p class="text-[10px] font-bold ${rem <= 0 ? 'text-red-500' : 'text-zinc-400'}">
                        คงเหลือ ${balanceToDisplay(rem, mySchedule)}
                      </p>
                    </div>
                  </div>
                  <div class="w-full bg-zinc-100 rounded-full h-1.5 mb-2">
                    <div class="h-1.5 rounded-full ${cv.bg.replace('100', pct>=100?'500':'400')} transition-all" style="width:${pct}%"></div>
                  </div>
                  <div class="flex justify-between text-[10px] text-zinc-400 font-bold">
                    <span class="${used > 0 ? 'text-zinc-600' : ''}">ใช้ ${balanceToDisplay(used, mySchedule)}</span>
                    <span>สิทธิ์ ${balanceToDisplay(max, mySchedule)}</span>
                  </div>
                </div>`;
            });
            // card วันทำงาน
            const hpd = getDayWorkHours(mySchedule);
            html += `
            <div class="leave-card bg-zinc-900 rounded-2xl p-5 text-white">
              <div class="flex items-center gap-3 mb-3">
                <div class="w-10 h-10 rounded-xl bg-yellow-500 flex items-center justify-center">
                  <i class="fa-solid fa-star text-zinc-900"></i>
                </div>
                <div>
                  <p class="font-black text-sm">วันทำงานของฉัน</p>
                  <p class="text-[10px] text-zinc-400 font-bold">ตารางประจำสัปดาห์</p>
                </div>
              </div>
              <p class="text-yellow-400 font-black text-sm">${formatWorkDays(mySchedule.workDays)}</p>
              <p class="text-zinc-400 text-xs mt-1">
                ${mySchedule.workStart} – ${mySchedule.workEnd}
                (พัก ${mySchedule.breakStart || '12:00'} ${mySchedule.breakMinutes ?? 60} นาที · ${hpd.toFixed(1)} ชม./วัน)
              </p>
            </div>`;
            const el = document.getElementById('quota-row');
            if (el) el.innerHTML = html;
        }

        function formatWorkDays(days) {
            const names = ['อา','จ','อ','พ','พฤ','ศ','ส'];
            return (days || []).map(d => names[d]).join(', ');
        }

        // ── Build leave type selector ──
        function buildLeaveTypeGrid() {
            const el = document.getElementById('leave-type-grid');
            if (!el) return;
            const usedFromReqs = usedHoursFromRequests();
            el.innerHTML = LEAVE_TYPES.map(t => {
                const cv = colorVariants(t.color);
                // โชว์ "คงเหลือ" ไม่ใช่สิทธิ์ทั้งปี — คนกำลังจะกดลาอยากรู้ว่าเหลือเท่าไหร่
                // และต้องดึงจาก myQuotaFor เท่านั้น ห้ามใช้ t.maxDays ตรงๆ
                // (ค่านั้นเป็น default ของบริษัท ไม่ใช่สิทธิ์จริงของคนนี้)
                const sub = t.maxDays
                    ? (() => {
                        const { rem } = myQuotaFor(t.id, usedFromReqs);
                        const cls = rem <= 0 ? 'text-red-500' : 'text-zinc-400';
                        return `<p class="text-[10px] ${cls} font-medium">เหลือ ${balanceToDisplay(rem, mySchedule)}</p>`;
                      })()
                    : '';
                return `
                <button onclick="selectLeaveType('${t.id}')" id="lt-${t.id}"
                  class="p-3 rounded-xl border-2 border-zinc-200 hover:border-yellow-400 text-left transition-all group">
                  <i class="fa-solid ${t.icon} text-zinc-400 group-hover:text-yellow-500 mb-1 block transition-colors"></i>
                  <p class="text-xs font-black text-zinc-700 leading-tight">${t.label}</p>
                  ${sub}
                </button>`;
            }).join('');
        }

        window.selectLeaveType = (tid) => {
            selectedLeaveType = tid;
            document.querySelectorAll('[id^="lt-"]').forEach(el => {
                el.classList.remove('border-yellow-500', 'bg-yellow-50');
                el.classList.add('border-zinc-200');
            });
            const el = document.getElementById(`lt-${tid}`);
            if (el) { el.classList.add('border-yellow-500', 'bg-yellow-50'); el.classList.remove('border-zinc-200'); }
            recalcHours();
        };

        function buildHourSelect(sel, defaultHour) {
            if (!sel) return;
            const dh = (defaultHour || '08:00').substring(0, 2) + ':00';
            sel.innerHTML = '';
            for (let h = 0; h <= 23; h++) {
                const v = String(h).padStart(2,'0') + ':00';
                const o = document.createElement('option');
                o.value = v; o.textContent = v;
                if (v === dh) o.selected = true;
                sel.appendChild(o);
            }
        }
        function setDefaultDates() {
            const today = todayTH();
            const sd = document.getElementById('req-start-date');
            const ed = document.getElementById('req-end-date');
            if (sd) sd.value = today;
            if (ed) ed.value = today;
            const ws = (mySchedule.workStart || '08:00').substring(0,2) + ':00';
            const we = (mySchedule.workEnd   || '17:00').substring(0,2) + ':00';
            buildHourSelect(document.getElementById('req-start-time'), ws);
            buildHourSelect(document.getElementById('req-end-time'),   we);
        }

        window.toggleHourly = () => {
            isHourly = !isHourly;
            const btn = document.getElementById('hourly-toggle');
            const fields = document.getElementById('hourly-fields');
            if (isHourly) {
                btn?.classList.replace('bg-zinc-300', 'bg-yellow-400');
                btn?.querySelector('span')?.classList.add('translate-x-5');
                fields?.classList.remove('hidden');
                fields?.classList.add('grid');
            } else {
                btn?.classList.replace('bg-yellow-400', 'bg-zinc-300');
                btn?.querySelector('span')?.classList.remove('translate-x-5');
                fields?.classList.add('hidden');
                fields?.classList.remove('grid');
            }
            recalcHours();
        };

        function checkLeaveDates(sd, ed) {
            const warn = document.getElementById('leave-date-warn');
            if (!warn) return;
            const msgs = [];
            let d = new Date(sd + 'T12:00:00+07:00');
            const eDay = new Date(ed + 'T12:00:00+07:00');
            while (d <= eDay) {
                // ใช้ local date แทน toISOString() เพื่อป้องกัน timezone shift (UTC+7 → วันหดไป 1)
                const yr  = d.getFullYear();
                const mo  = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                const ds  = yr + '-' + mo + '-' + day;
                const hn = getHolidayName(ds);
                if (hn) msgs.push(ds + ' เป็นวันหยุดนักขัตฤกษ์ (' + hn + ')');
                d.setDate(d.getDate() + 1);
            }
            myRequests.filter(r => r.status !== 'cancelled' && r.status !== 'rejected').forEach(r => {
                if (r.startDate <= ed && r.endDate >= sd)
                    msgs.push('มีคำขอลา ' + r.typeName + ' ซ้อนในช่วงนี้แล้ว (' + r.startDate + ')');
            });
            if (msgs.length) {
                warn.innerHTML = msgs.map(m => '<p class="text-xs text-amber-800 font-bold">⚠️ ' + m + '</p>').join('');
                warn.classList.remove('hidden');
            } else {
                warn.classList.add('hidden');
                warn.innerHTML = '';
            }
        }
        function recalcHours() {
            const sd = document.getElementById('req-start-date')?.value;
            const ed = document.getElementById('req-end-date')?.value;
            if (!sd || !ed) return;
            checkLeaveDates(sd, ed);
            const ws = (mySchedule.workStart || '08:00').substring(0,2) + ':00';
            const we = (mySchedule.workEnd   || '17:00').substring(0,2) + ':00';
            const st = isHourly ? (document.getElementById('req-start-time')?.value || ws) : ws;
            const et = isHourly ? (document.getElementById('req-end-time')?.value   || we) : we;
            const hrs = calcLeaveHours(sd, st, ed, et, mySchedule);
            const prev = document.getElementById('hours-preview');
            const val  = document.getElementById('hours-preview-val');
            if (hrs > 0) {
                prev?.classList.remove('hidden');
                prev?.classList.add('flex');
                if (val) val.textContent = hoursToDisplay(hrs, mySchedule);
            } else {
                prev?.classList.add('hidden');
                prev?.classList.remove('flex');
            }
        }
        document.getElementById('req-start-date')?.addEventListener('change', e => {
            const ed = document.getElementById('req-end-date');
            if (ed && (!ed.value || ed.value < e.target.value)) {
                ed.value = e.target.value;
            }
            recalcHours();
        });
        document.getElementById('req-end-date')?.addEventListener('change', recalcHours);

        window.openLeaveModal  = () => {
            editingId = null;
            setModalMode(false);
            // สร้างใหม่ทุกครั้งที่เปิด — ยอดคงเหลืออาจเปลี่ยนไปแล้วตั้งแต่โหลดหน้า
            // (เช่น หัวหน้าเพิ่งอนุมัติใบลาอีกใบระหว่างที่หน้านี้เปิดค้างอยู่)
            buildLeaveTypeGrid();
            document.getElementById('leave-modal')?.classList.remove('hidden');
        };
        window.closeLeaveModal = () => {
            editingId = null;
            document.getElementById('leave-modal')?.classList.add('hidden');
        };

        function setModalMode(isEdit) {
            const titleEl = document.querySelector('#leave-modal h3');
            const btn = document.getElementById('submit-leave-btn');
            if (titleEl) titleEl.textContent = isEdit ? 'แก้ไขคำขอลา' : 'ยื่นคำขอลา';
            if (btn) btn.innerHTML = isEdit
                ? '<i class="fa-solid fa-floppy-disk"></i> บันทึกการแก้ไข'
                : '<i class="fa-solid fa-paper-plane"></i> ส่งคำขอลา';
        }

        // แก้ไขคำขอที่ยัง pending — เปิด modal พร้อมข้อมูลเดิม
        window.editLeaveRequest = (id) => {
            const r = myRequests.find(x => x.id === id);
            if (!r || r.status !== 'pending') { showToast('แก้ไขได้เฉพาะคำขอที่รอการอนุมัติ', 'error'); return; }
            editingId = id;
            selectLeaveType(r.type);
            const sd = document.getElementById('req-start-date');
            const ed = document.getElementById('req-end-date');
            if (sd) sd.value = r.startDate;
            if (ed) ed.value = r.endDate;
            // ตั้ง hourly toggle ให้ตรงกับคำขอเดิม
            if (!!r.isHourly !== isHourly) toggleHourly();
            if (r.isHourly) {
                const st = document.getElementById('req-start-time');
                const et = document.getElementById('req-end-time');
                if (st && r.startTime) st.value = r.startTime;
                if (et && r.endTime) et.value = r.endTime;
            }
            const reason = document.getElementById('req-reason');
            if (reason) reason.value = r.reason || '';
            const att = document.getElementById('req-attachment');
            if (att) att.value = r.attachment || '';
            recalcHours();
            setModalMode(true);
            document.getElementById('leave-modal')?.classList.remove('hidden');
        };

        window.submitLeaveRequest = async () => {
            if (!selectedLeaveType) { showToast('กรุณาเลือกประเภทการลา', 'error'); return; }
            const sd = document.getElementById('req-start-date')?.value;
            const ed = document.getElementById('req-end-date')?.value;
            const reason = document.getElementById('req-reason')?.value.trim();
            if (!sd || !ed || !reason) { showToast('กรุณากรอกข้อมูลให้ครบ', 'error'); return; }
            if (sd > ed) { showToast('วันสิ้นสุดต้องไม่ก่อนวันเริ่มต้น', 'error'); return; }
            const ws0 = (mySchedule.workStart || '08:00').substring(0,2) + ':00';
            const we0 = (mySchedule.workEnd   || '17:00').substring(0,2) + ':00';
            const st = isHourly ? (document.getElementById('req-start-time')?.value || ws0) : ws0;
            const et = isHourly ? (document.getElementById('req-end-time')?.value   || we0) : we0;
            const hrs = calcLeaveHours(sd, st, ed, et, mySchedule);
            if (hrs <= 0) {
                showToast('วันที่เลือกไม่มีชั่วโมงทำงาน (เป็นวันหยุดหรือนอกตารางงาน)', 'error'); return;
            }
            const hasOverlap = myRequests.some(r =>
                r.id !== editingId &&
                r.status !== 'cancelled' && r.status !== 'rejected' &&
                r.startDate <= ed && r.endDate >= sd
            );
            if (hasOverlap) {
                showToast('มีคำขอลาซ้อนในช่วงวันที่นี้แล้ว กรุณาตรวจสอบ', 'error'); return;
            }

            // ตรวจโควต้าก่อน submit
            if (['sick','personal','vacation'].includes(selectedLeaveType)) {
                // อ่าน balance สดอีกรอบ เผื่อมีใบลาใบอื่นถูกอนุมัติระหว่างที่กรอกฟอร์มอยู่
                // แต่คิดยอดด้วย myQuotaFor ตัวเดียวกับที่หน้าจอใช้ — ไม่งั้นตัวเลขที่เตือน
                // จะไม่ตรงกับที่ผู้ใช้เห็นบนการ์ด
                const balSnap2 = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_balances', user.uid));
                const bal2 = balSnap2.exists() ? balSnap2.data() : {};
                const { rem: remH2 } = myQuotaFor(selectedLeaveType, usedHoursFromRequests(), bal2);
                if (hrs > remH2 + 0.01) {
                    showToast(`❌ โควต้าไม่พอ — คงเหลือ ${balanceToDisplay(remH2, mySchedule)} แต่ขอลา ${hoursToDisplay(hrs, mySchedule)}`, 'error');
                    return;
                }
            }

            const btn = document.getElementById('submit-leave-btn');
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังส่ง...';
            try {
                if (editingId) {

                        branch: profile.branch || '', position: profile.position || '',
                        photoURL: profile.photoURL || '',
                        type: selectedLeaveType, typeName: getLeaveTypeInfo(selectedLeaveType).label,

                    });

                    // แจ้ง manager/admin ผ่าน LINE
                    notifyManagersNewLeave({

        // ── Render my requests ──
        function renderMyRequests() {

            if (!el) return;
            if (!myRequests.length) {
                el.innerHTML = `<div class="text-center py-16 text-zinc-300">

            }
            el.innerHTML = myRequests.map(r => {
                const t  = getLeaveTypeInfo(r.type);

                const cv = colorVariants(t.color);

                    ? fmtDate(r.startDate)
                    : `${fmtDate(r.startDate)} – ${fmtDate(r.endDate)}`;
                const timeRange = r.isHourly ? ` (${r.startTime}–${r.endTime})` : '';
                const todayStr = todayTH();
                const canCancel = (r.status === 'pending' || r.status === 'approved') && r.startDate > todayStr;
                return `

                  </div>
                </div>`;
            }).join('');
        }

        window.cancelLeaveRequest = async (id) => {
            const req = myRequests.find(r => r.id === id);
            if (!req) return;
            const todayNow = todayTH();
            if (req.startDate <= todayNow) {
                showToast('วันลาถึงแล้ว ไม่สามารถยกเลิกเองได้ กรุณาติดต่อหัวหน้า', 'error');
                return;

            if (!confirm('ต้องการยกเลิกคำขอลานี้?')) return;

                await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_requests', id), {
                    status: 'cancelled', cancelledAt: new Date().toISOString()
                });
                // คืนชั่วโมงกลับถ้าสถานะ approved
                if (req.status === 'approved' && req.totalHours > 0) {
                    const leaveTypeKey = ['sick','personal','vacation'].includes(req.type) ? req.type : null;
                    if (leaveTypeKey) {
                        const balRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_balances', user.uid);
                        const bs = await getDoc(balRef);
                        if (bs.exists()) {
                            const bal = bs.data();
                            const newUsed = Math.max(0, (bal[leaveTypeKey]?.usedHours || 0) - req.totalHours);
                            await updateDoc(balRef, { [leaveTypeKey + '.usedHours']: newUsed });
                        }
                    }
                }
                showToast('ยกเลิกคำขอลาแล้ว', 'info');

        // ── Calendar ──
        function renderCalendar() {
            var el = document.getElementById('leave-cal-grid');
            var title = document.getElementById('cal-month-title');
            if (!el) return;
            var months = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
            if (title) title.textContent = months[calMonth] + ' ' + (calYear + 543);
            var firstDay = new Date(calYear, calMonth, 1).getDay();
            var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
            var today = todayTH();
            var personalHolSet = new Set((mySchedule && Array.isArray(mySchedule.holidays)) ? mySchedule.holidays : []);
            var workDaySet2 = new Set((mySchedule && mySchedule.workDays) ? mySchedule.workDays : [1,2,3,4,5]);
            var leaveMap = {};
            myRequests.filter(function(r){ return r.status !== 'cancelled' && r.status !== 'rejected'; }).forEach(function(r) {
                var d = parseDateTH(r.startDate);
                var end = parseDateTH(r.endDate);
                while (d <= end) {
                    var ds = dateToTHStr(d);
                    if (!leaveMap[ds]) leaveMap[ds] = [];
                    leaveMap[ds].push(r);
                    d.setDate(d.getDate() + 1);
                }
            });
            var leaveStyleMap = {
                sick:     { cell:'bg-red-50 text-red-700',     dot:'bg-red-400'    },
                personal: { cell:'bg-blue-50 text-blue-700',   dot:'bg-blue-400'   },
                vacation: { cell:'bg-green-50 text-green-700', dot:'bg-green-400'  },
                maternity:{ cell:'bg-pink-50 text-pink-700',   dot:'bg-pink-400'   },
                ordain:   { cell:'bg-orange-50 text-orange-700',dot:'bg-orange-400'},
                military: { cell:'bg-slate-100 text-slate-600',dot:'bg-slate-400'  },
                other:    { cell:'bg-zinc-100 text-zinc-600',  dot:'bg-zinc-400'   }
            };
            var html = '';
            for (var i = 0; i < firstDay; i++) html += '<div></div>';
            for (var d = 1; d <= daysInMonth; d++) {
                var ds = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
                var isToday2 = ds === today;
                var isHol2 = isPublicHoliday(ds);
                var dow2 = new Date(ds + 'T12:00:00+07:00').getDay();
                var isPerHol2 = !workDaySet2.has(dow2) || personalHolSet.has(ds);
                var leaves2 = leaveMap[ds] || [];
                var hasPending2 = leaves2.some(function(r){ return r.status === 'pending'; });
                var approved2 = leaves2.filter(function(r){ return r.status === 'approved'; });
                var cellCls = 'aspect-square flex flex-col items-center justify-center rounded-xl font-bold relative cursor-default transition-all ';
                var badge2 = '';
                if (isToday2) {
                    cellCls += 'bg-zinc-900 text-white';
                } else if (isHol2) {
                    var holName2 = getHolidayName(ds) || 'หยุดนักขัตฤกษ์';
                    cellCls += 'bg-red-100 text-red-700';
                    var holShort2 = holName2.length > 5 ? holName2.slice(0,5)+'…' : holName2;
                    badge2 = '<span style="font-size:0.38rem;font-weight:800;line-height:1;margin-top:1px;display:block;text-align:center;opacity:0.85">' + holShort2 + '</span>';
                } else if (isPerHol2) {
                    cellCls += 'bg-purple-100 text-purple-700';
                    badge2 = '<span style="font-size:0.4rem;font-weight:800;line-height:1;margin-top:1px;display:block;text-align:center;opacity:0.85">หยุด</span>';
                } else if (hasPending2) {
                    cellCls += 'bg-amber-100 text-amber-700';
                    badge2 = '<span style="font-size:0.4rem;font-weight:800;line-height:1;margin-top:1px;display:block;text-align:center;opacity:0.85">รอ?</span>';
                } else if (approved2.length) {
                    var s2 = leaveStyleMap[approved2[0].type] || leaveStyleMap.other;
                    cellCls += s2.cell;
                    var seen2 = {}, dots2 = [];
                    approved2.forEach(function(r){ var dot=(leaveStyleMap[r.type]||leaveStyleMap.other).dot; if(!seen2[dot]){seen2[dot]=1;dots2.push(dot);} });
                    dots2 = dots2.slice(0,3);
                    badge2 = '<div style="display:flex;gap:2px;margin-top:2px">' + dots2.map(function(c){ return '<div style="width:5px;height:5px;border-radius:50%" class="'+c+'"></div>'; }).join('') + '</div>';
                } else {
                    cellCls += 'text-zinc-600 hover:bg-zinc-50';
                }
                html += '<div class="' + cellCls + '" style="font-size:0.8rem"><span>' + d + '</span>' + badge2 + '</div>';
            }
            el.innerHTML = html;
            var legend = document.getElementById('leave-cal-legend');
            if (!legend) {
                legend = document.createElement('div');
                legend.id = 'leave-cal-legend';
                legend.className = 'mt-4 pt-4 border-t border-zinc-100 flex flex-wrap gap-x-3 gap-y-2 justify-center text-xs font-bold text-zinc-500';
                var items = [['bg-zinc-900','วันนี้'],['bg-red-200','หยุดนักขัตฤกษ์'],['bg-purple-300','หยุดส่วนตัว'],['bg-amber-300','รออนุมัติ'],['bg-red-400','ลาป่วย'],['bg-blue-400','ลากิจ'],['bg-green-400','ลาพักร้อน'],['bg-pink-400','ลาคลอด'],['bg-orange-400','ลาบวช']];
                legend.innerHTML = items.map(function(item){ return '<div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full '+item[0]+'"></div> '+item[1]+'</div>'; }).join('');
                if (el.parentElement) el.parentElement.appendChild(legend);
            }
        }

        window.leaveCalPrev = () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); };
        window.leaveCalNext = () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); };

        window.switchLeaveTab = (tab) => {
            document.getElementById('tab-mine')?.classList.toggle('hidden', tab !== 'mine');
            document.getElementById('tab-calendar')?.classList.toggle('hidden', tab !== 'calendar');
            document.querySelectorAll('.tab-btn').forEach((b, i) => {
                const isActive = (i === 0 && tab === 'mine') || (i === 1 && tab === 'calendar');
                b.classList.toggle('active', isActive);
                b.classList.toggle('text-zinc-500', !isActive);
            });
            if (tab === 'calendar') renderCalendar();
        };

        function fmtDate(ds) {
            if (!ds) return '-';
            // รองรับทั้ง 'YYYY-MM-DD' และ full ISO timestamp จาก Firestore
            const d = ds.length === 10 ? new Date(ds+'T12:00:00+07:00') : new Date(ds);
            return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric', timeZone: 'Asia/Bangkok' });
        }

        return () => {
            if (typeof unsubReq === 'function') unsubReq();
            if (typeof unsubBal === 'function') unsubBal();
            ['selectLeaveType','toggleHourly','openLeaveModal','closeLeaveModal',
             'submitLeaveRequest','cancelLeaveRequest','editLeaveRequest','leaveCalPrev','leaveCalNext',
             'switchLeaveTab'].forEach(k => delete window[k]);
        };
    }
};
