                    const row = document.getElementById('img-url-row');
                    if (row) row.classList.add('hidden');
                    const inp = document.getElementById('img-url-input'); if (inp) inp.value='';
                    const prev = document.getElementById('img-url-preview'); if (prev) { prev.src=''; prev.classList.add('hidden'); }
                    const uploadList = document.getElementById('ann-upload-list'); if (uploadList) uploadList.innerHTML = '';
                };
        
                // แทรก <img> เข้า editor ณ cursor position
                function annInsertImgTag(src, width) {
                    const editor = document.getElementById('ann-body-editor');
                    if (!editor) return;
                    editor.focus();
                    const styleAttr = width ? ` style="max-width:100%;width:${width}px"` : ' style="max-width:100%"';
                    document.execCommand('insertHTML', false,
                        `<img src="${src}" alt="รูปประกอบ"${styleAttr}><br>`);
                }

                // อัปโหลดหลายรูปผ่าน Cloudinary + แทรกทีละรูปหลัง upload เสร็จ
                window.annUploadImages = async (input) => {
                    const files = Array.from(input.files || []);
                    if (!files.length) return;
                    const listEl = document.getElementById('ann-upload-list');
                    if (!listEl) return;

                    for (const file of files) {
                        const itemId = '_upl_' + Date.now() + Math.random().toString(36).slice(2);
                        const item = document.createElement('div');
                        item.id = itemId;
                        item.className = 'flex items-center gap-3 bg-white border border-zinc-200 rounded-xl px-3 py-2';
                        item.innerHTML = `
                            <i class="fa-solid fa-image text-zinc-300 shrink-0"></i>
                            <div class="flex-1 min-w-0">
                                <p class="text-xs font-bold text-zinc-700 truncate">${file.name}</p>
                                <div class="w-full bg-zinc-100 rounded-full h-1 mt-1">
                                    <div id="${itemId}-bar" class="bg-yellow-400 h-1 rounded-full transition-all" style="width:0%"></div>
                                </div>
                            </div>
                            <span id="${itemId}-pct" class="text-[10px] font-black text-zinc-400 shrink-0">0%</span>`;
                        listEl.appendChild(item);

                        try {
                            const url = await window.uploadPhotoToStorage(file, null, pct => {
                                const bar = document.getElementById(itemId + '-bar');
                                const pctEl = document.getElementById(itemId + '-pct');
                                if (bar) bar.style.width = pct + '%';
                                if (pctEl) pctEl.textContent = pct + '%';
                            });
                            // แทรกรูปเข้า editor ทันที
                            annInsertImgTag(url);
                            // อัปเดต item → success
                            item.innerHTML = `
                                <i class="fa-solid fa-circle-check text-green-500 shrink-0"></i>
                                <p class="flex-1 text-xs font-bold text-zinc-600 truncate">${file.name}</p>
                                <span class="text-[10px] font-black text-green-500">✓ แทรกแล้ว</span>`;
                        } catch(e) {
                            item.innerHTML = `
                                <i class="fa-solid fa-circle-xmark text-red-400 shrink-0"></i>
                                <p class="flex-1 text-xs font-bold text-red-500 truncate">${file.name}</p>
                                <span class="text-[10px] text-red-400">${e.message}</span>`;
                        }
                    }
                    // reset file input
                    if (input.value !== undefined) input.value = '';
                };

                window.annInsertLink = () => {
                    const url = prompt('กรอก URL ลิงก์:');
                    if (url) { document.getElementById('ann-body-editor')?.focus(); document.execCommand('createLink',false,url); }
                };
        
                // ── Save ──────────────────────────────────────────────────────
                window.annSave = async (id) => {
                    const title = document.getElementById('ann-title')?.value.trim();
                    const body  = document.getElementById('ann-body-editor')?.innerHTML||'';
                    const tag   = document.getElementById('ann-tag')?.value||'info';
                    const pub   = document.getElementById('ann-published')?.checked ?? true;
                    if (!title) { showToast('กรุณากรอกหัวข้อประกาศ','error'); return; }
                    const payload = {
                        title, body, tag, published: pub,
                        updatedAt: new Date().toISOString(),
                        author: profile.name,
                    };
                    try {
                        if (id) {
                            await updateDoc(doc(db,'artifacts',APP_ID,'public','data','announcements',id), payload);
                            showToast('✅ บันทึกการแก้ไขแล้ว','success');
                        } else {
                            payload.createdAt = new Date().toISOString();
                            const ref = await addDoc(collection(db,'artifacts',APP_ID,'public','data','announcements'), payload);
                            activeId = ref.id;
                            showToast('✅ สร้างประกาศแล้ว','success');
                        }
                        renderList();
                    } catch(e) { showToast('❌ '+e.message,'error'); }
                };
        
                // ── Delete ────────────────────────────────────────────────────
                window.annDelete = async (id) => {
                    const a = allAnns.find(x=>x.id===id);
                    if (!confirm(`ลบประกาศ "${a?.title}" ?`)) return;
                    try {
                        await deleteDoc(doc(db,'artifacts',APP_ID,'public','data','announcements',id));
                        showToast('ลบแล้ว','info');
                        activeId=null;
                        renderList();
                        const panel=document.getElementById('ann-editor-panel');
                        if(panel) panel.innerHTML=`<div class="bg-white rounded-2xl border border-zinc-200 p-10 flex flex-col items-center justify-center h-64 text-zinc-300"><i class="fa-solid fa-pen-to-square text-5xl mb-3 opacity-20"></i><p class="font-bold text-sm">เลือกประกาศหรือสร้างใหม่</p></div>`;
                    } catch(e) { showToast('❌ '+e.message,'error'); }
                };
        
                return () => {
                    unsub();
                    ['annFilter','annSelect','annNew','annCmd','annBlock','annKeyDown','annUpdateToolbar',
                     'annInsertImage','annPreviewImg','annConfirmImg','annCancelImg','annInsertLink','annUploadImages',
                     'annSave','annDelete'].forEach(k => delete window[k]);
                };
            }
        };


    </script>
</body>
</html>
