<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamsang Group HRIS</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1wFGzcl5Y3yEfd39sA2LTbrgeNkgVxm27">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Prompt', sans-serif; }

        /* ========= SIDEBAR ========= */
        #app-sidebar {
            width: 16rem;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: width;
        }
        #app-sidebar.collapsed { width: 4rem; }
        #app-sidebar.collapsed .sidebar-text,
        #app-sidebar.collapsed .admin-panel-text,
        #app-sidebar.collapsed .footer-text { display: none; }
        #app-sidebar.collapsed .collapsed-footer-text { display: block; }
        #app-sidebar.collapsed .nav-item { justify-content: center; padding-left: 0; padding-right: 0; }
        #app-sidebar.collapsed .nav-item i { margin: 0 !important; font-size: 1.25rem; }
        #app-sidebar.collapsed .logo-container { padding: 1rem 0; }
        #app-sidebar.collapsed .logo-container img { margin-right: 0; width: 2rem; height: 2rem; min-width: 2rem; }

        /* ========= PAGE TRANSITIONS ========= */
        #page-content {
            animation: pageFadeIn 0.18s ease forwards;
        }
        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ========= LOADING OVERLAY ========= */
        #page-loader {
            position: absolute; inset: 0;
            background: #fafafa;
            z-index: 50;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.2s ease;
        }
        #page-loader.hidden-fade { opacity: 0; pointer-events: none; }

        /* ========= SCROLLBAR ========= */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-50 flex h-screen overflow-hidden text-zinc-800">

    <!-- ===================== SIDEBAR (อยู่ตลอด ไม่โหลดใหม่) ===================== -->
    <aside id="app-sidebar" class="bg-zinc-900 text-zinc-300 flex flex-col shadow-xl z-20 h-full overflow-hidden shrink-0">
        <!-- Logo -->
        <div class="logo-container p-5 flex items-center justify-center border-b border-zinc-800">
            <img src="https://lh3.googleusercontent.com/d/1wFGzcl5Y3yEfd39sA2LTbrgeNkgVxm27"
                 alt="Lamsang Logo"
                 class="h-10 w-10 min-w-[2.5rem] object-contain rounded bg-white p-1 mr-3 shrink-0">
            <h1 class="text-lg font-bold tracking-wider truncate text-white sidebar-text">Lamsang Group</h1>
        </div>

        <!-- Nav -->
        <nav id="sidebar-nav" class="flex-1 px-4 py-6 space-y-2 overflow-y-auto overflow-x-hidden">
            <!-- รายการเมนูจะถูก inject โดย JS หลังล็อกอิน -->
            <div class="animate-pulse space-y-3 px-2">
                <div class="h-10 bg-zinc-800 rounded-lg"></div>
                <div class="h-10 bg-zinc-800 rounded-lg opacity-70"></div>
                <div class="h-10 bg-zinc-800 rounded-lg opacity-40"></div>
            </div>
        </nav>

        <!-- Footer -->
        <div class="p-4 border-t border-zinc-800 text-[10px] text-zinc-600 text-center uppercase tracking-widest font-medium footer-text whitespace-nowrap">
            &copy; 2026 Lamsang Group
        </div>
        <div class="p-4 border-t border-zinc-800 text-[10px] text-zinc-600 text-center font-black hidden collapsed-footer-text">LSG</div>
    </aside>

    <!-- ===================== MAIN AREA ===================== -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden">

        <!-- TOPBAR (อยู่ตลอด ไม่โหลดใหม่) -->
        <header id="app-topbar" class="bg-white shadow-sm h-16 flex items-center justify-between px-6 z-10 border-b border-zinc-200 shrink-0">
            <div class="flex items-center">
                <button onclick="toggleSidebar()" class="text-zinc-500 hover:text-yellow-500 hover:bg-zinc-100 p-2 rounded-lg mr-4 transition-colors focus:outline-none">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <h2 id="topbar-title" class="text-lg font-bold text-zinc-800 uppercase tracking-tight hidden sm:block">Lamsang Group</h2>
            </div>
            <div class="flex items-center space-x-4">
                <button class="text-zinc-400 hover:text-yellow-500 relative transition-colors p-2">
                    <i class="fa-regular fa-bell text-xl"></i>
                    <span class="absolute top-1 right-1 bg-red-500 text-white text-[9px] font-bold rounded-full h-4 w-4 flex items-center justify-center border-2 border-white">3</span>
                </button>
                <div class="h-8 w-px bg-zinc-200"></div>
                <button id="topbar-profile-btn" onclick="navigateTo('profile')" class="flex items-center space-x-3 hover:bg-zinc-50 px-3 py-1.5 rounded-xl transition-all border border-transparent hover:border-zinc-100 group">
                    <img id="topbar-avatar" src="https://ui-avatars.com/api/?name=LSG&background=f4f4f5&color=a1a1aa"
                         class="w-8 h-8 rounded-full object-cover border-2 border-zinc-200 group-hover:border-yellow-500 transition-all">
                    <div class="text-sm leading-tight hidden md:block">
                        <p id="topbar-username" class="font-bold text-zinc-800 group-hover:text-yellow-600 transition-colors">กำลังโหลด...</p>
                        <p id="topbar-role" class="text-[9px] text-zinc-400 font-black uppercase tracking-widest">SYSTEM</p>
                    </div>
                </button>
                <div class="h-8 w-px bg-zinc-200 hidden md:block"></div>
                <button onclick="handleLogout()" class="text-xs text-red-500 hover:text-red-700 font-black uppercase tracking-widest flex items-center transition-colors bg-red-50 hover:bg-red-100 px-3 py-2 rounded-lg">
                    <i class="fa-solid fa-power-off sm:mr-2"></i><span class="hidden sm:inline">ออกจากระบบ</span>
                </button>
            </div>
        </header>

        <!-- CONTENT AREA — เปลี่ยนเฉพาะตรงนี้ -->
        <div class="flex-1 overflow-y-auto relative bg-zinc-50" id="content-wrapper">
            <!-- Loading overlay -->
            <div id="page-loader">
                <i class="fa-solid fa-circle-notch fa-spin text-5xl text-yellow-500 mb-4 drop-shadow-md"></i>
                <p class="text-[10px] font-black text-zinc-400 uppercase tracking-[0.2em]">Loading Workspace...</p>
            </div>

            <!-- เนื้อหาแต่ละหน้าถูก inject ที่นี่ -->
            <div id="page-content" class="min-h-full"></div>
        </div>
    </div>

    <!-- ===================== FIREBASE & SPA ROUTER ===================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADmZFoyvxq7vRD8SvV4PhnmNmnzwZQWVY",
            authDomain: "hris-21093.firebaseapp.com",
            projectId: "hris-21093",
            storageBucket: "hris-21093.firebasestorage.app",
            messagingSenderId: "549158917606",
            appId: "1:549158917606:web:cdade4e855554e57fab227"
        };
        const fbApp = initializeApp(firebaseConfig);
        const auth = getAuth(fbApp);
        const db = getFirestore(fbApp);
        const APP_ID = 'bizhris-phichit';

        // ── Page registry ──────────────────────────────────────────────
        // แต่ละ page คือ object ที่มี: title, html() และ init(user, db, APP_ID)
        const PAGES = {};

        // ── Router state ───────────────────────────────────────────────
        let currentPageId = null;
        let currentUser = null;
        let userProfile = null;
        let pageCleanup = null; // ฟังก์ชัน cleanup ของหน้าก่อน (เช่น unsubscribe listeners)

        // ── Sidebar nav registry (ขึ้นอยู่กับ role) ───────────────────
        function buildNav(profile) {
            const isAdmin = profile.role === 'admin';
            const isManager = profile.role === 'manager' || isAdmin;
            return [
                { id: 'home',         icon: 'fa-house',                label: 'หน้าหลัก',              show: true },
                { id: 'executive',    icon: 'fa-chart-line',           label: 'แดชบอร์ดผู้บริหาร',     show: isManager },
                { id: 'time',         icon: 'fa-clock',                label: 'เวลาทำงาน & กะ',        show: true },
                { id: 'profile',      icon: 'fa-id-badge',             label: 'โปรไฟล์ของฉัน',         show: true },
                { id: 'leave',        icon: 'fa-calendar-check',       label: 'การอนุมัติ & วันลา',    show: true },
                { id: '---',          icon: '',                        label: 'Admin Panel',            show: isAdmin, divider: true },
                { id: 'add-employee', icon: 'fa-user-plus',            label: 'เพิ่ม/แก้ไขพนักงาน',   show: isAdmin, adminStyle: true },
                { id: 'payroll',      icon: 'fa-file-invoice-dollar',  label: 'จัดการเงินเดือน',       show: isAdmin },
            ];
        }

        function renderNav(profile, activeId) {
            const nav = document.getElementById('sidebar-nav');
            const items = buildNav(profile);
            let html = '';
            items.forEach(item => {
                if (!item.show) return;
                if (item.divider) {
                    html += `<div class="mt-6 pt-6 border-t border-zinc-800">
                        <p class="px-4 text-[10px] text-zinc-500 uppercase tracking-widest mb-2 font-bold admin-panel-text whitespace-nowrap">${item.label}</p>`;
                    return;
                }
                const isActive = item.id === activeId;
                const baseClass = 'nav-item flex items-center px-4 py-3 rounded-lg transition-colors cursor-pointer';
                const activeClass = isActive ? 'bg-yellow-500 text-zinc-900 font-semibold shadow-sm' : 
                                    (item.adminStyle ? 'text-yellow-500 hover:bg-zinc-800 hover:text-yellow-400' : 'hover:bg-zinc-800 hover:text-yellow-400');
                html += `<button data-page="${item.id}" class="${baseClass} ${activeClass} w-full text-left" title="${item.label}">
                    <i class="fa-solid ${item.icon} w-6 text-center shrink-0"></i>
                    <span class="ml-3 font-medium sidebar-text whitespace-nowrap">${item.label}</span>
                </button>`;
                if (item.divider) html += '</div>';
            });
            // ปิด admin div ถ้ามี
            if (items.some(i => i.show && i.divider)) html += '</div>';
            nav.innerHTML = html;

            // Bind click
            nav.querySelectorAll('button[data-page]').forEach(btn => {
                btn.addEventListener('click', () => navigateTo(btn.dataset.page));
            });
        }

        // ── Topbar update ───────────────────────────────────────────────
        function updateTopbar(profile, pageTitle) {
            const avatar = profile.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=27272a&color=eab308&size=128`;
            document.getElementById('topbar-avatar').src = avatar;
            document.getElementById('topbar-username').textContent = profile.name;
            document.getElementById('topbar-role').textContent = profile.role;
            if (pageTitle) document.getElementById('topbar-title').textContent = pageTitle;
        }

        // ── Page Loader ─────────────────────────────────────────────────
        function showLoader() {
            const loader = document.getElementById('page-loader');
            loader.classList.remove('hidden-fade');
            loader.style.opacity = '1';
        }
        function hideLoader() {
            const loader = document.getElementById('page-loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.classList.add('hidden-fade'), 200);
        }

        // ── Navigate ────────────────────────────────────────────────────
        window.navigateTo = async function(pageId) {
            if (pageId === currentPageId) return;
            if (pageId === '#' || pageId === 'executive' || pageId === 'leave' || pageId === 'payroll') {
                showToast('หน้านี้ยังอยู่ระหว่างพัฒนา', 'info');
                return;
            }

            // Cleanup หน้าเก่า (unsubscribe Firebase listeners ฯลฯ)
            if (typeof pageCleanup === 'function') {
                pageCleanup();
                pageCleanup = null;
            }

            currentPageId = pageId;
            showLoader();

            // อัปเดต active state บน sidebar
            if (userProfile) renderNav(userProfile, pageId);

            // โหลด page module
            try {
                const page = await loadPage(pageId);
                if (!page) { hideLoader(); return; }

                // Set content
                const contentEl = document.getElementById('page-content');
                contentEl.innerHTML = page.html;
                contentEl.style.animation = 'none';
                contentEl.offsetHeight; // force reflow
                contentEl.style.animation = '';

                // อัปเดต title
                document.getElementById('topbar-title').textContent = page.title || 'Lamsang Group';
                document.title = `${page.title || 'หน้าหลัก'} - Lamsang Group`;

                // scroll กลับบนสุดเสมอ
                document.getElementById('content-wrapper').scrollTop = 0;

                // init page logic
                if (typeof page.init === 'function') {
                    pageCleanup = await page.init(currentUser, userProfile, db, APP_ID) || null;
                }

                hideLoader();

                // อัปเดต URL hash (ไม่ reload)
                history.pushState({ page: pageId }, '', `#${pageId}`);

            } catch (err) {
                console.error('Page load error:', err);
                hideLoader();
                document.getElementById('page-content').innerHTML = `
                    <div class="flex flex-col items-center justify-center h-64 text-zinc-400">
                        <i class="fa-solid fa-triangle-exclamation text-5xl mb-4 text-yellow-500"></i>
                        <p class="font-bold">ไม่สามารถโหลดหน้านี้ได้</p>
                        <p class="text-xs mt-1">${err.message}</p>
                    </div>`;
            }
        }

        // ── Page Loader: โหลด HTML + script จากไฟล์ .html ─────────────
        // แต่ละหน้าถูก inline ไว้ใน PAGES registry ด้านล่าง
        async function loadPage(pageId) {
            if (PAGES[pageId]) return PAGES[pageId];
            console.warn(`Page "${pageId}" not registered`);
            return null;
        }

        // ── Toast notification ──────────────────────────────────────────
        window.showToast = function(msg, type = 'info') {
            const colors = { info: 'bg-zinc-800 text-white', success: 'bg-green-600 text-white', error: 'bg-red-600 text-white' };
            const toast = document.createElement('div');
            toast.className = `fixed bottom-6 right-6 z-[999] px-5 py-3 rounded-xl shadow-2xl text-sm font-bold ${colors[type]} transition-all`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2500);
        }

        // ── Auth gate ───────────────────────────────────────────────────
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', user.uid));
            if (!snap.exists()) {
                alert('ไม่พบข้อมูลโปรไฟล์ กรุณาติดต่อ HR');
                signOut(auth); window.location.href = 'index.html'; return;
            }
            userProfile = snap.data();

            // Build sidebar & topbar ครั้งเดียว
            const startPage = (location.hash.slice(1) || 'home');
            renderNav(userProfile, startPage);
            updateTopbar(userProfile, null);

            // Navigate ไปหน้าแรก
            await navigateTo(startPage);
        });

        window.handleLogout = () => {
            if (confirm('คุณต้องการออกจากระบบใช่หรือไม่?')) {
                if (typeof pageCleanup === 'function') pageCleanup();
                signOut(auth).then(() => window.location.href = 'index.html');
            }
        };

        window.toggleSidebar = () => {
            document.getElementById('app-sidebar').classList.toggle('collapsed');
        };

        // Handle browser back/forward
        window.addEventListener('popstate', (e) => {
            if (e.state?.page) navigateTo(e.state.page);
        });

        // Auto-collapse on mobile
        if (window.innerWidth < 1024) {
            document.getElementById('app-sidebar').classList.add('collapsed');
        }

        // ================================================================
        // PAGE DEFINITIONS
        // แต่ละหน้าเป็น object { title, html, init }
        // init() return cleanup function (optional) สำหรับ unsubscribe listeners
        // ================================================================

        // ── HOME ──────────────────────────────────────────────────────
        PAGES['home'] = {
            title: 'หน้าหลัก',
            html: `
            <div class="p-6 lg:p-10">
                <div class="mb-8">
                    <h2 class="text-3xl font-black text-zinc-800">สวัสดี, คุณ<span id="welcome-name" class="text-yellow-600">...</span> 👋</h2>
                    <p class="text-zinc-400 text-sm mt-1 font-medium italic">Welcome to Lamsang Group Management System</p>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
                    <div class="lg:col-span-2 bg-white rounded-3xl shadow-sm border border-zinc-200 p-8 flex flex-col">
                        <h3 class="text-lg font-black text-zinc-800 mb-6 flex items-center uppercase tracking-tight">
                            <i class="fa-solid fa-bullhorn text-yellow-500 mr-3"></i> ประกาศองค์กร
                        </h3>
                        <div class="p-5 bg-yellow-50 rounded-2xl border border-yellow-100 flex items-start hover:bg-yellow-100 transition-all">
                            <i class="fa-solid fa-circle-info mt-1 mr-4 text-yellow-600 text-xl"></i>
                            <div>
                                <h4 class="font-bold text-sm text-yellow-900">อัปเดตนโยบายการเบิก OT เดือนนี้</h4>
                                <p class="text-xs mt-1 text-yellow-700 leading-relaxed">กรุณาส่งเอกสารภายในวันที่ 25 เพื่อความรวดเร็วในการประมวลผลเงินเดือน</p>
                            </div>
                        </div>
                    </div>
                    <div class="bg-zinc-900 text-white rounded-3xl shadow-xl p-8 border border-zinc-800">
                        <h3 class="text-sm font-bold text-zinc-500 mb-4 uppercase tracking-widest flex items-center">
                            <i class="fa-solid fa-clock text-yellow-500 mr-2"></i> สถานะวันนี้
                        </h3>
                        <div class="bg-zinc-800 border border-zinc-700 rounded-2xl p-6 text-center">
                            <p class="text-[10px] text-zinc-500 font-black uppercase tracking-tighter mb-1">Time In</p>
                            <h4 class="text-4xl font-black text-yellow-500 my-1">07:58</h4>
                            <p class="text-[10px] text-zinc-400 font-bold uppercase mt-1">สาขาเนินปอ, พิจิตร</p>
                        </div>
                        <button onclick="navigateTo('time')" class="mt-6 block w-full text-center bg-yellow-500 hover:bg-yellow-400 text-zinc-900 text-xs font-black py-4 rounded-xl transition-all shadow-lg uppercase tracking-widest">
                            ไปหน้าลงเวลา
                        </button>
                    </div>
                </div>

                <!-- Executive Dashboard (admin/manager only) -->
                <div id="dashboard-executive" class="hidden border-t-2 border-zinc-100 pt-10 mt-4">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="text-xl font-black text-zinc-800 uppercase tracking-tighter">
                            <i class="fa-solid fa-chart-line text-yellow-500 mr-2"></i> EXECUTIVE INSIGHTS
                        </h3>
                        <span class="bg-zinc-800 text-yellow-500 text-[9px] uppercase font-black px-4 py-1.5 rounded-full tracking-widest shadow-md">Privileged Access</span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                        <div class="bg-white rounded-2xl shadow-sm p-6 border border-zinc-200 flex justify-between items-center group hover:border-zinc-800 transition-all">
                            <div><p class="text-[10px] text-zinc-400 font-bold uppercase mb-1">Total Employees</p><h3 class="text-3xl font-black text-zinc-800">42</h3></div>
                            <div class="bg-zinc-50 p-4 rounded-2xl text-zinc-400 group-hover:bg-zinc-900 group-hover:text-white transition-all"><i class="fa-solid fa-users text-xl"></i></div>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 pb-10">
                        <div class="bg-white rounded-3xl shadow-sm border border-zinc-200 p-8">
                            <h3 class="text-sm font-black text-zinc-400 mb-8 text-center uppercase tracking-widest">Today's Attendance</h3>
                            <div class="relative h-64 w-full flex justify-center"><canvas id="attendanceChart"></canvas></div>
                        </div>
                        <div class="bg-white rounded-3xl shadow-sm border border-zinc-200 p-8">
                            <h3 class="text-sm font-black text-zinc-400 mb-8 text-center uppercase tracking-widest">Payroll Overview</h3>
                            <div class="relative h-64 w-full"><canvas id="payrollChart"></canvas></div>
                        </div>
                    </div>
                </div>
            </div>`,
            init: async (user, profile) => {
                document.getElementById('welcome-name').textContent = profile.name;
                if (profile.role === 'admin' || profile.role === 'manager') {
                    document.getElementById('dashboard-executive').classList.remove('hidden');
                    // Lazy-load Chart.js
                    if (!window.Chart) {
                        await new Promise(resolve => {
                            const s = document.createElement('script');
                            s.src = 'https://cdn.jsdelivr.net/npm/chart.js';
                            s.onload = resolve;
                            document.head.appendChild(s);
                        });
                    }
                    const ctxA = document.getElementById('attendanceChart');
                    if (ctxA) new Chart(ctxA.getContext('2d'), {
                        type: 'doughnut',
                        data: { labels: ['มาทำงาน', 'ลางาน', 'ขาดงาน'], datasets: [{ data: [38,2,2], backgroundColor: ['#22c55e','#eab308','#ef4444'], borderWidth: 4, borderColor: '#ffffff' }] },
                        options: { responsive: true, maintainAspectRatio: false, cutout: '80%', plugins: { legend: { position: 'bottom', labels: { font: { family: 'Prompt', weight: 'bold' }, usePointStyle: true } } } }
                    });
                    const ctxP = document.getElementById('payrollChart');
                    if (ctxP) new Chart(ctxP.getContext('2d'), {
                        type: 'bar',
                        data: { labels: ['ก.ย.','ต.ค.','พ.ย.','ธ.ค.','ม.ค.','ก.พ.'], datasets: [{ label: 'BASE', data: [850000,855000,860000,920000,870000,885000], backgroundColor: '#27272a', borderRadius: 10 }, { label: 'OT/BONUS', data: [45000,50000,48000,150000,42000,55000], backgroundColor: '#eab308', borderRadius: 10 }] },

                                <div><label class="input-label">สาขา/แผนก</label><input type="text" id="ro-branch" readonly class="input-readonly"></div>

            init: async (user, profile, db, appId) => {

                // Fill profile card
                const avatarUrl = profile.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=27272a&color=eab308&size=128`;
                document.getElementById('main-profile-img').src = avatarUrl;
                document.getElementById('display-name').textContent = profile.name;
                document.getElementById('display-role').textContent = profile.position || profile.role.toUpperCase();
                document.getElementById('display-branch').textContent = profile.branch || 'สำนักงานใหญ่';
                document.getElementById('display-emp-code').textContent = profile.employeeCode || '-';
                document.getElementById('display-start-date').textContent = profile.startDate ? new Date(profile.startDate).toLocaleDateString('th-TH') : '-';
                const st = document.getElementById('display-status');
                if (profile.status === 'resigned') { st.textContent = 'ลาออก'; st.className = 'font-bold text-red-600'; }
                else if (profile.status === 'probation') { st.textContent = 'ทดลองงาน'; st.className = 'font-bold text-blue-600'; }
                else { st.textContent = 'ทำงานอยู่'; st.className = 'font-bold text-green-600'; }

                document.getElementById('edit-photo-url').value = profile.originalPhotoURL || profile.photoURL || '';

                    if (url.includes('drive.google.com')) {

                    }
                    return url;

                        document.getElementById('edit-photo-url').value = url;

                };

                    } catch (err) { alert('❌ ' + err.message); }
                    finally { btn.disabled = false; btn.innerHTML = orig; }
                });

                return () => { delete window.changeProfilePicture; };
            }
        };

                            <div class="overflow-x-auto">
                                <table class="w-full text-sm">
                                    <thead><tr class="bg-zinc-50 text-zinc-500 text-[11px] uppercase tracking-widest font-bold">
                                        <th class="px-6 py-4 text-left">พนักงาน</th>
                                        <th class="px-4 py-4 text-left">รหัส / ตำแหน่ง</th>
                                        <th class="px-4 py-4 text-left">สาขา</th>
                                        <th class="px-4 py-4 text-left">สถานะ</th>
                                        <th class="px-6 py-4 text-center">จัดการ</th>
                                    </tr></thead>
                                    <tbody id="employee-list"><tr><td colspan="5" class="text-center py-10 text-zinc-400">กำลังโหลดข้อมูล...</td></tr></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`,
            init: async (user, profile, db, appId) => {
                if (profile.role !== 'admin') { navigateTo('home'); return; }
                const { collection, doc, getDoc, setDoc, updateDoc, onSnapshot } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

                let isEditing = false;
                let allEmployees = [];

                window.empSwitchTab = (tab) => {
                    const btnAdd = document.getElementById('btn-tab-add');
                    const btnManage = document.getElementById('btn-tab-manage');
                    if (tab === 'add') {
                        btnAdd.className = 'flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm font-bold transition-all bg-white text-zinc-800 shadow-sm';
                        btnManage.className = 'flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm font-bold transition-all text-zinc-500 hover:text-zinc-800';
                        document.getElementById('tab-form').classList.add('active');
                        document.getElementById('tab-list').classList.remove('active');
                    } else {
                        btnManage.className = 'flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm font-bold transition-all bg-white text-zinc-800 shadow-sm';
                        btnAdd.className = 'flex-1 md:flex-none px-6 py-2.5 rounded-lg text-sm font-bold transition-all text-zinc-500 hover:text-zinc-800';
                        document.getElementById('tab-list').classList.add('active');
                        document.getElementById('tab-form').classList.remove('active');
                        if (allEmployees.length === 0) loadList();
                    }
                };

                const v = (id) => document.getElementById(id)?.value.trim() || '';

                const unsubscribe = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), snap => {
                    allEmployees = [];
                    let html = '';
                    snap.forEach(d => {
                        const emp = d.data();
                        allEmployees.push(emp);
                        const avatar = emp.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(emp.name)}&background=f4f4f5&color=27272a&bold=true`;
                        let badge = '<span class="px-2 py-1 bg-green-100 text-green-700 rounded text-[10px] font-bold">Active</span>';
                        if (emp.status === 'resigned') badge = '<span class="px-2 py-1 bg-red-100 text-red-700 rounded text-[10px] font-bold">Resigned</span>';
                        else if (emp.status === 'probation') badge = '<span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-[10px] font-bold">Probation</span>';
                        html += `<tr class="hover:bg-zinc-50 transition-all border-b border-zinc-100">
                            <td class="px-6 py-4"><div class="flex items-center"><img src="${avatar}" class="w-10 h-10 rounded-full border border-zinc-200 mr-3 object-cover"><div><p class="font-bold text-zinc-800 text-sm">${emp.name}</p><p class="text-[10px] text-zinc-400 font-bold">${emp.email}</p></div></div></td>
                            <td class="px-4 py-4"><p class="text-xs font-black text-zinc-600">${emp.employeeCode||'-'}</p><p class="text-[10px] text-zinc-400">${emp.position||emp.role}</p></td>
                            <td class="px-4 py-4 text-xs font-medium text-zinc-600">${emp.branch||'-'}</td>
                            <td class="px-4 py-4">${badge}</td>
                            <td class="px-6 py-4 text-center"><button onclick="empPrepareEdit('${emp.uid}')" class="text-zinc-500 bg-zinc-100 hover:bg-yellow-500 hover:text-zinc-900 px-3 py-1.5 rounded-lg transition-all text-xs font-bold shadow-sm"><i class="fa-solid fa-pen mr-1"></i> แก้ไข</button></td>
                        </tr>`;
                    });
                    const el = document.getElementById('employee-list');
                    if (el) el.innerHTML = html || '<tr><td colspan="5" class="text-center py-10 text-zinc-400">ยังไม่มีข้อมูลพนักงาน</td></tr>';
                });

                function loadList() { /* triggered by onSnapshot above */ }

                window.filterEmployees = () => {
                    const q = document.getElementById('search-emp')?.value.toLowerCase();
                    document.getElementById('employee-list')?.querySelectorAll('tr').forEach(r => {
                        r.style.display = r.innerText.toLowerCase().includes(q) ? '' : 'none';
                    });
                };

                window.empPrepareEdit = (uid) => {
                    const emp = allEmployees.find(e => e.uid === uid);
                    if (!emp) return;
                    isEditing = true;
                    document.getElementById('emp-uid').value = emp.uid;
                    document.getElementById('f-emp-code').value = emp.employeeCode || '';
                    document.getElementById('f-sys-role').value = emp.role || 'employee';
                    document.getElementById('f-status').value = emp.status || 'active';
                    document.getElementById('f-photo-url').value = emp.photoURL || '';
                    document.getElementById('f-title').value = emp.titleTH || 'นาย';
                    document.getElementById('f-fname-th').value = emp.fnameTH || '';
                    document.getElementById('f-lname-th').value = emp.lnameTH || '';
                    document.getElementById('f-nickname').value = emp.nickname || '';
                    document.getElementById('f-fname-en').value = emp.fnameEN || '';
                    document.getElementById('f-lname-en').value = emp.lnameEN || '';
                    document.getElementById('f-gender').value = emp.gender || 'ชาย';
                    document.getElementById('f-dob').value = emp.dob || '';
                    document.getElementById('f-idcard').value = emp.idCard || '';
                    document.getElementById('f-phone').value = emp.phone || '';
                    document.getElementById('f-email').value = emp.email || '';
                    document.getElementById('f-email').readOnly = true;
                    document.getElementById('f-email').classList.add('opacity-50', 'cursor-not-allowed');
                    document.getElementById('f-line-id').value = emp.lineId || '';
                    document.getElementById('f-address').value = emp.address || '';
                    document.getElementById('f-province').value = emp.province || '';
                    document.getElementById('f-district').value = emp.district || '';
                    document.getElementById('f-subdistrict').value = emp.subdistrict || '';
                    document.getElementById('f-zipcode').value = emp.zipcode || '';
                    document.getElementById('f-start-date').value = emp.startDate || '';
                    document.getElementById('f-branch').value = emp.branch || 'สำนักงานใหญ่';
                    document.getElementById('f-position').value = emp.position || '';
                    document.getElementById('f-emp-type').value = emp.empType || 'Full-time';
                    document.getElementById('f-salary-month').value = emp.baseSalary || 0;
                    document.getElementById('f-salary-day').value = emp.dailyWage || 0;
                    document.getElementById('f-salary-hour').value = emp.hourlyWage || 0;
                    document.getElementById('f-commission').value = emp.commission || 0;
                    document.getElementById('f-payment-method').value = emp.paymentMethod || 'Bank Transfer';
                    document.getElementById('f-bank-name').value = emp.bankName || '';
                    document.getElementById('f-bank-acc').value = emp.bankAccount || '';
                    document.getElementById('f-sso').value = emp.sso || 'Yes';
                    document.getElementById('f-tax').value = emp.taxDeduction || 'No';
                    document.getElementById('f-emergency-name').value = emp.emergencyName || '';
                    document.getElementById('f-emergency-phone').value = emp.emergencyPhone || '';
                    document.getElementById('form-header').classList.replace('bg-zinc-900', 'bg-zinc-800');
                    document.getElementById('form-title').textContent = 'แก้ไขข้อมูลพนักงาน';
                    document.getElementById('form-subtitle').textContent = `Editing: ${emp.name}`;
                    document.getElementById('form-icon').className = 'fa-solid fa-user-pen text-yellow-500 text-3xl';
                    document.getElementById('submit-btn-text').textContent = 'บันทึกการเปลี่ยนแปลง';
                    document.getElementById('account-notice').classList.add('hidden');
                    document.getElementById('btn-cancel-edit').classList.remove('hidden');
                    empSwitchTab('add');
                    document.getElementById('content-wrapper').scrollTop = 0;
                };

                document.getElementById('employee-form')?.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const btn = document.getElementById('submit-btn');
                    btn.disabled = true;
                    const orig = document.getElementById('submit-btn-text').textContent;
                    document.getElementById('submit-btn-text').textContent = 'กำลังประมวลผล...';
                    const fullName = `${v('f-fname-th')} ${v('f-lname-th')}`.trim();
                    const email = v('f-email');
                    const payload = {
                        employeeCode: v('f-emp-code'), role: v('f-sys-role'), status: v('f-status'), photoURL: v('f-photo-url'),
                        name: fullName, titleTH: v('f-title'), fnameTH: v('f-fname-th'), lnameTH: v('f-lname-th'),
                        nickname: v('f-nickname'), fnameEN: v('f-fname-en'), lnameEN: v('f-lname-en'),
                        gender: v('f-gender'), dob: v('f-dob'), idCard: v('f-idcard'),
                        phone: v('f-phone'), email, lineId: v('f-line-id'), address: v('f-address'),
                        province: v('f-province'), district: v('f-district'), subdistrict: v('f-subdistrict'), zipcode: v('f-zipcode'),
                        startDate: v('f-start-date'), branch: v('f-branch'), position: v('f-position'), empType: v('f-emp-type'),
                        baseSalary: Number(v('f-salary-month')||0), dailyWage: Number(v('f-salary-day')||0), hourlyWage: Number(v('f-salary-hour')||0),
                        commission: Number(v('f-commission')||0), paymentMethod: v('f-payment-method'), bankName: v('f-bank-name'), bankAccount: v('f-bank-acc'),
                        sso: v('f-sso'), taxDeduction: v('f-tax'),
                        emergencyName: v('f-emergency-name'), emergencyPhone: v('f-emergency-phone'),
                        updatedAt: new Date().toISOString()
                    };
                    try {
                        if (isEditing) {
                            const uid = document.getElementById('emp-uid').value;
                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', uid), payload);
                            showToast('✅ บันทึกการแก้ไขเรียบร้อย', 'success');
                            isEditing = false;
                            document.getElementById('employee-form').reset();
                            document.getElementById('form-header').classList.replace('bg-zinc-800', 'bg-zinc-900');
                            document.getElementById('form-title').textContent = 'ลงทะเบียนพนักงานใหม่';
                            document.getElementById('form-subtitle').textContent = 'Create New Employee Profile';
                            document.getElementById('account-notice').classList.remove('hidden');
                            document.getElementById('btn-cancel-edit').classList.add('hidden');
                            document.getElementById('submit-btn-text').textContent = 'บันทึกและสร้างบัญชีใหม่';
                            const emailEl = document.getElementById('f-email');
                            emailEl.readOnly = false; emailEl.classList.remove('opacity-50', 'cursor-not-allowed');
                            empSwitchTab('manage');
                        } else {
                            const { firebaseConfig } = { firebaseConfig: { apiKey: 'AIzaSyADmZFoyvxq7vRD8SvV4PhnmNmnzwZQWVY' } };
                            const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=AIzaSyADmZFoyvxq7vRD8SvV4PhnmNmnzwZQWVY`, {
                                method: 'POST', body: JSON.stringify({ email, password: '123456', returnSecureToken: true })
                            });
                            const data = await res.json();
                            if (!res.ok) throw new Error(data.error.message === 'EMAIL_EXISTS' ? 'อีเมลนี้มีอยู่ในระบบแล้ว' : data.error.message);
                            payload.uid = data.localId; payload.createdAt = new Date().toISOString();
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', data.localId), payload);
                            showToast('✅ สร้างพนักงานใหม่สำเร็จ (รหัสผ่าน: 123456)', 'success');
                            document.getElementById('employee-form').reset();
                            empSwitchTab('manage');
                        }
                    } catch (err) { alert('❌ ' + err.message); }
                    finally { btn.disabled = false; document.getElementById('submit-btn-text').textContent = orig; }
                });

                // Load list initially
                empSwitchTab('manage');

                return () => {
                    unsubscribe();
                    delete window.empSwitchTab;
                    delete window.empPrepareEdit;
                    delete window.filterEmployees;
                };
            }
        };

    </script>
</body>
</html>
