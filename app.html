<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lamsang Group HRIS</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1wFGzcl5Y3yEfd39sA2LTbrgeNkgVxm27">
    <!-- iOS Home Screen Icon -->
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1wFGzcl5Y3yEfd39sA2LTbrgeNkgVxm27">
    <link rel="apple-touch-icon" sizes="120x120" href="https://lh3.googleusercontent.com/d/1wFGzcl5Y3yEfd39sA2LTbrgeNkgVxm27">
    <link rel="apple-touch-icon" sizes="152x152" href="https://lh3.googleusercontent.com/d/1wFGzcl5Y3yEfd39sA2LTbrgeNkgVxm27">
    <link rel="apple-touch-icon" sizes="180x180" href="https://lh3.googleusercontent.com/d/1wFGzcl5Y3yEfd39sA2LTbrgeNkgVxm27">
    <!-- iOS PWA Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lamsang HRIS">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#18181b">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            safelist: [
                'bg-purple-100','text-purple-700',
                'bg-purple-300','bg-purple-400',
                'bg-red-100','text-red-700','bg-red-50',
                'bg-amber-100','text-amber-700','bg-amber-300',
                'bg-blue-50','text-blue-700','bg-blue-400',
                'bg-green-50','text-green-700','bg-green-400',
                'bg-pink-50','text-pink-700','bg-pink-400',
                'bg-orange-50','text-orange-700','bg-orange-400',
                'bg-slate-100','text-slate-600','bg-slate-400',
                'bg-zinc-100','text-zinc-600','bg-zinc-400',
            ]
        }
    </script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Prompt', sans-serif; }

        /* ========= MOBILE-FIRST FIXES (iOS Safari / Chrome iOS / Chrome Android / LINE LIFF) ========= */
        /* iOS Safari treats 100vh as the largest possible viewport (ignoring the URL bar),
           which makes h-screen overflow. Use 100dvh (dynamic viewport height) with fallback. */
        html, body { height: 100%; }
        @supports (height: 100dvh) {
            .h-screen { height: 100dvh !important; }
        }
        @supports (min-height: 100dvh) {
            .min-h-screen { min-height: 100dvh !important; }
        }

        /* iOS auto-zooms on focus when input font-size < 16px. Force 16px on focusable form elements. */
        input, select, textarea, button {
            font-size: 16px;
        }
        @media (min-width: 768px) {
            input, select, textarea { font-size: inherit; }
        }

        /* Remove blue tap highlight, make taps feel instant (no 300ms delay) */
        * {
            -webkit-tap-highlight-color: transparent;
        }
        a, button, [onclick], [role="button"], .nav-item, .mob-nav-item, .cal-cell {
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }

        /* Prevent iOS rubber-band on background while inner divs scroll */
        body { overscroll-behavior-y: none; }

        /* LINE in-app browser sometimes renders position:fixed weirdly when keyboard opens.
           Use safe-area + viewport-height-aware sizing for bottom nav */
        @supports (padding: env(safe-area-inset-bottom)) {
            #mobile-bottom-nav { padding-bottom: max(env(safe-area-inset-bottom, 0px), 4px); }
        }

        /* Smooth momentum scrolling on iOS for all scroll containers */
        .overflow-y-auto, .overflow-auto, .overflow-x-auto {
            -webkit-overflow-scrolling: touch;
        }

        /* Custom dialog (replaces alert/confirm/prompt for LINE LIFF compatibility) */
        #lsg-dialog-backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,0.55);
            display: none; align-items: center; justify-content: center;
            z-index: 99999; padding: 1rem;
            padding-top: calc(1rem + env(safe-area-inset-top, 0px));
            padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0px));
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            font-family: 'Prompt', sans-serif;
        }
        #lsg-dialog-backdrop.open { display: flex; animation: lsg-fade-in 0.15s ease; }
        @keyframes lsg-fade-in { from { opacity: 0; } to { opacity: 1; } }
        #lsg-dialog-box {
            background: #fff; border-radius: 1.25rem; max-width: 420px; width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            overflow: hidden; transform: scale(0.96);
            animation: lsg-pop-in 0.18s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        @keyframes lsg-pop-in { to { transform: scale(1); } }
        #lsg-dialog-box .lsg-d-head { padding: 1.25rem 1.5rem 0.5rem; display: flex; align-items: center; gap: 0.75rem; }
        #lsg-dialog-box .lsg-d-icon { width: 2.5rem; height: 2.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
        #lsg-dialog-box .lsg-d-title { font-weight: 900; font-size: 1rem; color: #18181b; }
        #lsg-dialog-box .lsg-d-body { padding: 0.25rem 1.5rem 1.25rem; color: #3f3f46; font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
        #lsg-dialog-box .lsg-d-input { width: calc(100% - 3rem); margin: 0 1.5rem 1.25rem; padding: 0.75rem 1rem; border: 1.5px solid #e4e4e7; border-radius: 0.75rem; font-size: 16px; outline: none; transition: border-color 0.15s; }
        #lsg-dialog-box .lsg-d-input:focus { border-color: #eab308; }
        #lsg-dialog-box .lsg-d-foot { display: flex; gap: 0.5rem; padding: 0 1rem 1rem; flex-wrap: wrap; }
        #lsg-dialog-box .lsg-d-btn { flex: 1; min-width: 100px; padding: 0.75rem 1rem; border-radius: 0.75rem; font-weight: 800; font-size: 0.9rem; cursor: pointer; border: none; transition: all 0.15s; min-height: 44px; }
        #lsg-dialog-box .lsg-d-btn-primary { background: #18181b; color: #eab308; }
        #lsg-dialog-box .lsg-d-btn-primary:active { transform: scale(0.97); }
        #lsg-dialog-box .lsg-d-btn-cancel { background: #f4f4f5; color: #52525b; }
        #lsg-dialog-box .lsg-d-btn-cancel:active { transform: scale(0.97); }
        #lsg-dialog-box .lsg-d-btn-danger { background: #dc2626; color: #fff; }
        #lsg-dialog-box.icon-info .lsg-d-icon { background: #dbeafe; color: #2563eb; }
        #lsg-dialog-box.icon-warn .lsg-d-icon { background: #fef3c7; color: #d97706; }
        #lsg-dialog-box.icon-error .lsg-d-icon { background: #fee2e2; color: #dc2626; }
        #lsg-dialog-box.icon-success .lsg-d-icon { background: #dcfce7; color: #16a34a; }
        #lsg-dialog-box.icon-ask .lsg-d-icon { background: #fef9c3; color: #ca8a04; }

        /* Toast (for short non-blocking messages) */
        #lsg-toast {
            position: fixed;
            top: calc(env(safe-area-inset-top, 0px) + 1rem);
            left: 50%; transform: translateX(-50%) translateY(-150%);
            background: #18181b; color: #fff; padding: 0.75rem 1.25rem;
            border-radius: 0.75rem; font-size: 0.875rem; font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 100000; max-width: 90vw; text-align: center;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
            pointer-events: none;
        }
        #lsg-toast.show { transform: translateX(-50%) translateY(0); }
        #lsg-toast.error { background: #dc2626; }
        #lsg-toast.success { background: #16a34a; }

        /* ========= SIDEBAR ========= */
        #app-sidebar {
            width: 16rem;
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: width;
        }
        #app-sidebar.collapsed { width: 4rem; }

        /* toggle button */
        #app-sidebar #sidebar-toggle-wrap {
            display: flex;
            justify-content: flex-start;
            transition: justify-content 0s;
        }
        #app-sidebar.collapsed #sidebar-toggle-wrap {
            justify-content: center;
        }
        #app-sidebar .sidebar-toggle-inner {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 0.65rem;
            border-radius: 0.625rem;
            transition: padding 0.35s cubic-bezier(0.4,0,0.2,1), background-color 0.15s ease;
        }
        #app-sidebar:not(.collapsed) .sidebar-toggle-inner {
            width: 100%;
        }
        #app-sidebar.collapsed .sidebar-toggle-inner {
            width: 2.75rem;
            padding: 0.7rem;
            justify-content: center;
        }
        #app-sidebar .sidebar-toggle-inner i {
            width: 1.25rem;
            text-align: center;
            flex-shrink: 0;
            font-size: 1rem;
        }

        /* nav wrapper */
        #sidebar-nav { padding-left: 0.5rem; padding-right: 0.5rem; }

        /* nav item — expanded */
        #app-sidebar .nav-item {
            width: 100%;
            padding: 0.625rem 0.75rem;
            border-radius: 0.625rem;
            justify-content: flex-start;
            transition: padding 0.35s cubic-bezier(0.4,0,0.2,1),
                        border-radius 0.35s cubic-bezier(0.4,0,0.2,1),
                        background-color 0.15s ease;
        }

        /* nav item — collapsed: กลายเป็น square pill กึ่งกลาง */
        #app-sidebar.collapsed #sidebar-nav { padding-left: 0; padding-right: 0; display: flex; flex-direction: column; align-items: center; gap: 0.125rem; }
        #app-sidebar.collapsed .nav-item {
            width: 2.75rem;
            padding: 0.7rem;
            border-radius: 0.75rem;
            justify-content: center;
        }

        /* icon */
        #app-sidebar .nav-item i,
        #app-sidebar .sidebar-toggle-inner > i {
            width: 1.25rem; text-align: center; flex-shrink: 0; font-size: 1rem;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        #app-sidebar.collapsed .nav-item i { transform: scale(1.05); }

        /* label */
        #app-sidebar .nav-item .sidebar-text { margin-left: 0.65rem; }
        #app-sidebar.collapsed .nav-item .sidebar-text { margin-left: 0; }

        /* fade/slide text */
        #app-sidebar .sidebar-text,
        #app-sidebar .admin-panel-text,
        #app-sidebar .footer-text {
            opacity: 1; transform: translateX(0); pointer-events: auto;
            transition: opacity 0.2s ease 0.1s, transform 0.2s ease 0.05s;
            white-space: nowrap; overflow: hidden;
        }
        #app-sidebar.collapsed .sidebar-text,
        #app-sidebar.collapsed .admin-panel-text,
        #app-sidebar.collapsed .footer-text {
            opacity: 0; transform: translateX(-6px); pointer-events: none;
            transition: opacity 0.1s ease, transform 0.1s ease;
        }

        /* collapsed footer badge */
        #app-sidebar .collapsed-footer-text {
            opacity: 0; transform: scale(0.8); pointer-events: none;
            transition: opacity 0.2s ease 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1) 0.15s;
        }
        #app-sidebar.collapsed .collapsed-footer-text {
            opacity: 1; transform: scale(1); pointer-events: auto;
        }

        /* admin divider — ซ่อนแค่ label+border ตอน collapsed ไม่ซ่อน items */
        #app-sidebar.collapsed .admin-divider-border { display: none; }

        /* ========= MOBILE BOTTOM NAV ========= */
        #mobile-bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background: #18181b;
            border-top: 1px solid #27272a;
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        #mobile-bottom-nav .mob-nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 8px 4px;
            color: #71717a;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.15s ease;
            border: none;
            background: none;
            min-width: 0;
        }
        #mobile-bottom-nav .mob-nav-item i {
            font-size: 1.1rem;
            transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
        }
        #mobile-bottom-nav .mob-nav-item.active {
            color: #eab308;
        }
        #mobile-bottom-nav .mob-nav-item.active i {
            transform: scale(1.15);
        }
        #mobile-bottom-nav .mob-nav-more-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 8px 4px;
            color: #71717a;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            background: none;
        }

        /* ========= MOBILE SIDEBAR DRAWER ========= */
        #mobile-sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 60;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        #mobile-sidebar-overlay.open { display: block; }

        #mobile-sidebar-drawer {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 280px;
            max-width: 85vw;
            background: #18181b;
            z-index: 70;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        #mobile-sidebar-drawer.open { transform: translateX(0); }

        /* ========= MOBILE RESPONSIVE TYPOGRAPHY & LAYOUT ========= */
        @media (max-width: 767px) {
            /* แสดง bottom nav, ซ่อน sidebar ปกติ */
            #app-sidebar { display: none !important; }
            #mobile-bottom-nav { display: flex; }

            /* content area ต้องมี padding-bottom สำหรับ bottom nav */
            #content-wrapper {
                padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px)) !important;
            }

            /* Topbar — safe area top */
            #app-topbar {
                padding-top: env(safe-area-inset-top, 0px);
                height: calc(3.5rem + env(safe-area-inset-top, 0px));
                padding-left: 0.75rem !important;
                padding-right: 0.75rem !important;
            }

            /* ลด heading ใหญ่ */
            .text-5xl { font-size: 2rem !important; }
            .text-4xl { font-size: 1.75rem !important; }
            .text-3xl { font-size: 1.25rem !important; }
            .text-2xl { font-size: 1.1rem !important; }
            .text-xl  { font-size: 1rem !important; }

            /* page header titles */
            h1, h2 { word-break: break-word; }

            /* ป้องกันข้อความล้น */
            * { min-width: 0; }

            /* ตาราง scroll แนวนอนได้ */
            .overflow-x-auto { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
            table { min-width: max-content; }

            /* card padding ลดบน mobile */
            .rounded-\[2rem\] { border-radius: 1.25rem !important; }
            .p-8  { padding: 1rem !important; }
            .p-10 { padding: 1.25rem !important; }
            .p-12 { padding: 1.5rem !important; }
            .px-8 { padding-left: 1rem !important; padding-right: 1rem !important; }
            .py-8 { padding-top: 1rem !important; padding-bottom: 1rem !important; }

            /* page content padding */
            .p-6 { padding: 0.875rem !important; }
            .p-6.lg\:p-8 { padding: 0.875rem !important; }
            .p-6.lg\:p-10 { padding: 0.875rem !important; }

            /* notification panel เต็มจอ */
            #notif-panel {
                position: fixed !important;
                top: calc(3.5rem + env(safe-area-inset-top, 0px)) !important;
                left: 0.5rem !important;
                right: 0.5rem !important;
                width: auto !important;
                max-height: 75vh;
                overflow-y: auto;
                border-radius: 1.25rem !important;
            }

            /* modal ปรับขนาดบน mobile */
            .fixed.inset-0 > .bg-white,
            .fixed.inset-0 > div > .bg-white,
            .fixed.inset-0 > div > .bg-zinc-900 {
                margin: 0.5rem;
                max-height: calc(100vh - 1rem);
                border-radius: 1.25rem !important;
                overflow-y: auto;
            }

            /* modal bottom-sheet style */
            .fixed.inset-0 .rounded-2xl,
            .fixed.inset-0 .rounded-3xl {
                border-radius: 1.25rem !important;
            }

            /* grid cols ลด */
            .grid-cols-4 { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
            .sm\:grid-cols-4 { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
            .grid-cols-3 { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }

            /* นาฬิกา clock page ให้ใหญ่และชัด */
            #current-time-display { font-size: 2.5rem !important; letter-spacing: 0.08em !important; }

            /* tracking ที่ทำให้ล้น */
            .tracking-widest { letter-spacing: 0.05em !important; }
            .tracking-wider  { letter-spacing: 0.03em !important; }

            /* truncate ป้องกัน overflow */
            .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }

            /* executive dashboard cards */
            .ex-kpi-val { font-size: 1.35rem !important; }

            /* ปุ่มลงเวลาใหญ่ขึ้นบน mobile — touch friendly */
            #btn-clock-in, #btn-clock-out { min-height: 3.5rem; font-size: 1.1rem !important; }

            /* calendar cells เล็กลงเล็กน้อยบน mobile */
            .cal-cell { border-radius: 0.5rem !important; font-size: 0.8rem !important; }
            .cal-label { font-size: 0.4rem !important; }

            /* gap ในหน้าต่างๆ */
            .gap-8 { gap: 1rem !important; }
            .gap-6 { gap: 0.875rem !important; }
            .space-y-6 > * + * { margin-top: 0.875rem !important; }
            .space-y-8 > * + * { margin-top: 1rem !important; }

            /* pr-modal */
            #pr-modal-rec .overflow-y-auto,
            #pr-modal-create .overflow-y-auto {
                max-height: calc(100vh - 6rem);
            }

            /* announcement editor บน mobile */
            #ann-editor-panel { display: none; }
        }

        /* ========= PAGE TRANSITIONS ========= */
        #page-content {
            will-change: opacity;
        }
        @keyframes pageFadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* ========= LOADING OVERLAY (unused, kept for init) ========= */
        #page-loader { display: none !important; }

        /* ========= SCROLLBAR ========= */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-50 flex h-screen overflow-hidden text-zinc-800">

    <!-- ===================== CUSTOM DIALOG (LINE LIFF / iOS friendly) ===================== -->
    <div id="lsg-dialog-backdrop" role="dialog" aria-modal="true">
        <div id="lsg-dialog-box">
            <div class="lsg-d-head">
                <div class="lsg-d-icon"><i class="fa-solid fa-info"></i></div>
                <div class="lsg-d-title">แจ้งเตือน</div>
            </div>
            <div class="lsg-d-body"></div>
            <input type="text" class="lsg-d-input" style="display:none" autocomplete="off" autocapitalize="off">
            <div class="lsg-d-foot"></div>
        </div>
    </div>
    <div id="lsg-toast"></div>

    <!-- ===================== SIDEBAR (อยู่ตลอด ไม่โหลดใหม่) ===================== -->
    <aside id="app-sidebar" class="bg-zinc-900 text-zinc-300 flex flex-col shadow-xl z-20 h-full overflow-hidden shrink-0">
        <!-- Sidebar Toggle Button -->
        <div class="border-b border-zinc-800 px-2 py-2" id="sidebar-toggle-wrap">
            <button onclick="toggleSidebar()" title="ย่อ/ขยายเมนู"
                class="sidebar-toggle-inner hover:bg-zinc-800 group">
                <i class="fa-solid fa-bars text-zinc-400 group-hover:text-yellow-400 transition-colors"></i>
                <span class="sidebar-text text-sm font-black text-white tracking-wider whitespace-nowrap">Lamsang Group</span>
            </button>
        </div>

        <!-- Nav -->
        <nav id="sidebar-nav" class="flex-1 py-4 space-y-1 overflow-y-auto overflow-x-hidden">
            <!-- รายการเมนูจะถูก inject โดย JS หลังล็อกอิน -->
            <div class="animate-pulse space-y-3 px-2">
                <div class="h-10 bg-zinc-800 rounded-lg"></div>
                <div class="h-10 bg-zinc-800 rounded-lg opacity-70"></div>
                <div class="h-10 bg-zinc-800 rounded-lg opacity-40"></div>
            </div>
        </nav>

        <div class="relative border-t border-zinc-800 shrink-0">
            <div class="p-4 text-[10px] text-zinc-600 text-center uppercase tracking-widest font-medium footer-text whitespace-nowrap">
                &copy; 2026 Lamsang Group
            </div>
            <div class="p-4 text-[10px] text-zinc-600 text-center font-black collapsed-footer-text absolute inset-0 flex items-center justify-center">LSG</div>
        </div>
    </aside>

    <!-- ===================== MOBILE SIDEBAR DRAWER (mobile only) ===================== -->
    <div id="mobile-sidebar-overlay" onclick="closeMobileDrawer()"></div>
    <div id="mobile-sidebar-drawer">
        <div class="flex items-center justify-between px-4 py-4 border-b border-zinc-800" style="padding-top: calc(1rem + env(safe-area-inset-top, 0px))">
            <div class="flex items-center gap-3">
                <img src="https://lh3.googleusercontent.com/d/1wFGzcl5Y3yEfd39sA2LTbrgeNkgVxm27"
                     alt="Lamsang Logo" class="h-8 w-8 object-contain rounded-lg" style="background:rgba(255,255,255,0.1);padding:2px">

    <!-- ===================== MOBILE / LINE COMPAT SHIM ===================== -->
    <script>
    (function() {
        // ---- Detect LINE in-app browser & iOS ----
        const UA = (navigator.userAgent || '').toLowerCase();
        window.__isLINE = UA.includes(' line/') || UA.includes('line/');
        window.__isIOS  = /iphone|ipad|ipod/.test(UA) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        window.__isAndroid = UA.includes('android');
        if (window.__isLINE) document.documentElement.classList.add('is-line');
        if (window.__isIOS)  document.documentElement.classList.add('is-ios');
        if (window.__isAndroid) document.documentElement.classList.add('is-android');

        // ---- Safe localStorage wrapper (Safari private mode / LIFF restricted) ----
        window.safeStorage = {
            get(k) { try { return localStorage.getItem(k); } catch(e) { return null; } },
            set(k, v) { try { localStorage.setItem(k, v); return true; } catch(e) { return false; } },
            remove(k) { try { localStorage.removeItem(k); } catch(e) {} }
        };

        // ---- Custom dialog (replaces alert / confirm / prompt) ----
        // Native dialogs render badly in LINE in-app browser and freeze the page on iOS.
        const $bd  = document.getElementById('lsg-dialog-backdrop');
        const $box = document.getElementById('lsg-dialog-box');
        function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

        function showDialog(opts) {
            return new Promise(resolve => {
                if (!$bd || !$box) { resolve(opts.kind === 'confirm' ? window.confirm(opts.message) : (opts.kind === 'prompt' ? window.prompt(opts.message, opts.defaultValue || '') : true)); return; }
                const kind = opts.kind || 'alert';
                const variant = opts.variant || (kind === 'confirm' ? 'ask' : (kind === 'prompt' ? 'info' : 'info'));
                $box.className = '';
                $box.classList.add('icon-' + variant);
                const iconMap = { info: 'fa-info', warn: 'fa-triangle-exclamation', error: 'fa-circle-exclamation', success: 'fa-circle-check', ask: 'fa-circle-question' };
                $box.querySelector('.lsg-d-icon').innerHTML = '<i class="fa-solid ' + (iconMap[variant] || 'fa-info') + '"></i>';
                $box.querySelector('.lsg-d-title').textContent = opts.title || (kind === 'confirm' ? 'ยืนยัน' : (kind === 'prompt' ? 'กรอกข้อมูล' : 'แจ้งเตือน'));
                $box.querySelector('.lsg-d-body').textContent = opts.message || '';

                const $input = $box.querySelector('.lsg-d-input');
                if (kind === 'prompt') {
                    $input.style.display = 'block';
                    $input.value = opts.defaultValue || '';
                    $input.type = opts.inputType || 'text';
                    setTimeout(() => $input.focus(), 100);
                } else {
                    $input.style.display = 'none';
                }

                const $foot = $box.querySelector('.lsg-d-foot');
                $foot.innerHTML = '';
                const cleanup = (result) => {
                    $bd.classList.remove('open');
                    document.body.style.overflow = '';
                    resolve(result);
                };

                if (kind === 'alert') {
                    const ok = document.createElement('button');
                    ok.className = 'lsg-d-btn lsg-d-btn-primary';
                    ok.textContent = opts.okText || 'ตกลง';
                    ok.onclick = () => cleanup(true);
                    $foot.appendChild(ok);
                    setTimeout(() => ok.focus(), 100);
                } else {
                    const cancel = document.createElement('button');
                    cancel.className = 'lsg-d-btn lsg-d-btn-cancel';
                    cancel.textContent = opts.cancelText || 'ยกเลิก';
                    cancel.onclick = () => cleanup(kind === 'confirm' ? false : null);
                    const ok = document.createElement('button');
                    ok.className = 'lsg-d-btn ' + (opts.danger ? 'lsg-d-btn-danger' : 'lsg-d-btn-primary');
                    ok.textContent = opts.okText || 'ตกลง';
                    ok.onclick = () => cleanup(kind === 'confirm' ? true : $input.value);
                    $foot.appendChild(cancel);
                    $foot.appendChild(ok);

                    if (kind === 'prompt') {
                        $input.onkeydown = (e) => { if (e.key === 'Enter') ok.click(); else if (e.key === 'Escape') cancel.click(); };
                    }
                }

                $bd.classList.add('open');
                document.body.style.overflow = 'hidden';
            });
        }

        window.lsgDialog = showDialog;

        // Override native dialogs with our custom one.
        // Native confirm/prompt are synchronous; we return a thenable that also has a sane default
        // so legacy `if (confirm(...))` still works (it will treat the object as truthy).
        // We provide async versions: lsgAlert / lsgConfirm / lsgPrompt.
        window.lsgAlert = (msg, title, variant) => showDialog({ kind: 'alert', message: msg, title, variant: variant || 'info' });
        window.lsgConfirm = (msg, opts = {}) => showDialog({ kind: 'confirm', message: msg, ...opts });
        window.lsgPrompt = (msg, defaultValue, opts = {}) => showDialog({ kind: 'prompt', message: msg, defaultValue, ...opts });

        // Replace native alert with non-blocking version (returns immediately, dialog still shows).
        const _nativeAlert = window.alert.bind(window);
        window.alert = function(msg) {
            try { showDialog({ kind: 'alert', message: String(msg) }); }
            catch (e) { _nativeAlert(msg); }
        };

        // We can't truly replace synchronous confirm/prompt, but we can keep native as fallback
        // (Chrome on Android still works; LINE iOS sometimes blocks). The codebase uses these
        // pattern: `if (confirm(...))`. Leave native confirm/prompt for now — they DO work in
        // LINE on iOS/Android per current LINE app behavior, just look ugly. Devs should migrate
        // to lsgConfirm/lsgPrompt where UX matters.

        // ---- Toast (non-blocking notification) ----
        let toastTimer = null;
        const $toast = document.getElementById('lsg-toast');
        window.lsgToast = function(message, type, duration) {
            if (!$toast) return;
            $toast.className = '';
            if (type) $toast.classList.add(type);
            $toast.textContent = message;
            requestAnimationFrame(() => $toast.classList.add('show'));
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => $toast.classList.remove('show'), duration || 2500);
        };

        // ---- Safe window.open for LINE (blocked) ----
        // In LINE LIFF, window.open() returns null. Fallback to location.href which always works.
        window.safeOpen = function(url, target) {
            try {
                if (window.__isLINE) {
                    // LIFF API if available
                    if (window.liff && window.liff.openWindow) {
                        window.liff.openWindow({ url, external: true });
                        return;
                    }
                    // Otherwise navigate in same window (so user doesn't lose the URL)
                    window.location.href = url;
                    return;
                }
                const w = window.open(url, target || '_blank');
                if (!w) {
                    // Popup blocked — fallback to current window
                    window.location.href = url;
                }
            } catch (e) {
                window.location.href = url;
            }
        };

        // ---- Visual viewport height for keyboard-aware fixed elements ----
        // iOS Safari: when the keyboard opens, fixed bottom elements can overlap the input.
        // Set --vvh on root to track the visible area.
        function syncVVH() {
            const vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
            document.documentElement.style.setProperty('--vvh', vh + 'px');
        }
        syncVVH();
        window.addEventListener('resize', syncVVH);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', syncVVH);
        }
    })();
    </script>

        window.todayTH = function() {

         * คืน ISO string ปัจจุบันโดยใช้ offset ของไทย (UTC+7)
         * ใช้แทน new Date().toISOString() เมื่อต้องการ local date ที่ถูกต้อง
         */
        window.nowTH = function() {
            const now = new Date();
            // shift เวลาเป็น UTC+7 แล้วตัด timezone ออก ให้ได้ local ISO string

        window.newDateTH = function() {

            const mobileNav = document.getElementById('mobile-drawer-nav');
            const items = buildNav(profile);
            let html = '';
            let inAdminDiv = false;
        
            items.forEach(item => {
                if (!item.show) return;
        
                // Divider = เปิด admin section
                if (item.divider) {
                    if (inAdminDiv) html += '</div>';
                    html += `<div class="mt-4 pt-4 border-t border-zinc-800 admin-divider-border">
                        <p class="pl-3 text-[10px] text-zinc-500 uppercase tracking-widest mb-2 font-bold admin-panel-text whitespace-nowrap">${item.label}</p>
                    </div>`;
                    inAdminDiv = false;
                    return;
                }
        
                const isActive = item.id === activeId;
                const baseClass = 'nav-item flex items-center py-3 rounded-lg transition-colors cursor-pointer';
                const activeClass = isActive
                    ? 'bg-yellow-500 text-zinc-900 font-semibold shadow-sm'
                    : (item.adminStyle
                        ? 'text-yellow-500 hover:bg-zinc-800 hover:text-yellow-400'
                        : 'hover:bg-zinc-800 hover:text-yellow-400');
        
                html += `<button data-page="${item.id}" class="${baseClass} ${activeClass} w-full text-left" title="${item.label}">
                    <i class="fa-solid ${item.icon} shrink-0"></i>
                    <span class="sidebar-text font-medium whitespace-nowrap">${item.label}</span>
                </button>`;
            });
        
            if (inAdminDiv) html += '</div>';
        
            nav.innerHTML = html;
            nav.querySelectorAll('button[data-page]').forEach(btn => {
                btn.addEventListener('click', () => navigateTo(btn.dataset.page));
            });

            // ── Mobile Drawer Nav (same items, slightly different style) ──
            if (mobileNav) {
                let mhtml = '';
                let inMDiv = false;
                items.forEach(item => {
                    if (!item.show) return;
                    if (item.divider) {
                        if (inMDiv) mhtml += '</div>';
                        mhtml += `<div class="pt-3 pb-1 px-3">
                            <p class="text-[10px] text-zinc-600 uppercase tracking-widest font-bold border-t border-zinc-800 pt-3">${item.label}</p>

                        return;

                    const ac = isActive ? 'bg-yellow-500 text-zinc-900 font-semibold' :

                    mhtml += `<button data-mpage="${item.id}"
                        style="width:100%;display:flex;align-items:center;gap:0.875rem;padding:0.75rem 1rem;border-radius:0.75rem;border:none;cursor:pointer;margin-bottom:2px;transition:background-color 0.15s,color 0.15s;text-align:left;"
                        class="${ac}" title="${item.label}">
                        <i class="fa-solid ${item.icon}" style="width:1.1rem;text-align:center;flex-shrink:0;font-size:0.95rem;"></i>
                        <span style="font-size:0.875rem;font-weight:600;white-space:nowrap;">${item.label}</span>
                    </button>`;
                });
                if (inMDiv) mhtml += '</div>';
                mobileNav.innerHTML = mhtml;
                mobileNav.querySelectorAll('button[data-mpage]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        closeMobileDrawer();
                        navigateTo(btn.dataset.mpage);

            }

        // ── Navigate ────────────────────────────────────────────────────
        window.navigateTo = async function(pageId) {
            if (pageId === currentPageId) return;
            if (pageId === '#' || pageId === '---') {
                showToast('หน้านี้ยังอยู่ระหว่างพัฒนา', 'info');
                return;
            }

            // อัปเดต mobile bottom nav
            if (window.updateMobileNav) updateMobileNav(pageId);
            // ปิด drawer ถ้าเปิดอยู่
            if (window.closeMobileDrawer) closeMobileDrawer();

            if (typeof pageCleanup === 'function') { pageCleanup(); pageCleanup = null; }
            currentPageId = pageId;
            if (userProfile) renderNav(userProfile, pageId);

            const contentEl = document.getElementById('page-content');

            try {
                const page = await loadPage(pageId);
                if (!page) return;

                // swap content แล้ว fade in ทันที ไม่มี flash
                contentEl.style.animation = 'none';
                contentEl.style.opacity = '0';
                contentEl.innerHTML = page.html;
                contentEl.offsetHeight; // force reflow
                contentEl.style.animation = 'pageFadeIn 0.2s ease forwards';

                document.getElementById('topbar-title').textContent = page.title || 'Lamsang Group';
                document.title = `${page.title || 'หน้าหลัก'} - Lamsang Group`;
                document.getElementById('content-wrapper').scrollTop = 0;

                if (typeof page.init === 'function') {
                    pageCleanup = await page.init(currentUser, userProfile, db, APP_ID) || null;
                }

                history.pushState({ page: pageId }, '', `#${pageId}`);

            } catch (err) {
                console.error('Page load error:', err);
                contentEl.style.opacity = '1';
                contentEl.style.animation = '';
                contentEl.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-64 text-zinc-400">
                        <i class="fa-solid fa-triangle-exclamation text-4xl mb-4 text-yellow-500"></i>
                        <p class="font-bold">ไม่สามารถโหลดหน้านี้ได้</p>
                        <p class="text-xs mt-1 text-red-400">${err.message}</p>

        // ค่อยๆ ย้ายหน้าที่เหลือมาที่นี่ทีละหน้า (app.html ยังยาวเกินไป)
        const PAGE_MODULES = {
            'holidays':         () => import('./js/pages/holidays.js'),

            'branch-locations': () => import('./js/pages/branch-locations.js'),

        async function loadPage(pageId) {
            if (PAGES[pageId]) return PAGES[pageId];
            if (PAGE_MODULES[pageId]) {
                try {
                    const mod = await PAGE_MODULES[pageId]();
                    PAGES[pageId] = mod.default;   // cache ไว้ ไม่ต้องโหลดซ้ำ
                    return PAGES[pageId];
                } catch (e) {
                    console.error(`โหลดหน้า "${pageId}" ไม่สำเร็จ:`, e);
                    return null;
                }
            }
            console.warn(`Page "${pageId}" not registered`);
            return null;
        }

        // ── บังคับเปลี่ยนรหัสผ่านครั้งแรก ───────────────────────────
        // resolve เมื่อเปลี่ยนรหัสสำเร็จเท่านั้น — ปิดไม่ได้ กด ESC ไม่ได้ ข้ามไม่ได้

        // ── เตือนลืมลงเวลาออก ───────────────────────────────────────
        // เลย workEnd + 1 ชม. แล้วมี clock_in วันนี้แต่ไม่มี clock_out → แสดงแบนเนอร์
        let _forgotInterval = null;
        async function startForgotClockOutWatch(user, profile) {
            const { collection, doc, getDoc, getDocs, query, where }
                = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

            let sched = { workEnd: '17:00', workDays: [1,2,3,4,5] };
            try {
                const s = await getDoc(doc(db,'artifacts',APP_ID,'public','data','work_schedules', user.uid));
                if (s.exists()) sched = { ...sched, ...s.data() };
            } catch {}

            async function check() {
                try {
                    const today = todayTH();
                    // ปิดแบนเนอร์ไปแล้ววันนี้ → ไม่เตือนซ้ำ
                    if (sessionStorage.getItem('forgotClockOutDismissed') === today) return;

                    const dow = newDateTH().getDay();
                    const workDaySet = new Set(sched.workDays || [1,2,3,4,5]);
                    if (!workDaySet.has(dow)) return;

                    // เลยเวลาเลิกงาน + 1 ชม. หรือยัง
                    const nowHM = newDateTH().toTimeString().slice(0,5);
                    const [eh, em] = (sched.workEnd || '17:00').split(':').map(Number);
                    const endPlus1 = String(Math.min(23, eh+1)).padStart(2,'0') + ':' + String(em).padStart(2,'0');
                    if (nowHM < endPlus1) { removeForgotBanner(); return; }

                    const snap = await getDocs(query(
                        collection(db,'artifacts',APP_ID,'public','data','time_logs'),
                        where('uid','==',user.uid), where('localDate','==',today)
                    ));
                    const logs = snap.docs.map(d=>d.data());
                    const hasIn  = logs.some(l=>l.type==='clock_in');
                    const hasOut = logs.some(l=>l.type==='clock_out');
                    if (hasIn && !hasOut) showForgotBanner();
                    else removeForgotBanner();
                } catch(e) { console.warn('forgotClockOut:', e); }
            }

            function showForgotBanner() {
                if (document.getElementById('forgot-clockout-banner')) return;
                const div = document.createElement('div');
                div.id = 'forgot-clockout-banner';
                div.className = 'fixed bottom-20 sm:bottom-6 left-1/2 -translate-x-1/2 z-[150] w-[92%] max-w-md bg-red-600 text-white rounded-2xl shadow-2xl p-4 flex items-center gap-3';
                div.innerHTML = `
                    <i class="fa-solid fa-bell fa-shake text-2xl text-yellow-300 shrink-0"></i>
                    <div class="flex-1 min-w-0">
                        <p class="font-black text-sm">อย่าลืมลงเวลาออกงาน!</p>
                        <p class="text-xs text-red-100">วันนี้คุณลงเวลาเข้า แต่ยังไม่ได้ลงเวลาออก</p>
                    </div>
                    <button onclick="navigateTo('time');document.getElementById('forgot-clockout-banner')?.remove();"
                        class="bg-white text-red-600 font-black text-xs px-3 py-2 rounded-xl shrink-0 hover:bg-red-50">ลงเวลาออก</button>
                    <button onclick="sessionStorage.setItem('forgotClockOutDismissed', '${todayTH()}');document.getElementById('forgot-clockout-banner')?.remove();"
                        class="text-red-200 hover:text-white shrink-0"><i class="fa-solid fa-xmark"></i></button>`;
                document.body.appendChild(div);
            }
            function removeForgotBanner() {
                document.getElementById('forgot-clockout-banner')?.remove();
            }

            check();
            if (_forgotInterval) clearInterval(_forgotInterval);
            _forgotInterval = setInterval(check, 10 * 60 * 1000);
        }

        // ================================================================
        // GLOBAL PHOTO UTILITIES — Cloudinary upload
        // ================================================================
        const _CLOUDINARY_CLOUD  = 'dmxvtpqur';
        const _CLOUDINARY_PRESET = 'lamsang_hris';
        const _CLOUDINARY_URL    = `https://api.cloudinary.com/v1_1/${_CLOUDINARY_CLOUD}/image/upload`;

        // แปลง Google Drive share link → URL รูปที่ดูได้โดยตรง
        window.convertDriveLink = function(url) {
            if (!url) return '';
            if (!url.includes('drive.google.com')) return url;
            const m1 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (m1) return `https://lh3.googleusercontent.com/d/${m1[1]}`;
            const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (m2) return `https://lh3.googleusercontent.com/d/${m2[1]}`;
            const m3 = url.match(/open\?id=([a-zA-Z0-9_-]+)/);
            if (m3) return `https://lh3.googleusercontent.com/d/${m3[1]}`;
            return url;
        };

        // helper: แปลง URL รูปพร้อม fallback chain สำหรับ Safari/iOS
        window.imgSrcWithFallback = function(url, name) {
            const fallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(name||'?')}&background=27272a&color=eab308&bold=true&size=128`;
            if (!url) return fallback;
            // lh3.googleusercontent.com/d/ → เพิ่ม uc?export=view fallback
            const driveId = url.match(/lh3\.googleusercontent\.com\/d\/([a-zA-Z0-9_-]+)/);
            if (driveId) {
                return url; // primary — ถ้า fail จะใช้ onerror
            }
            return url;
        };

        // Global onerror handler สำหรับรูปที่โหลดไม่ได้ (Safari, CORS, expired)
        window.handleImgError = function(img) {
            const name = img.dataset.name || img.alt || '?';
            // ลอง uc?export=view ก่อน ถ้า src เป็น lh3
            const driveId = (img.src||'').match(/lh3\.googleusercontent\.com\/d\/([a-zA-Z0-9_-]+)/);
            if (driveId && !img.dataset.triedUc) {
                img.dataset.triedUc = '1';
                img.src = `https://drive.google.com/uc?export=view&id=${driveId[1]}`;
                return;
            }
            // fallback สุดท้าย: ui-avatars
            img.onerror = null;
            img.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=27272a&color=eab308&bold=true&size=128`;
        };

        // อัปโหลดรูปไป Cloudinary พร้อม progress callback
        window.uploadPhotoToStorage = async function(file, _unusedPath, onProgress) {
            if (!file) throw new Error('ไม่มีไฟล์');
            if (file.size > 10 * 1024 * 1024) throw new Error('รูปต้องไม่เกิน 10 MB');
            const allowed = ['image/jpeg','image/png','image/webp','image/gif'];
            if (!allowed.includes(file.type)) throw new Error('รองรับเฉพาะ JPG, PNG, WebP, GIF');

            return new Promise((resolve, reject) => {
                const fd = new FormData();
                fd.append('file', file);
                fd.append('upload_preset', _CLOUDINARY_PRESET);
                fd.append('folder', 'lamsang_hris');

                const xhr = new XMLHttpRequest();
                xhr.open('POST', _CLOUDINARY_URL, true);

                xhr.upload.addEventListener('progress', e => {
                    if (e.lengthComputable && typeof onProgress === 'function')
                        onProgress(Math.round(e.loaded / e.total * 100));
                });
                xhr.addEventListener('load', () => {
                    if (xhr.status === 200) {
                        try {
                            const res = JSON.parse(xhr.responseText);
                            resolve(res.secure_url);
                        } catch(e) { reject(new Error('Parse error')); }
                    } else {
                        reject(new Error(`Cloudinary error ${xhr.status}`));
                    }
                });
                xhr.addEventListener('error', () => reject(new Error('Network error')));
                xhr.send(fd);
            });
        };

        function fmtNotifDate(ds) {
            if (!ds) return '';
            try {
                // ds อาจเป็น ISO timestamp (UTC) หรือ 'YYYY-MM-DD' — ต้องระบุ timeZone ให้ถูกต้อง
                const d = ds.length === 10 ? new Date(ds + 'T12:00:00+07:00') : new Date(ds);
                return d.toLocaleDateString('th-TH', { day:'numeric', month:'short', timeZone:'Asia/Bangkok' });
            } catch { return ds; }
        }

        function renderNotifPanel() {
            const listEl = document.getElementById('notif-list');

            if (!listEl) return;

            const unread = _notifItems.filter(x => !x.read).length;

                </div>`; return;
            }

            function timeAgo(ts) {
                if (!ts) return '';
                const diff = Date.now() - new Date(ts).getTime();
                const m = Math.floor(diff/60000);
                if (m < 1)  return 'เมื่อกี้';
                if (m < 60) return m + ' นาทีที่แล้ว';
                const h = Math.floor(m/60);
                if (h < 24) return h + ' ชม.ที่แล้ว';
                return Math.floor(h/24) + ' วันที่แล้ว';
            }

            listEl.innerHTML = _notifItems.map(n => `
                <button onclick="clickNotif('${n.id}','${n.link}')"
                  class="w-full flex items-start gap-3 px-4 py-3.5 text-left hover:bg-zinc-50 transition-all ${n.read ? 'opacity-60' : 'bg-white'}">

        // LINE MESSAGING API — Push Notification Helper
        // ================================================================
        // token ไม่ฝังในโค้ดแล้ว — อ่านจาก Firestore: app_config/line ฟิลด์ channelAccessToken
        // (ของเดิมเคย hardcode ไว้ตรงนี้และหลุดขึ้น GitHub public ต้อง rotate ทิ้งแล้ว)
        //
        // ข้อจำกัดที่ต้องรู้: เบราว์เซอร์พนักงานเป็นคนยิง LINE เอง เครื่องเขาจึงต้องอ่าน token ได้
        // rules จึงเปิดให้ผู้ที่ล็อกอินแล้วอ่าน doc นี้ได้ = คนที่เปิด DevTools ยังเห็น token อยู่ดี
        // นี่แค่ปิดรูที่หลุดสู่สาธารณะ ยังไม่ใช่การแก้ที่ต้นเหตุ
        // ทางแก้จริงคือย้ายการยิง LINE ไปไว้หลัง Cloud Function แล้วเก็บ token เป็น env ฝั่งเซิร์ฟเวอร์
        const LINE_PROXY = 'https://api.line.me/v2/bot/message/push';

        let _lineTokenCache = null;
        async function getLineToken() {
            if (_lineTokenCache) return _lineTokenCache;
            const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
            const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'app_config', 'line'));
            const token = snap.exists() ? (snap.data().channelAccessToken || '') : '';
            if (!token) throw new Error('ยังไม่ได้ตั้งค่า LINE token — ไปที่ Firestore: app_config/line แล้วใส่ฟิลด์ channelAccessToken');
            _lineTokenCache = token;
            return token;
        }

        async function sendLineMessage(lineUserId, messages) {
            if (!lineUserId) throw new Error('ไม่มี LINE User ID');
            const token = await getLineToken();
            // ใช้ proxy เพื่อหลีกเลี่ยง CORS (LINE API ไม่รองรับ browser request โดยตรง)
            const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(LINE_PROXY);
            const res = await fetch(proxyUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token,
                },
                body: JSON.stringify({ to: lineUserId, messages }),
            });
            if (!res.ok) {
                const text = await res.text().catch(()=>'');
                throw new Error(`LINE API error ${res.status}: ${text.slice(0,120)}`);
            }
            return res;
        }

        //
        // เดิมโค้ดนี้อ่าน users ทั้ง collection จากเบราว์เซอร์พนักงาน ซึ่งแปลว่า
        // ต้องเปิดให้พนักงานอ่าน users ได้ = เห็นเงินเดือน เลขบัตร ปชช. เลขบัญชีของทุกคน
        // (rules ไม่ใช่ตัวกรอง จะขอเฉพาะ field ที่ต้องการไม่ได้ ต้องเปิดทั้ง doc)
        //
        // directory จึงเก็บเฉพาะข้อมูลที่ไม่อ่อนไหว (ชื่อ/role/lineId) ให้พนักงานอ่านได้
        // ส่วน users ยังล็อกไว้ที่ตัวเอง+หัวหน้าเหมือนเดิม
        // ถ้าย้ายไป Cloud Function เมื่อไหร่ ลบ directory ทิ้งได้เลย
        async function getManagerLineTargets(excludeUid) {
            const { collection, getDocs, query, where }
                = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
            const snap = await getDocs(query(
                collection(db, 'artifacts', APP_ID, 'public', 'data', 'directory'),
                where('notifyTarget', '==', true),
            ));
            return snap.docs.map(d => d.data())
                .filter(u => u.lineId && u.uid !== excludeUid);
        }

        // ── ตำแหน่งสำนักงาน + รัศมี geofence (ใช้ร่วมทุกหน้า) ─────────
        const OFFICE_LAT = 16.4132778;     // 16°24'47.8"N
        const OFFICE_LNG = 100.1666111;    // 100°09'59.8"E
        const OFFICE_RADIUS_M = 100;

        function distanceMeters(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const toRad = d => d * Math.PI / 180;
            const dLat = toRad(lat2 - lat1);
            const dLng = toRad(lng2 - lng1);
            const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
            return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // ── พิกัดต่อสาขา (Firestore: branch_locations) ────────────────
        // doc id = ชื่อสาขา, fields: { lat, lng, radius }
        // ถ้าสาขาไม่มีพิกัดตั้งไว้ → fallback เป็นพิกัดสำนักงานใหญ่ด้านบน
        let _branchLocCache = null;
        async function loadBranchLocations(forceReload) {
            if (_branchLocCache && !forceReload) return _branchLocCache;
            try {
                const { collection, getDocs } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                const snap = await getDocs(collection(db,'artifacts',APP_ID,'public','data','branch_locations'));
                const map = {};
                snap.forEach(d => { map[d.id] = d.data(); });
                _branchLocCache = map;
            } catch(e) { console.warn('branch_locations:', e); _branchLocCache = {}; }
            return _branchLocCache;
        }
        // หน้า branch-locations ที่แยกไฟล์ไปแล้วเรียกตัวนี้ — ต้องอยู่บน window
        // ไม่งั้นหน้านั้นพังด้วย "loadBranchLocations is not defined"
        // (แคช _branchLocCache กับ officeFor ยังผูกกันอยู่ใน scope นี้ เลยยังไม่ย้ายออกไปทั้งชุด)
        window.loadBranchLocations = loadBranchLocations;
        function officeFor(branch) {
            const loc = _branchLocCache && branch ? _branchLocCache[branch] : null;
            if (loc && loc.lat != null && loc.lng != null) {
                return { lat: loc.lat, lng: loc.lng, radius: loc.radius || OFFICE_RADIUS_M, name: branch };
            }
            return { lat: OFFICE_LAT, lng: OFFICE_LNG, radius: OFFICE_RADIUS_M, name: branch || 'สำนักงานใหญ่' };
        }

            init: async (user, profile, db, appId) => {

                function updateLocStatusFromPosition() {
                    if (!currentPosition) return;
                    const d = distanceMeters(currentPosition.lat, currentPosition.lng, myOffice.lat, myOffice.lng);
                    const acc = currentPosition.accuracy;
                    const inOffice = d <= myOffice.radius;
                    const distTxt = d < 1000 ? `${Math.round(d)} ม.` : `${(d/1000).toFixed(2)} กม.`;
                    const accTxt = acc > 100 ? ` (±${Math.round(acc)}ม.)` : '';
                    if (inOffice) {
                        setLocStatus(`✓ อยู่ในพื้นที่ ${myOffice.name} · ห่าง ${distTxt}${accTxt}`, 'text-green-600');
                    } else {
                        setLocStatus(`⚠ นอกพื้นที่ ${myOffice.name} · ห่าง ${distTxt}${accTxt}`, 'text-orange-500');

                window.requestLocation = (forceUI) => {

                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            currentPosition = {
                                lat: pos.coords.latitude,
                                lng: pos.coords.longitude,
                                accuracy: pos.coords.accuracy,
                                ts: Date.now(),

                function getFreshLocation(timeoutMs = 8000) {
                    return new Promise((resolve) => {
                        // ถ้ามี cache สดอยู่ (< 30s) ใช้เลย
                        if (currentPosition && (Date.now() - currentPosition.ts) < 30000) {
                            return resolve(currentPosition);
                        }
                        if (!navigator.geolocation) return resolve(null);
                        let done = false;
                        const t = setTimeout(() => { if (!done) { done = true; resolve(currentPosition || null); } }, timeoutMs);
                        navigator.geolocation.getCurrentPosition(
                            (pos) => {
                                if (done) return;
                                done = true; clearTimeout(t);
                                currentPosition = {
                                    lat: pos.coords.latitude,

                                    accuracy: pos.coords.accuracy,
                                    ts: Date.now(),
