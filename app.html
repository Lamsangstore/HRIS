                <div><label class="pr-lbl">\u0e25\u0e32\u0e01\u0e34\u0e08 (\u0e0a\u0e21.)</label><input ${RO} id="rlp" type="number" step="0.5" class="pr-input num" value="${r.personalLeaveHours||0}"></div>
                <div><label class="pr-lbl">\u0e25\u0e32\u0e1e\u0e31\u0e01\u0e23\u0e49\u0e2d\u0e19 (\u0e0a\u0e21.)</label><input ${RO} id="rlv" type="number" step="0.5" class="pr-input num" value="${r.vacationLeaveHours||0}"></div>
                <div><label class="pr-lbl">\u0e25\u0e32\u0e2d\u0e37\u0e48\u0e19\u0e46 (\u0e0a\u0e21.)</label><input ${RO} id="rlo" type="number" step="0.5" class="pr-input num" value="${r.otherLeaveHours||0}"></div>
                <div><label class="pr-lbl">\u0e2a\u0e32\u0e22 (\u0e0a\u0e21.)</label><input ${RO} id="rlt" type="number" step="0.5" class="pr-input num" value="${r.lateHours||0}"></div>
              </div>
            </div>
            <div class="pr-section"><p class="pr-section-title">\u0e01\u0e32\u0e23\u0e2b\u0e31\u0e01 (Deductions)</p>
              <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                <div><label class="pr-lbl">\u0e2b\u0e31\u0e01\u0e25\u0e32 (\u0e3f)</label><input ${RO} id="rdl" type="number" class="pr-input num" value="${r.deductLeave||0}"></div>
                <div><label class="pr-lbl">\u0e2b\u0e31\u0e01\u0e1b\u0e23\u0e30\u0e01\u0e31\u0e19\u0e2a\u0e31\u0e07\u0e04\u0e21 (\u0e3f)</label><input ${RO} id="rds" type="number" class="pr-input num" value="${r.deductSSO||0}"></div>
                <div><label class="pr-lbl">\u0e20\u0e32\u0e29\u0e35 \u0e13 \u0e17\u0e35\u0e48\u0e08\u0e48\u0e32\u0e22</label>
                  <select ${RO} id="rtm" class="pr-input" onchange="prRecalc()">
                    <option value="No" ${r.taxMode==='No'||!r.taxMode?'selected':''}>\u0e44\u0e21\u0e48\u0e2b\u0e31\u0e01</option>
                    <option value="Yes" ${r.taxMode==='Yes'?'selected':''}>\u0e15\u0e32\u0e21\u0e02\u0e31\u0e49\u0e19\u0e1a\u0e31\u0e19\u0e44\u0e14</option>
                    <option value="3" ${r.taxMode==='3'?'selected':''}>3% Fixed</option>
                    <option value="custom" ${r.taxMode==='custom'?'selected':''}>\u0e23\u0e30\u0e1a\u0e38\u0e40\u0e2d\u0e07</option>
                  </select>
                </div>
                <div><label class="pr-lbl">\u0e2b\u0e31\u0e01\u0e20\u0e32\u0e29\u0e35 (\u0e3f)</label><input ${RO} id="rdt" type="number" class="pr-input num" value="${r.deductTax||0}"></div>
                <div><label class="pr-lbl">\u0e2b\u0e31\u0e01\u0e2d\u0e37\u0e48\u0e19\u0e46 (\u0e3f)</label><input ${RO} id="rdo" type="number" class="pr-input num" value="${r.otherDeduct||0}"></div>
              </div>
            </div>
            <div class="rounded-2xl overflow-hidden border border-zinc-200">
              <table class="w-full text-sm">
                <tbody>
                  <tr class="pr-row-earn border-b border-green-100"><td class="px-5 py-3 font-bold text-green-700">\u0e23\u0e27\u0e21\u0e23\u0e32\u0e22\u0e44\u0e14\u0e49</td><td class="px-5 py-3 text-right font-black text-green-700 num" id="rte">\u0e3f${fmt(r.totalEarning)}</td></tr>
                  <tr class="pr-row-deduct border-b border-red-100"><td class="px-5 py-3 font-bold text-red-600">\u0e23\u0e27\u0e21\u0e2b\u0e31\u0e01</td><td class="px-5 py-3 text-right font-black text-red-600 num" id="rtd">\u0e3f${fmt(r.totalDeduct)}</td></tr>
                  <tr class="pr-row-net"><td class="px-5 py-4 font-black text-zinc-800 text-base">\u0e23\u0e27\u0e21\u0e23\u0e31\u0e1a (\u0e2a\u0e38\u0e17\u0e18\u0e34)</td><td class="px-5 py-4 text-right font-black text-green-600 text-xl num" id="rtn">\u0e3f${fmt(r.netPay)}</td></tr>
                </tbody>
              </table>
            </div>`;

            sEl('pr-net-prev').textContent=`\u0e3f ${fmt(r.netPay)}`;
            if(isDraft){
                ['rb','rd','rh','rc','rwd','rwh','rcu','reo','rdl','rds','rdt','rdo','rtm']
                    .forEach(id=>sEl(id)?.addEventListener('input',prRecalc));
            }
            const sb=sEl('pr-save-btn'); if(sb) sb.style.display=isDraft?'':'none';
            sEl('pr-modal-rec')?.classList.remove('hidden');
            prRecalc();
        };

        window.prCloseRec = () => { sEl('pr-modal-rec')?.classList.add('hidden'); editId=null; };

        window.prRecalc = () => {
            const b=gN('rb'),d=gN('rd'),h=gN('rh'),c=gN('rc');
            const wd=gN('rwd'),wh=gN('rwh'),cu=gN('rcu'),eo=gN('reo');
            const tm=sEl('rtm')?.value||'No';
            const eD=d*wd, eH=h*wh, eC=cu*(c/100)*b;
            const setT=(id,v)=>{const e=sEl(id);if(e)e.textContent=fmt(v);};
            setT('red',eD); setT('reh',eH); setT('rec',eC);
            const tEar=b+eD+eH+eC+eo;
            if(tm!=='custom'){const te=sEl('rdt');if(te)te.value=calcTax(b,tm);}
            const tDed=gN('rdl')+gN('rds')+gN('rdt')+gN('rdo');
            const net=tEar-tDed;
            const setTL=(id,v)=>{const e=sEl(id);if(e)e.textContent=`\u0e3f${fmt(v)}`;};
            setTL('rte',tEar); setTL('rtd',tDed); setTL('rtn',net);
            const p=sEl('pr-net-prev');if(p)p.textContent=`\u0e3f ${fmt(net)}`;
        };

        window.prSaveRec = async () => {
            if(!editId) return;
            const b=gN('rb'),d=gN('rd'),h=gN('rh'),c=gN('rc');
            const wd=gN('rwd'),wh=gN('rwh'),cu=gN('rcu'),eo=gN('reo');
            const tm=sEl('rtm')?.value||'No';
            const eD=d*wd,eH=h*wh,eC=cu*(c/100)*b;
            const tEar=b+eD+eH+eC+eo;
            const tDed=gN('rdl')+gN('rds')+gN('rdt')+gN('rdo');
            const net=tEar-tDed;
            const btn=sEl('pr-save-btn'); btn.disabled=true; btn.innerHTML='<i class="fa-solid fa-spinner fa-spin mr-2"></i> \u0e1a\u0e31\u0e19\u0e17\u0e36\u0e01...';
            try {
                await updateDoc(doc(db,'artifacts',APP_ID,'public','data','payroll_records',editId),{
                    nickname:gV('rn'),lineId:gV('rl'),
                    baseSalary:b,dailyWage:d,hourlyWage:h,commissionRate:c,
                    workDays:wd,workHours:wh,commissionUnits:cu,
                    earningDaily:eD,earningHourly:eH,earningCommission:eC,otherEarning:eo,
                    sickLeaveHours:gN('rls'),personalLeaveHours:gN('rlp'),
                    vacationLeaveHours:gN('rlv'),otherLeaveHours:gN('rlo'),lateHours:gN('rlt'),
                    deductLeave:gN('rdl'),deductSSO:gN('rds'),deductTax:gN('rdt'),otherDeduct:gN('rdo'),
                    taxMode:tm,totalEarning:tEar,totalDeduct:tDed,netPay:net,
                    updatedAt:new Date().toISOString(),
                });
                showToast('\u2705 \u0e1a\u0e31\u0e19\u0e17\u0e36\u0e01\u0e40\u0e23\u0e35\u0e22\u0e1a\u0e23\u0e49\u0e2d\u0e22','success');
                prCloseRec();
            } catch(err){showToast('\u274c '+err.message,'error');}
            finally{btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-save mr-2"></i> \u0e1a\u0e31\u0e19\u0e17\u0e36\u0e01';}
        };

        window.prFinal = async pid => {
            if(!confirm('\u0e2a\u0e23\u0e38\u0e1b\u0e07\u0e27\u0e14\u0e19\u0e35\u0e49? \u0e08\u0e30\u0e44\u0e21\u0e48\u0e2a\u0e32\u0e21\u0e32\u0e23\u0e16\u0e41\u0e01\u0e49\u0e44\u0e02\u0e44\u0e14\u0e49\u0e2d\u0e35\u0e01'))return;
            try{await updateDoc(doc(db,'artifacts',APP_ID,'public','data','payroll_periods',pid),
                {status:'final',finalizedAt:new Date().toISOString(),finalizedBy:profile.name});
                showToast('\u2705 \u0e2a\u0e23\u0e38\u0e1b\u0e07\u0e27\u0e14\u0e40\u0e23\u0e35\u0e22\u0e1a\u0e23\u0e49\u0e2d\u0e22','success');
            }catch(err){showToast('\u274c '+err.message,'error');}
        };
        window.prPaid = async pid => {
            if(!confirm('\u0e22\u0e37\u0e19\u0e22\u0e31\u0e19\u0e01\u0e32\u0e23\u0e08\u0e48\u0e32\u0e22\u0e40\u0e07\u0e34\u0e19\u0e40\u0e14\u0e37\u0e2d\u0e19\u0e07\u0e27\u0e14\u0e19\u0e35\u0e49?'))return;
            try{await updateDoc(doc(db,'artifacts',APP_ID,'public','data','payroll_periods',pid),
                {status:'paid',paidAt:new Date().toISOString(),paidBy:profile.name});
                showToast('\u2705 \u0e1a\u0e31\u0e19\u0e17\u0e36\u0e01\u0e01\u0e32\u0e23\u0e08\u0e48\u0e32\u0e22\u0e41\u0e25\u0e49\u0e27','success');
            }catch(err){showToast('\u274c '+err.message,'error');}
        };
        window.prDel = async pid => {
            if(!confirm('\u0e25\u0e1a\u0e07\u0e27\u0e14\u0e19\u0e35\u0e49\u0e41\u0e25\u0e30\u0e23\u0e32\u0e22\u0e01\u0e32\u0e23\u0e17\u0e31\u0e49\u0e07\u0e2b\u0e21\u0e14?'))return;
            try{
                const ex=await getDocs(query(collection(db,'artifacts',APP_ID,'public','data','payroll_records'),where('periodId','==',pid)));
                const b=writeBatch(db); ex.docs.forEach(d=>b.delete(d.ref));
                b.delete(doc(db,'artifacts',APP_ID,'public','data','payroll_periods',pid));
                await b.commit(); activeId=null;
                const panel=sEl('pr-panel');
                if(panel)panel.innerHTML=`<div class="bg-white rounded-2xl border border-zinc-200 p-10 flex flex-col items-center justify-center h-72 text-zinc-300"><i class="fa-solid fa-trash-can text-4xl mb-3 opacity-30"></i><p class="font-bold text-sm">\u0e25\u0e1a\u0e07\u0e27\u0e14\u0e40\u0e23\u0e35\u0e22\u0e1a\u0e23\u0e49\u0e2d\u0e22</p></div>`;
                showToast('\u0e25\u0e1a\u0e07\u0e27\u0e14\u0e41\u0e25\u0e49\u0e27','info');
            }catch(err){showToast('\u274c '+err.message,'error');}
        };

        window.prCSV = pid => {
            const period=periods.find(p=>p.id===pid);
            if(!period||!records.length){showToast('\u0e44\u0e21\u0e48\u0e21\u0e35\u0e02\u0e49\u0e2d\u0e21\u0e39\u0e25','error');return;}
            const H=['\u0e40\u0e07\u0e34\u0e19\u0e40\u0e14\u0e37\u0e2d\u0e19\u0e07\u0e27\u0e14\u0e17\u0e35\u0e48','\u0e1b\u0e35','\u0e15\u0e31\u0e49\u0e07\u0e41\u0e15\u0e48','\u0e16\u0e36\u0e07',
                '\u0e23\u0e2b\u0e31\u0e2a\u0e1e\u0e19\u0e31\u0e01\u0e07\u0e32\u0e19','\u0e0a\u0e37\u0e48\u0e2d-\u0e19\u0e32\u0e21\u0e2a\u0e01\u0e38\u0e25','\u0e0a\u0e37\u0e48\u0e2d\u0e40\u0e25\u0e48\u0e19','\u0e2a\u0e32\u0e02\u0e32','\u0e15\u0e33\u0e41\u0e2b\u0e19\u0e48\u0e07','Line ID',
                '\u0e40\u0e07\u0e34\u0e19\u0e40\u0e14\u0e37\u0e2d\u0e19','\u0e04\u0e48\u0e32\u0e08\u0e49\u0e32\u0e07\u0e23\u0e32\u0e22\u0e27\u0e31\u0e19','\u0e04\u0e48\u0e32\u0e08\u0e49\u0e32\u0e07\u0e23\u0e32\u0e22\u0e0a\u0e21.','\u0e2d\u0e31\u0e15\u0e23\u0e32\u0e04\u0e2d\u0e21\u0e21\u0e34\u0e0a\u0e0a\u0e31\u0e48\u0e19(%)',
                '\u0e23\u0e27\u0e21\u0e27\u0e31\u0e19\u0e17\u0e33\u0e07\u0e32\u0e19','\u0e23\u0e27\u0e21\u0e0a\u0e21.OT','\u0e23\u0e27\u0e21\u0e2b\u0e19\u0e48\u0e27\u0e22\u0e04\u0e2d\u0e21\u0e21\u0e34\u0e0a\u0e0a\u0e31\u0e48\u0e19',
                '\u0e23\u0e32\u0e22\u0e44\u0e14\u0e49\u0e08\u0e32\u0e01\u0e27\u0e31\u0e19','\u0e23\u0e32\u0e22\u0e44\u0e14\u0e49\u0e08\u0e32\u0e01\u0e0a\u0e21.','\u0e23\u0e32\u0e22\u0e44\u0e14\u0e49\u0e08\u0e32\u0e01\u0e04\u0e2d\u0e21\u0e21\u0e34\u0e0a\u0e0a\u0e31\u0e48\u0e19','\u0e23\u0e32\u0e22\u0e44\u0e14\u0e49\u0e2d\u0e37\u0e48\u0e19\u0e46',
                '\u0e25\u0e32\u0e1b\u0e48\u0e27\u0e22(\u0e0a\u0e21.)','\u0e25\u0e32\u0e01\u0e34\u0e08(\u0e0a\u0e21.)','\u0e25\u0e32\u0e1e\u0e31\u0e01\u0e23\u0e49\u0e2d\u0e19(\u0e0a\u0e21.)','\u0e25\u0e32\u0e2d\u0e37\u0e48\u0e19\u0e46(\u0e0a\u0e21.)','\u0e2a\u0e32\u0e22(\u0e0a\u0e21.)',
                '\u0e2b\u0e31\u0e01\u0e25\u0e32','\u0e2b\u0e31\u0e01\u0e1b\u0e23\u0e30\u0e01\u0e31\u0e19\u0e2a\u0e31\u0e07\u0e04\u0e21','\u0e2b\u0e31\u0e01\u0e20\u0e32\u0e29\u0e35','\u0e2b\u0e31\u0e01\u0e2d\u0e37\u0e48\u0e19\u0e46',
                '\u0e23\u0e27\u0e21\u0e23\u0e32\u0e22\u0e44\u0e14\u0e49','\u0e23\u0e27\u0e21\u0e2b\u0e31\u0e01','\u0e23\u0e27\u0e21\u0e23\u0e31\u0e1a\u0e2a\u0e38\u0e17\u0e18\u0e34'];
            const rows=records.map(r=>[
                r.periodNo,r.year,period.startDate,period.endDate,
                r.employeeCode,r.name,r.nickname||'',r.branch||'',r.position||'',r.lineId||'',
                r.baseSalary||0,r.dailyWage||0,r.hourlyWage||0,r.commissionRate||0,
                r.workDays||0,r.workHours||0,r.commissionUnits||0,
                r.earningDaily||0,r.earningHourly||0,r.earningCommission||0,r.otherEarning||0,
                r.sickLeaveHours||0,r.personalLeaveHours||0,r.vacationLeaveHours||0,r.otherLeaveHours||0,r.lateHours||0,
                r.deductLeave||0,r.deductSSO||0,r.deductTax||0,r.otherDeduct||0,
                r.totalEarning||0,r.totalDeduct||0,r.netPay||0
            ]);
            const csv=[H,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
            const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
            const url=URL.createObjectURL(blob);
            const a=Object.assign(document.createElement('a'),{href:url,download:`payroll_${period.periodNo}_${period.year}.csv`});
            a.click(); URL.revokeObjectURL(url);
            showToast('\ud83d\udce5 Export CSV \u0e2a\u0e33\u0e40\u0e23\u0e47\u0e08','success');
        };

        return () => {
            unsubP();
            if(unsubRec) unsubRec();
            ['prSel','prOpenCreate','prCloseCreate','prDoCreate','prGenAll',
             'prOpenRec','prCloseRec','prRecalc','prSaveRec',
             'prFinal','prPaid','prDel','prCSV'
            ].forEach(k=>delete window[k]);
        };
    }
};

      <!-- เวลาที่ขอ -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold text-zinc-500 mb-1 uppercase tracking-widest">เวลาเข้างาน</label>

          <input type="time" id="tr-time-out" class="w-full border-2 border-zinc-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:border-yellow-500 focus:outline-none">

        <label class="block text-xs font-bold text-zinc-500 mb-1 uppercase tracking-widest">เวลาเดิม (ที่ต้องการแก้)</label>
        <div class="grid grid-cols-2 gap-4">
          <input type="time" id="tr-orig-in" placeholder="เวลาเข้าเดิม" class="w-full border-2 border-zinc-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:border-yellow-500 focus:outline-none">
          <input type="time" id="tr-orig-out" placeholder="เวลาออกเดิม" class="w-full border-2 border-zinc-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:border-yellow-500 focus:outline-none">
        </div>
      </div>
      <!-- เหตุผล -->
      <div>
        <label class="block text-xs font-bold text-zinc-500 mb-1 uppercase tracking-widest">เหตุผล / รายละเอียด *</label>
        <textarea id="tr-reason" rows="3" placeholder="อธิบายสาเหตุ..." class="w-full border-2 border-zinc-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:border-yellow-500 focus:outline-none resize-none"></textarea>
      </div>
      <button onclick="trSubmit()" id="tr-submit-btn"
        class="w-full bg-yellow-500 hover:bg-yellow-400 text-zinc-900 font-black py-4 rounded-xl transition-all shadow-md uppercase tracking-widest text-sm flex items-center justify-center gap-2">
        <i class="fa-solid fa-paper-plane"></i> ส่งคำขอ
      </button>
    </div>
  </div>
</div>`,

    init: async (user, profile, db, APP_ID) => {
        const { collection, doc, addDoc, onSnapshot, query, where, orderBy, updateDoc }
            = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

        let allReqs = [], activeTab = 'explain', selectedType = 'explain';

        const unsub = onSnapshot(
            query(collection(db,'artifacts',APP_ID,'public','data','time_requests'),
                  where('uid','==',user.uid), orderBy('createdAt','desc')),
            snap => { allReqs = snap.docs.map(d=>({id:d.id,...d.data()})); renderList(); }
        );

        function renderList() {
            const el = document.getElementById('tr-list'); if(!el) return;
            const filtered = allReqs.filter(r => r.reqType === activeTab);
            if (!filtered.length) {
                el.innerHTML = `<div class="text-center py-16 text-zinc-300"><i class="fa-regular fa-calendar-xmark text-5xl mb-3"></i><p class="font-bold text-sm">ยังไม่มีคำขอ</p></div>`; return;
            }
            const ST = { pending:{label:'รออนุมัติ',cls:'bg-yellow-100 text-yellow-800 border border-yellow-200',icon:'fa-clock'},
                         approved:{label:'อนุมัติแล้ว',cls:'bg-green-100 text-green-800 border border-green-200',icon:'fa-circle-check'},
                         rejected:{label:'ไม่อนุมัติ',cls:'bg-red-100 text-red-700 border border-red-200',icon:'fa-circle-xmark'} };
            el.innerHTML = filtered.map(r => {
                const st = ST[r.status]||ST.pending;
                const timeStr = r.reqType === 'explain'
                    ? `เข้า ${r.timeIn||'-'} · ออก ${r.timeOut||'-'}`
                    : `เดิม ${r.origIn||'-'}/${r.origOut||'-'} → ใหม่ ${r.timeIn||'-'}/${r.timeOut||'-'}`;
                return `<div class="tr-card bg-white rounded-2xl border border-zinc-200 p-5 flex flex-col sm:flex-row sm:items-center gap-4">
                  <div class="w-12 h-12 rounded-2xl bg-zinc-100 flex items-center justify-center shrink-0">
                    <i class="fa-solid ${r.reqType==='explain'?'fa-comment-dots text-yellow-500':'fa-pen-to-square text-blue-500'} text-lg"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex flex-wrap items-center gap-2 mb-1">
                      <span class="font-black text-zinc-800 text-sm">${r.reqType==='explain'?'ชี้แจงไม่ได้บันทึก':'ขอแก้ไขเวลา'}</span>
                      <span class="text-[10px] font-black px-2.5 py-1 rounded-full ${st.cls}"><i class="fa-solid ${st.icon} mr-1"></i>${st.label}</span>
                    </div>
                    <p class="text-sm text-zinc-600 font-medium">${r.date} · ${timeStr}</p>
                    <p class="text-xs text-zinc-400 truncate mt-0.5">${r.reason}</p>
                    ${r.approverNote ? `<p class="text-xs text-red-500 mt-1 font-bold"><i class="fa-solid fa-comment mr-1"></i>${r.approverNote}</p>` : ''}
                  </div>
                  ${r.status==='pending' ? `<button onclick="trCancel('${r.id}')" class="shrink-0 text-[10px] text-red-500 font-black bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg transition-all">ยกเลิก</button>` : ''}
                </div>`;
            }).join('');
        }

        window.trTab = (tab) => {
            activeTab = tab;
            document.querySelectorAll('.tr-tab').forEach((b,i) => {
                const isA = (i===0&&tab==='explain')||(i===1&&tab==='fix');
                b.classList.toggle('active', isA);
                b.classList.toggle('text-zinc-500', !isA);
            });
            renderList();
        };

        window.trSetType = (t) => {
            selectedType = t;
            document.getElementById('tr-type-explain')?.classList.toggle('border-yellow-500', t==='explain');
            document.getElementById('tr-type-explain')?.classList.toggle('bg-yellow-50', t==='explain');
            document.getElementById('tr-type-explain')?.classList.toggle('border-zinc-200', t!=='explain');
            document.getElementById('tr-type-fix')?.classList.toggle('border-yellow-500', t==='fix');
            document.getElementById('tr-type-fix')?.classList.toggle('bg-yellow-50', t==='fix');
            document.getElementById('tr-type-fix')?.classList.toggle('border-zinc-200', t!=='fix');
            document.getElementById('tr-original-section')?.classList.toggle('hidden', t!=='fix');
        };

        window.trOpenModal = (prefill) => {
            selectedType = 'explain';
            trSetType('explain');
            const today = new Date().toISOString().slice(0,10);
            const d = document.getElementById('tr-date'); if(d) d.value = prefill?.date || today;
            ['tr-time-in','tr-time-out','tr-orig-in','tr-orig-out','tr-reason'].forEach(id => {
                const el = document.getElementById(id); if(el) el.value = '';
            });
            document.getElementById('tr-modal')?.classList.remove('hidden');
        };
        window.trCloseModal = () => document.getElementById('tr-modal')?.classList.add('hidden');

        window.trSubmit = async () => {
            const date   = document.getElementById('tr-date')?.value;
            const timeIn = document.getElementById('tr-time-in')?.value;
            const timeOut= document.getElementById('tr-time-out')?.value;
            const reason = document.getElementById('tr-reason')?.value.trim();
            if (!date || !reason) { showToast('กรุณากรอกข้อมูลให้ครบ', 'error'); return; }
            const btn = document.getElementById('tr-submit-btn');
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>';
            try {
                await addDoc(collection(db,'artifacts',APP_ID,'public','data','time_requests'), {
                    uid: user.uid, employeeName: profile.name, employeeCode: profile.employeeCode||'',
                    branch: profile.branch||'', photoURL: profile.photoURL||'',
                    reqType: selectedType, date, timeIn: timeIn||'', timeOut: timeOut||'',
                    origIn: document.getElementById('tr-orig-in')?.value||'',
                    origOut: document.getElementById('tr-orig-out')?.value||'',
                    reason, status: 'pending', createdAt: new Date().toISOString(),
                });
                showToast('✅ ส่งคำขอเรียบร้อย', 'success');
                trCloseModal();
            } catch(e) { showToast('❌ '+e.message, 'error'); }
            finally { btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-paper-plane mr-2"></i> ส่งคำขอ'; }
        };

        window.trCancel = async (id) => {
            if (!confirm('ยกเลิกคำขอนี้?')) return;
            try {
                await updateDoc(doc(db,'artifacts',APP_ID,'public','data','time_requests',id),
                    { status:'cancelled', cancelledAt: new Date().toISOString() });
                showToast('ยกเลิกแล้ว','info');
            } catch(e) { showToast('❌ '+e.message,'error'); }
        };

        renderList();
        return () => {
            unsub();
            ['trTab','trSetType','trOpenModal','trCloseModal','trSubmit','trCancel'].forEach(k=>delete window[k]);
        };
    }
};

    init: async (user, profile, db, APP_ID) => {
        if (profile.role !== 'admin' && profile.role !== 'manager') { navigateTo('home'); return; }
        const { collection, doc, addDoc, onSnapshot, query, orderBy, updateDoc, where, getDocs }
            = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

        let allReqs = [], pendingAction = null;

        const unsub = onSnapshot(
            query(collection(db,'artifacts',APP_ID,'public','data','time_requests'), orderBy('createdAt','desc')),
            snap => {
                allReqs = snap.docs.map(d=>({id:d.id,...d.data()}));
                updateStats(); taFilter();
            }
        );

        function updateStats() {
            const s = (st) => allReqs.filter(r=>r.status===st).length;
            const setT = (id,v) => { const e=document.getElementById(id); if(e) e.textContent=v; };
            setT('ta-stat-p', s('pending')); setT('ta-stat-a', s('approved')); setT('ta-stat-r', s('rejected'));
        }

        window.taFilter = () => {
            const f = document.getElementById('ta-filter')?.value||'pending';
            const list = f==='all' ? allReqs : allReqs.filter(r=>r.status===f);
            renderList(list);
        };

        function renderList(list) {
            const el = document.getElementById('ta-list'); if(!el) return;
            if (!list.length) { el.innerHTML=`<div class="text-center py-16 text-zinc-300"><i class="fa-regular fa-folder-open text-5xl mb-3"></i><p class="font-bold text-sm">ไม่มีคำขอในหมวดนี้</p></div>`; return; }
            const ST = { pending:{label:'รออนุมัติ',cls:'bg-yellow-100 text-yellow-800 border border-yellow-200',icon:'fa-clock'},
                         approved:{label:'อนุมัติแล้ว',cls:'bg-green-100 text-green-800 border border-green-200',icon:'fa-circle-check'},
                         rejected:{label:'ไม่อนุมัติ',cls:'bg-red-100 text-red-700 border border-red-200',icon:'fa-circle-xmark'},
                         cancelled:{label:'ยกเลิก',cls:'bg-zinc-100 text-zinc-500 border border-zinc-200',icon:'fa-ban'} };
            const av = r => r.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(r.employeeName)}&background=f4f4f5&color=27272a&bold=true`;
            el.innerHTML = list.map(r => {
                const st = ST[r.status]||ST.pending;
                const isPending = r.status==='pending';
                const typeLabel = r.reqType==='explain' ? '💬 ชี้แจงไม่ได้บันทึก' : '✏️ ขอแก้ไขเวลา';
                const timeInfo = r.reqType==='explain'
                    ? `เข้า ${r.timeIn||'-'} · ออก ${r.timeOut||'-'}`
                    : `เดิม ${r.origIn||'-'}/${r.origOut||'-'} → ใหม่ ${r.timeIn||'-'}/${r.timeOut||'-'}`;

                  <div class="flex flex-col lg:flex-row gap-4">
                    <div class="flex items-center gap-3 lg:w-48 shrink-0">

                      <div class="min-w-0">
                        <p class="font-black text-zinc-800 text-sm truncate">${r.employeeName}</p>
                        <p class="text-[10px] text-zinc-400 font-bold uppercase">${r.employeeCode||''}</p>
                        <p class="text-[10px] text-zinc-400">${r.branch||''}</p>
                      </div>
                    </div>
                    <div class="flex-1">
                      <div class="flex flex-wrap items-center gap-2 mb-1.5">
                        <span class="font-bold text-zinc-800 text-sm">${typeLabel}</span>
                        <span class="text-[10px] font-black px-2.5 py-1 rounded-full ${st.cls}"><i class="fa-solid ${st.icon} mr-1"></i>${st.label}</span>
                      </div>
                      <p class="text-sm font-bold text-zinc-600">📅 ${r.date} · ${timeInfo}</p>
                      <p class="text-xs text-zinc-400 mt-1 line-clamp-2">${r.reason}</p>
                      ${r.approverNote ? `<p class="text-xs text-zinc-500 mt-1 bg-zinc-50 px-3 py-1 rounded-lg border"><i class="fa-solid fa-comment mr-1 text-zinc-400"></i>${r.approverNote}</p>` : ''}
                    </div>
                    ${isPending ? `<div class="flex lg:flex-col gap-2 shrink-0 justify-end">
                      <button onclick="taOpenAction('${r.id}','approve')" class="inline-flex items-center gap-2 bg-green-500 hover:bg-green-400 text-white font-black px-5 py-2.5 rounded-xl text-xs uppercase tracking-widest transition-all shadow-sm">
                        <i class="fa-solid fa-check"></i> อนุมัติ
                      </button>
                      <button onclick="taOpenAction('${r.id}','reject')" class="inline-flex items-center gap-2 bg-red-50 hover:bg-red-500 text-red-600 hover:text-white border-2 border-red-200 hover:border-red-500 font-black px-5 py-2.5 rounded-xl text-xs uppercase tracking-widest transition-all">

                    </div>` : `<div class="shrink-0 text-right text-xs">
                      <p class="text-zinc-400">โดย ${r.approvedBy||'-'}</p>

                  </div>
                </div>`;
            }).join('');
        }

        window.taOpenAction = (id, action) => {
            const r = allReqs.find(x=>x.id===id); if(!r) return;
            pendingAction = {id, action};
            const isApp = action==='approve';
            const hdr = document.getElementById('ta-action-header');
            if(hdr) hdr.className = `px-7 py-5 ${isApp?'bg-green-600':'bg-red-600'}`;
            const title = document.getElementById('ta-action-title');
            if(title) title.textContent = isApp ? '✅ อนุมัติคำขอ' : '❌ ไม่อนุมัติคำขอ';
            const det = document.getElementById('ta-action-detail');
            if(det) det.innerHTML = `
                <div class="flex justify-between"><span class="text-zinc-400">พนักงาน</span><span class="font-bold">${r.employeeName}</span></div>

            const btn = document.getElementById('ta-confirm-btn');
            if(btn) { btn.className = `flex-1 py-3 font-black rounded-xl text-sm text-white ${isApp?'bg-green-500 hover:bg-green-400':'bg-red-500 hover:bg-red-400'}`; btn.textContent = isApp ? 'ยืนยันอนุมัติ' : 'ยืนยันไม่อนุมัติ'; }

            if (!pendingAction) return;
            const {id, action} = pendingAction;
            const note = document.getElementById('ta-action-note')?.value.trim();
            const btn = document.getElementById('ta-confirm-btn');
            btn.disabled=true; btn.textContent='กำลังบันทึก...';

                await updateDoc(doc(db,'artifacts',APP_ID,'public','data','time_requests',id), {
                    status: action==='approve' ? 'approved' : 'rejected',
                    approvedBy: profile.name, approvedAt: new Date().toISOString(), approverNote: note||'',
                });
                // ถ้าอนุมัติ → สร้าง time_log จริงใน Firestore
                if (action==='approve' && r) {
                    const logsToCreate = [];
                    if (r.timeIn) logsToCreate.push({ type:'clock_in',  time: r.timeIn });
                    if (r.timeOut) logsToCreate.push({ type:'clock_out', time: r.timeOut });
                    for (const entry of logsToCreate) {
                        const ts = new Date(`${r.date}T${entry.time}:00`).toISOString();
                        await addDoc(collection(db,'artifacts',APP_ID,'public','data','time_logs'), {
                            uid: r.uid, type: entry.type,
                            timestamp: ts, localDate: r.date,
                            note: `[${r.reqType==='explain'?'ชี้แจง':'แก้ไข'}] อนุมัติโดย ${profile.name}`,
                            isAdjusted: true, requestId: id,
                        });
                    }
                }
                showToast(action==='approve' ? '✅ อนุมัติแล้ว' : '❌ ไม่อนุมัติ', action==='approve'?'success':'info');
                taCloseAction();
            } catch(e) { showToast('❌ '+e.message,'error'); }
            finally { btn.disabled=false; }
        };

        return () => {
            unsub();
            ['taFilter','taOpenAction','taCloseAction','taConfirm'].forEach(k=>delete window[k]);
        };
    }
};

    init: async (user, profile, db, APP_ID) => {
        if (profile.role !== 'admin') { navigateTo('home'); return; }
        const { collection, doc, addDoc, getDocs, onSnapshot, query, orderBy, where, limit }
            = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

        let employees = [], csvData = [];

        // Load employees
        const empSnap = await getDocs(collection(db,'artifacts',APP_ID,'public','data','users'));
        employees = empSnap.docs.map(d=>d.data()).filter(e=>e.uid);
        const sel = document.getElementById('ti-emp');
        if(sel) {
            employees.sort((a,b)=>a.name.localeCompare(b.name,'th')).forEach(e => {
                const opt = document.createElement('option');
                opt.value = e.uid; opt.textContent = `${e.name} (${e.employeeCode||''})`;
                sel.appendChild(opt);
            });
        }

        // Set today
        const ti = document.getElementById('ti-date');
        if(ti) ti.value = new Date().toISOString().slice(0,10);

        // Recent imports
        const unsub = onSnapshot(
            query(collection(db,'artifacts',APP_ID,'public','data','time_logs'),
                  where('isImported','==',true), orderBy('importedAt','desc'), limit(50)),
            snap => {
                const logs = snap.docs.map(d=>({id:d.id,...d.data()}));
                const cnt = document.getElementById('ti-log-count');
                if(cnt) cnt.textContent = logs.length + ' รายการ';
                const el = document.getElementById('ti-log-list');
                if(!el) return;
                if(!logs.length){ el.innerHTML='<div class="p-6 text-center text-zinc-400 text-sm">ยังไม่มีรายการ</div>'; return; }
                el.innerHTML = logs.map(l => {
                    const emp = employees.find(e=>e.uid===l.uid);
                    return `<div class="flex items-center gap-4 px-5 py-3">
                      <div class="w-8 h-8 rounded-lg ${l.type==='clock_in'?'bg-green-100':'bg-red-100'} flex items-center justify-center shrink-0">
                        <i class="fa-solid ${l.type==='clock_in'?'fa-right-to-bracket text-green-600':'fa-right-from-bracket text-red-500'} text-xs"></i>
                      </div>
                      <div class="flex-1 min-w-0">
                        <p class="font-bold text-zinc-800 text-xs truncate">${emp?.name||l.uid}</p>
                        <p class="text-[10px] text-zinc-400">${l.localDate} · ${l.timestamp?.slice(11,16)||''} · ${l.note||''}</p>
                      </div>
                      <span class="text-[10px] font-black text-zinc-400 bg-zinc-100 px-2 py-0.5 rounded-full">${l.importedBy||'Admin'}</span>
                    </div>`;
                }).join('');
            }
        );

        window.tiSaveOne = async () => {
            const uid  = document.getElementById('ti-emp')?.value;
            const date = document.getElementById('ti-date')?.value;
            const tin  = document.getElementById('ti-in')?.value;
            const tout = document.getElementById('ti-out')?.value;
            const note = document.getElementById('ti-note')?.value||'นำเข้าโดย Admin';
            if (!uid || !date) { showToast('กรุณาเลือกพนักงานและวันที่', 'error'); return; }
            if (!tin && !tout) { showToast('กรุณาใส่เวลาอย่างน้อย 1 รายการ', 'error'); return; }
            const btn = document.getElementById('ti-save-btn');
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>';
            try {
                const toImport = [];
                if (tin)  toImport.push({ type:'clock_in',  time: tin });
                if (tout) toImport.push({ type:'clock_out', time: tout });
                for (const e of toImport) {
                    const ts = new Date(`${date}T${e.time}:00`).toISOString();
                    await addDoc(collection(db,'artifacts',APP_ID,'public','data','time_logs'), {
                        uid, type: e.type, timestamp: ts, localDate: date,
                        note, isImported: true, importedBy: profile.name,
                        importedAt: new Date().toISOString(),
                    });
                }
                showToast(`✅ นำเข้า ${toImport.length} รายการสำเร็จ`, 'success');
                document.getElementById('ti-in').value='';
                document.getElementById('ti-out').value='';
                document.getElementById('ti-note').value='';
            } catch(e) { showToast('❌ '+e.message,'error'); }
            finally { btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-plus mr-2"></i> เพิ่มรายการ'; }
        };

        window.tiParseCSV = (input) => {
            const file = input.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const lines = e.target.result.split('\n').filter(l=>l.trim());
                csvData = [];
                const rows = [];
                lines.slice(1).forEach((line, i) => {
                    const parts = line.split(',').map(s=>s.trim().replace(/"/g,''));
                    const [code, date, timeIn, timeOut, note] = parts;
                    if (!code || !date) return;
                    const emp = employees.find(e=>e.employeeCode===code||e.uid===code);
                    const status = emp ? '✅ พบ' : '❌ ไม่พบ';
                    csvData.push({ uid: emp?.uid, code, date, timeIn, timeOut, note: note||'Import CSV', found: !!emp });
                    rows.push(`<tr class="border-b border-zinc-100 ${!emp?'bg-red-50':''}">
                      <td class="px-3 py-2 font-bold">${code}</td>
                      <td class="px-3 py-2">${date}</td>
                      <td class="px-3 py-2">${timeIn||'-'}</td>
                      <td class="px-3 py-2">${timeOut||'-'}</td>
                      <td class="px-3 py-2">${status}</td>
                    </tr>`);
                });
                document.getElementById('ti-csv-rows').innerHTML = rows.join('');
                document.getElementById('ti-csv-count').textContent = `พบ ${csvData.length} แถว (พนักงานที่รู้จัก ${csvData.filter(r=>r.found).length} คน)`;
                document.getElementById('ti-import-count').textContent = csvData.filter(r=>r.found).length;
                document.getElementById('ti-csv-preview').classList.remove('hidden');
            };
            reader.readAsText(file, 'UTF-8');
        };

        window.tiImportCSV = async () => {
            const valid = csvData.filter(r=>r.found);
            if (!valid.length) { showToast('ไม่มีรายการที่นำเข้าได้', 'error'); return; }
            const btn = document.getElementById('ti-import-btn');
            btn.disabled=true; btn.innerHTML='<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังนำเข้า...';
            try {
                let count = 0;
                for (const row of valid) {
                    const toAdd = [];
                    if (row.timeIn)  toAdd.push({ type:'clock_in',  time:row.timeIn });
                    if (row.timeOut) toAdd.push({ type:'clock_out', time:row.timeOut });
                    for (const e of toAdd) {
                        const ts = new Date(`${row.date}T${e.time}:00`).toISOString();
                        await addDoc(collection(db,'artifacts',APP_ID,'public','data','time_logs'), {
                            uid: row.uid, type: e.type, timestamp: ts, localDate: row.date,
                            note: row.note, isImported: true, importedBy: profile.name,
                            importedAt: new Date().toISOString(),
                        });
                        count++;
                    }
                }
                showToast(`✅ นำเข้า ${count} รายการสำเร็จ`, 'success');
                document.getElementById('ti-csv-preview').classList.add('hidden');
                csvData = [];
            } catch(e) { showToast('❌ '+e.message,'error'); }
            finally { btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-bolt mr-2"></i> นำเข้า'; }
        };

        window.tiDownloadTemplate = () => {
            const csv = 'employee_code,date,time_in,time_out,note\nEMP001,2025-03-01,08:05,17:30,import\nEMP002,2025-03-01,08:10,17:45,\n';
            const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
            const a = Object.assign(document.createElement('a'), {href:URL.createObjectURL(blob), download:'time_import_template.csv'});
            a.click();
        };

        return () => {
            unsub();
            ['tiSaveOne','tiParseCSV','tiImportCSV','tiDownloadTemplate'].forEach(k=>delete window[k]);
        };
    }
};

    init: async (user, profile, db, APP_ID) => {
        if (profile.role !== 'admin') { navigateTo('home'); return; }
        const { collection, doc, addDoc, setDoc, deleteDoc, onSnapshot, orderBy, query, writeBatch }
            = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

        let allHolidays = [];

        const unsub = onSnapshot(
            query(collection(db,'artifacts',APP_ID,'public','data','public_holidays'), orderBy('date','asc')),
            snap => {
                allHolidays = snap.docs.map(d=>({id:d.id,...d.data()}));
                window._publicHolidays = allHolidays; // sync global cache
                buildYearFilter();
                holFilterYear();
            }
        );

        function buildYearFilter() {
            const sel = document.getElementById('hol-year-filter'); if(!sel) return;
            const years = [...new Set(allHolidays.map(h => (parseInt(h.date.slice(0,4))+543).toString()))].sort();
            const curVal = sel.value;
            sel.innerHTML = '<option value="all">ทั้งหมด</option>' + years.map(y=>`<option value="${y}" ${y===curVal?'selected':''}>${y}</option>`).join('');
        }

        window.holFilterYear = () => {
            const yr = document.getElementById('hol-year-filter')?.value;
            const filtered = yr==='all' ? allHolidays : allHolidays.filter(h => (parseInt(h.date.slice(0,4))+543).toString()===yr);
            renderList(filtered);
            const cnt = document.getElementById('hol-count');
            if(cnt) cnt.textContent = filtered.length + ' วัน';
        };

        const TYPE_MAP = { national:'วันหยุดนักขัตฤกษ์', royal:'วันหยุดราชการพิเศษ', company:'วันหยุดบริษัท', regional:'วันหยุดประจำภูมิภาค' };
        const DAY_NAMES = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];

        function renderList(list) {
            const el = document.getElementById('hol-list'); if(!el) return;
            if (!list.length) { el.innerHTML=`<div class="p-10 text-center text-zinc-300"><i class="fa-regular fa-calendar-xmark text-4xl mb-3 block"></i><p class="font-bold text-sm">ยังไม่มีวันหยุด</p></div>`; return; }
            // Group by year
            const grouped = {};
            list.forEach(h => {
                const yr = (parseInt(h.date.slice(0,4))+543).toString();
                if (!grouped[yr]) grouped[yr] = [];
                grouped[yr].push(h);
            });
            let html = '';
            Object.keys(grouped).sort().forEach(yr => {
                html += `<div class="px-5 py-3 bg-zinc-50 border-b border-zinc-100 flex items-center gap-2">
                    <i class="fa-solid fa-calendar-days text-yellow-500 text-sm"></i>
                    <span class="font-black text-zinc-700 text-xs uppercase tracking-widest">ปี ${yr}</span>
                    <span class="text-[10px] text-zinc-400 font-bold ml-auto">${grouped[yr].length} วัน</span>
                </div>`;
                grouped[yr].forEach(h => {
                    const d = new Date(h.date+'T00:00:00');
                    const dayName = DAY_NAMES[d.getDay()];
                    const thDate = d.toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'});
                    const typeBadge = { national:'bg-red-100 text-red-700', royal:'bg-purple-100 text-purple-700', company:'bg-blue-100 text-blue-700', regional:'bg-orange-100 text-orange-700' }[h.type]||'bg-zinc-100 text-zinc-600';
                    html += `<div class="flex items-center gap-4 px-5 py-4 hover:bg-zinc-50 transition-all group">
                      <div class="w-12 text-center shrink-0">
                        <p class="text-lg font-black text-zinc-800">${d.getDate()}</p>
                        <p class="text-[10px] text-zinc-400 font-bold">${dayName}</p>
                      </div>
                      <div class="w-px h-10 bg-zinc-200 shrink-0"></div>
                      <div class="flex-1 min-w-0">
                        <div class="flex flex-wrap items-center gap-2">
                          <p class="font-black text-zinc-800 text-sm">${h.name}</p>
                          ${h.nameEn ? `<p class="text-xs text-zinc-400">${h.nameEn}</p>` : ''}
                          <span class="text-[10px] font-black px-2 py-0.5 rounded-full ${typeBadge}">${TYPE_MAP[h.type]||h.type}</span>
                        </div>
                        <p class="text-xs text-zinc-400 mt-0.5">${thDate}</p>
                      </div>
                      <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-all shrink-0">
                        <button onclick="holOpenModal('${h.id}')" class="w-8 h-8 rounded-lg bg-zinc-100 hover:bg-yellow-400 flex items-center justify-center transition-all"><i class="fa-solid fa-pen text-xs"></i></button>
                        <button onclick="holDelete('${h.id}')" class="w-8 h-8 rounded-lg bg-zinc-100 hover:bg-red-400 hover:text-white flex items-center justify-center transition-all"><i class="fa-solid fa-trash text-xs"></i></button>
                      </div>
                    </div>`;
                });
            });
            el.innerHTML = html;
        }

        window.holOpenModal = (id) => {
            const h = id ? allHolidays.find(x=>x.id===id) : null;
            const setV = (elId, v) => { const e=document.getElementById(elId); if(e) e.value=v||''; };
            setV('hol-edit-id', id||'');
            setV('hol-date',    h?.date||'');
            setV('hol-name',    h?.name||'');
            setV('hol-name-en', h?.nameEn||'');
            setV('hol-type',    h?.type||'national');
            const title = document.getElementById('hol-modal-title');
            if(title) title.textContent = id ? 'แก้ไขวันหยุด' : 'เพิ่มวันหยุด';
            document.getElementById('hol-modal')?.classList.remove('hidden');
        };
        window.holCloseModal = () => document.getElementById('hol-modal')?.classList.add('hidden');

        window.holSave = async () => {
            const date   = document.getElementById('hol-date')?.value;
            const name   = document.getElementById('hol-name')?.value.trim();
            const nameEn = document.getElementById('hol-name-en')?.value.trim();
            const type   = document.getElementById('hol-type')?.value;
            const editId = document.getElementById('hol-edit-id')?.value;
            if (!date || !name) { showToast('กรุณากรอกวันที่และชื่อวันหยุด', 'error'); return; }
            const btn = document.getElementById('hol-save-btn');
            btn.disabled=true; btn.innerHTML='<i class="fa-solid fa-spinner fa-spin mr-2"></i>';
            try {
                const payload = { date, name, nameEn: nameEn||'', type, updatedAt: new Date().toISOString() };
                if (editId) {
                    await setDoc(doc(db,'artifacts',APP_ID,'public','data','public_holidays',editId), payload, {merge:true});
                } else {
                    payload.createdAt = new Date().toISOString();
                    payload.createdBy = profile.name;
                    await addDoc(collection(db,'artifacts',APP_ID,'public','data','public_holidays'), payload);
                }
                showToast('✅ บันทึกวันหยุดแล้ว', 'success');
                holCloseModal();
            } catch(e) { showToast('❌ '+e.message,'error'); }
            finally { btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-save mr-2"></i> บันทึก'; }
        };

        window.holDelete = async (id) => {
            const h = allHolidays.find(x=>x.id===id);
            if (!confirm(`ลบวันหยุด "${h?.name}" ?`)) return;
            try {
                await deleteDoc(doc(db,'artifacts',APP_ID,'public','data','public_holidays',id));
                showToast('ลบแล้ว','info');
            } catch(e) { showToast('❌ '+e.message,'error'); }
        };

        // Preset วันหยุด 2568
        window.holAddPreset = async () => {
            const preset = [
                {date:'2025-01-01',name:'วันขึ้นปีใหม่',nameEn:'New Year\'s Day',type:'national'},
                {date:'2025-02-12',name:'วันมาฆบูชา',nameEn:'Makha Bucha Day',type:'national'},
                {date:'2025-04-06',name:'วันจักรี',nameEn:'Chakri Memorial Day',type:'national'},
                {date:'2025-04-13',name:'วันสงกรานต์',nameEn:'Songkran Festival',type:'national'},
                {date:'2025-04-14',name:'วันสงกรานต์',nameEn:'Songkran Festival',type:'national'},
                {date:'2025-04-15',name:'วันสงกรานต์',nameEn:'Songkran Festival',type:'national'},
                {date:'2025-05-01',name:'วันแรงงานแห่งชาติ',nameEn:'National Labour Day',type:'national'},
                {date:'2025-05-05',name:'วันฉัตรมงคล',nameEn:'Coronation Day',type:'national'},
                {date:'2025-05-12',name:'วันวิสาขบูชา',nameEn:'Visakha Bucha Day',type:'national'},
                {date:'2025-06-03',name:'วันเฉลิมพระชนมพรรษา สมเด็จพระราชินี',nameEn:'Queen\'s Birthday',type:'national'},
                {date:'2025-07-10',name:'วันอาสาฬหบูชา',nameEn:'Asarnha Bucha Day',type:'national'},
                {date:'2025-07-11',name:'วันเข้าพรรษา',nameEn:'Buddhist Lent Day',type:'national'},
                {date:'2025-07-28',name:'วันเฉลิมพระชนมพรรษา ร.10',nameEn:'King\'s Birthday',type:'national'},
                {date:'2025-08-12',name:'วันแม่แห่งชาติ',nameEn:'Mother\'s Day',type:'national'},
                {date:'2025-10-13',name:'วันนวมินทรมหาราช',nameEn:'Navamindra Maharaj Day',type:'national'},
                {date:'2025-10-23',name:'วันปิยมหาราช',nameEn:'Chulalongkorn Day',type:'national'},
                {date:'2025-12-05',name:'วันพ่อแห่งชาติ',nameEn:'Father\'s Day',type:'national'},
                {date:'2025-12-10',name:'วันรัฐธรรมนูญ',nameEn:'Constitution Day',type:'national'},
                {date:'2025-12-31',name:'วันสิ้นปี',nameEn:'New Year\'s Eve',type:'national'},
            ];
            if (!confirm(`เพิ่มวันหยุดนักขัตฤกษ์ปี 2568 จำนวน ${preset.length} วัน?`)) return;
            try {
                const batch = writeBatch(db);
                preset.forEach(h => {
                    const ref = doc(collection(db,'artifacts',APP_ID,'public','data','public_holidays'));
                    batch.set(ref, {...h, createdAt: new Date().toISOString(), createdBy: profile.name});
                });
                await batch.commit();
                showToast(`✅ เพิ่ม ${preset.length} วันหยุดสำเร็จ`, 'success');
            } catch(e) { showToast('❌ '+e.message,'error'); }
        };

        return () => {
            unsub();
            ['holFilterYear','holOpenModal','holCloseModal','holSave','holDelete','holAddPreset'].forEach(k=>delete window[k]);
        };
    }
};

    </script>
</body>
</html>
